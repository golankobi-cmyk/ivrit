<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>עברית · Vincenzo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0e1b2c; --navy2:#15293f; --navy3:#1e3450; --panel:#16293d;
  --ink:#0e1b2c; --warm:#f7f3ea; --warm2:#efe7d6; --paper:#fbf8f1;
  --gold:#c9a24b; --gold2:#e0c074; --goldsoft:#f0e2bf;
  --line:rgba(201,162,75,.22); --muted:#8aa0b6; --good:#5fa07a; --bad:#c96a5a;
  --shadow:0 18px 50px -22px rgba(0,0,0,.55);
  --serif:'Spectral',Georgia,serif; --sans:'Outfit',system-ui,sans-serif; --heb:'Heebo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:radial-gradient(1200px 600px at 80% -10%,#173049 0,var(--navy) 55%) fixed,var(--navy);
  color:var(--warm);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.55}
.heb{font-family:var(--heb);direction:rtl;unicode-bidi:embed}
.app{display:flex;min-height:100vh}
/* sidebar */
.side{width:228px;flex:0 0 228px;background:linear-gradient(180deg,#0c1827,#0e1b2c);
  border-right:1px solid var(--line);padding:22px 14px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:6px;overflow:auto}
.brand{display:flex;align-items:baseline;gap:10px;padding:6px 10px 16px}
.brand .he{font-family:var(--heb);font-weight:800;font-size:30px;color:var(--gold2);direction:rtl}
.brand small{color:var(--muted);font-family:var(--serif);font-style:italic;font-size:13px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{all:unset;display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;
  cursor:pointer;color:#b9c8d6;font-size:14.5px;transition:.18s}
.nav button .ic{width:18px;text-align:center;opacity:.85}
.nav button:hover{background:rgba(201,162,75,.08);color:var(--warm)}
.nav button.on{background:linear-gradient(90deg,rgba(201,162,75,.18),rgba(201,162,75,.04));
  color:var(--gold2);box-shadow:inset 2px 0 0 var(--gold)}
.side .foot{margin-top:auto;padding:10px;color:var(--muted);font-size:11.5px;line-height:1.5}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--bad);margin-inline-end:6px;vertical-align:middle}
.dot.ok{background:var(--good)}
/* main */
.main{flex:1;min-width:0;padding:34px 40px 80px;max-width:1040px}
.view{display:none;animation:fade .4s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
h1{font-family:var(--serif);font-weight:700;font-size:34px;letter-spacing:-.01em;color:var(--paper)}
h2{font-family:var(--serif);font-weight:600;font-size:22px;color:var(--gold2);margin:26px 0 12px}
h3{font-family:var(--sans);font-weight:600;font-size:15px;color:var(--warm);margin:0 0 4px}
p{color:#cdd9e4}
.lead{color:var(--muted);font-family:var(--serif);font-style:italic;font-size:16px;margin-top:4px}
.card{background:linear-gradient(180deg,var(--panel),#13243a);border:1px solid var(--line);
  border-radius:16px;padding:20px 22px;box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)}
.pill{display:inline-block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;
  color:var(--gold2);border:1px solid var(--line);border-radius:999px;padding:3px 9px}
.btn{all:unset;cursor:pointer;background:linear-gradient(180deg,var(--gold2),var(--gold));
  color:#241a04;font-weight:600;font-size:13.5px;padding:9px 16px;border-radius:10px;transition:.15s}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn.ghost{background:transparent;color:var(--gold2);border:1px solid var(--line)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.spread{justify-content:space-between}
.he-lg{font-family:var(--heb);direction:rtl;font-size:30px;font-weight:700;color:var(--paper)}
.tl{color:var(--gold2);font-style:italic;font-family:var(--serif)}
.en{color:#cdd9e4}
.muted{color:var(--muted)}
.tag{font-size:10.5px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 7px}
/* dashboard stats */
.stat{display:flex;flex-direction:column;gap:2px}
.stat b{font-family:var(--serif);font-size:32px;color:var(--gold2);font-weight:700}
.stat span{color:var(--muted);font-size:12.5px;text-transform:uppercase;letter-spacing:.05em}
.bar{height:8px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}
/* accordion */
.acc{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:12px;background:#13243a}
.acc>summary{cursor:pointer;list-style:none;padding:16px 20px;display:flex;justify-content:space-between;
  align-items:center;gap:12px}
.acc>summary::-webkit-details-marker{display:none}
.acc[open]>summary{border-bottom:1px solid var(--line);background:rgba(201,162,75,.05)}
.acc .body{padding:18px 20px;display:flex;flex-direction:column;gap:16px}
.sec h4{color:var(--gold2);font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:4px}
th,td{text-align:start;padding:7px 10px;border-bottom:1px solid rgba(201,162,75,.12)}
th{color:var(--gold2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
td .heb{font-size:17px}
.rate{display:flex;gap:6px;align-items:center}
.rate b{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);display:grid;place-items:center;
  cursor:pointer;color:var(--muted);font-size:13px}
.rate b.on{background:var(--gold);color:#241a04;border-color:var(--gold)}
/* vocab */
.vbatch{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.vbatch button{all:unset;cursor:pointer;padding:7px 13px;border-radius:999px;border:1px solid var(--line);
  color:#b9c8d6;font-size:13px}
.vbatch button.on{background:rgba(201,162,75,.16);color:var(--gold2)}
.vcard{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);
  border-radius:12px;background:#13243a;margin-bottom:8px}
.vcard.done{border-color:rgba(95,160,122,.5);background:rgba(95,160,122,.07)}
.vmeta{display:flex;flex-direction:column;gap:1px}
.spk{all:unset;cursor:pointer;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
  display:grid;place-items:center;color:var(--gold2);font-size:15px;flex:0 0 auto}
.spk:hover{background:rgba(201,162,75,.1)}
/* story */
.s-sent{padding:11px 14px;border-radius:11px;border:1px solid transparent;cursor:pointer;transition:.15s}
.s-sent:hover{background:rgba(201,162,75,.06);border-color:var(--line)}
.s-sent .heb{font-size:21px;color:var(--paper)}
.s-sent .tl{font-size:13.5px;display:block;margin-top:2px}
.s-sent .en{font-size:13.5px;display:block;color:var(--muted)}
/* conversa */
.chat{display:flex;flex-direction:column;gap:10px;max-height:46vh;overflow:auto;padding:6px 2px}
.msg{max-width:78%;padding:11px 15px;border-radius:14px;font-size:15px}
.msg.ai{align-self:flex-start;background:#13243a;border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.me{align-self:flex-end;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#241a04;border-bottom-right-radius:4px}
.msg .heb{font-size:18px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chips button{all:unset;cursor:pointer;font-size:13px;border:1px solid var(--line);border-radius:999px;
  padding:6px 12px;color:#b9c8d6}
.chips button:hover{background:rgba(201,162,75,.1);color:var(--gold2)}
.inp,textarea,select{width:100%;background:#0e1c2d;border:1px solid var(--line);border-radius:11px;
  color:var(--warm);padding:11px 14px;font-family:var(--sans);font-size:14px}
.inp:focus,textarea:focus{outline:none;border-color:var(--gold)}
textarea.heb{font-size:18px;min-height:120px}
label{display:block;font-size:12.5px;color:var(--muted);margin:14px 0 5px;letter-spacing:.03em}
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer}
.switch input{display:none}
.track{width:42px;height:24px;border-radius:99px;background:#24405c;position:relative;transition:.2s}
.track::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.switch input:checked+.track{background:var(--gold)}
.switch input:checked+.track::after{left:21px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:16px}
.note{font-size:12.5px;color:var(--muted);background:rgba(201,162,75,.06);border:1px solid var(--line);
  border-radius:10px;padding:10px 13px;margin-top:12px}
.hr{height:1px;background:var(--line);margin:22px 0}
.kbd{font-family:var(--heb);direction:rtl;font-size:40px;color:var(--paper);text-align:center}
.alefcell{border:1px solid var(--line);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;background:#13243a}
.alefcell:hover{background:rgba(201,162,75,.08)}
.alefcell small{display:block;color:var(--muted);font-size:11px;margin-top:4px}
@media(max-width:860px){
  .app{flex-direction:column}.side{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;gap:2px}
  .brand{width:100%}.nav{flex-direction:row;flex-wrap:wrap}.main{padding:24px 18px 70px}
  .g3,.g2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="he">עברית</span><small>for Vincenzo</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">
      <div><span class="dot" id="syncDot"></span><span id="syncTxt">offline</span></div>
      <div style="margin-top:6px">Modern Hebrew · Ulpan Aleph→Dalet</div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
/* ============ STATE & STORAGE (hardcoded user) ============ */
const USER_ID='vincenzo';
const DRIVE_FOLDER='1jqZwxO-5IhaiMxn7WkS0_EDadN_4VQlr';
const LS='ivrit_state_'+USER_ID;
const defaultState={
  user:USER_ID, nikud:true, streak:0, lastDay:null,
  grammar:{}, vocab:{}, exercises:{}, stories:{},
  cfg:{anthropicKey:'', supaUrl:'', supaKey:''},
  updated:Date.now()
};
let S=load();
function load(){try{return Object.assign({},defaultState,JSON.parse(localStorage.getItem(LS))||{})}catch(e){return {...defaultState}}}
function save(){S.updated=Date.now();localStorage.setItem(LS,JSON.stringify(S));syncUp();}
function touchDay(){const d=new Date().toDateString();if(S.lastDay!==d){S.streak=(S.lastDay&&(new Date(d)-new Date(S.lastDay))<=864e5*1.5)?S.streak+1:1;S.lastDay=d;}}

/* ============ HEBREW HELPERS ============ */
function stripNikud(t){return t.replace(/[\u0591-\u05C7]/g,'')}
function showHeb(t){return S.nikud?t:stripNikud(t)}
let voices=[];
function loadVoices(){voices=speechSynthesis.getVoices()}
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function speak(t){
  if(!('speechSynthesis'in window))return;
  const u=new SpeechSynthesisUtterance(stripNikud(t));u.lang='he-IL';
  const v=voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith('he'));if(v)u.voice=v;
  u.rate=.92;speechSynthesis.cancel();speechSynthesis.speak(u);
}

/* ============ SUPABASE SYNC (newer-wins, configurable) ============ */
async function syncUp(){
  const {supaUrl,supaKey}=S.cfg||{};if(!supaUrl||!supaKey){setSync(false);return;}
  try{
    await fetch(supaUrl.replace(/\/$/,'')+'/rest/v1/progress?on_conflict=user_id',{
      method:'POST',headers:{'apikey':supaKey,'Authorization':'Bearer '+supaKey,
        'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify([{user_id:USER_ID,state:S,updated_at:new Date(S.updated).toISOString()}])
    });setSync(true);
  }catch(e){setSync(false)}
}
async function syncDown(){
  const {supaUrl,supaKey}=S.cfg||{};if(!supaUrl||!supaKey)return;
  try{
    const r=await fetch(supaUrl.replace(/\/$/,'')+'/rest/v1/progress?user_id=eq.'+USER_ID+'&select=state,updated_at',
      {headers:{'apikey':supaKey,'Authorization':'Bearer '+supaKey}});
    const rows=await r.json();
    if(rows&&rows[0]&&rows[0].state){
      const remote=rows[0].state;
      if((remote.updated||0)>(S.updated||0)){S=Object.assign({},defaultState,remote);localStorage.setItem(LS,JSON.stringify(S));render();}
    }
    setSync(true);
  }catch(e){setSync(false)}
}
function setSync(ok){const d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');
  if(!d)return;d.className='dot'+(ok?' ok':'');t.textContent=ok?'synced':( (S.cfg&&S.cfg.supaUrl)?'sync error':'offline');}

/* ============ BACKUP (JSON export; Drive via connected assistant) ============ */
function backupJSON(){
  const name='ivrit-backup-'+new Date().toISOString().slice(0,10)+'.json';
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}
function importJSON(file){const r=new FileReader();r.onload=e=>{try{S=Object.assign({},defaultState,JSON.parse(e.target.result));save();render();alert('Backup restored.')}catch(_){alert('Invalid file.')}};r.readAsText(file);}

/* ============ CONTENT ============ */
/* --- Grammar: 17 chapters (rule / table / examples / pitfalls / deeper) --- */
const GRAMMAR=[
 {id:1,t:"The Alphabet & Pronunciation",lvl:"A1.1",rule:"22 consonants, written right to left. Vowels are mostly small marks (nikud) under letters, not letters themselves. Five letters take a final shape at word end. No capitals.",
  table:[["א","alef","silent carrier"],["ב","bet","b / v"],["ח","chet","ch (guttural)"],["כ","kaf","k / kh (final ך)"],["צ","tzadi","tz (final ץ)"],["ר","resh","r (French-like)"],["שׁ/שׂ","shin/sin","sh / s"]],
  ex:[["שָׁלוֹם","shalom","hello"],["בַּיִת","bayit","house"]],
  pit:"Vowels map almost exactly onto Italian a-e-i-o-u, so your ear is ready. The hard part is the throat sound ח and the soft כ (nothing like Italian), the French-style ר, and reading right to left.",
  deep:"A dot (dagesh) flips three letters: בּ b/ב v, כּ k/כ kh, פּ p/פ f. Same letter, two sounds."},
 {id:2,t:"Present Tense (Pa'al)",lvl:"A1.1",rule:"The present has only four forms, agreeing by gender and number (m.sg, f.sg, m.pl, f.pl). No personal endings, the pronoun does that. No 'am/is/are'.",
  table:[["m.sg","כּוֹתֵב","kotev"],["f.sg","כּוֹתֶבֶת","kotevet"],["m.pl","כּוֹתְבִים","kotvim"],["f.pl","כּוֹתְבוֹת","kotvot"]],
  ex:[["אֲנִי לוֹמֵד עִבְרִית","ani lomed ivrit","I learn Hebrew"],["אֲנַחְנוּ גָּרִים בְּבֶּרְלִין","anachnu garim be-Berlin","we live in Berlin"]],
  pit:"Italian conjugates by person; Hebrew present does not, so it feels too easy. But you cannot drop the pronoun the way Italian drops it: 'parlo' must become אֲנִי מְדַבֵּר.",
  deep:"Sub-patterns (גָּר, בָּא, שׁוֹתֶה) look different from כּוֹתֵב. Learn each frequent verb as a unit."},
 {id:3,t:"Nouns & Grammatical Gender",lvl:"A1.1",rule:"Every noun is masculine or feminine, like Italian. Feminine often ends ־ָה or ־ֶת. Plurals: ־ִים (m), ־וֹת (f), with exceptions.",
  table:[["בַּיִת (m)","house","בָּתִּים"],["שֻׁלְחָן (m)","table","שֻׁלְחָנוֹת"],["דִּירָה (f)","apartment","דִּירוֹת"],["יֶלֶד (m)","child","יְלָדִים"]],
  ex:[["הַמִּשְׁפָּחָה שֶׁלִּי גְּדוֹלָה","ha-mishpacha sheli gdola","my family is big"]],
  pit:"Italian helps: you already think in genders. But genders do not always match across languages, and endings lie (שֻׁלְחָן is m but takes ־וֹת). Learn each noun with its gender, like il/la.",
  deep:"A few nouns are feminine with no feminine ending: אֶבֶן, עִיר, דֶּרֶךְ."},
 {id:4,t:"The Article ה & Object Marker אֶת",lvl:"A1.2",rule:"No word for 'a/an'. 'The' is the prefix הַ. A definite direct object is marked by אֶת, which has no English/Italian equivalent.",
  table:[["בַּיִת","a house","—"],["הַבַּיִת","the house","ha-bayit"],["אֶת הַכֶּלֶב","the dog (object)","et ha-kelev"]],
  ex:[["אֲנִי פּוֹתֵחַ אֶת הַחַלּוֹן","ani pote'ach et ha-chalon","I open the window"],["אֲנִי שׁוֹתֶה קָפֶה","ani shote kafe","I drink coffee (indefinite, no אֶת)"]],
  pit:"You will hunt for 'a/an' (there is none) and forget אֶת (nothing matches it). Rule: definite object → אֶת; indefinite → nothing.",
  deep:"Prepositions fuse with הַ: בְּ+הַבַּיִת → בַּבַּיִת; לְ+הַשּׁוּק → לַשּׁוּק."},
 {id:5,t:"Adjective Agreement & Placement",lvl:"A1.2",rule:"Adjectives come after the noun (like Italian) and agree in gender and number. If the noun is definite, the adjective also takes הַ.",
  table:[["בַּיִת גָּדוֹל","big house (m)","bayit gadol"],["דִּירָה גְּדוֹלָה","big apartment (f)","dira gdola"],["הַבַּיִת הַגָּדוֹל","the big house","ha-bayit ha-gadol"]],
  ex:[["הַכֶּלֶב הַשָּׁחוֹר","ha-kelev ha-shachor","the black dog"]],
  pit:"Italian places adjectives after the noun too (casa grande), so you start ahead. New thing: double definiteness, both noun and adjective take הַ. Forgetting the second הַ is the classic slip.",
  deep:"Comparative יוֹתֵר / פָּחוֹת; superlative הֲכִי."},
 {id:6,t:"Numbers & Telling Time",lvl:"A1.2",rule:"Numbers have masculine and feminine forms. The feminine form is used for counting aloud and feminine nouns; masculine nouns take the longer masculine forms.",
  table:[["3","שָׁלוֹשׁ / שְׁלוֹשָׁה","f / m"],["5","חָמֵשׁ / חֲמִשָּׁה","f / m"],["10","עֶשֶׂר / עֲשָׂרָה","f / m"]],
  ex:[["מָה הַשָּׁעָה? הַשָּׁעָה שָׁלוֹשׁ","ma ha-sha'a? ha-sha'a shalosh","what time is it? it's three"]],
  pit:"Harder than Italian, where numbers do not change. The feminine form is the default for counting, which feels backwards. '2' is special: שְׁתַּיִם alone, שְׁתֵּי before a noun.",
  deep:"Ordinals build the weekdays: יוֹם רִאשׁוֹן = Sunday ('first day')."},
 {id:7,t:"Past Tense (Pa'al)",lvl:"A2",rule:"The past conjugates by person with suffixes, much more like Italian. The root stays visible; the vowels shift.",
  table:[["I","כָּתַבְתִּי","katavti"],["you m","כָּתַבְתָּ","katavta"],["he","כָּתַב","katav"],["she","כָּתְבָה","katva"],["we","כָּתַבְנוּ","katavnu"]],
  ex:[["אֶתְמוֹל בִּשַּׁלְתִּי פַּסְטָה","etmol bishalti pasta","yesterday I cooked pasta"]],
  pit:"Relief after the article-free present: it conjugates by person like Italian. Trap: vowels inside the stem shift (כָּתַב vs כָּתְבָה). Track the three root letters under the changing vowels.",
  deep:"One past tense covers both 'I wrote' and 'I was writing'; context decides (no ho scritto vs scrivevo split)."},
 {id:8,t:"Future Tense (Pa'al)",lvl:"A2",rule:"The future uses prefixes by person: א (I), תּ (you/she), י (he), נ (we).",
  table:[["I","אֶכְתֹּב","echtov"],["you m","תִּכְתֹּב","tichtov"],["he","יִכְתֹּב","yichtov"],["we","נִכְתֹּב","nichtov"]],
  ex:[["מָחָר אֶלְמַד עִבְרִית","machar elmad ivrit","tomorrow I will learn Hebrew"]],
  pit:"Prefix system is new (Italian future uses endings). 'you m.sg' and 'she' share תִּכְתֹּב. The future doubles as a polite request, like Italian's conditional: תִּרְצֶה קָפֶה? = would you like coffee?",
  deep:"Spoken Hebrew uses the future for soft commands and 'let's': נֵלֵךְ."},
 {id:9,t:"Pronouns & the Missing 'To Be'",lvl:"A2",rule:"No present-tense 'to be'. 'I am Italian' is just אֲנִי אִיטַלְקִי. In past/future, 'to be' returns (הָיָה / יִהְיֶה).",
  table:[["I","אֲנִי","ani"],["you m","אַתָּה","ata"],["he","הוּא","hu"],["we","אֲנַחְנוּ","anachnu"]],
  ex:[["קוֹבִּי הוּא הַבַּעַל שֶׁלִּי","Kobi hu ha-ba'al sheli","Kobi is my husband"],["הַקָּפֶה חַם","ha-kafe cham","the coffee is hot"]],
  pit:"English speakers reach for 'is/are'; Italian for 'sono'. Hebrew has truly nothing in the present. Resist inserting a word. A pronoun can act as a soft 'is': קוֹבִּי הוּא יִשְׂרְאֵלִי.",
  deep:"Past of 'to be' also means 'had': הָיָה לִי כֶּלֶב = I had a dog."},
 {id:10,t:"Possession: yesh / shel / smichut",lvl:"A2",rule:"No verb 'to have'. Possession is יֵשׁ לִי ('there is to me'). Ownership uses שֶׁל. Linking two nouns often uses smichut, a construct chain.",
  table:[["I have","יֵשׁ לִי","yesh li"],["he has","יֵשׁ לוֹ","yesh lo"],["I don't have","אֵין לִי","ein li"],["Kobi's house","הַבַּיִת שֶׁל קוֹבִּי","—"]],
  ex:[["יֵשׁ לִי מִשְׁפָּחָה גְּדוֹלָה","yesh li mishpacha gdola","I have a big family"],["אֲרוּחַת שַׁבָּת","aruchat shabat","the Shabbat meal (smichut)"]],
  pit:"No 'to have' is the big switch (Italian ho, English have). Drill יֵשׁ לִי. In a definite smichut chain only the LAST noun takes הַ: בֵּית הַקָּפֶה.",
  deep:"Suffix possession: בֵּיתִי = my house. More formal; שֶׁל is fine in speech."},
 {id:11,t:"Question Formation",lvl:"A2",rule:"Yes/no questions use statement word order with rising intonation. Information questions start with a question word.",
  table:[["מַה","what"],["מִי","who"],["אֵיפֹה","where"],["כַּמָּה","how much/many"],["מֵאַיִן","from where"]],
  ex:[["כַּמָּה זֶה עוֹלֶה?","kama ze ole?","how much does it cost?"],["מֵאַיִן אַתָּה?","me-ayin ata?","where are you from?"]],
  pit:"No 'do/does' and no inversion. אַתָּה גָּר בְּבֶּרְלִין? with rising tone = 'do you live in Berlin?'. Italian is close (also intonation). A name: אֵיךְ קוֹרְאִים לְךָ?",
  deep:"אֵיזֶה (m) / אֵיזוֹ (f) for 'which'. Question words embed: אֲנִי לֹא יוֹדֵעַ אֵיפֹה הוּא."},
 {id:12,t:"The Pi'el Binyan",lvl:"A2",rule:"Second major verb pattern, often intensive. Many everyday verbs simply live here. Present: מְ prefix + doubled middle letter.",
  table:[["present","מְדַבֵּר","medaber"],["past I","דִּבַּרְתִּי","dibarti"],["past he","דִּבֵּר","diber"]],
  ex:[["אֲנִי מְבַשֵּׁל פַּסְטָה","ani mevashel pasta","I cook pasta"]],
  pit:"The binyan system itself is the hurdle, nothing like it in Italian/English. Same root can sit in several binyanim. Learn the binyan as part of the verb.",
  deep:"The מְ present-prefix is shared by Pi'el, Hif'il, Hitpa'el; the internal vowels tell them apart."},
 {id:13,t:"The Hif'il Binyan (causative)",lvl:"B1",rule:"Hif'il makes something happen: enlarge, bring in. Present: מ prefix and a long י vowel.",
  table:[["m.sg","מַתְחִיל","matchil"],["understand","מֵבִין","mevin"],["know (person)","מַכִּיר","makir"]],
  ex:[["אֲנִי מֵבִין קְצָת עִבְרִית","ani mevin ktzat ivrit","I understand a little Hebrew"]],
  pit:"מֵבִין and מַכִּיר are common irregular-looking Hif'il, memorise them. Hebrew splits 'know' exactly like Italian: יוֹדֵעַ=sapere (facts), מַכִּיר=conoscere (people). You have an edge over English speakers here.",
  deep:"Causative pairs: בָּא (come) → מֵבִיא (bring)."},
 {id:14,t:"The Hitpa'el Binyan (reflexive)",lvl:"B1",rule:"Reflexive/reciprocal: actions to oneself or to each other. Present: מִתְ prefix.",
  table:[["get dressed","מִתְלַבֵּשׁ","mitlabesh"],["wake up","מִתְעוֹרֵר","mit'orer"],["miss/long","מִתְגַּעְגֵּעַ","mitga'age'a"]],
  ex:[["אֲנִי מִתְגַּעְגֵּעַ לְסִיצִילְיָה","ani mitga'age'a le-Sitzilya","I miss Sicily"]],
  pit:"Big Italian advantage: Hitpa'el maps onto Italian -si verbs (vestirsi → מִתְלַבֵּשׁ, svegliarsi → מִתְעוֹרֵר). Trap: with ס/שׁ/צ roots the ת swaps place (הִסְתַּכֵּל).",
  deep:"Also 'becoming': מִשְׁתַּפֵּר (improves), מִתְרַגֵּל (gets used to)."},
 {id:15,t:"The Nif'al Binyan (passive)",lvl:"B1",rule:"Usually the passive/middle counterpart of Pa'al. Present starts with נ.",
  table:[["enters","נִכְנָס","nichnas"],["stays","נִשְׁאָר","nish'ar"],["is born","נוֹלַד","nolad"]],
  ex:[["קוֹבִּי נוֹלַד בְּתֵל אָבִיב","Kobi nolad be-Tel Aviv","Kobi was born in Tel Aviv"]],
  pit:"Passive sense overlaps Italian's si-passive (la porta si chiude). Trap: very common verbs are secretly Nif'al, נוֹלַד, נִכְנָס, נִשְׁאָר. Memorise them as Nif'al.",
  deep:"For states, speech prefers an adjective: הַחֲנוּת סְגוּרָה (closed)."},
 {id:16,t:"Irregular Roots",lvl:"B1",rule:"Some roots bend the patterns: gutturals (א ה ח ע ר), hollow roots (vav/yod middle: בָּא, קָם), double-letter roots. They bend predictably.",
  table:[["get up (present)","קָם","kam"],["get up (past I)","קַמְתִּי","kamti"],["come (we, past)","בָּאנוּ","banu"]],
  ex:[["אֲנִי קָם בְּשֶׁבַע","ani kam be-sheva","I get up at seven"]],
  pit:"They feel irregular but are systematic: gutturals just refuse certain vowels, so a substitute appears. Drill the daily hollow verbs as a family: בָּא, קָם, שָׂם, רָץ.",
  deep:"Roots starting נ or י drop/assimilate letters (נוֹפֵל → אֶפֹּל)."},
 {id:17,t:"Prepositions with Suffixes",lvl:"B1",rule:"Prepositions fuse with pronouns as suffixes instead of staying separate ('to me' = one word).",
  table:[["to me","לִי","li"],["to him","לוֹ","lo"],["with me","אִתִּי","iti"],["our","שֶׁלָּנוּ","shelanu"]],
  ex:[["הוּא עוֹזֵר לִי","hu ozer li","he helps me"],["אֲנִי גָּר אִתּוֹ","ani gar ito","I live with him"]],
  pit:"Both Italian and English keep them separate (a me / to me), so fusion is the novelty. Only a handful are high-frequency; drill לִי/לְךָ/לוֹ first, they ride on verbs like עוֹזֵר and נוֹתֵן.",
  deep:"Some take a plural-looking base: עַל → עָלַי, אֶל → אֵלַי."}

     <div class="body">
       <div class="sec"><h4>The rule</h4><p>${c.rule}</p></div>
       <div class="sec"><h4>The table</h4><table><tbody>${c.table.map(r=>`<tr>${r.map((cell,ci)=>ci===0&&/[\u0590-\u05FF]/.test(cell)?`<td class="heb"><span class="heb">${showHeb(cell)}</span></td>`:/[\u0590-\u05FF]/.test(cell)?`<td><span class="heb" style="font-size:17px">${showHeb(cell)}</span></td>`:`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
       <div class="sec"><h4>Examples in context</h4>${c.ex.map(e=>`<div class="row" style="gap:10px;margin-bottom:6px"><button class="spk" data-speak="${e[0]}">♪</button><span class="heb" style="font-size:19px">${showHeb(e[0])}</span><span class="tl">${e[1]}</span><span class="muted">· ${e[2]}</span></div>`).join('')}</div>
       <div class="sec"><h4>Pitfalls for Italian & English speakers</h4><p>${c.pit}</p></div>
       <div class="sec"><h4>Go deeper</h4><p>${c.deep}</p></div>
       ${rateRow(c.id)}
     </div></details>`).join('')}
  </div>`;
}

let curBatch=0;
function vVocab(){
  const b=VOCAB[curBatch];
  return `<div class="view on"><div class="topbar"><div><h1>Vocabulary</h1><div class="lead">${vocabCount()} learned · themed by your life</div></div>${nikudToggleHTML()}</div>
   <div class="vbatch">${VOCAB.map((x,i)=>`<button class="${i===curBatch?'on':''}" data-batch="${i}">${x.theme}</button>`).join('')}</div>
   ${b.words.map((w,i)=>{const key=b.theme+':'+i;const done=S.vocab[key];
     return `<div class="vcard ${done?'done':''}"><div class="row" style="gap:14px"><button class="spk" data-speak="${w[0]}">♪</button>
       <div class="vmeta"><span class="heb" style="font-size:23px;color:var(--paper)">${showHeb(w[0])}</span><span class="tl">${w[1]}</span></div></div>
       <div class="row" style="gap:12px"><div class="vmeta" style="text-align:end"><span class="en">${w[2]}</span><span class="muted" style="font-size:12.5px">${w[3]}</span></div>
       <button class="btn ${done?'ghost':''} sm" data-vocab="${key}">${done?'✓ known':'mark known'}</button></div></div>`;}).join('')}
   <div class="note">Italian shown for contrast. The verb batch lists present-tense masculine forms, your default.</div>
  </div>`;
}

function vVerbs(){
  return `<div class="view on"><div class="topbar"><div><h1>Verbs</h1><div class="lead">Conjugation across the binyanim. Present, past, future.</div></div>${nikudToggleHTML()}</div>
   <div class="grid g2">${VERBS.map(v=>`<div class="card"><div class="row spread"><div><span class="heb" style="font-size:24px;color:var(--paper)">${showHeb(v.inf)}</span> <span class="muted">${v.en}</span></div><span class="tag">${v.binyan}</span></div>
     <div class="muted" style="font-size:12.5px;margin:4px 0 8px">root <span class="heb">${v.root}</span></div>
     <table><thead><tr><th>Present</th><th>Past</th><th>Future</th></tr></thead><tbody>
     ${[0,1,2].map(i=>`<tr><td><span class="muted" style="font-size:11px">${v.present[i][0]}</span> <span class="heb" style="font-size:17px">${showHeb(v.present[i][1])}</span></td>
       <td><span class="muted" style="font-size:11px">${v.past[i][0]}</span> <span class="heb" style="font-size:17px">${showHeb(v.past[i][1])}</span></td>
       <td><span class="muted" style="font-size:11px">${v.future[i][0]}</span> <span class="heb" style="font-size:17px">${showHeb(v.future[i][1])}</span></td></tr>`).join('')}
     </tbody></table>
     <div class="row" style="margin-top:8px"><button class="spk" data-speak="${v.present[0][1]}">♪</button><span class="muted" style="font-size:12px">hear present</span></div></div>`).join('')}</div>
  </div>`;
}

let curStory=null;
function vStories(){
  if(curStory){const st=STORIES.find(s=>s.id===curStory);
    return `<div class="view on"><div class="topbar"><div><button class="btn ghost sm" data-stories-back="1">← all stories</button><h1 style="margin-top:10px"><span class="heb">${showHeb(st.t)}</span></h1><div class="lead">${st.en} · ${st.lvl}</div></div>${nikudToggleHTML()}</div>
     <div class="card"><div class="row" style="margin-bottom:10px"><button class="btn sm" data-readall="${st.id}">♪ read whole story</button></div>
       ${st.s.map(x=>`<div class="s-sent" data-speak="${x[0]}"><span class="heb">${showHeb(x[0])}</span><span class="tl">${x[1]}</span><span class="en">${x[2]}</span></div>`).join('')}</div>
     <div class="note">Tap any sentence to hear it. Turn nikud off (top right) once the shapes feel familiar.</div></div>`;}
  return `<div class="view on"><h1>Stories</h1><div class="lead">Grounded in your life. Hebrew, transliteration, English on every line.</div>
   <div class="grid g2" style="margin-top:14px">${STORIES.map(s=>`<div class="card"><span class="tag">${s.lvl}</span><h3 style="margin-top:8px"><span class="heb" style="font-size:22px">${showHeb(s.t)}</span></h3><p class="muted">${s.en}</p><div class="row" style="margin-top:12px"><button class="btn sm" data-story="${s.id}">Read</button></div></div>`).join('')}</div>
   <div class="note">Four stories embedded here. The full bank of 20 lives in story-bank.md, ready to load.</div></div>`;
}

function vPractice(){
  return `<div class="view on"><h1>Practice</h1><div class="lead">Exercises by chapter. Answer in your head, then reveal.</div>
   ${EXERCISES.map(ex=>`<div class="card" style="margin-top:14px"><div class="row spread"><h3>Ch ${ex.ch} · ${ex.t}</h3><span class="tag">${ex.items.length} items</span></div>
     ${ex.items.map((it,i)=>`<div style="margin-top:12px"><div class="row" style="gap:8px"><span class="muted">${i+1}.</span><span class="heb" style="font-size:17px">${showHeb(it.q)}</span></div>
       <div class="row" style="margin-top:6px"><button class="btn ghost sm" data-reveal>show answer</button><span class="answer heb" style="display:none;color:var(--gold2);font-size:17px">${showHeb(it.a)}</span></div></div>`).join('')}</div>`).join('')}
   <div class="note">More chapters covered in exercise-bank.md, ready to load into this tab.</div></div>`;
}

let chat=[];let curConv=null;
function vConversa(){
  if(curConv){const sc=CONVERSA.find(c=>c.id===curConv);
   const hasKey=!!(S.cfg&&S.cfg.anthropicKey);
   return `<div class="view on"><div class="topbar"><div><button class="btn ghost sm" data-conv-back="1">← scenarios</button><h1 style="margin-top:10px">${sc.t}</h1><div class="lead">${sc.lvl} · live roleplay</div></div>${nikudToggleHTML()}</div>
    <div class="card"><div class="chat" id="chat"></div>
      <div class="row" style="margin-top:12px;gap:8px"><input class="inp heb" id="convInput" placeholder="הָקֵשׁ תְּשׁוּבָה..." style="flex:1"><button class="btn" id="convSend">שְׁלַח</button></div>
      <div class="chips">${sc.chips.map(c=>`<button data-chip="${c}">${showHeb(c)}</button>`).join('')}</div>
      ${hasKey?'':'<div class="note">Add your Anthropic API key in Settings to enable live AI replies. Until then you can still read the opening lines and rehearse with the suggested chips.</div>'}
    </div></div>`;}
  return `<div class="view on"><h1>Conversa</h1><div class="lead">16 scenarios. Real people, real situations.</div>
   <div class="grid g2" style="margin-top:14px">${CONVERSA.map(c=>`<div class="card"><div class="row spread"><h3>${c.t}</h3><span class="tag">${c.lvl}</span></div>
     <p class="muted" style="font-size:13px;margin-top:6px"><span class="heb" style="font-size:16px">${showHeb(c.open[0])}</span></p>
     <div class="row" style="margin-top:12px"><button class="btn sm" data-conv="${c.id}">Open</button></div></div>`).join('')}</div></div>`;
}

function vWrite(){
  return `<div class="view on"><h1>Write</h1><div class="lead">Free practice. Write in Hebrew, hear it back, keep notes.</div>
   <div class="card" style="margin-top:14px"><label>Your text (Hebrew)</label><textarea class="heb" id="writeBox" placeholder="כְּתֹב כָּאן...">${S.writeDraft||''}</textarea>
     <div class="row" style="margin-top:10px"><button class="btn sm" id="writeSpeak">♪ read aloud</button><button class="btn ghost sm" id="writeSave">save draft</button><span class="muted" id="writeMsg"></span></div></div>
   <div class="note">Prompt ideas: describe your morning, write Angela a few lines, list what you cooked this week, plan the next Tel Aviv trip.</div></div>`;
}

function vPron(){
  return `<div class="view on"><h1>Pronunciation</h1><div class="lead">The alef-bet and the vowels. Tap to hear each one.</div>
   <h2>Letters</h2><div class="grid" style="grid-template-columns:repeat(6,1fr)">${ALEFBET.map(l=>`<div class="alefcell" data-speak="${l[0].split('/')[0]}"><span class="kbd">${l[0]}</span><small>${l[1]} · ${l[2]}</small></div>`).join('')}</div>
   <h2>Vowels (on the letter ב)</h2><div class="grid" style="grid-template-columns:repeat(6,1fr)">${VOWELS.map(v=>`<div class="alefcell" data-speak="${v[0]}"><span class="kbd">${v[0]}</span><small>${v[1]} · ${v[2]}</small></div>`).join('')}</div>
   <div class="note">Vincenzo's edge: the vowels a-e-i-o-u sound almost exactly like Italian. The work is in ח, the soft כ, and the French-style ר.</div></div>`;
}

function vSettings(){
  const c=S.cfg||{};
  return `<div class="view on"><h1>Settings</h1><div class="lead">Private to you. Stored on this device, synced if you add Supabase.</div>
   <div class="card" style="margin-top:14px"><h3>Display</h3>
     <div class="row spread" style="margin-top:10px"><span>Show nikud (vowel marks) by default</span>
       <label class="switch"><input type="checkbox" id="setNikud" ${S.nikud?'checked':''}><span class="track"></span></label></div></div>

   <div class="card" style="margin-top:14px"><h3>Conversa AI key</h3>
     <p class="muted" style="font-size:13px">Your own Anthropic API key powers the live roleplay. It stays on your device.</p>
     <label>Anthropic API key</label><input class="inp" id="setAnthropic" type="password" placeholder="sk-ant-..." value="${c.anthropicKey||''}"></div>

   <div class="card" style="margin-top:14px"><h3>Sync (Supabase · project "ivrit")</h3>
     <p class="muted" style="font-size:13px">Create a fresh Supabase project named ivrit, add a table <b>progress</b> (columns: user_id text primary key, state jsonb, updated_at timestamptz), then paste its URL and anon key. Newer-wins, separate from the Italian app.</p>
     <label>Supabase URL</label><input class="inp" id="setSupaUrl" placeholder="https://xxxx.supabase.co" value="${c.supaUrl||''}">
     <label>Supabase anon key</label><input class="inp" id="setSupaKey" type="password" placeholder="eyJ..." value="${c.supaKey||''}">
     <div class="row" style="margin-top:12px"><button class="btn sm" id="setSave">save settings</button><button class="btn ghost sm" id="setPull">pull from cloud</button></div></div>

   <div class="card" style="margin-top:14px"><h3>Backup</h3>
     <p class="muted" style="font-size:13px">Download a JSON snapshot (filename ivrit-backup-YYYY-MM-DD.json). Save it to your Drive folder, or hand it to your Drive-connected assistant to file automatically. Restore any time.</p>
     <div class="row" style="margin-top:12px"><button class="btn sm" id="setBackup">download backup</button>
       <label class="btn ghost sm" style="cursor:pointer">restore<input type="file" id="setRestore" accept="application/json" style="display:none"></label></div>
     <div class="muted" style="font-size:12px;margin-top:10px">Drive folder: ${DRIVE_FOLDER}</div></div>

   <div class="note">True one-click Drive auto-backup needs Google OAuth, which a static page can't do safely on its own. The JSON export plus your Drive-connected assistant covers the same ground without exposing credentials.</div>
  </div>`;
}

function nikudToggleHTML(){return `<label class="switch" title="nikud"><input type="checkbox" id="nikudTop" ${S.nikud?'checked':''}><span class="track"></span></label>`;}

/* ============ BIND ============ */
function bindView(){
  document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{current=b.dataset.go;buildNav();render();window.scrollTo(0,0);});
  document.querySelectorAll('[data-speak]').forEach(b=>b.onclick=e=>{e.stopPropagation();speak(b.dataset.speak);});
  document.querySelectorAll('[data-grammar]').forEach(b=>b.onclick=()=>{window.__openCh=+b.dataset.grammar;current='grammar';buildNav();render();});
  // confidence
  document.querySelectorAll('[data-rate]').forEach(r=>r.querySelectorAll('b').forEach(b=>b.onclick=()=>{const id=r.dataset.rate;S.grammar[id]=+b.dataset.n;touchDay();save();render();}));
  document.querySelectorAll('[data-practice]').forEach(b=>b.onclick=()=>{current='practice';buildNav();render();});
  // nikud toggles
  const nt=document.getElementById('nikudTop');if(nt)nt.onchange=()=>{S.nikud=nt.checked;save();render();};
  // vocab
  document.querySelectorAll('[data-batch]').forEach(b=>b.onclick=()=>{curBatch=+b.dataset.batch;render();});
  document.querySelectorAll('[data-vocab]').forEach(b=>b.onclick=()=>{const k=b.dataset.vocab;S.vocab[k]=!S.vocab[k];touchDay();save();render();});
  // stories
  document.querySelectorAll('[data-story]').forEach(b=>b.onclick=()=>{curStory=b.dataset.story;S.stories[curStory]=true;touchDay();save();render();});
  const sb=document.querySelector('[data-stories-back]');if(sb)sb.onclick=()=>{curStory=null;render();};
  const ra=document.querySelector('[data-readall]');if(ra)ra.onclick=()=>{const st=STORIES.find(s=>s.id===ra.dataset.readall);speak(st.s.map(x=>x[0]).join(' '));};
  // practice reveal
  document.querySelectorAll('[data-reveal]').forEach(b=>b.onclick=()=>{const a=b.parentElement.querySelector('.answer');a.style.display=a.style.display==='none'?'inline':'none';b.textContent=a.style.display==='none'?'show answer':'hide';});
  // conversa
  document.querySelectorAll('[data-conv]').forEach(b=>b.onclick=()=>{curConv=b.dataset.conv;chat=[];render();primeConversa();});
  const cb=document.querySelector('[data-conv-back]');if(cb)cb.onclick=()=>{curConv=null;render();};
  document.querySelectorAll('[data-chip]').forEach(b=>b.onclick=()=>{const inp=document.getElementById('convInput');inp.value=b.dataset.chip;});
  const cs=document.getElementById('convSend');if(cs)cs.onclick=sendConversa;
  const ci=document.getElementById('convInput');if(ci)ci.onkeydown=e=>{if(e.key==='Enter')sendConversa();};
  // write
  const wb=document.getElementById('writeBox');
  if(wb){document.getElementById('writeSpeak').onclick=()=>speak(wb.value);
    document.getElementById('writeSave').onclick=()=>{S.writeDraft=wb.value;save();document.getElementById('writeMsg').textContent='saved';};}
  // settings
  const sn=document.getElementById('setNikud');if(sn)sn.onchange=()=>{S.nikud=sn.checked;save();};
  const ss=document.getElementById('setSave');if(ss)ss.onclick=()=>{S.cfg={anthropicKey:val('setAnthropic'),supaUrl:val('setSupaUrl'),supaKey:val('setSupaKey')};save();syncDown();alert('Saved.');};
  const sp=document.getElementById('setPull');if(sp)sp.onclick=()=>syncDown();
  const bk=document.getElementById('setBackup');if(bk)bk.onclick=backupJSON;
  const rs=document.getElementById('setRestore');if(rs)rs.onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);};
}
function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}

/* ============ CONVERSA ENGINE ============ */
function renderChat(){const c=document.getElementById('chat');if(!c)return;
  c.innerHTML=chat.map(m=>`<div class="msg ${m.role==='assistant'?'ai':'me'}"><span class="heb">${showHeb(m.display||m.content)}</span></div>`).join('');
  c.scrollTop=c.scrollHeight;}
function primeConversa(){const sc=CONVERSA.find(c=>c.id===curConv);chat=[{role:'assistant',content:sc.open[0]}];renderChat();}
async function sendConversa(){
  const inp=document.getElementById('convInput');const text=inp.value.trim();if(!text)return;
  inp.value='';chat.push({role:'user',content:text});renderChat();
  const sc=CONVERSA.find(c=>c.id===curConv);const key=S.cfg&&S.cfg.anthropicKey;
  if(!key){chat.push({role:'assistant',content:'(הוֹסֵף מַפְתֵּחַ בְּהַגְדָּרוֹת)',display:'Add your Anthropic key in Settings to get live replies.'});renderChat();return;}
  touchDay();save();
  const sys=`You are roleplaying in Modern Hebrew for a language learner named Vincenzo (Italian, ~A1-A2, male, address him with masculine forms). Character: ${sc.char} Stay in character. Reply ONLY in modern spoken Hebrew, ${sc.lvl} level, short and natural. Keep replies to 1-2 sentences. If he makes a clear mistake, model the correct form briefly and naturally. Do not translate unless he asks.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,
        messages:chat.map(m=>({role:m.role,content:m.content}))})});
    const d=await r.json();
    const txt=(d.content&&d.content.filter(x=>x.type==='text').map(x=>x.text).join(' '))||'(...)';
    chat.push({role:'assistant',content:txt});renderChat();
  }catch(e){chat.push({role:'assistant',content:'(שְׁגִיאָה)',display:'Connection error. Check your key and network.'});renderChat();}
}

/* ============ BOOT ============ */
buildNav();render();syncDown();
</script>
</body>
</html>
