<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>עברית · Vincenzo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  /* softened palette: calmer slate-navy, gentler gold, warm paper */
  --bg:#1b2733; --bg2:#1f2d3b; --panel:#243341; --panel2:#26384a; --raise:#2c3e51;
  --paper:#f4efe6; --warm:#e9e2d4; --muted:#9aabba; --faint:#6f8294;
  --gold:#cbb279; --gold2:#ddc890; --goldsoft:#3a3a2a;
  --line:rgba(203,178,121,.16); --line2:rgba(255,255,255,.06);
  --good:#6fae86; --bad:#cf8a7c; --info:#7fa8c9;
  --shadow:0 14px 40px -20px rgba(0,0,0,.5);
  --serif:'Spectral',Georgia,serif; --sans:'Outfit',system-ui,sans-serif; --heb:'Assistant','Heebo',sans-serif;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--warm);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.55;overflow-x:hidden}
/* Hebrew is lighter, modern, not bold/biblical */
.heb{font-family:var(--heb);direction:rtl;unicode-bidi:embed;font-weight:400}
.heb.lg{font-size:28px;font-weight:300;color:var(--paper)}
.heb.b{font-weight:500}
.app{display:flex;min-height:100vh}
/* sidebar (desktop) */
.side{width:230px;flex:0 0 230px;background:linear-gradient(180deg,#1a2530,#1b2835);
  border-right:1px solid var(--line);padding:20px 13px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:3px;overflow:auto;z-index:30}
.brand{display:flex;align-items:baseline;gap:9px;padding:4px 10px 14px}
.brand .he{font-family:var(--heb);font-weight:600;font-size:27px;color:var(--gold2);direction:rtl}
.brand small{color:var(--faint);font-family:var(--serif);font-style:italic;font-size:12.5px}
.nav{display:flex;flex-direction:column;gap:1px}
.nav button{all:unset;display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;
  cursor:pointer;color:#aebccb;font-size:14px;transition:.16s}
.nav button .ic{width:17px;text-align:center;opacity:.8;font-size:14px}
.nav button:hover{background:rgba(203,178,121,.07);color:var(--paper)}
.nav button.on{background:rgba(203,178,121,.13);color:var(--gold2);box-shadow:inset 2px 0 0 var(--gold)}
.side .foot{margin-top:auto;padding:10px;color:var(--faint);font-size:11px;line-height:1.5}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--bad);margin-inline-end:6px;vertical-align:middle}
.dot.ok{background:var(--good)}
/* main */
.main{flex:1;min-width:0;padding:30px 38px 90px;max-width:1060px}
h1{font-family:var(--serif);font-weight:600;font-size:31px;letter-spacing:-.01em;color:var(--paper)}
h2{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--gold2);margin:24px 0 12px}
h3{font-family:var(--sans);font-weight:600;font-size:14.5px;color:var(--paper);margin:0 0 4px}
h4{color:var(--gold2);font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px;font-weight:600}
p{color:#cbd6e0;font-size:14.5px}
.lead{color:var(--muted);font-family:var(--serif);font-style:italic;font-size:15.5px;margin-top:4px}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
  border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.grid{display:grid;gap:14px}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
.pill{display:inline-block;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--gold2);
  border:1px solid var(--line);border-radius:999px;padding:3px 9px}
.tag{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 7px;white-space:nowrap}
.lvl{font-size:10px;font-weight:600;letter-spacing:.04em;border-radius:6px;padding:2px 7px}
.lvl.a1{background:rgba(111,174,134,.16);color:#9ed3b3} .lvl.a2{background:rgba(127,168,201,.16);color:#a9cbe6}
.lvl.b1{background:rgba(203,178,121,.16);color:var(--gold2)} .lvl.b2{background:rgba(207,138,124,.16);color:#e3a99c}
.btn{all:unset;cursor:pointer;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#2a230f;
  font-weight:600;font-size:13px;padding:9px 15px;border-radius:10px;transition:.15s;text-align:center}
.btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn:active{transform:none}
.btn.ghost{background:transparent;color:var(--gold2);border:1px solid var(--line)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.full{display:block;width:100%}
.row{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.spread{justify-content:space-between}
.tl{color:var(--gold2);font-style:italic;font-family:var(--serif);font-size:13.5px}
.en{color:#cbd6e0}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.stat{display:flex;flex-direction:column;gap:1px}
.stat b{font-family:var(--serif);font-size:30px;color:var(--gold2);font-weight:600}
.stat span{color:var(--faint);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em}
.bar{height:7px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}
/* list item (master) */
.item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);
  border-radius:12px;background:var(--panel);margin-bottom:9px;cursor:pointer;transition:.15s}
.item:hover{border-color:rgba(203,178,121,.4);background:var(--panel2);transform:translateX(2px)}
.item.done{border-color:rgba(111,174,134,.4)}
.item .meta{display:flex;flex-direction:column;gap:3px;min-width:0}
.item .meta .t{font-weight:600;color:var(--paper);font-size:14.5px}
.chev{color:var(--faint);font-size:18px}
/* detail */
.back{all:unset;cursor:pointer;color:var(--gold2);font-size:13px;display:inline-flex;align-items:center;gap:6px;margin-bottom:6px}
.back:hover{color:var(--gold)}
.sec{border:1px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--panel);margin-bottom:12px}
.stage{display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
.stage .n{flex:0 0 26px;height:26px;border-radius:8px;background:rgba(203,178,121,.14);color:var(--gold2);
  display:grid;place-items:center;font-size:12px;font-weight:600;font-family:var(--serif)}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:4px}
th,td{text-align:start;padding:7px 10px;border-bottom:1px solid var(--line2)}
th{color:var(--gold2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td .heb{font-size:17px}
/* confidence */
.rate{display:flex;gap:5px;align-items:center}
.rate b{width:25px;height:25px;border-radius:7px;border:1px solid var(--line);display:grid;place-items:center;
  cursor:pointer;color:var(--muted);font-size:12px}
.rate b.on{background:var(--gold);color:#2a230f;border-color:var(--gold)}
/* tabs within a section */
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 16px;border-bottom:1px solid var(--line);padding-bottom:0}
.subtabs button{all:unset;cursor:pointer;padding:8px 13px;color:var(--muted);font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px}
.subtabs button.on{color:var(--gold2);border-bottom-color:var(--gold)}
/* speak button + clickable word */
.spk{all:unset;cursor:pointer;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);
  display:grid;place-items:center;color:var(--gold2);font-size:14px;flex:0 0 auto;transition:.15s}
.spk:hover{background:rgba(203,178,121,.1)}
.w{cursor:pointer;border-bottom:1px dotted transparent;transition:.12s}
.w:hover{border-bottom-color:var(--gold);color:var(--gold2)}
/* story sentence */
.s-sent{padding:11px 13px;border-radius:11px;border:1px solid transparent;transition:.15s;margin-bottom:2px}
.s-sent:hover{background:rgba(203,178,121,.05);border-color:var(--line)}
.s-sent .heb{font-size:21px;font-weight:300;color:var(--paper);display:block}
.s-sent .tl{display:block;margin-top:2px}
.s-sent .en{display:block;color:var(--muted);font-size:13px}
.s-sent .pmark{all:unset;cursor:pointer;color:var(--gold2);font-size:13px;margin-inline-start:4px}
/* chat */
.chat{display:flex;flex-direction:column;gap:9px;max-height:48vh;overflow:auto;padding:6px 2px}
.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:15px;line-height:1.5}
.msg.ai{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.me{align-self:flex-end;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#2a230f;border-bottom-right-radius:4px}
.msg .heb{font-size:18px;font-weight:300}
.msg.me .heb{font-weight:400}
.typing{align-self:flex-start;color:var(--faint);font-size:13px;padding:4px 10px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chips button{all:unset;cursor:pointer;font-size:13px;border:1px solid var(--line);border-radius:999px;padding:6px 11px;color:#aebccb}
.chips button:hover{background:rgba(203,178,121,.1);color:var(--gold2)}
/* inputs */
.inp,textarea,select{width:100%;background:#172430;border:1px solid var(--line);border-radius:11px;
  color:var(--warm);padding:10px 13px;font-family:var(--sans);font-size:14px}
.inp.heb,textarea.heb{font-family:var(--heb);font-size:18px;font-weight:300;direction:rtl}
.inp:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold)}
textarea{min-height:120px;resize:vertical}
label{display:block;font-size:12px;color:var(--muted);margin:14px 0 5px;letter-spacing:.02em}
.range{width:100%;accent-color:var(--gold)}
/* switch */
.switch{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.switch input{display:none}
.track{width:40px;height:23px;border-radius:99px;background:#34495e;position:relative;transition:.2s}
.track::after{content:"";position:absolute;top:3px;left:3px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s}
.switch input:checked+.track{background:var(--gold)}
.switch input:checked+.track::after{left:20px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:16px;flex-wrap:wrap}
.note{font-size:12.5px;color:var(--muted);background:rgba(203,178,121,.05);border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin-top:12px}
.info{display:inline-grid;place-items:center;width:16px;height:16px;border-radius:50%;border:1px solid var(--line);color:var(--info);font-size:10px;cursor:help;font-style:italic;font-family:var(--serif);position:relative}
.info:hover .tip{display:block}
.tip{display:none;position:absolute;top:22px;left:50%;transform:translateX(-50%);width:240px;background:#0f1922;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:12px;color:#cbd6e0;z-index:50;font-style:normal;font-family:var(--sans);text-align:start;line-height:1.45;box-shadow:var(--shadow)}
.kbd{font-family:var(--heb);direction:rtl;font-size:36px;font-weight:300;color:var(--paper);text-align:center}
.cell{border:1px solid var(--line);border-radius:11px;padding:13px 8px;text-align:center;cursor:pointer;background:var(--panel);transition:.15s}
.cell:hover{background:var(--panel2);border-color:rgba(203,178,121,.4)}
.cell small{display:block;color:var(--faint);font-size:10.5px;margin-top:4px}
/* answer states */
.ans-ok{color:var(--good)} .ans-bad{color:var(--bad)}
.feedback{font-size:13px;margin-top:6px}
/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0f1922;border:1px solid var(--gold);
  color:var(--paper);padding:11px 18px;border-radius:11px;font-size:13.5px;opacity:0;transition:.25s;z-index:100;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* word popover */
.pop{position:fixed;background:#0f1922;border:1px solid var(--gold);border-radius:12px;padding:13px 15px;z-index:90;box-shadow:var(--shadow);max-width:260px;display:none}
.pop.show{display:block}
.pop .hw{font-family:var(--heb);font-size:24px;font-weight:300;color:var(--paper);direction:rtl}
/* mobile bottom nav */
.mobnav{display:none}
@media(max-width:860px){
  .app{flex-direction:column}
  .side{display:none}
  .main{padding:18px 15px 96px;max-width:100%}
  .g3,.g2,.g4{grid-template-columns:1fr}
  h1{font-size:26px}
  .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#16212c;border-top:1px solid var(--line);
    z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom));overflow-x:auto;gap:2px}
  .mobnav button{all:unset;cursor:pointer;flex:1 0 auto;min-width:60px;text-align:center;color:#9aabba;font-size:10px;padding:6px 4px;border-radius:9px}
  .mobnav button .ic{display:block;font-size:16px;margin-bottom:2px}
  .mobnav button.on{color:var(--gold2);background:rgba(203,178,121,.12)}
  .mobtop{display:flex !important}
}
.mobtop{display:none;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:20}
.mobtop .he{font-family:var(--heb);font-weight:600;font-size:22px;color:var(--gold2)}

/* ===== teaching-engine UI ===== */
.km{display:flex;gap:8px;flex-wrap:wrap}
.km .b{flex:1;min-width:120px;border:1px solid var(--line);border-radius:11px;padding:11px 13px;background:var(--panel)}
.km .b b{font-family:var(--serif);font-size:24px;display:block}
.km .b span{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint)}
.km .enc b{color:#9aabba} .km .weak b{color:#e3a99c} .km .fam b{color:#a9cbe6} .km .mas b{color:#9ed3b3}
.mbar{height:9px;border-radius:99px;overflow:hidden;display:flex;margin-top:10px;background:rgba(255,255,255,.05)}
.mbar i{height:100%}
.mpill{font-size:9.5px;font-weight:600;letter-spacing:.03em;border-radius:6px;padding:2px 6px;white-space:nowrap}
.mpill.enc{background:rgba(154,171,186,.16);color:#9aabba} .mpill.weak{background:rgba(207,138,124,.18);color:#e3a99c}
.mpill.fam{background:rgba(127,168,201,.18);color:#a9cbe6} .mpill.mas{background:rgba(111,174,134,.2);color:#9ed3b3} .mpill.new{background:rgba(203,178,121,.14);color:var(--gold2)}
/* stepper */
.stepper{display:flex;gap:6px;margin:14px 0 18px}
.stepper .st{flex:1;height:5px;border-radius:99px;background:rgba(255,255,255,.07)}
.stepper .st.on{background:var(--gold)} .stepper .st.done{background:var(--good)}
.steplabel{display:flex;align-items:center;gap:8px;color:var(--gold2);font-size:12px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:10px}
/* lesson card grid for vocab intro */
.wcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.wcard{border:1px solid var(--line);border-radius:12px;padding:13px;background:var(--panel);cursor:pointer;transition:.15s;text-align:center}
.wcard:hover{background:var(--panel2);border-color:rgba(203,178,121,.4)}
.wcard .h{font-family:var(--heb);direction:rtl;font-weight:300;font-size:23px;color:var(--paper)}
.wcard .t{color:var(--gold2);font-style:italic;font-family:var(--serif);font-size:12px;margin-top:2px}
.wcard .e{color:var(--muted);font-size:12.5px}
/* drill */
.drill{}
.dprog{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.dprog .track{flex:1;height:7px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.dprog .track i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.dprog .num{color:var(--faint);font-size:12.5px;white-space:nowrap}
.qprompt{text-align:center;margin:8px 0 18px}
.qprompt .big{font-family:var(--heb);direction:rtl;font-weight:300;font-size:34px;color:var(--paper)}
.qprompt .en{font-size:20px;color:var(--paper)}
.qprompt .sub{color:var(--muted);font-size:13px;margin-top:4px}
.opts{display:grid;gap:9px}
.opt{all:unset;cursor:pointer;border:1px solid var(--line);border-radius:11px;padding:13px 16px;background:var(--panel);font-size:16px;transition:.12s;text-align:center}
.opt:hover{background:var(--panel2)}
.opt.heb{font-family:var(--heb);direction:rtl;font-weight:300;font-size:22px}
.opt.ok{background:rgba(111,174,134,.18);border-color:var(--good);color:#bfe6cd}
.opt.bad{background:rgba(207,138,124,.16);border-color:var(--bad);color:#f0c4ba}
.banner{margin-top:14px;border-radius:11px;padding:12px 15px;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.banner.ok{background:rgba(111,174,134,.14);border:1px solid var(--good)}
.banner.bad{background:rgba(207,138,124,.12);border:1px solid var(--bad)}
.banner .lbl{font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase;opacity:.9}
.flash{border:1px solid var(--line);border-radius:16px;background:var(--panel);padding:34px 20px;text-align:center;cursor:pointer;min-height:160px;display:flex;flex-direction:column;justify-content:center;gap:8px}
.flash .h{font-family:var(--heb);direction:rtl;font-weight:300;font-size:40px;color:var(--paper)}
.lock{opacity:.55;cursor:not-allowed}
.lock .chev{color:var(--faint)}
.modepick{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
.modepick .m{border:1px solid var(--line);border-radius:13px;padding:16px;background:var(--panel);cursor:pointer;transition:.15s}
.modepick .m:hover{background:var(--panel2);border-color:rgba(203,178,121,.4);transform:translateY(-2px)}
.modepick .m h3{margin-bottom:4px}
.modepick .m p{font-size:12.5px;color:var(--muted)}
.modepick .m .cnt{color:var(--gold2);font-size:12px;margin-top:6px;font-weight:600}
</style>
</head>
<body>
<div class="mobtop">
  <span class="he">עברית</span>
  <span class="faint" style="font-size:12px">Vincenzo</span>
</div>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="he">עברית</span><small>for Vincenzo</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">
      <div><span class="dot" id="syncDot"></span><span id="syncTxt">checking…</span></div>
      <div style="margin-top:6px">Modern Hebrew · A1 to B2</div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
<nav class="mobnav" id="mobnav"></nav>
<div class="toast" id="toast"></div>
<div class="pop" id="pop"></div>

<script>
/* ===================================================================
   IVRIT · private Hebrew learning app for Vincenzo
   Teaching engine: Course path · feedback drills · mastery + weak-spots
=================================================================== */
const USER_ID='vincenzo';
const DRIVE_FOLDER='1jqZwxO-5IhaiMxn7WkS0_EDadN_4VQlr';
const SUPA_URL='https://ygstriddcprzalnisbql.supabase.co';
const SUPA_KEY='sb_publishable_QbkZ3-OMXm-LiIoZw3lApA_BzhOUtlS';
const LS='ivrit_state_'+USER_ID;

const defaultState={
  user:USER_ID, nikud:true, rate:0.9, voiceURI:'',
  streak:0, lastDay:null, xp:0,
  mastery:{},                 // key -> {s:0..3, n, c, due}
  grammar:{},                 // grammar topic id -> confidence 1..5
  course:{done:{}, lesson:1}, // done lessons + current lesson pointer
  stories:{}, dailyDone:{},
  customVocab:[], writeEntries:[], writeDraft:'',
  cfg:{anthropicKey:''},
  updated:Date.now()
};
let S=load();
function load(){try{return deepMerge(structuredClone(defaultState),JSON.parse(localStorage.getItem(LS))||{})}catch(e){return structuredClone(defaultState)}}
function deepMerge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])){a[k]=deepMerge(a[k]||{},b[k])}else{a[k]=b[k]}}return a}
function save(){S.updated=Date.now();localStorage.setItem(LS,JSON.stringify(S));syncUp();}
function touchDay(){const d=new Date().toDateString();if(S.lastDay!==d){const gap=S.lastDay?(new Date(d)-new Date(S.lastDay)):0;S.streak=(S.lastDay&&gap<=864e5*1.6)?S.streak+1:1;S.lastDay=d;}}
function addXP(n){S.xp=(S.xp||0)+n;}

/* ---------- Hebrew display: nikud + correct unvowelled (ktiv male) ---------- */
function stripN(t){return t.replace(/[\u0591-\u05C7]/g,'')}
function H(v,plain){ if(S.nikud) return v; return (plain!=null&&plain!=='')?plain:stripN(v); }
function hebClick(v,plain,cls){
  const shown=H(v,plain);const words=shown.split(/(\s+)/);
  return `<span class="heb ${cls||''}" dir="rtl">`+words.map(w=>{
    if(/^\s+$/.test(w)||w==='')return w;
    return `<span class="w" data-word="${encodeURIComponent(w)}">${w}</span>`;
  }).join('')+`</span>`;
}

/* ---------- Speech ---------- */
let voices=[];
function loadVoices(){voices=speechSynthesis.getVoices()||[]}
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function heVoice(){if(S.voiceURI){const v=voices.find(v=>v.voiceURI===S.voiceURI);if(v)return v;}return voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith('he'))||null;}
function hasHeVoice(){return !!heVoice()}
function speak(t){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(stripN(t));u.lang='he-IL';const v=heVoice();if(v)u.voice=v;u.rate=S.rate||0.9;speechSynthesis.speak(u);}
let queue=[];
function speakSeq(arr){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();queue=arr.slice();next();
  function next(){if(!queue.length)return;const u=new SpeechSynthesisUtterance(stripN(queue.shift()));u.lang='he-IL';const v=heVoice();if(v)u.voice=v;u.rate=S.rate||0.9;u.onend=()=>setTimeout(next,180);speechSynthesis.speak(u);}}

/* ---------- Supabase sync ---------- */
async function syncUp(){if(!SUPA_URL||!SUPA_KEY){setSync(false);return;}
  try{const r=await fetch(SUPA_URL+'/rest/v1/progress?on_conflict=user_id',{method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify([{user_id:USER_ID,state:S,updated_at:new Date(S.updated).toISOString()}])});setSync(r.ok);}catch(e){setSync(false)}}
async function syncDown(){if(!SUPA_URL||!SUPA_KEY){setSync(false);return;}
  try{const r=await fetch(SUPA_URL+'/rest/v1/progress?user_id=eq.'+USER_ID+'&select=state,updated_at',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    if(r.ok){const rows=await r.json();if(rows&&rows[0]&&rows[0].state&&(rows[0].state.updated||0)>(S.updated||0)){S=deepMerge(structuredClone(defaultState),rows[0].state);localStorage.setItem(LS,JSON.stringify(S));render();}setSync(true);}else setSync(false);}catch(e){setSync(false)}}
function setSync(ok){const d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');if(!d)return;d.className='dot'+(ok?' ok':'');t.textContent=ok?'synced across devices':'offline (saved on device)';}

/* ---------- Backup ---------- */
function backupJSON(){const name='ivrit-backup-'+new Date().toISOString().slice(0,10)+'.json';const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();toast('Backup downloaded: '+name);}
function importJSON(file){const r=new FileReader();r.onload=e=>{try{S=deepMerge(structuredClone(defaultState),JSON.parse(e.target.result));save();render();toast('Backup restored')}catch(_){toast('Invalid file')}};r.readAsText(file);}

/* ---------- toast ---------- */
let toastT;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

 {id:18,t:"Prepositions + suffixes",lvl:"B1",sum:"'to me' is one fused word.",

 {id:20,t:"Shem Peula (gerund/noun of action)",lvl:"B1",sum:"Turning verbs into 'the act of…'.",
  stages:[
   {h:"The idea",p:"Each binyan has a noun form for the action itself, like Italian's -zione/-mento. From לבשל (cook) comes בישול (cooking)."},
   {h:"Patterns",tbl:[["Pa'al",["כְּתִיבָה","כתיבה"],"writing"],["Pi'el",["בִּישּׁוּל","בישול"],"cooking"],["Hif'il",["הַזְמָנָה","הזמנה"],"an order / invitation"]]},

  ]},
 {id:21,t:"Subordinate clauses (ש־)",lvl:"B2",sum:"'that', 'who', 'which' with one word: ש.",
  stages:[
   {h:"The rule",p:"The single prefix ש links clauses: 'that', 'who', 'which'. It attaches to the next word."},
   {h:"Examples",ex:[[["אֲנִי חוֹשֵׁב שֶׁזֶּה יָפֶה","אני חושב שזה יפה"],"ani choshev she-ze yafe","I think that it's beautiful"],[["הָאִישׁ שֶׁגָּר כָּאן","האיש שגר כאן"],"ha-ish she-gar kan","the man who lives here"]]},
   {h:"Build up",p:"Combine with כי (because), אם (if), כדי (in order to), כאשר/כש (when) for full B2 sentences."}
  ]},
 {id:22,t:"Comparatives & superlatives",lvl:"B2",sum:"more, less, the most.",
  stages:[
   {h:"The rule",p:"Comparative: יותר (more) / פחות (less) + מ (than). Superlative: הכי (the most) or ביותר."},
   {h:"Examples",ex:[[["בֶּרְלִין גְּדוֹלָה יוֹתֵר מֵרוֹזוֹלִינִי","ברלין גדולה יותר מרוזוליני"],"Berlin gdola yoter me-Rosolini","Berlin is bigger than Rosolini"],[["הַיּוֹם הֲכִי יָפֶה","היום הכי יפה"],"ha-yom hachi yafe","the most beautiful day"]]}
  ]},
 {id:23,t:"Conditional (would)",lvl:"B2",sum:"Hypotheticals with היה + present.",
  stages:[
   {h:"The rule",p:"To say 'would', Hebrew uses היה plus the present form. For unreal conditions: אם + past, then היה + present."},

  ]}

     [["אֲנִי אוֹהֵב יָמִים כָּאֵלֶּה.","אני אוהב ימים כאלה."],"ani ohev yamim ka'ele.","I love days like these."]],
  quiz:[{q:"What is the weather?",opts:["Sunny","Rainy","Snowy"],a:1},{q:"Where do they stay?",opts:["At a café","At home","At ABAITA"],a:1}]},
 {id:"s7",t:["בַּשּׁוּק בְּתֵל אָבִיב","בשוק בתל אביב"],en:"At the Market in Tel Aviv",lvl:"A2",
  s:[[["אֲנַחְנוּ הוֹלְכִים לַשּׁוּק בְּתֵל אָבִיב.","אנחנו הולכים לשוק בתל אביב."],"anachnu holchim la-shuk be-Tel Aviv.","We go to the market in Tel Aviv."],
     [["בַּשּׁוּק יֵשׁ הַרְבֵּה אֹכֶל.","בשוק יש הרבה אוכל."],"ba-shuk yesh harbe ochel.","At the market there is a lot of food."],
     [["אֲנִי קוֹנֶה עַגְבָנִיּוֹת וְלֶחֶם.","אני קונה עגבניות ולחם."],"ani kone agvaniyot ve-lechem.","I buy tomatoes and bread."],
     [["קוֹבִּי קוֹנֶה חוּמּוּס.","קובי קונה חומוס."],"Kobi kone chumus.","Kobi buys hummus."],
     [["הַשּׁוּק גָּדוֹל וְרוֹעֵשׁ.","השוק גדול ורועש."],"ha-shuk gadol ve-ro'esh.","The market is big and noisy."],
     [["זֶה לֹא יָקָר.","זה לא יקר."],"ze lo yakar.","It is not expensive."]],
  quiz:[{q:"What does Vincenzo buy?",opts:["Tomatoes and bread","Hummus","Wine"],a:0},{q:"How is the market?",opts:["Quiet and small","Big and noisy","Empty"],a:1}]},
 {id:"s8",t:["הַחֲתֻנָּה בְּקוֹפֶּנְהָאגֶן","החתונה בקופנהאגן"],en:"The Wedding in Copenhagen",lvl:"A2",
  s:[[["בְּתִשְׁעָה בְּסֶפְּטֶמְבֶּר הִתְחַתַּנּוּ.","בתשעה בספטמבר התחתנו."],"be-tish'a be-September hitchatanu.","On the ninth of September we got married."],
     [["הַחֲתֻנָּה הָיְתָה בְּקוֹפֶּנְהָאגֶן.","החתונה הייתה בקופנהאגן."],"ha-chatuna hayta be-Copenhagen.","The wedding was in Copenhagen."],
     [["הַמִּשְׁפָּחָה מֵאִיטַלְיָה הִגִּיעָה בְּמָטוֹס.","המשפחה מאיטליה הגיעה במטוס."],"ha-mishpacha me-italya higi'a be-matos.","The family from Italy arrived by plane."],
     [["אַנְגֶ'לָה בָּכְתָה מֵרֹב שִׂמְחָה.","אנג'לה בכתה מרוב שמחה."],"Angela bachta me-rov simcha.","Angela cried from joy."],
     [["מִיקִי נָאַם נְאוּם יָפֶה.","מיקי נאם נאום יפה."],"Miki na'am ne'um yafe.","Miki gave a beautiful speech."],
     [["רָקַדְנוּ עַד מְאֻחָר בַּלַּיְלָה.","רקדנו עד מאוחר בלילה."],"rakadnu ad me'uchar ba-layla.","We danced until late at night."],
     [["זֶה הָיָה הַיּוֹם הֲכִי מְאֻשָּׁר בַּחַיִּים שֶׁלָּנוּ.","זה היה היום הכי מאושר בחיים שלנו."],"ze haya ha-yom hachi me'ushar ba-chayim shelanu.","It was the happiest day of our lives."]],
  quiz:[{q:"Where was the wedding?",opts:["Tel Aviv","Copenhagen","Rosolini"],a:1},{q:"Who gave a speech?",opts:["Salvatore","Miki","Kobi"],a:1}]},
 {id:"s9",t:["הָעֲבוֹדָה שֶׁל קוֹבִּי","העבודה של קובי"],en:"Kobi's Work",lvl:"B1",
  s:[[["קוֹבִּי עוֹבֵד עִם אֲנָשִׁים.","קובי עובד עם אנשים."],"Kobi oved im anashim.","Kobi works with people."],
     [["הוּא יוֹעֵץ תַּדְמִית וְגַם סַפָּר.","הוא יועץ תדמית וגם ספר."],"hu yo'etz tadmit ve-gam sapar.","He is an image consultant and also a hairdresser."],
     [["הוּא מֵבִין בְּצֶבַע, בְּסִגְנוֹן וּבְעִצּוּב.","הוא מבין בצבע, בסגנון ובעיצוב."],"hu mevin be-tzeva, be-signon u-ve-itzuv.","He understands colour, style and design."],
     [["לָקוֹחוֹת בָּאִים אֵלָיו מִכָּל בֶּרְלִין.","לקוחות באים אליו מכל ברלין."],"lekochot ba'im elav mi-kol Berlin.","Clients come to him from all over Berlin."],
     [["גַּם אֲנִי עוֹבֵד בְּעִצּוּב, אֲבָל בְּעִצּוּב פְּנִים.","גם אני עובד בעיצוב, אבל בעיצוב פנים."],"gam ani oved be-itzuv, aval be-itzuv pnim.","I also work in design, but in interior design."],
     [["בָּעֶרֶב אֲנַחְנוּ מְדַבְּרִים עַל הָרַעְיוֹנוֹת שֶׁלָּנוּ.","בערב אנחנו מדברים על הרעיונות שלנו."],"ba-erev anachnu medabrim al ha-ra'ayonot shelanu.","In the evening we talk about our ideas."],
     [["אֲנַחְנוּ לוֹמְדִים אֶחָד מֵהַשֵּׁנִי.","אנחנו לומדים אחד מהשני."],"anachnu lomdim echad me-ha-sheni.","We learn from each other."]],
  quiz:[{q:"What is one of Kobi's jobs?",opts:["Doctor","Hairdresser","Teacher"],a:1},{q:"What field is Vincenzo in?",opts:["Interior design","Cooking","Medicine"],a:0}]},
 {id:"s10",t:["לִלְמֹד שָׂפָה חֲדָשָׁה","ללמוד שפה חדשה"],en:"Learning a New Language",lvl:"B1",
  s:[[["כְּשֶׁהִתְחַלְתִּי לִלְמֹד עִבְרִית, חָשַׁבְתִּי שֶׁזֶּה בִּלְתִּי אֶפְשָׁרִי.","כשהתחלתי ללמוד עברית, חשבתי שזה בלתי אפשרי."],"kshe-hitchalti lilmod ivrit, chashavti she-ze bilti efshari.","When I started learning Hebrew, I thought it was impossible."],
     [["הָאוֹתִיּוֹת נִרְאוּ לִי כְּמוֹ צִיּוּרִים.","האותיות נראו לי כמו ציורים."],"ha-otiyot nir'u li kmo tziyurim.","The letters looked to me like drawings."],
     [["בְּאִיטַלְקִית קוֹרְאִים מִשְּׂמֹאל לְיָמִין, וְכָאן הַכֹּל הָפוּךְ.","באיטלקית קוראים משמאל לימין, וכאן הכול הפוך."],"be-italkit korim mi-smol le-yamin, ve-kan ha-kol hafuch.","In Italian you read left to right, and here everything is reversed."],
     [["אֲבָל גִּלִּיתִי שֶׁהַתְּנוּעוֹת דּוֹמוֹת לְאִיטַלְקִית.","אבל גיליתי שהתנועות דומות לאיטלקית."],"aval giliti she-ha-tnu'ot domot le-italkit.","But I discovered the vowels are similar to Italian."],
     [["הַיּוֹם אֲנִי כְּבָר מֵבִין מִשְׁפָּטִים פְּשׁוּטִים.","היום אני כבר מבין משפטים פשוטים."],"hayom ani kvar mevin mishpatim pshutim.","Today I already understand simple sentences."],
     [["כָּל פַּעַם שֶׁאֲנִי מֵבִין, אֲנִי מַרְגִּישׁ קָרוֹב יוֹתֵר לְקוֹבִּי.","כל פעם שאני מבין, אני מרגיש קרוב יותר לקובי."],"kol pa'am she-ani mevin, ani margish karov yoter le-Kobi.","Each time I understand, I feel closer to Kobi."]],
  quiz:[{q:"What did the letters look like to him?",opts:["Numbers","Drawings","Music"],a:1},{q:"What is similar to Italian?",opts:["The vowels","The verbs","The alphabet"],a:0}]},
 {id:"s11",t:["גַּעְגּוּעַ לְסִיצִילְיָה","געגוע לסיציליה"],en:"Longing for Sicily",lvl:"B1",
  s:[[["יֵשׁ יָמִים שֶׁבָּהֶם אֲנִי מִתְגַּעְגֵּעַ לְרוֹזוֹלִינִי.","יש ימים שבהם אני מתגעגע לרוזוליני."],"yesh yamim she-bahem ani mitga'age'a le-Rosolini.","There are days when I long for Rosolini."],
     [["אֲנִי זוֹכֵר אֶת הָאוֹר שֶׁל סִיצִילְיָה.","אני זוכר את האור של סיציליה."],"ani zocher et ha-or shel Sitzilya.","I remember the light of Sicily."],
     [["אֲנִי זוֹכֵר אֶת הָרֵיחַ שֶׁל הַיָּם.","אני זוכר את הריח של הים."],"ani zocher et ha-re'ach shel ha-yam.","I remember the smell of the sea."],
     [["אֲבָל בָּחַרְתִּי לִחְיוֹת כָּאן, עִם הָאִישׁ שֶׁאֲנִי אוֹהֵב.","אבל בחרתי לחיות כאן, עם האיש שאני אוהב."],"aval bacharti lichyot kan, im ha-ish she-ani ohev.","But I chose to live here, with the man I love."],
     [["וּכְשֶׁאֲנִי מְבַשֵּׁל אֹכֶל סִיצִילְיָאנִי, סִיצִילְיָה אִתִּי.","וכשאני מבשל אוכל סיציליאני, סיציליה איתי."],"u-chshe-ani mevashel ochel sitzilyani, Sitzilya iti.","And when I cook Sicilian food, Sicily is with me."],
     [["אֲנִי יָכוֹל לִהְיוֹת בִּשְׁנֵי מְקוֹמוֹת בְּאוֹתוֹ זְמַן.","אני יכול להיות בשני מקומות באותו זמן."],"ani yachol lihyot bi-shnei mekomot be-oto zman.","I can be in two places at the same time."]],
  quiz:[{q:"What does he remember about Sicily?",opts:["The cold","The light and the smell of the sea","The traffic"],a:1},{q:"How does he bring Sicily to Berlin?",opts:["By cooking Sicilian food","By phone","By flying"],a:0}]},
 {id:"s12",t:["הָאוֹרְחִים שֶׁל אַבַּאיְטָה","האורחים של אבאיטה"],en:"The Guests of ABAITA",lvl:"B2",
  s:[[["אַבַּאיְטָה אֵינוֹ רַק בַּיִת פְּרָטִי שֶׁלָּנוּ.","אבאיטה אינו רק בית פרטי שלנו."],"ABAITA eino rak bayit prati shelanu.","ABAITA is not only our private house."],
     [["אֲנַחְנוּ פּוֹתְחִים אוֹתוֹ גַּם לְאוֹרְחִים.","אנחנו פותחים אותו גם לאורחים."],"anachnu potchim oto gam le-orchim.","We open it also to guests."],
     [["אֲנָשִׁים מַגִּיעִים מִבֶּרְלִין כְּדֵי לָנוּחַ.","אנשים מגיעים מברלין כדי לנוח."],"anashim magi'im mi-Berlin kdei lanu'ach.","People arrive from Berlin in order to rest."],
     [["רֻבָּם בָּאִים עִם כְּלָבִים, כִּי הַמָּקוֹם אוֹהֵב כְּלָבִים.","רובם באים עם כלבים, כי המקום אוהב כלבים."],"rubam ba'im im klavim, ki ha-makom ohev klavim.","Most of them come with dogs, because the place is dog-friendly."],
     [["אֲנַחְנוּ מַסְבִּירִים לָהֶם אֵיךְ לְהַדְלִיק אֶת הַתַּנּוּר.","אנחנו מסבירים להם איך להדליק את התנור."],"anachnu masbirim lahem eich lehadlik et ha-tanur.","We explain to them how to light the stove."],
     [["מַשֶּׁהוּ בַּשֶּׁקֶט שֶׁל בְּרַנְדֶּנְבּוּרְג עוֹשֶׂה טוֹב לָאֲנָשִׁים.","משהו בשקט של ברנדנבורג עושה טוב לאנשים."],"mashehu ba-sheket shel Brandenburg ose tov la-anashim.","Something in the quiet of Brandenburg does people good."],
     [["הֵם מַגִּיעִים עֲיֵפִים וְעוֹזְבִים רְגוּעִים.","הם מגיעים עייפים ועוזבים רגועים."],"hem magi'im ayefim ve-ozvim regu'im.","They arrive tired and leave calm."],
     [["בִּשְׁבִילֵנוּ זֶה לֹא רַק עֵסֶק, זֶה דֶּרֶךְ לְאָרֵחַ.","בשבילנו זה לא רק עסק, זו דרך לארח."],"bishvilenu ze lo rak esek, ze derech le'are'ach.","For us it is not only a business, it is a way to host."],
     [["וְאֵין דָּבָר אִיטַלְקִי יוֹתֵר מֵאֲשֶׁר לְאָרֵחַ.","ואין דבר איטלקי יותר מאשר לארח."],"ve-ein davar italki yoter me-asher le'are'ach.","And there is nothing more Italian than to host."]],
  quiz:[{q:"Why do most guests come with dogs?",opts:["The place is dog-friendly","Dogs are required","To guard the house"],a:0},{q:"How do guests leave?",opts:["Tired","Calm","Hungry"],a:1}]},
 {id:"s13",t:["הַשָּׁכֵן הֶחָדָשׁ","השכן החדש"],en:"The New Neighbour",lvl:"A2",
  s:[[["יֵשׁ שָׁכֵן חָדָשׁ בַּבִּנְיָן.","יש שכן חדש בבניין."],"yesh shachen chadash ba-binyan.","There is a new neighbour in the building."],
     [["קוֹרְאִים לוֹ תּוֹמָס וְהוּא מִגֶּרְמַנְיָה.","קוראים לו תומס והוא מגרמניה."],"korim lo Thomas ve-hu mi-germanya.","His name is Thomas and he is from Germany."],
     [["הוּא אוֹהֵב אֹכֶל אִיטַלְקִי.","הוא אוהב אוכל איטלקי."],"hu ohev ochel italki.","He loves Italian food."],
     [["אֶתְמוֹל הִזְמַנְתִּי אוֹתוֹ לַאֲרוּחַת עֶרֶב.","אתמול הזמנתי אותו לארוחת ערב."],"etmol hizmanti oto la-aruchat erev.","Yesterday I invited him to dinner."],
     [["בִּשַּׁלְתִּי פַּסְטָה וְהוּא הֵבִיא יַיִן.","בישלתי פסטה והוא הביא יין."],"bishalti pasta ve-hu hevi yayin.","I cooked pasta and he brought wine."],
     [["עַכְשָׁיו יֵשׁ לָנוּ חָבֵר חָדָשׁ.","עכשיו יש לנו חבר חדש."],"achshav yesh lanu chaver chadash.","Now we have a new friend."]],
  quiz:[{q:"Where is Thomas from?",opts:["Italy","Germany","Israel"],a:1},{q:"What did Vincenzo cook?",opts:["Fish","Pasta","Soup"],a:1}]},
 {id:"s14",t:["הַפְּגִישָׁה עִם הַלָּקוֹחַ","הפגישה עם הלקוח"],en:"The Client Meeting",lvl:"B1",
  s:[[["הַבֹּקֶר הָיְתָה לִי פְּגִישָׁה חֲשׁוּבָה.","הבוקר הייתה לי פגישה חשובה."],"ha-boker hayta li pgisha chashuva.","This morning I had an important meeting."],
     [["לָקוֹחַ חָדָשׁ רוֹצֶה לְעַצֵּב מֵחָדָשׁ אֶת הַסָּלוֹן.","לקוח חדש רוצה לעצב מחדש את הסלון."],"lako'ach chadash rotze le'atzev me-chadash et ha-salon.","A new client wants to redesign the living room."],
     [["הוּא שָׁאַל אוֹתִי אֵיזֶה סִגְנוֹן אֲנִי מַמְלִיץ.","הוא שאל אותי איזה סגנון אני ממליץ."],"hu sha'al oti eize signon ani mamlitz.","He asked me which style I recommend."],
     [["אָמַרְתִּי שֶׁאֲנִי אוֹהֵב עֵץ, אֶבֶן וְאוֹר טִבְעִי.","אמרתי שאני אוהב עץ, אבן ואור טבעי."],"amarti she-ani ohev etz, even ve-or tiv'i.","I said I love wood, stone and natural light."],
     [["הִסְבַּרְתִּי לוֹ אֶת הָרַעְיוֹן וְהוּא הִתְלַהֵב.","הסברתי לו את הרעיון והוא התלהב."],"hisbarti lo et ha-ra'ayon ve-hu hitlahev.","I explained the idea to him and he got excited."],
     [["מָחָר אֶשְׁלַח לוֹ תּוֹכְנִית.","מחר אשלח לו תוכנית."],"machar eshlach lo tochnit.","Tomorrow I will send him a plan."],
     [["אֲנִי אוֹהֵב אֶת הָעֲבוֹדָה שֶׁלִּי.","אני אוהב את העבודה שלי."],"ani ohev et ha-avoda sheli.","I love my work."]],
  quiz:[{q:"What does the client want to redesign?",opts:["The kitchen","The living room","The garden"],a:1},{q:"What materials does Vincenzo love?",opts:["Glass and metal","Wood, stone and natural light","Plastic"],a:1}]},
 {id:"s15",t:["שְׁנֵי בָּתִּים, לֵב אֶחָד","שני בתים, לב אחד"],en:"Two Homes, One Heart",lvl:"B2",
  s:[[["לִפְעָמִים שׁוֹאֲלִים אוֹתִי אֵיפֹה הַבַּיִת שֶׁלִּי.","לפעמים שואלים אותי איפה הבית שלי."],"lif'amim sho'alim oti eifo ha-bayit sheli.","Sometimes people ask me where my home is."],
     [["זוֹ שְׁאֵלָה לֹא פְּשׁוּטָה בִּשְׁבִילִי.","זו שאלה לא פשוטה בשבילי."],"zo she'ela lo pshuta bishvili.","It is not a simple question for me."],

/* ===================================================================
   LEXICON INDEX  (all vocab as flat, addressable items)
=================================================================== */
const LEX=[];
function buildLex(){
  LEX.length=0;
  VOCAB.forEach(c=>c.words.forEach((w,i)=>LEX.push({key:'v|'+c.cat+'|'+i,v:w[0][0],p:w[0][1],tl:w[1],en:w[2],it:w[3],cat:c.cat,lvl:c.lvl})));
  (S.customVocab||[]).forEach((w,i)=>LEX.push({key:'cv|'+i,v:w.v,p:w.p||'',tl:w.tl,en:w.en,it:w.it||'',cat:'My words',lvl:''}));
}

/* ===================================================================
   MASTERY MODEL   states: 0 seen · 1 weak · 2 familiar · 3 mastered
=================================================================== */
function mState(k){const m=S.mastery[k];return m?m.s:-1;}
function mSeen(k){if(!S.mastery[k])S.mastery[k]={s:0,n:0,c:0,due:Date.now()};}
function mAnswer(k,ok){let m=S.mastery[k]||{s:0,n:0,c:0,due:Date.now()};m.n++;
  if(ok){m.c++;m.s=m.c>=4?3:m.c>=2?2:Math.max(m.s,1);m.due=Date.now()+(m.s===3?7:m.s===2?2:1)*864e5;}
  else{m.c=0;m.s=1;m.due=Date.now()+6e5;}
  S.mastery[k]=m;}
function masteryCounts(){const c={enc:0,weak:0,fam:0,mas:0};for(const k in S.mastery){const s=S.mastery[k].s;if(s===0)c.enc++;else if(s===1)c.weak++;else if(s===2)c.fam++;else if(s>=3)c.mas++;}return c;}
function mpill(k){const s=mState(k);if(s<0)return '<span class="mpill new">new</span>';return['<span class="mpill enc">seen</span>','<span class="mpill weak">weak</span>','<span class="mpill fam">familiar</span>','<span class="mpill mas">mastered</span>'][s];}
function weakPool(limit){const now=Date.now();const arr=[];
  LEX.forEach(it=>{const m=S.mastery[it.key];if(!m)return;if(m.s<=1)arr.push({it,pri:0});else if(m.due<=now)arr.push({it,pri:1});});
  arr.sort((a,b)=>a.pri-b.pri);return arr.slice(0,limit||20).map(x=>x.it);}
function learnedPool(){return LEX.filter(it=>S.mastery[it.key]);}

/* ===================================================================
   DRILL ENGINE  (feedback-bearing, updates mastery)
=================================================================== */
let drill=null;
function startVocabDrill(items,opts){opts=opts||{};
  items=items.filter(Boolean);
  if(!items.length){toast('Nothing to practise here yet');return;}
  drill={typed:false,items:shuffle(items).slice(0,opts.max||Math.min(items.length,12)),i:0,score:0,wrong:[],answered:null,done:opts.onDone,title:opts.title||'Practice',back:opts.back||'practice'};
  go('drill');}
function startGrammarDrill(chItems,opts){opts=opts||{};
  drill={typed:true,items:shuffle(chItems).slice(0,opts.max||chItems.length),i:0,score:0,wrong:[],answered:null,done:opts.onDone,title:opts.title||'Practice',back:opts.back||'practice'};
  go('drill');}
function startVerbDrill(verbs,opts){opts=opts||{};
  verbs=(verbs||VERBS).filter(Boolean);
  const tenses=[["present","Present"],["past","Past"],["future","Future"]];
  const items=[];
  verbs.forEach(v=>{
    tenses.forEach(t=>{const rows=v[t[0]];if(!rows)return;
      rows.forEach(r=>{
        items.push({q:v.en+" \u00b7 "+t[1]+", "+r[0]+"  ("+v.inf[1]+")",a:[r[1][0],r[1][1]],hint:v.binyan+" \u00b7 root "+v.root});
      });});
  });
  if(!items.length){toast("No verbs to drill");return;}
  drill={typed:true,items:shuffle(items).slice(0,opts.max||12),i:0,score:0,wrong:[],answered:null,done:opts.onDone,title:opts.title||"Verb conjugation",back:opts.back||"practice"};
  go("drill");}
function distractors(it,n){const pool=(drill.items.length>=4?drill.items:LEX).filter(x=>x.en!==it.en);const out=[];const used={};
  while(out.length<n&&pool.length){const c=pool[Math.floor(Math.random()*pool.length)];if(!used[c.en]){used[c.en]=1;out.push(c);}if(Object.keys(used).length>=pool.length)break;}
  return out;}
function vDrill(){
  const d=drill;if(!d)return '<p>No drill.</p>';
  if(d.i>=d.items.length)return drillDone();
  const pct=Math.round(d.i/d.items.length*100);
  const head=`<div class="dprog"><button class="back" data-drill-exit="1" style="margin:0">← exit</button><div class="track"><i style="width:${pct}%"></i></div><div class="num">${d.i+1} / ${d.items.length}</div></div><div class="steplabel">${d.title}</div>`;
  if(d.typed)return head+drillTyped(d);
  return head+drillVocab(d);
}
function drillVocab(d){
  const it=d.items[d.i];const type=d.i%4;const a=d.answered;
  if(type===1){ // typed meaning
    const fb=a?`<div class="banner ${a.ok?'ok':'bad'}"><span><span class="lbl">${a.ok?'נכון · correct':'לא בדיוק · not quite'}</span><br>${H(it.v,it.p)} = ${it.en} (${it.tl})</span><button class="btn sm" data-drill-next="1">Continue</button></div>`:'';
    return `<div class="qprompt"><div class="big">${H(it.v,it.p)}</div><button class="spk" data-speak="${encodeURIComponent(it.v)}" style="margin:8px auto 0">♪</button><div class="sub">type the English meaning</div></div>
      <input class="inp" id="dType" placeholder="meaning…" ${a?'disabled':''}>
      <div class="row" style="margin-top:10px">${a?'':'<button class="btn" data-drill-check="1">check</button><button class="btn ghost sm" data-drill-skip="1">skip</button>'}</div>${fb}`;
  }
  // MCQ
  const en2he=(type===3);
  const opts=shuffle([it,...distractors(it,3)]);
  const promptHTML = en2he
    ? `<div class="qprompt"><div class="en">${it.en}</div><div class="sub">choose the Hebrew word</div></div>`
    : (type===2
      ? `<div class="qprompt"><button class="spk" data-speak="${encodeURIComponent(it.v)}" style="margin:0 auto;width:46px;height:46px;font-size:20px">♪</button><div class="sub">listen, then choose the meaning</div></div>`
      : `<div class="qprompt"><div class="big">${H(it.v,it.p)}</div><button class="spk" data-speak="${encodeURIComponent(it.v)}" style="margin:8px auto 0">♪</button><div class="sub">choose the meaning</div></div>`);
  const optsHTML=opts.map(o=>{
    const label=en2he?H(o.v,o.p):o.en;
    let cls='opt'+(en2he?' heb':'');
    if(a){if(o.en===it.en)cls+=' ok';else if(o.en===a.chosen&&!a.ok)cls+=' bad';}
    return `<button class="${cls}" ${a?'disabled':''} data-drill-pick="${encodeURIComponent(o.en)}">${label}</button>`;
  }).join('');
  const fb=a?`<div class="banner ${a.ok?'ok':'bad'}"><span><span class="lbl">${a.ok?'נכון · correct':'לא בדיוק · not quite'}</span><br>${H(it.v,it.p)} = ${it.en}</span><button class="btn sm" data-drill-next="1">Continue</button></div>`:'';
  return promptHTML+`<div class="opts">${optsHTML}</div>${fb}`;
}
function drillTyped(d){
  const it=d.items[d.i];const a=d.answered;
  const fb=a?`<div class="banner ${a.ok?'ok':'bad'}"><span><span class="lbl">${a.ok?'נכון · correct':'לא בדיוק · not quite'}</span><br>${it.a[0]}</span><button class="btn sm" data-drill-next="1">Continue</button></div>`:'';
  return `<div class="qprompt"><div class="sub" style="font-size:15px;color:var(--paper)">${it.q}</div></div>
    <input class="inp" id="dType" placeholder="type your answer…" ${a?'disabled':''}>
    <div class="row" style="margin-top:10px">${a?'':'<button class="btn" data-drill-check="1">check</button> <button class="btn ghost sm" data-drill-hint="1">hint</button> <span class="muted" id="dHint" style="font-size:12.5px"></span>'}</div>${fb}`;
}
function drillDone(){
  const d=drill;const total=d.items.length;
  return `<div class="steplabel">${d.title}</div>
   <div class="card" style="text-align:center"><h2 style="margin-top:0">${d.score} / ${total}</h2>
   <p class="muted">${d.score===total?'Perfect.':d.score>=total*0.6?'Good work. The ones you missed are now marked weak and will come back.':'Keep going. These are now in your weak spots for review.'}</p>
   <div class="row" style="justify-content:center;margin-top:14px;gap:8px"><button class="btn sm" data-drill-again="1">Again</button><button class="btn ghost sm" data-drill-finish="1">Done</button></div></div>`;
}

   <div class="card" style="margin-top:14px"><h3>Sync <span class="info">i<span class="tip">Keeps your streak, learned words and progress identical on Mac and iPhone, and safe if a browser clears its cache. Pre-connected to your private "ivrit" Supabase project.</span></span></h3>
     <p class="muted" style="font-size:13px">Pre-connected to your private Supabase project "ivrit". Nothing to enter. Status: <span id="syncTxt2">…</span></p>
     <button class="btn sm ghost" id="pullCloud">pull latest from cloud</button></div>
   <div class="card" style="margin-top:14px"><h3>Backup</h3>
     <p class="muted" style="font-size:13px">Download a snapshot (ivrit-backup-YYYY-MM-DD.json) for the shared Drive back-ups folder. Restore any time.</p>
     <div class="row" style="margin-top:10px"><button class="btn sm" id="doBackup">download backup</button>
       <label class="btn ghost sm" style="cursor:pointer">restore<input type="file" id="doRestore" accept="application/json" style="display:none"></label></div></div>
   <div class="card" style="margin-top:14px"><h3>Reset progress</h3><p class="muted" style="font-size:13px">Clears mastery, course progress and streak. Cannot be undone.</p><button class="btn ghost sm" id="resetProg" style="margin-top:8px">Reset my progress</button></div>`;
}

/* ===================================================================
   BIND
=================================================================== */
function bind(){
  document.querySelectorAll('.w').forEach(el=>el.onclick=e=>{e.stopPropagation();wordPopover(decodeURIComponent(el.dataset.word),e);});
  document.querySelectorAll('[data-speak]').forEach(b=>b.onclick=e=>{e.stopPropagation();speak(decodeURIComponent(b.dataset.speak));});
  document.querySelectorAll('[data-go2]').forEach(b=>b.onclick=()=>{const[s,i,sub]=b.dataset.go2.split('|');go(s,i,sub);});
  document.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>go(b.dataset.back));
  const nt=document.getElementById('nikTop');if(nt)nt.onchange=()=>{S.nikud=nt.checked;save();render();};
  document.querySelectorAll('[data-rate]').forEach(r=>r.querySelectorAll('b').forEach(b=>b.onclick=()=>{S.grammar[r.dataset.rate]=+b.dataset.n;touchDay();addXP(2);save();render();}));

  // dashboard
  document.querySelectorAll('[data-open-lesson]').forEach(b=>b.onclick=()=>{lsStage=0;go('course',b.dataset.openLesson);});
  const fd=document.getElementById('finishDay');if(fd)fd.onclick=()=>{S.dailyDone[new Date().toDateString()]=true;touchDay();addXP(10);save();toast('Nice. +10 XP');render();};
  const wu=document.querySelector('[data-warmup]');if(wu)wu.onclick=()=>startVocabDrill(weakPool(10),{title:'Warm-up review',back:'dash'});

  // course lesson stepping
  const lp=document.querySelector('[data-ls-prev]');if(lp)lp.onclick=()=>{lsStage=Math.max(0,lsStage-1);render();};
  const ln=document.querySelector('[data-ls-next]');if(ln)ln.onclick=()=>{lsStage++;save();render();};
  const ld=document.querySelector('[data-lesson-drill]');if(ld)ld.onclick=()=>{const l=COURSE.find(x=>x.id===+ld.dataset.lessonDrill);
    let items=catItems(l.vocab).slice();const pr=PRACTICE.find(p=>p.ch===l.grammar);
    const onDone=()=>{completeLesson(l.id);toast('Lesson '+l.id+' complete. +15 XP');go('course');};
    if(pr){startGrammarDrill(pr.items,{title:'Lesson '+l.id+' grammar',back:'course',onDone:()=>{startVocabDrill(items,{title:'Lesson '+l.id+' words',back:'course',onDone});}});}
    else{startVocabDrill(items,{title:'Lesson '+l.id+' practice',back:'course',onDone});}};

  // grammar
  document.querySelectorAll('[data-grammar]').forEach(b=>b.onclick=()=>go('grammar',b.dataset.grammar));
  const pt=document.querySelector('[data-practice-topic]');if(pt)pt.onclick=()=>{const id=+pt.dataset.practiceTopic;const pr=PRACTICE.find(p=>p.ch===id);
    if(pr){startGrammarDrill(pr.items,{title:pr.t,back:'grammar'});}
    else{const l=COURSE.find(x=>x.grammar===id);const items=l?catItems(l.vocab):LEX.slice(0,10);startVocabDrill(items,{title:'Practice',back:'grammar'});}};

  // binyanim
  document.querySelectorAll('[data-binyan]').forEach(b=>b.onclick=()=>go('binyanim',b.dataset.binyan));

  // vocab
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>go('vocab',b.dataset.cat));
  document.querySelectorAll('[data-vocab-add]').forEach(b=>b.onclick=()=>go('vocab','__add__'));
  document.querySelectorAll('[data-practice-cat]').forEach(b=>b.onclick=()=>{const name=decodeURIComponent(b.dataset.practiceCat);startVocabDrill(catItems(name),{title:name,back:'vocab'});});
  const aw=document.getElementById('awSave');if(aw)aw.onclick=()=>{const v=val('awV');if(!v){toast('Type the Hebrew word');return;}S.customVocab.push({v,p:val('awP'),tl:val('awTl'),en:val('awEn'),it:val('awIt')});buildLex();save();toast('Word saved');go('vocab',encodeURIComponent('My words'));};

  // verbs
  document.querySelectorAll('[data-verb]').forEach(b=>b.onclick=()=>go('verbs',decodeURIComponent(b.dataset.verb)));
  document.querySelectorAll('[data-verb-drill]').forEach(b=>b.onclick=()=>{const v=VERBS.find(x=>x.inf[0]===decodeURIComponent(b.dataset.verbDrill));startVerbDrill([v],{title:v.en+' · conjugation',max:12,back:'verbs'});});

  // stories
  document.querySelectorAll('[data-story]').forEach(b=>b.onclick=()=>{S.stories[b.dataset.story]=true;touchDay();save();go('stories',b.dataset.story);});
  const ra=document.querySelector('[data-readall]');if(ra)ra.onclick=()=>{const st=STORIES.find(s=>s.id===ra.dataset.readall);speakSeq(st.s.map(x=>x[0][0]));};
  const sr=document.querySelector('[data-stopread]');if(sr)sr.onclick=()=>{queue=[];if('speechSynthesis'in window)speechSynthesis.cancel();};
  document.querySelectorAll('[data-quiz]').forEach(b=>b.onclick=()=>{const[sid,qi,oi]=b.dataset.quiz.split('|');const st=STORIES.find(s=>s.id===sid);const q=st.quiz[+qi];const fb=document.getElementById('qf-'+qi);
    if(+oi===q.a){fb.innerHTML='<span class="ans-ok">Correct ✓</span>';addXP(2);save();}else{fb.innerHTML='<span class="ans-bad">Not quite. Answer: '+q.opts[q.a]+'</span>';}});

  // practice modes
  document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{const mode=b.dataset.mode;
    if(mode==='weak'){const w=weakPool(15);if(!w.length){toast('No weak spots yet. Learn some words first.');return;}startVocabDrill(w,{title:'Weak spots',back:'practice'});}
    else if(mode==='mixed'){const p=learnedPool();if(!p.length){toast('Learn some words first.');return;}startVocabDrill(p,{title:'Mixed review',max:12,back:'practice'});}
    else if(mode==='flash'){go('practice',null,'flash');setTimeout(startFlash,30);}
    else if(mode==='cat'){go('practice',null,'cat');}
    else if(mode==='grammar'){go('practice',null,'grammar');}
    else if(mode==='verbs'){startVerbDrill(VERBS,{title:'Conjugation drill',max:12,back:'practice'});}});
  document.querySelectorAll('[data-practice-ch]').forEach(b=>b.onclick=()=>{const pr=PRACTICE.find(p=>p.ch===+b.dataset.practiceCh);startGrammarDrill(pr.items,{title:'Ch '+pr.ch+' · '+pr.t,back:'practice'});});
  if(route.section==='practice'&&route.sub==='flash')setTimeout(startFlash,20);

  // drill engine
  bindDrill();

  // conversa
  document.querySelectorAll('[data-conv]').forEach(b=>b.onclick=()=>{go('conversa',b.dataset.conv);setTimeout(primeChat,30);});
  const cs=document.getElementById('cSend');if(cs){cs.onclick=sendChat;primeChat();}
  const cin=document.getElementById('cIn');if(cin)cin.onkeydown=e=>{if(e.key==='Enter')sendChat();};
  document.querySelectorAll('[data-chip]').forEach(b=>b.onclick=()=>{const i=document.getElementById('cIn');if(i){i.value=decodeURIComponent(b.dataset.chip);i.focus();}});

  // write
  const wb=document.getElementById('wBox');
  if(wb){document.getElementById('wSpeak').onclick=()=>speak(wb.value);
    document.getElementById('wSave').onclick=()=>{if(!wb.value.trim())return;S.writeEntries.push({date:new Date().toLocaleString(),text:wb.value});S.writeDraft='';save();toast('Entry saved');render();};
    wb.oninput=()=>{S.writeDraft=wb.value;};
    document.getElementById('wFeedback').onclick=()=>writeFeedback(wb.value);}

  // settings
  const sn=document.getElementById('setNik');if(sn)sn.onchange=()=>{S.nikud=sn.checked;save();};
  const sv=document.getElementById('setVoice');if(sv)sv.onchange=()=>{S.voiceURI=sv.value;save();};
  const srng=document.getElementById('setRate');if(srng)srng.oninput=()=>{S.rate=+srng.value;document.getElementById('rateVal').textContent=(+srng.value).toFixed(2)+'x';save();};
  const tv=document.getElementById('testVoice');if(tv)tv.onclick=()=>speak('שלום, מה שלומך?');
  const sk=document.getElementById('saveKey');if(sk)sk.onclick=()=>{S.cfg.anthropicKey=val('setKey');save();document.getElementById('keyMsg').innerHTML='<span class="ans-ok">Saved ✓</span>';toast('API key saved');};
  const pc=document.getElementById('pullCloud');if(pc)pc.onclick=()=>{syncDown();toast('Pulling from cloud…');};
  const db=document.getElementById('doBackup');if(db)db.onclick=backupJSON;
  const dr=document.getElementById('doRestore');if(dr)dr.onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);};
  const st2=document.getElementById('syncTxt2');if(st2)st2.textContent=document.getElementById('syncTxt').textContent;
  const rp=document.getElementById('resetProg');if(rp)rp.onclick=()=>{if(confirm('Reset all progress?')){S.mastery={};S.grammar={};S.course={done:{},lesson:1};S.streak=0;S.xp=0;S.stories={};save();toast('Progress reset');go('dash');}};
}
function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function norm(s){return stripN(s).toLowerCase().replace(/[\u2013\u2014'"`.,!?]/g,'').replace(/\s+/g,' ').trim();}

/* drill bind */
function bindDrill(){
  if(route.section!=='drill'||!drill)return;
  const d=drill;
  document.querySelectorAll('[data-drill-exit]').forEach(b=>b.onclick=()=>{const back=d.back||'practice';drill=null;go(back);});
  document.querySelectorAll('[data-drill-pick]').forEach(b=>b.onclick=()=>{if(d.answered)return;const chosen=decodeURIComponent(b.dataset.drillPick);const it=d.items[d.i];const ok=chosen===it.en;mAnswer(it.key,ok);if(ok)d.score++;else d.wrong.push(it);d.answered={chosen,ok};save();render();});
  const ck=document.querySelector('[data-drill-check]');if(ck)ck.onclick=drillCheck;
  const ti=document.getElementById('dType');if(ti)ti.onkeydown=e=>{if(e.key==='Enter')drillCheck();};
  const sk=document.querySelector('[data-drill-skip]');if(sk)sk.onclick=()=>{const it=d.items[d.i];mAnswer(it.key,false);d.wrong.push(it);d.answered={chosen:'',ok:false};save();render();};
  const hb=document.querySelector('[data-drill-hint]');if(hb)hb.onclick=()=>{const it=d.items[d.i];const h=document.getElementById('dHint');if(h)h.textContent=it.hint||'';};
  const nx=document.querySelector('[data-drill-next]');if(nx)nx.onclick=()=>{d.i++;d.answered=null;render();};
  const ag=document.querySelector('[data-drill-again]');if(ag)ag.onclick=()=>{d.i=0;d.score=0;d.wrong=[];d.answered=null;d.items=shuffle(d.items);render();};
  const fn=document.querySelector('[data-drill-finish]');if(fn)fn.onclick=()=>{const cb=d.done;const back=d.back||'practice';drill=null;if(cb)cb();else go(back);};
}
function drillCheck(){const d=drill;const ti=document.getElementById('dType');if(!ti)return;const got=norm(ti.value);
  if(d.typed){const it=d.items[d.i];const ok=it.a.some(a=>norm(a)===got||norm(a).replace(/-/g,'')===got.replace(/-/g,''));if(ok)d.score++;else d.wrong.push(it);d.answered={ok};render();}
  else{const it=d.items[d.i];const ok=(norm(it.en).includes(got)&&got.length>1)||norm(it.tl)===got;mAnswer(it.key,ok);if(ok)d.score++;else d.wrong.push(it);d.answered={chosen:'',ok};save();render();}
}

/* ===================================================================
   WORD POPOVER + LEX LOOKUP
=================================================================== */
function lexLookup(word){const bare=stripN(word);
  for(const it of LEX){if(stripN(it.v)===bare||(it.p&&it.p===bare))return {tl:it.tl,en:it.en};}
  for(const v of VERBS){if(stripN(v.inf[0])===bare)return {tl:'',en:v.en,extra:v.binyan+' · '+v.root};
    for(const grp of[[v.present,'present'],[v.past,'past'],[v.future,'future']]){for(const r of grp[0]){if(stripN(r[1][0])===bare)return {tl:'',en:v.en+' ('+grp[1]+', '+r[0]+')',extra:v.binyan+' · '+v.root};}}}
  return null;}
function wordPopover(word,e){const pop=document.getElementById('pop');const info=lexLookup(word);
  pop.innerHTML=`<div class="row spread"><span class="hw">${word}</span><button class="spk" id="popSpk">♪</button></div>${info?`<div class="tl" style="margin-top:6px">${info.tl||''}</div><div class="en">${info.en}</div>${info.extra?`<div class="faint" style="font-size:11.5px;margin-top:3px">${info.extra}</div>`:''}`:'<div class="muted" style="margin-top:6px;font-size:12.5px">Tap to hear it.</div>'}`;
  const x=Math.min(e.clientX,window.innerWidth-280);const y=Math.min(e.clientY+14,window.innerHeight-120);
  pop.style.left=x+'px';pop.style.top=y+'px';pop.classList.add('show');
  document.getElementById('popSpk').onclick=()=>speak(word);
  setTimeout(()=>document.addEventListener('click',hidePop,{once:true}),10);
  function hidePop(){pop.classList.remove('show');}
}

/* ===================================================================
   AI: conversa + writing feedback
=================================================================== */
function primeChat(){if(route.section!=='conversa'||!route.item)return;const sc=CONVERSA.find(c=>c.id===route.item);if(!sc)return;
  if(!chat.length||chat.__id!==sc.id){chat=[{role:'assistant',content:sc.open[0]}];chat.__id=sc.id;}renderChat();}
function renderChat(){const c=document.getElementById('chat');if(!c)return;
  c.innerHTML=chat.map(m=>`<div class="msg ${m.role==='assistant'?'ai':'me'}">${hebClick(m.display||m.content)}</div>`).join('')+(busy?'<div class="typing">…</div>':'');
  c.querySelectorAll('.w').forEach(el=>el.onclick=ev=>{ev.stopPropagation();wordPopover(decodeURIComponent(el.dataset.word),ev);});
  c.scrollTop=c.scrollHeight;}
async function sendChat(){const inp=document.getElementById('cIn');const text=inp.value.trim();if(!text||busy)return;
  inp.value='';chat.push({role:'user',content:text});touchDay();addXP(2);save();renderChat();
  const sc=CONVERSA.find(c=>c.id===route.item);const key=S.cfg&&S.cfg.anthropicKey;
  if(!key){chat.push({role:'assistant',content:'(הוֹסֵף מַפְתֵּחַ בְּהַגְדָּרוֹת)',display:'Add your Anthropic key in Settings for live replies.'});renderChat();return;}
  busy=true;renderChat();
  const sys=`${sc.char} You are speaking with Vincenzo. Reply ONLY in modern spoken Hebrew${sc.free?'':' at '+sc.lvl+' level'}, short and natural (1-2 sentences). Address him with masculine forms. If he makes a clear mistake, model the correct form briefly. Do not translate unless asked.`;
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,messages:chat.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content}))})});
    const d=await r.json();busy=false;const txt=(d.content&&d.content.filter(x=>x.type==='text').map(x=>x.text).join(' '))||'(...)';
    chat.push({role:'assistant',content:txt});renderChat();}catch(e){busy=false;chat.push({role:'assistant',content:'(שְׁגִיאָה)',display:'Connection error. Check your key and network.'});renderChat();}}
async function writeFeedback(text){const fb=document.getElementById('wFb');const key=S.cfg&&S.cfg.anthropicKey;
  if(!text.trim()){fb.textContent='Write something first.';return;}
  if(!key){fb.innerHTML='<span class="muted">Add your Anthropic key in Settings to get feedback.</span>';return;}
  fb.textContent='Reading your text…';
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
      system:"You are a warm Hebrew tutor for an Italian beginner (A1-A2, male). The user writes Hebrew. Reply in English. Give: (1) a corrected version of their Hebrew, (2) 2-3 short bullet notes on the main fixes in plain language, (3) one encouraging line. Keep it brief.",
      messages:[{role:'user',content:text}]})});
    const d=await r.json();const txt=(d.content&&d.content.filter(x=>x.type==='text').map(x=>x.text).join(' '))||'(no response)';
    fb.innerHTML=txt.replace(/\n/g,'<br>');}catch(e){fb.textContent='Connection error. Check your key.';}}

/* ===================================================================
   BOOT
=================================================================== */
buildLex();buildNav();render();setSync(false);syncDown();
setTimeout(()=>{loadVoices();if(route.section==='settings'||route.section==='pron')render();},600);
</script>
