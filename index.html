<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>עברית · Vincenzo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111921; --bg2:#16202c; --panel:#1c2738; --panel2:#212f42; --raise:#27384f;
  --paper:#f0ebe2; --warm:#ddd7cc; --muted:#7d96ac; --faint:#4e6a80;
  --gold:#c8a458; --gold2:#d8b86a; --goldsoft:#241e10;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.04);
  --good:#4a9466; --bad:#b86858; --info:#4e85b0;
  --shadow:0 8px 28px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.2);
  --shadow-sm:0 2px 12px rgba(0,0,0,.28);
  --serif:'Spectral',Georgia,serif; --sans:'Outfit',-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif; --heb:'Assistant','Heebo',-apple-system,sans-serif;
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--warm);font-family:var(--sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;line-height:1.6;overflow-x:hidden}
.heb{font-family:var(--heb);direction:rtl;unicode-bidi:embed;font-weight:400}
.heb.lg{font-size:28px;font-weight:300;color:var(--paper)}
.heb.b{font-weight:500}
.app{display:flex;min-height:100vh}
/* sidebar */
.side{width:228px;flex:0 0 228px;background:var(--bg2);border-right:1px solid var(--line);
  padding:22px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;
  gap:2px;overflow:auto;z-index:30}
.brand{display:flex;align-items:baseline;gap:8px;padding:4px 10px 18px}
.brand .he{font-family:var(--heb);font-weight:700;font-size:26px;color:var(--gold2);direction:rtl;letter-spacing:-.02em}
.brand small{color:var(--faint);font-family:var(--serif);font-style:italic;font-size:11.5px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{all:unset;display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;
  cursor:pointer;color:var(--muted);font-size:13.5px;transition:all .18s ease;font-weight:400}
.nav button .ic{width:17px;text-align:center;opacity:.7;font-size:13px;flex-shrink:0}
.nav button:hover{background:rgba(255,255,255,.05);color:var(--warm)}
.nav button.on{background:rgba(255,255,255,.07);color:var(--paper);font-weight:600}
.nav button.on .ic{opacity:1;color:var(--gold2)}
.side .foot{margin-top:auto;padding:12px 10px 0;color:var(--faint);font-size:11px;line-height:1.6}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--bad);margin-inline-end:6px;vertical-align:middle}
.dot.ok{background:var(--good)}
/* main */
.main{flex:1;min-width:0;padding:28px 36px 100px;max-width:1200px}
/* typography */
h1{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:-.02em;color:var(--paper);line-height:1.2}
h2{font-family:var(--sans);font-weight:600;font-size:11.5px;color:var(--faint);margin:26px 0 10px;text-transform:uppercase;letter-spacing:.1em}
h3{font-family:var(--sans);font-weight:600;font-size:14px;color:var(--paper);margin:0 0 4px}
h4{color:var(--gold);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:700}
p{color:#aec0d0;font-size:14px;line-height:1.65}
.lead{color:var(--muted);font-family:var(--serif);font-style:italic;font-size:15px;margin-top:5px;line-height:1.55}
/* card */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow-sm)}
/* grids */
.grid{display:grid;gap:13px}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
/* pills & tags */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  color:var(--gold2);background:rgba(200,164,88,.1);border-radius:999px;padding:4px 12px;letter-spacing:.01em}
.tag{font-size:10.5px;color:var(--muted);background:rgba(255,255,255,.06);border-radius:7px;padding:2px 8px;white-space:nowrap}
.lvl{font-size:10px;font-weight:700;letter-spacing:.05em;border-radius:6px;padding:2px 7px;text-transform:uppercase}
.lvl.a1{background:rgba(74,148,102,.18);color:#80c89a} .lvl.a2{background:rgba(78,133,176,.18);color:#8ab8e2}
.lvl.b1{background:rgba(200,164,88,.18);color:var(--gold2)} .lvl.b2{background:rgba(184,104,88,.18);color:#e89880}
.stbadge{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:6px;padding:2px 7px}
.stbadge.st-short{background:rgba(125,150,172,.14);color:#7d96ac}
.stbadge.st-long{background:rgba(78,133,176,.14);color:#8ab8e2}
.stbadge.st-ext{background:rgba(200,164,88,.14);color:var(--gold2)}
.stbadge.st-mag{background:rgba(184,104,88,.16);color:#e89880}
/* buttons */
.btn{all:unset;cursor:pointer;background:rgba(192,154,76,.85);color:#0e0c07;
  font-weight:600;font-size:13.5px;padding:11px 18px;border-radius:12px;transition:all .18s ease;text-align:center;letter-spacing:-.005em}
.btn:hover{background:rgba(192,154,76,.98);transform:translateY(-1px);box-shadow:0 4px 14px rgba(192,154,76,.22)}
.btn:active{transform:translateY(0);opacity:.88}
.btn.ghost{background:rgba(200,164,88,.1);color:var(--gold2);border:none}
.btn.ghost:hover{background:rgba(200,164,88,.16);box-shadow:none;transform:none}
.btn.sm{padding:7px 13px;font-size:12.5px;border-radius:10px}
.btn.full{display:block;width:100%}
/* layout */
.row{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.spread{justify-content:space-between}
.tl{color:var(--gold2);font-style:italic;font-family:var(--serif);font-size:13px}
.en{color:#9eb4c4}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.stat{display:flex;flex-direction:column;gap:2px}
.stat b{font-family:var(--serif);font-size:30px;color:var(--gold2);font-weight:600}
.stat span{color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.07em}
/* progress bar */
.bar{height:4px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:10px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;transition:width .4s ease}
/* list item */
.item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 16px;
  border:1px solid var(--line);border-radius:14px;background:var(--panel);margin-bottom:8px;cursor:pointer;transition:all .18s ease}
.item:hover{background:var(--panel2);border-color:rgba(200,164,88,.18)}
.item:active{transform:scale(.998)}
.item.done{border-color:rgba(74,148,102,.22)}
.item .meta{display:flex;flex-direction:column;gap:3px;min-width:0}
.item .meta .t{font-weight:600;color:var(--paper);font-size:14.5px}
.chev{color:var(--faint);font-size:17px;flex-shrink:0}
/* detail */
.back{all:unset;cursor:pointer;color:var(--muted);font-size:13px;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px;transition:color .15s}
.back:hover{color:var(--gold2)}
.back::before{content:'\2039';font-size:20px;line-height:1;color:var(--gold2)}
.sec{border:1px solid var(--line);border-radius:14px;padding:16px 20px;background:var(--panel);margin-bottom:12px}
.stage{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.stage .n{flex:0 0 28px;height:28px;border-radius:50%;background:rgba(200,164,88,.14);color:var(--gold2);
  display:grid;place-items:center;font-size:12px;font-weight:700;font-family:var(--serif);flex-shrink:0}
/* table */
table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px}
th,td{text-align:start;padding:8px 10px;border-bottom:1px solid var(--line2)}
th{color:var(--gold2);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em}
td .heb{font-size:17px}
tr:last-child td{border-bottom:none}
/* confidence rating */
.rate{display:flex;gap:5px;align-items:center}
.rate b{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;
  cursor:pointer;color:var(--muted);font-size:12px;transition:all .15s}
.rate b:hover{border-color:rgba(200,164,88,.35);color:var(--gold2)}
.rate b.on{background:var(--gold);color:#1a1408;border-color:var(--gold)}
/* subtabs */
.subtabs{display:flex;gap:4px;flex-wrap:wrap;margin:14px 0 18px;border-bottom:1px solid var(--line);padding-bottom:0}
.subtabs button{all:unset;cursor:pointer;padding:9px 14px;color:var(--muted);font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.subtabs button.on{color:var(--gold2);border-bottom-color:var(--gold2)}
.subtabs button:hover:not(.on){color:var(--warm)}
/* speak button */
.spk{all:unset;cursor:pointer;width:32px;height:32px;border-radius:10px;border:1px solid var(--line);
  display:grid;place-items:center;color:var(--gold2);font-size:13px;flex:0 0 auto;transition:all .15s}
.spk:hover{background:rgba(200,164,88,.1);border-color:rgba(200,164,88,.3)}
.spk:active{transform:scale(.92)}
/* clickable word */
.w{cursor:pointer;border-bottom:1px dotted transparent;transition:all .12s;border-radius:2px}
.w:hover{border-bottom-color:var(--gold);color:var(--gold2)}
/* story sentence */
.s-sent{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:12px;border:1px solid transparent;transition:all .15s;margin-bottom:1px}
.s-sent:hover{background:rgba(255,255,255,.025);border-color:var(--line)}
.s-sent .s-txt{flex:1;min-width:0}
.s-sent .heb{font-size:20px;font-weight:300;color:var(--paper);display:block;line-height:1.65}
.s-sent .tl{display:block;margin-top:2px;font-style:italic}
.s-sent .en{display:block;color:var(--muted);font-size:13px;margin-top:1px}
.s-sent .spk{flex:0 0 auto;width:34px;height:34px;margin-top:4px}
.s-sent .pmark{all:unset;cursor:pointer;color:var(--gold2);font-size:13px;margin-inline-start:4px}
/* chat */
.chat{display:flex;flex-direction:column;gap:8px;max-height:46vh;overflow:auto;padding:6px 2px}
.msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14.5px;line-height:1.55}
.msg.ai{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:5px}
.msg.me{align-self:flex-end;background:linear-gradient(155deg,var(--gold2),var(--gold));color:#1a1408;border-bottom-right-radius:5px}
.msg .heb{font-size:17px;font-weight:300}
.msg.me .heb{font-weight:400}
.typing{align-self:flex-start;color:var(--faint);font-size:13px;padding:4px 10px}
/* chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chips button{all:unset;cursor:pointer;font-size:13px;border:1px solid var(--line);border-radius:999px;
  padding:6px 13px;color:#8aaac0;transition:all .15s}
.chips button:hover{background:rgba(200,164,88,.1);color:var(--gold2);border-color:rgba(200,164,88,.28)}
/* inputs */
.inp,textarea,select{width:100%;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:12px;
  color:var(--warm);padding:11px 14px;font-family:var(--sans);font-size:14px;transition:border-color .15s}
.inp.heb,textarea.heb{font-family:var(--heb);font-size:18px;font-weight:300;direction:rtl;text-align:right}
.inp:focus,textarea:focus,select:focus{outline:none;border-color:rgba(200,164,88,.5);box-shadow:0 0 0 3px rgba(200,164,88,.07)}
textarea{min-height:120px;resize:vertical}
label{display:block;font-size:12px;color:var(--muted);margin:14px 0 5px;letter-spacing:.02em;font-weight:500}
.range{width:100%;accent-color:var(--gold)}
/* switch */
.switch{display:inline-flex;align-items:center;gap:9px;cursor:pointer}
.switch input{display:none}
.track{width:44px;height:26px;border-radius:99px;background:rgba(255,255,255,.12);position:relative;transition:.2s}
.track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.switch input:checked+.track{background:var(--gold)}
.switch input:checked+.track::after{left:21px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:16px;flex-wrap:wrap}
.note{font-size:13px;color:var(--muted);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-top:12px;line-height:1.65}
.info{display:inline-grid;place-items:center;width:16px;height:16px;border-radius:50%;border:1px solid var(--line);color:var(--info);font-size:10px;cursor:help;font-style:italic;font-family:var(--serif);position:relative}
.info:hover .tip{display:block}
.tip{display:none;position:absolute;top:22px;left:50%;transform:translateX(-50%);width:240px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:12px;color:#aec0d0;z-index:50;font-style:normal;font-family:var(--sans);text-align:start;line-height:1.5;box-shadow:var(--shadow)}
.kbd{font-family:var(--heb);direction:rtl;font-size:36px;font-weight:300;color:var(--paper);text-align:center}
.cell{border:1px solid var(--line);border-radius:13px;padding:14px 8px;text-align:center;cursor:pointer;background:var(--panel);transition:all .18s}
.cell:hover{background:var(--panel2);border-color:rgba(200,164,88,.25);transform:translateY(-2px)}
.cell small{display:block;color:var(--faint);font-size:10.5px;margin-top:5px}
/* answer states */
.ans-ok{color:var(--good)} .ans-bad{color:var(--bad)}
.feedback{font-size:13px;margin-top:6px}
/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(18,26,38,.94);border:1px solid rgba(200,164,88,.22);color:var(--paper);
  padding:12px 20px;border-radius:14px;font-size:13.5px;opacity:0;transition:all .25s ease;
  z-index:100;box-shadow:var(--shadow);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* word popover */
.pop{position:fixed;background:rgba(18,26,38,.96);border:1px solid rgba(200,164,88,.25);border-radius:14px;
  padding:14px 16px;z-index:90;box-shadow:var(--shadow);max-width:260px;display:none;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.pop.show{display:block}
.pop .hw{font-family:var(--heb);font-size:24px;font-weight:300;color:var(--paper);direction:rtl}
/* mobile bottom nav */
.mobnav{display:none}
@media(max-width:860px){
  .app{flex-direction:column}
  .side{display:none}
  .main{padding:18px 16px 100px;max-width:100%}
  .g3,.g2,.g4{grid-template-columns:1fr}
  h1{font-size:26px}
  .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;
    background:rgba(17,25,33,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--line);z-index:40;
    padding:6px 4px calc(6px + env(safe-area-inset-bottom));overflow-x:auto;gap:1px}
  .mobnav button{all:unset;cursor:pointer;flex:1 0 auto;min-width:56px;text-align:center;
    color:var(--faint);font-size:9.5px;padding:6px 4px;border-radius:10px;transition:all .15s}
  .mobnav button .ic{display:block;font-size:19px;margin-bottom:2px}
  .mobnav button.on{color:var(--gold2)}
  .mobtop{display:flex !important}
}
.mobtop{display:none;align-items:center;justify-content:space-between;padding:14px 16px;
  border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(17,25,33,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:20}
.mobtop .he{font-family:var(--heb);font-weight:700;font-size:22px;color:var(--gold2)}
/* knowledge map */
.km{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.km .b{border:1px solid var(--line);border-radius:14px;padding:10px 8px;background:var(--panel);text-align:center}
.km .b b{font-family:var(--serif);font-size:24px;display:block;font-weight:600;line-height:1.1}
.km .b span{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:600;display:block;margin-top:4px}
.km .enc b{color:#7d96ac} .km .weak b{color:#d88870} .km .fam b{color:#8ab8e2} .km .mas b{color:#80c89a}
@media(max-width:860px){.km{grid-template-columns:repeat(2,1fr)}}
.mbar{height:5px;border-radius:99px;overflow:hidden;display:flex;margin-top:10px;background:rgba(255,255,255,.05)}
.mbar i{height:100%}
.mpill{font-size:9.5px;font-weight:700;letter-spacing:.03em;border-radius:6px;padding:2px 7px;white-space:nowrap}
.mpill.enc{background:rgba(125,150,172,.16);color:#7d96ac} .mpill.weak{background:rgba(184,104,88,.18);color:#d88870}
.mpill.fam{background:rgba(78,133,176,.18);color:#8ab8e2} .mpill.mas{background:rgba(74,148,102,.2);color:#80c89a}
.mpill.new{background:rgba(200,164,88,.14);color:var(--gold2)}
/* stepper */
.stepper{display:flex;gap:5px;margin:16px 0 20px}
.stepper .st{flex:1;height:4px;border-radius:99px;background:rgba(255,255,255,.07);transition:background .3s}
.stepper .st.on{background:var(--gold2)} .stepper .st.done{background:var(--good)}
.steplabel{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:12px}
/* word cards */
.wcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.wcard{border:1px solid var(--line);border-radius:14px;padding:14px;background:var(--panel);cursor:pointer;transition:all .18s ease;text-align:center}
.wcard:hover{background:var(--panel2);border-color:rgba(200,164,88,.22);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.wcard .h{font-family:var(--heb);direction:rtl;font-weight:300;font-size:24px;color:var(--paper);line-height:1.4}
.wcard .t{color:var(--gold2);font-style:italic;font-family:var(--serif);font-size:12px;margin-top:3px}
.wcard .e{color:var(--muted);font-size:12.5px}
.wcard.flip .wc-back{display:none}
.wcard.flip.open .wc-front{display:none}
.wcard.flip.open .wc-back{display:block}
.wcard .wc-hint{color:var(--faint);font-size:10.5px;margin-top:7px;letter-spacing:.03em}
.wcard .wc-rate{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.wcard .wr{all:unset;cursor:pointer;font-family:var(--heb);direction:rtl;font-size:12.5px;
  border:1px solid var(--line);border-radius:9px;padding:6px 8px;color:#7d96ac;text-align:center;transition:all .15s}
.wcard .wr:hover{background:rgba(200,164,88,.07);border-color:rgba(200,164,88,.22)}
.wcard .wr-k.on{background:rgba(74,148,102,.2);border-color:rgba(74,148,102,.55);color:#80c89a}
.wcard .wr-m.on{background:rgba(200,164,88,.18);border-color:rgba(200,164,88,.55);color:var(--gold2)}
.wcard .wr-n.on{background:rgba(184,104,88,.18);border-color:rgba(184,104,88,.5);color:#e08870}
/* drill */
.drill{}
.dprog{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.dprog .track{flex:1;height:4px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.dprog .track i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px}
.dprog .num{color:var(--faint);font-size:12.5px;white-space:nowrap}
.qprompt{text-align:center;margin:10px 0 20px}
.qprompt .big{font-family:var(--heb);direction:rtl;font-weight:300;font-size:38px;color:var(--paper);line-height:1.4}
.qprompt .en{font-size:22px;color:var(--paper);font-weight:500}
.qprompt .sub{color:var(--muted);font-size:13px;margin-top:6px}
.opts{display:grid;gap:8px}
.opt{all:unset;cursor:pointer;border:1px solid var(--line);border-radius:13px;padding:13px 16px;

<script>

   IVRIT · private Hebrew learning app for Vincenzo

=================================================================== */
const USER_ID='vincenzo';
const DRIVE_FOLDER='1jqZwxO-5IhaiMxn7WkS0_EDadN_4VQlr';
const SUPA_URL='https://ygstriddcprzalnisbql.supabase.co';
const SUPA_KEY='sb_publishable_QbkZ3-OMXm-LiIoZw3lApA_BzhOUtlS';
const LS='ivrit_state_'+USER_ID;

const defaultState={
  user:USER_ID, nikud:true, rate:0.82, voiceURI:'',
  streak:0, lastDay:null, xp:0,
  mastery:{},                 // key -> {s:0..3, n, c, due}
  grammar:{},                 // grammar topic id -> confidence 1..5
  course:{done:{}, lesson:1}, // done lessons + current lesson pointer
  stories:{}, dailyDone:{},
  customVocab:[], writeEntries:[], writeDraft:'',
  cfg:{anthropicKey:''},
  updated:Date.now()
};
let S=load();
function load(){
  try{
    const s=deepMerge(structuredClone(defaultState),JSON.parse(localStorage.getItem(LS))||{});
    /* BUG 1 FIX: nikud pref lives in its own key (never touched by save/sync) */
    const nik=localStorage.getItem(LS+'_nik');
    if(nik!==null)s.nikud=(nik==='1');
    return s;
  }catch(e){return structuredClone(defaultState)}
}
function deepMerge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])){a[k]=deepMerge(a[k]||{},b[k])}else{a[k]=b[k]}}return a}
function save(){S.updated=Date.now();localStorage.setItem(LS,JSON.stringify(S));syncUp();}
/* saveNikud: writes ONLY the display pref (never calls syncUp, never touches progress) */
function saveNikud(){try{localStorage.setItem(LS+'_nik',S.nikud?'1':'0');}catch(e){}}
function touchDay(){const d=new Date().toDateString();if(S.lastDay!==d){const gap=S.lastDay?(new Date(d)-new Date(S.lastDay)):0;S.streak=(S.lastDay&&gap<=864e5*1.6)?S.streak+1:1;S.lastDay=d;}}
function addXP(n){S.xp=(S.xp||0)+n;}

/* ---------- Hebrew display: nikud + correct unvowelled (ktiv male) ---------- */
/* stripN: remove ALL nikud \u2014 used only for display when user toggled nikud off */
function stripN(t){return t.replace(/[\u0591-\u05C7]/g,'')}
/* forTTS: keep nikud (vowels) so Carmit / Israeli TTS pronounces correctly \u2014 only strip cantillation tropes */
function forTTS(t){return t.replace(/[\u0591-\u05AF]/g,'').replace(/\s+/g,' ').trim();}
/* array shuffle (Fisher-Yates) - returns a new shuffled copy */
function shuffle(arr){const a=(arr||[]).slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function H(v,plain){ if(S.nikud) return v; return (plain!=null&&plain!=='')?plain:stripN(v); }
function hebClick(v,plain,cls){
  const shown=H(v,plain);const words=shown.split(/(\s+)/);
  return `<span class="heb ${cls||''}" dir="rtl">`+words.map(w=>{
    if(/^\s+$/.test(w)||w==='')return w;
    return `<span class="w" data-word="${encodeURIComponent(w)}">${w}</span>`;
  }).join('')+`</span>`;
}

/* ---------- Speech ---------- */
let voices=[];
function loadVoices(){voices=speechSynthesis.getVoices()||[]}
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
/* heVoice: prefer Carmit (macOS/iOS authentic Israeli female voice), then Tamar, then any he-IL */
function heVoice(){
  if(S.voiceURI){const v=voices.find(v=>v.voiceURI===S.voiceURI);if(v)return v;}
  const prefer=['Carmit','Tamar','Tami','he-IL'];
  for(const p of prefer){
    const v=voices.find(v=>(v.name&&v.name.includes(p))||(v.lang&&v.lang===p));
    if(v)return v;
  }
  return voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith('he'))||null;
}
function hasHeVoice(){return !!heVoice()}
/* speak: keep nikud so Carmit vowelizes correctly; use 0.82 for natural Israeli pace */
function speak(t){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(forTTS(t));
  u.lang='he-IL';const v=heVoice();if(v)u.voice=v;
  u.rate=S.rate||0.82;u.pitch=1;
  speechSynthesis.speak(u);
}
let queue=[];
function speakSeq(arr){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();queue=arr.slice();next();
  function next(){if(!queue.length)return;
    const u=new SpeechSynthesisUtterance(forTTS(queue.shift()));
    u.lang='he-IL';const v=heVoice();if(v)u.voice=v;
    u.rate=S.rate||0.82;u.pitch=1;
    u.onend=()=>setTimeout(next,220);speechSynthesis.speak(u);}
}

/* ---------- Supabase sync ---------- */
async function syncUp(){if(!SUPA_URL||!SUPA_KEY){setSync(false);return;}
  try{const r=await fetch(SUPA_URL+'/rest/v1/progress?on_conflict=user_id',{method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify([{user_id:USER_ID,state:S,updated_at:new Date(S.updated).toISOString()}])});setSync(r.ok);}catch(e){setSync(false)}}
async function syncDown(){if(!SUPA_URL||!SUPA_KEY){setSync(false);return;}
  try{const r=await fetch(SUPA_URL+'/rest/v1/progress?user_id=eq.'+USER_ID+'&select=state,updated_at',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    if(r.ok){const rows=await r.json();if(rows&&rows[0]&&rows[0].state&&(rows[0].state.updated||0)>(S.updated||0)){S=deepMerge(structuredClone(defaultState),rows[0].state);localStorage.setItem(LS,JSON.stringify(S));render();}setSync(true);}else setSync(false);}catch(e){setSync(false)}}
function setSync(ok){const d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');if(!d)return;d.className='dot'+(ok?' ok':'');t.textContent=ok?'synced across devices':'offline (saved on device)';}

/* ---------- Backup ---------- */
function backupJSON(){const name='ivrit-backup-'+new Date().toISOString().slice(0,10)+'.json';const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();toast('Backup downloaded: '+name);}
function importJSON(file){const r=new FileReader();r.onload=e=>{try{S=deepMerge(structuredClone(defaultState),JSON.parse(e.target.result));save();render();toast('Backup restored')}catch(_){toast('Invalid file')}};r.readAsText(file);}

/* ---------- toast ---------- */
let toastT;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ---- ALEPH-BET (all 22 + finals) ---- */
const ALEFBET=[
 ["א","alef","silent / vowel carrier",""],["ב","bet","b (בּ) / v (ב)",""],["ג","gimel","g (as in go)",""],
 ["ד","dalet","d",""],["ה","he","h",""],["ו","vav","v / o / u",""],["ז","zayin","z",""],
 ["ח","chet","ch (throat)",""],["ט","tet","t",""],["י","yod","y / i",""],["כ","kaf","k (כּ) / kh (כ)","ך"],
 ["ל","lamed","l",""],["מ","mem","m","ם"],["נ","nun","n","ן"],["ס","samech","s",""],
 ["ע","ayin","silent / guttural carrier",""],["פ","pe","p (פּ) / f (פ)","ף"],["צ","tzadi","tz","ץ"],
 ["ק","kuf","k",""],["ר","resh","r (French-like)",""],["ש","shin (שׁ) / sin (שׂ)","sh / s",""],["ת","tav","t",""]
];
/* ---- NIKUD lessons (modern explanation) ---- */
const NIKUD=[
 {sign:"בַ",name:"Patach",sound:"a",note:"Short 'a' as in Italian casa."},
 {sign:"בָ",name:"Kamatz",sound:"a",note:"Also 'a' in modern Hebrew. Same sound as patach for speakers today."},
 {sign:"בֶ",name:"Segol",sound:"e",note:"'e' as in Italian bene."},
 {sign:"בֵ",name:"Tzere",sound:"e",note:"Also 'e', slightly longer. Sounds the same today."},
 {sign:"בִ",name:"Chirik",sound:"i",note:"'i' as in Italian vino. With a yod (בִי) it is the same sound."},
 {sign:"בֹ",name:"Cholam",sound:"o",note:"'o' as in sole. Often written with a vav (בּוֹ) in unvowelled text."},
 {sign:"בֻ",name:"Kubutz",sound:"u",note:"'u' as in luna. In unvowelled text usually becomes a vav (בּוּ)."},
 {sign:"בּוּ",name:"Shuruk",sound:"u",note:"The vav-with-dot 'u'. This is how 'u' usually looks without nikud."},
 {sign:"בְ",name:"Sheva",sound:"(silent / very short)",note:"Either silent or a tiny 'e'. Disappears in fast speech."}
];

/* ---- BINYANIM (the 7 verb patterns) ---- */
const BINYANIM=[
 {id:"paal",name:"פָּעַל",tl:"Pa'al (Qal)",voice:"active, simple",
  desc:"The simplest and most common pattern. Plain active actions.",
  ex:[["כָּתַב","katav","he wrote"],["אָכַל","achal","he ate"],["הָלַךְ","halach","he walked"]],
  note:"Most basic everyday verbs live here: לכתוב, לאכול, ללכת, לשתות. Your starting point."},
 {id:"nifal",name:"נִפְעַל",tl:"Nif'al",voice:"passive / middle of Pa'al",
  desc:"Usually the passive or 'it happens to itself' counterpart of Pa'al.",
  ex:[["נִכְתַּב","nichtav","it was written"],["נוֹלַד","nolad","he was born"],["נִכְנַס","nichnas","he entered"]],
  note:"Several daily verbs are secretly Nif'al: להיכנס, להישאר, להיוולד, להיפגש."},
 {id:"piel",name:"פִּעֵל",tl:"Pi'el",voice:"active, often intensive",
  desc:"Active, frequently intensive or with a 'do thoroughly' flavour. Marked by a doubled middle letter.",
  ex:[["דִּבֵּר","diber","he spoke"],["בִּשֵּׁל","bishel","he cooked"],["סִפֵּר","siper","he told"]],
  note:"Very productive: לדבר, לבשל, לספר, לנקות, ללמד. Present begins with מְ."},
 {id:"pual",name:"פֻּעַל",tl:"Pu'al",voice:"passive of Pi'el",
  desc:"The passive partner of Pi'el. 'It was done (intensively).'",
  ex:[["דּוֹחַ","dubar","it was spoken about"],["בֻּשַּׁל","bushal","it was cooked"],["סֻפַּר","supar","it was told"]],
  note:"Less common in speech, mostly heard as adjectives: מְבֻשָּׁל (cooked), מְסֻדָּר (arranged)."},
 {id:"hifil",name:"הִפְעִיל",tl:"Hif'il",voice:"active, causative",
  desc:"Causative: to make something happen or bring about a state.",
  ex:[["הִתְחִיל","hitchil","he began"],["הֵבִין","hevin","he understood"],["הִזְמִין","hizmin","he invited / ordered"]],
  note:"Causative pairs: בָּא come → הֵבִיא bring. Daily: להבין, להכיר, להרגיש, להתחיל."},
 {id:"hufal",name:"הֻפְעַל",tl:"Huf'al",voice:"passive of Hif'il",
  desc:"The passive partner of Hif'il. 'It was made to happen.'",
  ex:[["הֻזְמַן","huzman","he/it was invited"],["הֻסְבַּר","husbar","it was explained"],["הֻחְלַט","huchlat","it was decided"]],
  note:"Mostly formal / written. Recognise it; you rarely produce it early."},
 {id:"hitpael",name:"הִתְפַּעֵל",tl:"Hitpa'el",voice:"reflexive / reciprocal",
  desc:"You do it to yourself, or people do it to each other. Marked by the מִתְ prefix.",
  ex:[["הִתְלַבֵּשׁ","hitlabesh","he got dressed"],["הִתְעוֹרֵר","hit'orer","he woke up"],["הִתְגַּעְגֵּעַ","hitga'age'a","he missed / longed"]],
  note:"Maps cleanly to Italian -si verbs: vestirsi, svegliarsi. Daily: להתלבש, להתקלח, להתחתן, להתגעגע."}
];

/* ---- GRAMMAR: chapters A1 to B2, each with stages ---- */
const GRAMMAR=[
 {id:1,t:"The Alphabet",lvl:"A1",sum:"22 letters, right to left, 5 final forms.",
  stages:[
   {h:"How it works",p:"Hebrew has 22 consonants written right to left. Vowels are small marks (nikud) added under or beside letters, not letters of their own. Five letters take a different shape at the end of a word."},
   {h:"The good news for you",p:"The vowel sounds map almost exactly onto Italian a, e, i, o, u. Your ear is already trained. The real work is three things: the throat sound ח and soft כ, the French-style ר, and reading right to left."},
   {h:"The dagesh dot",p:"A dot inside three letters flips the sound: בּ b / ב v, כּ k / כ kh, פּ p / פ f. Same letter, two sounds, decided by a dot and by position."},
   {h:"See the full chart",p:"Open the Alphabet tab in Pronunciation to tap every letter and hear it."}
  ]},
 {id:2,t:"Nikud: the vowel marks",lvl:"A1",sum:"How the vowel system works, and why modern texts drop it.",
  stages:[
   {h:"What nikud is",p:"Nikud are the dots and dashes that tell you the vowels. Beginners rely on them. But everyday modern Hebrew (newspapers, signs, texts) is written without nikud."},
   {h:"Why we drop it later",p:"Because real Hebrew has no nikud, you must learn to read words by their consonant skeleton. When you remove the marks, Hebrew compensates by adding letters (mainly ו and י). This fuller spelling is called ktiv male."},
   {h:"Example",p:"חֲנוּת and חנות are the same word (shop). But תָּכְנִית becomes תוכנית when unvowelled, an extra vav appears. That is why this app stores the real unvowelled spelling, not a naive strip."},
   {h:"Use the toggle",p:"Turn nikud off (top of any content screen, or in Settings) once shapes feel familiar. Practise reading the bare form."}
  ]},
 {id:3,t:"Present Tense (Pa'al)",lvl:"A1",sum:"Only four forms. No 'am/is/are'.",
  stages:[
   {h:"The rule",p:"In the present, a Hebrew verb behaves like an adjective. It has only four forms, agreeing by gender and number. The pronoun carries the person. There is no helper verb."},
   {h:"Table (כותב, to write)",tbl:[["m.sg",["כּוֹתֵב","כותב"],"kotev"],["f.sg",["כּוֹתֶבֶת","כותבת"],"kotevet"],["m.pl",["כּוֹתְבִים","כותבים"],"kotvim"],["f.pl",["כּוֹתְבוֹת","כותבות"],"kotvot"]]},
   {h:"Examples",ex:[[["אֲנִי לוֹמֵד עִבְרִית","אני לומד עברית"],"ani lomed ivrit","I learn Hebrew"],[["אֲנַחְנוּ גָּרִים בְּבֶּרְלִין","אנחנו גרים בברלין"],"anachnu garim be-Berlin","we live in Berlin"]]},
   {h:"Italian trap",p:"Italian conjugates by person (parlo, parli, parla); Hebrew present does not. It feels too easy. But you cannot drop the pronoun the way Italian does: 'parlo' must be אני מדבר."}
  ]},
 {id:4,t:"Nouns & Gender",lvl:"A1",sum:"Every noun is m or f, like Italian.",
  stages:[
   {h:"The rule",p:"Every noun is masculine or feminine. Feminine often ends ־ָה or ־ֶת. Plurals are usually ־ים (m) and ־ות (f), with exceptions you memorise."},
   {h:"Table",tbl:[["house (m)",["בַּיִת","בית"],"→ בתים batim"],["apartment (f)",["דִּירָה","דירה"],"→ דירות dirot"],["table (m)",["שֻׁלְחָן","שולחן"],"→ שולחנות (m, ־ות!)"]]},
   {h:"Italian trap",p:"You already think in genders, which helps. But genders do not always match across languages, and endings can lie (שולחן is masculine but takes ־ות). Learn each noun with its gender, exactly like il/la."}
  ]},
 {id:5,t:"Article ה & Object אֶת",lvl:"A1",sum:"No 'a/an'. 'The' is a prefix. אֶת marks a definite object.",
  stages:[
   {h:"The rule",p:"There is no word for 'a/an'. 'The' is the prefix הַ. When a direct object is definite, Hebrew marks it with אֶת, a word with no English or Italian equivalent."},
   {h:"Examples",ex:[[["אֲנִי פּוֹתֵחַ אֶת הַחַלּוֹן","אני פותח את החלון"],"ani pote'ach et ha-chalon","I open the window"],[["אֲנִי שׁוֹתֶה קָפֶה","אני שותה קפה"],"ani shote kafe","I drink coffee (indefinite, no את)"]]},
   {h:"Rule of thumb",p:"Definite object → use את. Indefinite → nothing. Proper names count as definite: אני אוהב את קובי."},
   {h:"Contraction",p:"Prepositions fuse with הַ: בְּ+הבית → בבית, לְ+השוק → לשוק."}
  ]},
 {id:6,t:"Adjectives",lvl:"A1",sum:"After the noun, agree in gender/number, double the ה.",
  stages:[
   {h:"The rule",p:"Adjectives come after the noun (like Italian) and agree in gender and number. If the noun is definite, the adjective also takes הַ."},
   {h:"Table",tbl:[["big house (m)",["בַּיִת גָּדוֹל","בית גדול"],"bayit gadol"],["big apt (f)",["דִּירָה גְּדוֹלָה","דירה גדולה"],"dira gdola"],["the big house",["הַבַּיִת הַגָּדוֹל","הבית הגדול"],"both take ה"]]},
   {h:"Italian trap",p:"Italian also places adjectives after the noun (casa grande), so you start ahead. New: double definiteness. Both noun and adjective carry ה. Forgetting the second ה is the classic slip."}
  ]},
 {id:7,t:"Numbers & Time",lvl:"A1",sum:"Numbers have m and f forms. Telling the time.",
  stages:[
   {h:"The rule",p:"Numbers have masculine and feminine forms. The feminine is used for counting aloud and with feminine nouns; masculine nouns take the longer masculine forms."},
   {h:"Table 1 to 5",tbl:[["1",["אַחַת / אֶחָד","אחת / אחד"],"f / m"],["2",["שְׁתַּיִם / שְׁנַיִם","שתיים / שניים"],"f / m"],["3",["שָׁלוֹשׁ / שְׁלוֹשָׁה","שלוש / שלושה"],"f / m"]]},
   {h:"Telling time",ex:[[["מָה הַשָּׁעָה?","מה השעה?"],"ma ha-sha'a?","what time is it?"],[["הַשָּׁעָה שָׁלוֹשׁ","השעה שלוש"],"ha-sha'a shalosh","it's three"]]},
   {h:"Italian trap",p:"Harder than Italian, where numbers do not change. The feminine form is the default for counting, which feels backwards. '2' is special: שתיים alone, שתי before a noun."}
  ]},
 {id:8,t:"Past Tense (Pa'al)",lvl:"A2",sum:"Conjugates by person with suffixes, like Italian.",
  stages:[
   {h:"The rule",p:"Unlike the present, the past conjugates by person with suffixes, much more like Italian. The root stays visible; the vowels shift."},
   {h:"Table (כתב)",tbl:[["I",["כָּתַבְתִּי","כתבתי"],"katavti"],["you m",["כָּתַבְתָּ","כתבת"],"katavta"],["he",["כָּתַב","כתב"],"katav"],["she",["כָּתְבָה","כתבה"],"katva"],["we",["כָּתַבְנוּ","כתבנו"],"katavnu"]]},
   {h:"Italian trap",p:"Relief after the article-free present: it conjugates by person like Italian. One Hebrew past covers both 'I wrote' and 'I was writing'. There is no ho scritto vs scrivevo split; context decides."}
  ]},
 {id:9,t:"Future Tense (Pa'al)",lvl:"A2",sum:"Prefixes mark the person.",
  stages:[
   {h:"The rule",p:"The future uses prefixes: א (I), ת (you/she), י (he), נ (we)."},
   {h:"Table (כתב)",tbl:[["I",["אֶכְתֹּב","אכתוב"],"echtov"],["you m",["תִּכְתֹּב","תכתוב"],"tichtov"],["he",["יִכְתֹּב","יכתוב"],"yichtov"],["we",["נִכְתֹּב","נכתוב"],"nichtov"]]},
   {h:"Useful twist",p:"Spoken Hebrew uses the future for soft requests and 'let's': תרצה קפה? = would you like coffee? נלך = let's go."}
  ]},
 {id:10,t:"Pronouns & 'to be'",lvl:"A2",sum:"No present 'to be'. It returns in past/future.",
  stages:[
   {h:"The rule",p:"There is no present-tense verb 'to be'. 'I am Italian' is simply אני איטלקי. In past and future, 'to be' reappears (היה / יהיה)."},
   {h:"Examples",ex:[[["קוֹבִּי הוּא הַבַּעַל שֶׁלִּי","קובי הוא הבעל שלי"],"Kobi hu ha-ba'al sheli","Kobi is my husband"],[["אֶתְמוֹל הָיָה קַר","אתמול היה קר"],"etmol haya kar","yesterday it was cold"]]},
   {h:"Bonus",p:"The past of 'to be' also means 'had': היה לי כלב = I had a dog. This leads into possession next."}
  ]},
 {id:11,t:"Possession: yesh / shel / smichut",lvl:"A2",sum:"No verb 'to have'. Construct chains.",
  stages:[
   {h:"The rule",p:"No verb 'to have'. Possession is יש לי ('there is to me'). Ownership uses של. Linking two nouns often uses smichut, a construct chain."},
   {h:"Table",tbl:[["I have",["יֵשׁ לִי","יש לי"],"yesh li"],["I don't have",["אֵין לִי","אין לי"],"ein li"],["Shabbat meal",["אֲרוּחַת שַׁבָּת","ארוחת שבת"],"smichut"]]},
   {h:"Trap",p:"In a definite smichut chain only the LAST noun takes ה: בית הקפה, not הבית קפה."}
  ]},
 {id:12,t:"Questions",lvl:"A2",sum:"Intonation, not inversion. Question words.",
  stages:[
   {h:"The rule",p:"Yes/no questions use statement word order with rising intonation. There is no 'do/does' and no inversion. Information questions start with a question word."},
   {h:"Question words",tbl:[["what",["מַה","מה"],"ma"],["where",["אֵיפֹה","איפה"],"eifo"],["how much",["כַּמָּה","כמה"],"kama"],["from where",["מֵאַיִן","מאיין"],"me-ayin"]]},
   {h:"Note",p:"A name: איך קוראים לך? (literally 'how do they call you?'). Italian helps, it also questions by intonation."}
  ]},
 {id:13,t:"Binyanim overview",lvl:"A2",sum:"The 7 verb patterns. The backbone of Hebrew verbs.",
  stages:[
   {h:"Why this matters",p:"Every Hebrew verb sits in one of 7 patterns (binyanim) built on a 3-letter root. The pattern tells you the voice (active, passive, reflexive, causative). This is the single most important idea for reading verbs."},
   {h:"The seven",p:"Pa'al (simple active), Nif'al (passive/middle), Pi'el (active intensive), Pu'al (its passive), Hif'il (causative), Huf'al (its passive), Hitpa'el (reflexive)."},
   {h:"Study them properly",p:"Open the Binyanim tab. Each one expands with its meaning, its present-tense marker, and real verbs you use."}
  ]},
 {id:14,t:"Pi'el in depth",lvl:"A2",sum:"מְ prefix, doubled middle letter.",
  stages:[
   {h:"Recognise it",p:"Present-tense Pi'el starts with מְ and doubles the middle root letter. Many everyday verbs live here whether or not they feel 'intensive'."},
   {h:"Table (דיבר)",tbl:[["present",["מְדַבֵּר","מדבר"],"medaber"],["past I",["דִּבַּרְתִּי","דיברתי"],"dibarti"],["future I",["אֲדַבֵּר","אדבר"],"adaber"]]},
   {h:"Your verbs",p:"לדבר, לבשל, לספר, לנקות, ללמד, לטייל, לחכות."}
  ]},
 {id:15,t:"Hif'il in depth",lvl:"B1",sum:"Causative: make something happen.",
  stages:[
   {h:"Recognise it",p:"Causative meaning: enlarge, bring in, begin. Present uses a מ prefix and a long י inside."},
   {h:"Table",tbl:[["begin",["מַתְחִיל","מתחיל"],"matchil"],["understand",["מֵבִין","מבין"],"mevin"],["know (person)",["מַכִּיר","מכיר"],"makir"]]},
   {h:"Italian edge",p:"Hebrew splits 'know' exactly like Italian: יודע = sapere (facts), מכיר = conoscere (people). You beat English speakers here."}
  ]},
 {id:16,t:"Hitpa'el in depth",lvl:"B1",sum:"Reflexive, מִתְ prefix.",
  stages:[
   {h:"Recognise it",p:"Reflexive or reciprocal: actions to oneself, or to each other. Present starts with מִתְ."},
   {h:"Table",tbl:[["get dressed",["מִתְלַבֵּשׁ","מתלבש"],"mitlabesh"],["wake up",["מִתְעוֹרֵר","מתעורר"],"mit'orer"],["miss/long",["מִתְגַּעְגֵּעַ","מתגעגע"],"mitga'age'a"]]},
   {h:"Italian edge",p:"Maps onto Italian -si verbs: vestirsi → מתלבש, svegliarsi → מתעורר. Trap: with roots starting ס/שׁ/צ the ת swaps place (הסתכל)."}
  ]},
 {id:17,t:"Nif'al in depth",lvl:"B1",sum:"Passive / middle, נ prefix.",
  stages:[
   {h:"Recognise it",p:"Usually the passive or middle of Pa'al. Present starts with נ."},
   {h:"Table",tbl:[["enters",["נִכְנָס","נכנס"],"nichnas"],["stays",["נִשְׁאָר","נשאר"],"nish'ar"],["is born",["נוֹלַד","נולד"],"nolad"]]},
   {h:"Trap",p:"Very common verbs are secretly Nif'al: נולד, נכנס, נשאר. For states, speech prefers an adjective: החנות סגורה (closed)."}
  ]},
 {id:18,t:"Prepositions + suffixes",lvl:"B1",sum:"'to me' is one fused word.",
  stages:[
   {h:"The rule",p:"Prepositions fuse with pronouns as suffixes instead of staying separate."},
   {h:"Table",tbl:[["to me",["לִי","לי"],"li"],["to him",["לוֹ","לו"],"lo"],["with me",["אִתִּי","איתי"],"iti"],["our",["שֶׁלָּנוּ","שלנו"],"shelanu"]]},
   {h:"Where it bites",p:"Drill לי / לך / לו first; they ride on daily verbs like עוזר (help) and נותן (give)."}
  ]},
 {id:19,t:"Irregular roots",lvl:"B1",sum:"Gutturals, hollow, doubled letters.",
  stages:[
   {h:"The families",p:"Some roots bend the patterns: gutturals (א ה ח ע ר), hollow roots with a vav/yod middle (בא, קם), and doubled-letter roots. They bend predictably, not randomly."},
   {h:"Table (hollow: קם)",tbl:[["present",["קָם","קם"],"kam"],["past I",["קַמְתִּי","קמתי"],"kamti"],["future I",["אָקוּם","אקום"],"akum"]]},
   {h:"Strategy",p:"Drill the daily hollow verbs as a family: בא, קם, שם, רץ, גר."}
  ]},
 {id:20,t:"Shem Peula (gerund/noun of action)",lvl:"B1",sum:"Turning verbs into 'the act of…'.",
  stages:[
   {h:"The idea",p:"Each binyan has a noun form for the action itself, like Italian's -zione/-mento. From לבשל (cook) comes בישול (cooking)."},
   {h:"Patterns",tbl:[["Pa'al",["כְּתִיבָה","כתיבה"],"writing"],["Pi'el",["בִּישּׁוּל","בישול"],"cooking"],["Hif'il",["הַזְמָנָה","הזמנה"],"an order / invitation"]]},
   {h:"Use",p:"These let you say 'I love cooking' (אני אוהב בישול) without a second verb."}
  ]},
 {id:21,t:"Subordinate clauses (ש־)",lvl:"B2",sum:"'that', 'who', 'which' with one word: ש.",
  stages:[
   {h:"The rule",p:"The single prefix ש links clauses: 'that', 'who', 'which'. It attaches to the next word."},
   {h:"Examples",ex:[[["אֲנִי חוֹשֵׁב שֶׁזֶּה יָפֶה","אני חושב שזה יפה"],"ani choshev she-ze yafe","I think that it's beautiful"],[["הָאִישׁ שֶׁגָּר כָּאן","האיש שגר כאן"],"ha-ish she-gar kan","the man who lives here"]]},
   {h:"Build up",p:"Combine with כי (because), אם (if), כדי (in order to), כאשר/כש (when) for full B2 sentences."}
  ]},
 {id:22,t:"Comparatives & superlatives",lvl:"B2",sum:"more, less, the most.",
  stages:[
   {h:"The rule",p:"Comparative: יותר (more) / פחות (less) + מ (than). Superlative: הכי (the most) or ביותר."},
   {h:"Examples",ex:[[["בֶּרְלִין גְּדוֹלָה יוֹתֵר מֵרוֹזוֹלִינִי","ברלין גדולה יותר מרוזוליני"],"Berlin gdola yoter me-Rosolini","Berlin is bigger than Rosolini"],[["הַיּוֹם הֲכִי יָפֶה","היום הכי יפה"],"ha-yom hachi yafe","the most beautiful day"]]}
  ]},
 {id:23,t:"Conditional (would)",lvl:"B2",sum:"Hypotheticals with היה + present.",
  stages:[
   {h:"The rule",p:"To say 'would', Hebrew uses היה plus the present form. For unreal conditions: אם + past, then היה + present."},
   {h:"Examples",ex:[[["הָיִיתִי רוֹצֶה לִנְסֹעַ","הייתי רוצה לנסוע"],"hayiti rotze linso'a","I would like to travel"],[["אִם הָיָה לִי זְמַן, הָיִיתִי בָּא","אם היה לי זמן הייתי בא"],"im haya li zman, hayiti ba","if I had time, I would come"]]}
  ]}
];

     [["הוּא גִּדֵּל עַגְבָנִיּוֹת, זֵיתִים, תְּאֵנִים. כָּל הַחַיִּים שֶׁלּוֹ.","הוא גידל עגבניות, זיתים, תאנים. כל החיים שלו."],"hu gidel agvaniyot, zeytim, te'enim. kol ha-chayim shelo.","He grew tomatoes, olives, figs. His whole life."],
     [["הוּא עַכְשָׁו בֶּן שִׁשִּׁים וּשְׁמוֹנֶה, אֲבָל כָּל בֹּקֶר הוּא עוֹמֵד בַּגִּינָה.","הוא עכשיו בן שישים ושמונה, אבל כל בוקר הוא עומד בגינה."],"hu achshav ben shishim u-shmone, aval kol boker hu omed ba-gina.","He is now sixty-eight, but every morning he stands in the garden."],
     [["אִמָּא שֶׁלִּי שְׁמָהּ אַנְגֶ'לָה, וְהִיא הַלֵּב שֶׁל הַמִּשְׁפָּחָה.","אמא שלי שמה אנג'לה, והיא הלב של המשפחה."],"ima sheli shma Angela, ve-hi ha-lev shel ha-mishpacha.","My mother's name is Angela, and she is the heart of the family."],
     [["הִיא מְבַשֶּׁלֶת כָּל יוֹם. הָאוֹכֶל שֶׁלָּהּ הוּא הַכִּי טוֹב בָּעוֹלָם, אֲנִי בְּטוּחַ בָּזֶה.","היא מבשלת כל יום. האוכל שלה הוא הכי טוב בעולם, אני בטוח בזה."],"hi mevashelet kol yom. ha-ochel shela hu ha-chi tov ba-olam, ani batuach ba-ze.","She cooks every day. Her food is the best in the world, I am sure of it."],
     [["כְּשֶׁאֲנִי חוֹשֵׁב עַל הַבַּיִת שֶׁלָּהּ בְּרוֹזוֹלִינִי, אֲנִי מִיָּד מִתְגַּעְגֵּעַ.","כשאני חושב על הבית שלה ברוזוליני, אני מיד מתגעגע."],"kshe-ani choshev al ha-bayit shela be-Rosolini, ani miyad mitga'ge'a.","When I think of her house in Rosolini, I immediately miss it."],
     [["יֵשׁ לִי אָחוֹת אַחַת. שְׁמָהּ טֵרֵזָה, הִיא גָּדוֹלָה מִמֶּנִּי בְּשָׁלוֹשׁ שָׁנִים.","יש לי אחות אחת. שמה טרזה, היא גדולה ממני בשלוש שנים."],"yesh li achot achat. shema Teresa, hi gdola mimeni be-shalosh shanim.","I have one sister. Her name is Teresa, she is three years older than me."],
     [["טֵרֵזָה גָּרָה בְּרוֹזוֹלִינִי עִם הַבַּעַל שֶׁלָּהּ לוּקָה, וְיֵשׁ לָהֶם שְׁנֵי יְלָדִים.","טרזה גרה ברוזוליני עם הבעל שלה לוקה, ויש להם שני ילדים."],"Teresa gara be-Rosolini im ha-ba'al shela Luka, ve-yesh lahem shnei yeladim.","Teresa lives in Rosolini with her husband Luca, and they have two children."],
     [["הַיְּלָדָה שְׁמָהּ מַרְטָה, הִיא בַּת שֶׁבַע, וְהַיֶּלֶד שְׁמוֹ אֵלְיָה, הוּא בֶּן חָמֵשׁ.","הילדה שמה מרטה, היא בת שבע, והילד שמו אליה, הוא בן חמש."],"ha-yalda shema Marta, hi bat sheva, ve-ha-yeled shmo Elia, hu ben chamesh.","The girl's name is Marta, she is seven, and the boy's name is Elia, he is five."],
     [["הֵם חֲמוּדִים מְאוֹד, וַאֲנִי אוֹהֵב אוֹתָם מְאוֹד.","הם חמודים מאוד, ואני אוהב אותם מאוד."],"hem chamuddim me'od, va-ani ohev otam me'od.","They are very cute, and I love them very much."],
     [["הֵם גָּרִים בְּרוֹזוֹלִינִי, עִיר קְטַנָּה בְּסִיצִילְיָה. בְּרוֹזוֹלִינִי כּוּלָּם מַכִּירִים אֶת כּוּלָּם.","הם גרים ברוזוליני, עיר קטנה בסיציליה. ברוזוליני כולם מכירים את כולם."],"hem garim be-Rosolini, ir ktana be-Sitzilya. be-Rosolini kulam makirim et kulam.","They live in Rosolini, a small city in Sicily. In Rosolini everyone knows everyone."],
     [["זֶה מְאוֹד שׁוֹנֶה מִבֶּרְלִין, אֲבָל אֲנִי אוֹהֵב אֶת שְׁנֵי הַמְּקוֹמוֹת.","זה מאוד שונה מברלין, אבל אני אוהב את שני המקומות."],"ze me'od shone mi-Berlin, aval ani ohev et shnei ha-mekomot.","It is very different from Berlin, but I love both places."],
     [["אֲנִי גָּר עַכְשָׁו בְּבֶּרְלִין עִם קוֹבִּי, הַבַּעַל שֶׁלִּי. הִתְחַתַּנּוּ בְּקוֹפֶּנְהָאגֶן, בְּתֵשָׁעָה בְּסֶפְּטֶמְבֶּר.","אני גר עכשיו בברלין עם קובי, הבעל שלי. התחתנו בקופנהאגן, בתשעה בספטמבר."],"ani gar achshav be-Berlin im Kobi, ha-ba'al sheli. hitchatannu be-Kopenhagen, be-tisha be-September.","I live now in Berlin with Kobi, my husband. We got married in Copenhagen, on the ninth of September."],
     [["קוֹבִּי הוּא יִשְׂרְאֵלִי מִתֵּל אָבִיב. גַּם לוֹ יֵשׁ מִשְׁפָּחָה גְּדוֹלָה.","קובי הוא ישראלי מתל אביב. גם לו יש משפחה גדולה."],"Kobi hu Israeli mi-Tel Aviv. gam lo yesh mishpacha gdola.","Kobi is Israeli from Tel Aviv. He also has a big family."],
     [["הָאָח שֶׁלּוֹ מִיקִי גָּר בְּתֵל אָבִיב עִם הָאִשָּׁה שֶׁלּוֹ וְהַיְּלָדִים שֶׁלָּהֶם.","האח שלו מיקי גר בתל אביב עם האישה שלו והילדים שלהם."],"ha-ach shelo Miki gar be-Tel Aviv im ha-isha shelo ve-ha-yeladim shelahem.","His brother Miki lives in Tel Aviv with his wife and their children."],
     [["כְּשֶׁאֲנַחְנוּ טָסִים לְתֵל אָבִיב, אֲנַחְנוּ תָּמִיד אוֹכְלִים אֶצֶל מִיקִי.","כשאנחנו טסים לתל אביב, אנחנו תמיד אוכלים אצל מיקי."],"kshe-anachnu tasim le-Tel Aviv, anachnu tamid ochlim etzel Miki.","When we fly to Tel Aviv, we always eat at Miki's."],
     [["הָאוֹכֶל שֶׁם מְצוּיָּן. יֵשׁ תָּמִיד הַרְבֵּה אוֹכֶל עַל הַשֻּׁלְחָן.","האוכל שם מצוין. יש תמיד הרבה אוכל על השולחן."],"ha-ochel sham metsuyan. yesh tamid harbe ochel al ha-shulchan.","The food there is excellent. There is always a lot of food on the table."],
     [["שְׁתֵּי הַמִּשְׁפָּחוֹת שׁוֹנוֹת מְאוֹד: אַחַת מִסִּיצִילְיָה, אַחַת מִיִּשְׂרָאֵל.","שתי המשפחות שונות מאוד: אחת מסיציליה, אחת מישראל."],"shtei ha-mishpachot shonot me'od: achat mi-Sitzilya, achat mi-Israel.","The two families are very different: one from Sicily, one from Israel."],
     [["אֲבָל שְׁתֵּיהֶן אוֹהֲבוֹת אוֹכֶל, מִשְׁפָּחָה, וְאֶת הַשֻּׁלְחָן שֶׁל שַׁבָּת.","אבל שתיהן אוהבות אוכל, משפחה, ואת השולחן של שבת."],"aval shteihen ohavot ochel, mishpacha, ve-et ha-shulchan shel shabbat.","But both love food, family, and the Shabbat table."],
     [["הַמִּשְׁפָּחָה הִיא הַדָּבָר הַכִּי חָשׁוּב בַּחַיִּים שֶׁלִּי. אֲנִי מַאֲמִין בָּזֶה בְּכָל לֵב.","המשפחה היא הדבר הכי חשוב בחיים שלי. אני מאמין בזה בכל לב."],"ha-mishpacha hi ha-davar ha-chi chashuv ba-chayim sheli. ani ma'amin ba-ze be-chol lev.","Family is the most important thing in my life. I believe this with all my heart."]],
  quiz:[{q:"How many children does Teresa have?",opts:["One","Two","Three"],a:1},{q:"Where did Vincenzo and Kobi get married?",opts:["Berlin","Tel Aviv","Copenhagen"],a:2},{q:"Who is Miki?",opts:["Kobi's brother","Vincenzo's colleague","A neighbour in Berlin"],a:0}]},
 {id:"s3",t:["אַנְגֶ'לָה מִתְקַשֶּׁרֶת","אנג'לה מתקשרת"],en:"Angela Calls from Rosolini",lvl:"A1",
  s:[[["הַטֶּלֶפוֹן מְצַלְצֵל בָּעֶרֶב.","הטלפון מצלצל בערב."],"ha-telefon metzaltzel ba-erev.","The phone rings in the evening."],
     [["זֹאת אִמָּא שֶׁלִּי, אַנְגֶ'לָה.","זאת אמא שלי, אנג'לה."],"zot ima sheli, Angela.","It is my mother, Angela."],
     [["הִיא מִתְקַשֶּׁרֶת מֵרוֹזוֹלִינִי.","היא מתקשרת מרוזוליני."],"hi mitkasheret me-Rosolini.","She calls from Rosolini."],
     [["אֲנִי אוֹמֵר שֶׁאֲנִי מְבַשֵּׁל פַּסְטָה.","אני אומר שאני מבשל פסטה."],"ani omer she-ani mevashel pasta.","I tell her I cook pasta."],
     [["אֲנִי מִתְגַּעְגֵּעַ אֵלֶיהָ.","אני מתגעגע אליה."],"ani mitga'age'a eleha.","I miss her."]],
  quiz:[{q:"Who is calling?",opts:["Kobi","Angela","Miki"],a:1},{q:"What is Vincenzo cooking?",opts:["Fish","Pasta","Soup"],a:1}]},
 {id:"s4",t:["אֲרוּחַת שַׁבָּת","ארוחת שבת"],en:"Shabbat Dinner",lvl:"A2",

     [["קוֹבִּי קוֹנֶה חַלָּה טְרִיָּה.","קובי קונה חלה טרייה."],"Kobi kone chala triya.","Kobi buys fresh challah."],
     [["אֲנִי מֵכִין סָלָט וְדָגִים.","אני מכין סלט ודגים."],"ani mechin salat ve-dagim.","I prepare salad and fish."],
     [["עַל הַשֻּׁלְחָן יֵשׁ יַיִן אָדֹם.","על השולחן יש יין אדום."],"al ha-shulchan yesh yayin adom.","On the table there is red wine."],
     [["לִפְעָמִים בָּאִים אוֹרְחִים.","לפעמים באים אורחים."],"lif'amim ba'im orchim.","Sometimes guests come."],
     [["זֶה הָעֶרֶב הָאָהוּב עָלַי.","זה הערב האהוב עליי."],"ze ha-erev ha-ahuv alai.","This is my favourite evening."]],

  s:[[["בְּסוֹף הַשָּׁבוּעַ אֲנַחְנוּ נוֹסְעִים לְאַבַּאיְטָה.","בסוף השבוע אנחנו נוסעים לאבאיטה."],"be-sof ha-shavua anachnu nos'im le-ABAITA.","On the weekend we travel to ABAITA."],
     [["אַבַּאיְטָה הוּא בַּיִת קָטָן בַּטֶּבַע.","אבאיטה הוא בית קטן בטבע."],"ABAITA hu bayit katan ba-teva.","ABAITA is a small house in nature."],
     [["יֵשׁ שָׁם גִּינָה וְסָאוּנָה.","יש שם גינה וסאונה."],"yesh sham gina ve-sauna.","There is a garden and a sauna."],
     [["בָּעֶרֶב אֲנַחְנוּ מַדְלִיקִים אֶת הַתַּנּוּר.","בערב אנחנו מדליקים את התנור."],"ba-erev anachnu madlikim et ha-tanur.","In the evening we light the stove."],
     [["אוֹרְחִים בָּאִים עִם הַכְּלָבִים שֶׁלָּהֶם.","אורחים באים עם הכלבים שלהם."],"orchim ba'im im ha-klavim shelahem.","Guests come with their dogs."],
     [["בְּאַבַּאיְטָה הַזְּמַן עוֹבֵר לְאַט.","באבאיטה הזמן עובר לאט."],"be-ABAITA ha-zman over le'at.","At ABAITA time passes slowly."]],
  quiz:[{q:"What two features does ABAITA have?",opts:["Pool and gym","Garden and sauna","Bar and cinema"],a:1},{q:"What do guests bring?",opts:["Their dogs","Their children","Wine"],a:0}]},

  s:[[["הַיּוֹם יוֹרֵד גֶּשֶׁם בְּבֶּרְלִין.","היום יורד גשם בברלין."],"hayom yored geshem be-Berlin.","Today it is raining in Berlin."],
     [["קַר וְאָפֹר בַּחוּץ.","קר ואפור בחוץ."],"kar ve-afor ba-chutz.","It is cold and grey outside."],
     [["אֲנַחְנוּ נִשְׁאָרִים בַּבַּיִת.","אנחנו נשארים בבית."],"anachnu nish'arim ba-bayit.","We stay at home."],
     [["אֲנִי קוֹרֵא סֵפֶר עַל הַסַּפָּה.","אני קורא ספר על הספה."],"ani kore sefer al ha-sapa.","I read a book on the sofa."],
     [["קוֹבִּי מֵכִין קָפֶה חַם.","קובי מכין קפה חם."],"Kobi mechin kafe cham.","Kobi makes hot coffee."],
     [["אֲנִי אוֹהֵב יָמִים כָּאֵלֶּה.","אני אוהב ימים כאלה."],"ani ohev yamim ka'ele.","I love days like these."]],

     [["בַּשּׁוּק יֵשׁ הַרְבֵּה אֹכֶל.","בשוק יש הרבה אוכל."],"ba-shuk yesh harbe ochel.","At the market there is a lot of food."],
     [["אֲנִי קוֹנֶה עַגְבָנִיּוֹת וְלֶחֶם.","אני קונה עגבניות ולחם."],"ani kone agvaniyot ve-lechem.","I buy tomatoes and bread."],
     [["קוֹבִּי קוֹנֶה חוּמּוּס.","קובי קונה חומוס."],"Kobi kone chumus.","Kobi buys hummus."],
     [["הַשּׁוּק גָּדוֹל וְרוֹעֵשׁ.","השוק גדול ורועש."],"ha-shuk gadol ve-ro'esh.","The market is big and noisy."],

 {id:"s8",t:["הַחֲתֻנָּה בְּקוֹפֶּנְהָאגֶן","החתונה בקופנהאגן"],en:"The Wedding in Copenhagen",lvl:"A2",
  s:[[["בְּתִשְׁעָה בְּסֶפְּטֶמְבֶּר הִתְחַתַּנּוּ.","בתשעה בספטמבר התחתנו."],"be-tish'a be-September hitchatanu.","On the ninth of September we got married."],
     [["הַחֲתֻנָּה הָיְתָה בְּקוֹפֶּנְהָאגֶן.","החתונה הייתה בקופנהאגן."],"ha-chatuna hayta be-Copenhagen.","The wedding was in Copenhagen."],
     [["הַמִּשְׁפָּחָה מֵאִיטַלְיָה הִגִּיעָה בְּמָטוֹס.","המשפחה מאיטליה הגיעה במטוס."],"ha-mishpacha me-italya higi'a be-matos.","The family from Italy arrived by plane."],
     [["אַנְגֶ'לָה בָּכְתָה מֵרֹב שִׂמְחָה.","אנג'לה בכתה מרוב שמחה."],"Angela bachta me-rov simcha.","Angela cried from joy."],
     [["מִיקִי נָאַם נְאוּם יָפֶה.","מיקי נאם נאום יפה."],"Miki na'am ne'um yafe.","Miki gave a beautiful speech."],
     [["רָקַדְנוּ עַד מְאֻחָר בַּלַּיְלָה.","רקדנו עד מאוחר בלילה."],"rakadnu ad me'uchar ba-layla.","We danced until late at night."],
     [["זֶה הָיָה הַיּוֹם הֲכִי מְאֻשָּׁר בַּחַיִּים שֶׁלָּנוּ.","זה היה היום הכי מאושר בחיים שלנו."],"ze haya ha-yom hachi me'ushar ba-chayim shelanu.","It was the happiest day of our lives."]],
  quiz:[{q:"Where was the wedding?",opts:["Tel Aviv","Copenhagen","Rosolini"],a:1},{q:"Who gave a speech?",opts:["Salvatore","Miki","Kobi"],a:1}]},
 {id:"s9",t:["הָעֲבוֹדָה שֶׁל קוֹבִּי","העבודה של קובי"],en:"Kobi's Work",lvl:"B1",
  s:[[["קוֹבִּי עוֹבֵד עִם אֲנָשִׁים.","קובי עובד עם אנשים."],"Kobi oved im anashim.","Kobi works with people."],
     [["הוּא יוֹעֵץ תַּדְמִית וְגַם סַפָּר.","הוא יועץ תדמית וגם ספר."],"hu yo'etz tadmit ve-gam sapar.","He is an image consultant and also a hairdresser."],
     [["הוּא מֵבִין בְּצֶבַע, בְּסִגְנוֹן וּבְעִצּוּב.","הוא מבין בצבע, בסגנון ובעיצוב."],"hu mevin be-tzeva, be-signon u-ve-itzuv.","He understands colour, style and design."],
     [["לָקוֹחוֹת בָּאִים אֵלָיו מִכָּל בֶּרְלִין.","לקוחות באים אליו מכל ברלין."],"lekochot ba'im elav mi-kol Berlin.","Clients come to him from all over Berlin."],
     [["גַּם אֲנִי עוֹבֵד בְּעִצּוּב, אֲבָל בְּעִצּוּב פְּנִים.","גם אני עובד בעיצוב, אבל בעיצוב פנים."],"gam ani oved be-itzuv, aval be-itzuv pnim.","I also work in design, but in interior design."],
     [["בָּעֶרֶב אֲנַחְנוּ מְדַבְּרִים עַל הָרַעְיוֹנוֹת שֶׁלָּנוּ.","בערב אנחנו מדברים על הרעיונות שלנו."],"ba-erev anachnu medabrim al ha-ra'ayonot shelanu.","In the evening we talk about our ideas."],
     [["אֲנַחְנוּ לוֹמְדִים אֶחָד מֵהַשֵּׁנִי.","אנחנו לומדים אחד מהשני."],"anachnu lomdim echad me-ha-sheni.","We learn from each other."]],
  quiz:[{q:"What is one of Kobi's jobs?",opts:["Doctor","Hairdresser","Teacher"],a:1},{q:"What field is Vincenzo in?",opts:["Interior design","Cooking","Medicine"],a:0}]},
 {id:"s10",t:["לִלְמֹד שָׂפָה חֲדָשָׁה","ללמוד שפה חדשה"],en:"Learning a New Language",lvl:"B1",
  s:[[["כְּשֶׁהִתְחַלְתִּי לִלְמֹד עִבְרִית, חָשַׁבְתִּי שֶׁזֶּה בִּלְתִּי אֶפְשָׁרִי.","כשהתחלתי ללמוד עברית, חשבתי שזה בלתי אפשרי."],"kshe-hitchalti lilmod ivrit, chashavti she-ze bilti efshari.","When I started learning Hebrew, I thought it was impossible."],
     [["הָאוֹתִיּוֹת נִרְאוּ לִי כְּמוֹ צִיּוּרִים.","האותיות נראו לי כמו ציורים."],"ha-otiyot nir'u li kmo tziyurim.","The letters looked to me like drawings."],
     [["בְּאִיטַלְקִית קוֹרְאִים מִשְּׂמֹאל לְיָמִין, וְכָאן הַכֹּל הָפוּךְ.","באיטלקית קוראים משמאל לימין, וכאן הכול הפוך."],"be-italkit korim mi-smol le-yamin, ve-kan ha-kol hafuch.","In Italian you read left to right, and here everything is reversed."],
     [["אֲבָל גִּלִּיתִי שֶׁהַתְּנוּעוֹת דּוֹמוֹת לְאִיטַלְקִית.","אבל גיליתי שהתנועות דומות לאיטלקית."],"aval giliti she-ha-tnu'ot domot le-italkit.","But I discovered the vowels are similar to Italian."],
     [["הַיּוֹם אֲנִי כְּבָר מֵבִין מִשְׁפָּטִים פְּשׁוּטִים.","היום אני כבר מבין משפטים פשוטים."],"hayom ani kvar mevin mishpatim pshutim.","Today I already understand simple sentences."],
     [["כָּל פַּעַם שֶׁאֲנִי מֵבִין, אֲנִי מַרְגִּישׁ קָרוֹב יוֹתֵר לְקוֹבִּי.","כל פעם שאני מבין, אני מרגיש קרוב יותר לקובי."],"kol pa'am she-ani mevin, ani margish karov yoter le-Kobi.","Each time I understand, I feel closer to Kobi."]],
  quiz:[{q:"What did the letters look like to him?",opts:["Numbers","Drawings","Music"],a:1},{q:"What is similar to Italian?",opts:["The vowels","The verbs","The alphabet"],a:0}]},
 {id:"s11",t:["גַּעְגּוּעַ לְסִיצִילְיָה","געגוע לסיציליה"],en:"Longing for Sicily",lvl:"B1",
  s:[[["יֵשׁ יָמִים שֶׁבָּהֶם אֲנִי מִתְגַּעְגֵּעַ לְרוֹזוֹלִינִי.","יש ימים שבהם אני מתגעגע לרוזוליני."],"yesh yamim she-bahem ani mitga'age'a le-Rosolini.","There are days when I long for Rosolini."],
     [["אֲנִי זוֹכֵר אֶת הָאוֹר שֶׁל סִיצִילְיָה.","אני זוכר את האור של סיציליה."],"ani zocher et ha-or shel Sitzilya.","I remember the light of Sicily."],
     [["אֲנִי זוֹכֵר אֶת הָרֵיחַ שֶׁל הַיָּם.","אני זוכר את הריח של הים."],"ani zocher et ha-re'ach shel ha-yam.","I remember the smell of the sea."],
     [["אֲבָל בָּחַרְתִּי לִחְיוֹת כָּאן, עִם הָאִישׁ שֶׁאֲנִי אוֹהֵב.","אבל בחרתי לחיות כאן, עם האיש שאני אוהב."],"aval bacharti lichyot kan, im ha-ish she-ani ohev.","But I chose to live here, with the man I love."],
     [["וּכְשֶׁאֲנִי מְבַשֵּׁל אֹכֶל סִיצִילְיָאנִי, סִיצִילְיָה אִתִּי.","וכשאני מבשל אוכל סיציליאני, סיציליה איתי."],"u-chshe-ani mevashel ochel sitzilyani, Sitzilya iti.","And when I cook Sicilian food, Sicily is with me."],
     [["אֲנִי יָכוֹל לִהְיוֹת בִּשְׁנֵי מְקוֹמוֹת בְּאוֹתוֹ זְמַן.","אני יכול להיות בשני מקומות באותו זמן."],"ani yachol lihyot bi-shnei mekomot be-oto zman.","I can be in two places at the same time."]],
  quiz:[{q:"What does he remember about Sicily?",opts:["The cold","The light and the smell of the sea","The traffic"],a:1},{q:"How does he bring Sicily to Berlin?",opts:["By cooking Sicilian food","By phone","By flying"],a:0}]},
 {id:"s12",t:["הָאוֹרְחִים שֶׁל אַבַּאיְטָה","האורחים של אבאיטה"],en:"The Guests of ABAITA",lvl:"B2",
  s:[[["אַבַּאיְטָה אֵינוֹ רַק בַּיִת פְּרָטִי שֶׁלָּנוּ.","אבאיטה אינו רק בית פרטי שלנו."],"ABAITA eino rak bayit prati shelanu.","ABAITA is not only our private house."],
     [["אֲנַחְנוּ פּוֹתְחִים אוֹתוֹ גַּם לְאוֹרְחִים.","אנחנו פותחים אותו גם לאורחים."],"anachnu potchim oto gam le-orchim.","We open it also to guests."],
     [["אֲנָשִׁים מַגִּיעִים מִבֶּרְלִין כְּדֵי לָנוּחַ.","אנשים מגיעים מברלין כדי לנוח."],"anashim magi'im mi-Berlin kdei lanu'ach.","People arrive from Berlin in order to rest."],
     [["רֻבָּם בָּאִים עִם כְּלָבִים, כִּי הַמָּקוֹם אוֹהֵב כְּלָבִים.","רובם באים עם כלבים, כי המקום אוהב כלבים."],"rubam ba'im im klavim, ki ha-makom ohev klavim.","Most of them come with dogs, because the place is dog-friendly."],
     [["אֲנַחְנוּ מַסְבִּירִים לָהֶם אֵיךְ לְהַדְלִיק אֶת הַתַּנּוּר.","אנחנו מסבירים להם איך להדליק את התנור."],"anachnu masbirim lahem eich lehadlik et ha-tanur.","We explain to them how to light the stove."],
     [["מַשֶּׁהוּ בַּשֶּׁקֶט שֶׁל בְּרַנְדֶּנְבּוּרְג עוֹשֶׂה טוֹב לָאֲנָשִׁים.","משהו בשקט של ברנדנבורג עושה טוב לאנשים."],"mashehu ba-sheket shel Brandenburg ose tov la-anashim.","Something in the quiet of Brandenburg does people good."],
     [["הֵם מַגִּיעִים עֲיֵפִים וְעוֹזְבִים רְגוּעִים.","הם מגיעים עייפים ועוזבים רגועים."],"hem magi'im ayefim ve-ozvim regu'im.","They arrive tired and leave calm."],
     [["בִּשְׁבִילֵנוּ זֶה לֹא רַק עֵסֶק, זֶה דֶּרֶךְ לְאָרֵחַ.","בשבילנו זה לא רק עסק, זו דרך לארח."],"bishvilenu ze lo rak esek, ze derech le'are'ach.","For us it is not only a business, it is a way to host."],
     [["וְאֵין דָּבָר אִיטַלְקִי יוֹתֵר מֵאֲשֶׁר לְאָרֵחַ.","ואין דבר איטלקי יותר מאשר לארח."],"ve-ein davar italki yoter me-asher le'are'ach.","And there is nothing more Italian than to host."]],
  quiz:[{q:"Why do most guests come with dogs?",opts:["The place is dog-friendly","Dogs are required","To guard the house"],a:0},{q:"How do guests leave?",opts:["Tired","Calm","Hungry"],a:1}]},
 {id:"s13",t:["הַשָּׁכֵן הֶחָדָשׁ","השכן החדש"],en:"The New Neighbour",lvl:"A2",
  s:[[["יֵשׁ שָׁכֵן חָדָשׁ בַּבִּנְיָן.","יש שכן חדש בבניין."],"yesh shachen chadash ba-binyan.","There is a new neighbour in the building."],
     [["קוֹרְאִים לוֹ תּוֹמָס וְהוּא מִגֶּרְמַנְיָה.","קוראים לו תומס והוא מגרמניה."],"korim lo Thomas ve-hu mi-germanya.","His name is Thomas and he is from Germany."],
     [["הוּא אוֹהֵב אֹכֶל אִיטַלְקִי.","הוא אוהב אוכל איטלקי."],"hu ohev ochel italki.","He loves Italian food."],
     [["אֶתְמוֹל הִזְמַנְתִּי אוֹתוֹ לַאֲרוּחַת עֶרֶב.","אתמול הזמנתי אותו לארוחת ערב."],"etmol hizmanti oto la-aruchat erev.","Yesterday I invited him to dinner."],
     [["בִּשַּׁלְתִּי פַּסְטָה וְהוּא הֵבִיא יַיִן.","בישלתי פסטה והוא הביא יין."],"bishalti pasta ve-hu hevi yayin.","I cooked pasta and he brought wine."],
     [["עַכְשָׁיו יֵשׁ לָנוּ חָבֵר חָדָשׁ.","עכשיו יש לנו חבר חדש."],"achshav yesh lanu chaver chadash.","Now we have a new friend."]],
  quiz:[{q:"Where is Thomas from?",opts:["Italy","Germany","Israel"],a:1},{q:"What did Vincenzo cook?",opts:["Fish","Pasta","Soup"],a:1}]},
 {id:"s14",t:["הַפְּגִישָׁה עִם הַלָּקוֹחַ","הפגישה עם הלקוח"],en:"The Client Meeting",lvl:"B1",
  s:[[["הַבֹּקֶר הָיְתָה לִי פְּגִישָׁה חֲשׁוּבָה.","הבוקר הייתה לי פגישה חשובה."],"ha-boker hayta li pgisha chashuva.","This morning I had an important meeting."],
     [["לָקוֹחַ חָדָשׁ רוֹצֶה לְעַצֵּב מֵחָדָשׁ אֶת הַסָּלוֹן.","לקוח חדש רוצה לעצב מחדש את הסלון."],"lako'ach chadash rotze le'atzev me-chadash et ha-salon.","A new client wants to redesign the living room."],
     [["הוּא שָׁאַל אוֹתִי אֵיזֶה סִגְנוֹן אֲנִי מַמְלִיץ.","הוא שאל אותי איזה סגנון אני ממליץ."],"hu sha'al oti eize signon ani mamlitz.","He asked me which style I recommend."],
     [["אָמַרְתִּי שֶׁאֲנִי אוֹהֵב עֵץ, אֶבֶן וְאוֹר טִבְעִי.","אמרתי שאני אוהב עץ, אבן ואור טבעי."],"amarti she-ani ohev etz, even ve-or tiv'i.","I said I love wood, stone and natural light."],
     [["הִסְבַּרְתִּי לוֹ אֶת הָרַעְיוֹן וְהוּא הִתְלַהֵב.","הסברתי לו את הרעיון והוא התלהב."],"hisbarti lo et ha-ra'ayon ve-hu hitlahev.","I explained the idea to him and he got excited."],
     [["מָחָר אֶשְׁלַח לוֹ תּוֹכְנִית.","מחר אשלח לו תוכנית."],"machar eshlach lo tochnit.","Tomorrow I will send him a plan."],
     [["אֲנִי אוֹהֵב אֶת הָעֲבוֹדָה שֶׁלִּי.","אני אוהב את העבודה שלי."],"ani ohev et ha-avoda sheli.","I love my work."]],
  quiz:[{q:"What does the client want to redesign?",opts:["The kitchen","The living room","The garden"],a:1},{q:"What materials does Vincenzo love?",opts:["Glass and metal","Wood, stone and natural light","Plastic"],a:1}]},
 {id:"s15",t:["שְׁנֵי בָּתִּים, לֵב אֶחָד","שני בתים, לב אחד"],en:"Two Homes, One Heart",lvl:"B2",
  s:[[["לִפְעָמִים שׁוֹאֲלִים אוֹתִי אֵיפֹה הַבַּיִת שֶׁלִּי.","לפעמים שואלים אותי איפה הבית שלי."],"lif'amim sho'alim oti eifo ha-bayit sheli.","Sometimes people ask me where my home is."],
     [["זוֹ שְׁאֵלָה לֹא פְּשׁוּטָה בִּשְׁבִילִי.","זו שאלה לא פשוטה בשבילי."],"zo she'ela lo pshuta bishvili.","It is not a simple question for me."],
     [["נוֹלַדְתִּי בְּסִיצִילְיָה, בְּעִיר קְטַנָּה בְּשֵׁם רוֹזוֹלִינִי.","נולדתי בסיציליה, בעיר קטנה בשם רוזוליני."],"noladti be-Sitzilya, be-ir ktana be-shem Rosolini.","I was born in Sicily, in a small town called Rosolini."],
     [["שָׁם נִשְׁאֲרָה הַמִּשְׁפָּחָה שֶׁלִּי, וְשָׁם נִשְׁאַר חֵלֶק מִמֶּנִּי.","שם נשארה המשפחה שלי, ושם נשאר חלק ממני."],"sham nish'ara ha-mishpacha sheli, ve-sham nish'ar chelek mimeni.","My family stayed there, and a part of me stayed there too."],
     [["אֲבָל אֶת הַחַיִּים שֶׁלִּי בָּנִיתִי בְּבֶּרְלִין, עִם קוֹבִּי.","אבל את החיים שלי בניתי בברלין, עם קובי."],"aval et ha-chayim sheli baniti be-Berlin, im Kobi.","But I built my life in Berlin, with Kobi."],
     [["כְּשֶׁאֲנִי מְבַשֵּׁל אֹכֶל סִיצִילְיָאנִי בַּמִּטְבָּח שֶׁלָּנוּ, שְׁנֵי הָעוֹלָמוֹת נִפְגָּשִׁים.","כשאני מבשל אוכל סיציליאני במטבח שלנו, שני העולמות נפגשים."],"kshe-ani mevashel ochel sitzilyani ba-mitbach shelanu, shnei ha-olamot nifgashim.","When I cook Sicilian food in our kitchen, the two worlds meet."],
     [["לָמַדְתִּי שֶׁבַּיִת אֵינוֹ מָקוֹם אֶחָד.","למדתי שבית אינו מקום אחד."],"lamadti she-bayit eino makom echad.","I have learned that home is not one place."],
     [["בַּיִת הוּא הָאֲנָשִׁים שֶׁאַתָּה אוֹהֵב, בְּכָל מָקוֹם שֶׁהֵם נִמְצָאִים.","בית הוא האנשים שאתה אוהב, בכל מקום שהם נמצאים."],"bayit hu ha-anashim she-ata ohev, be-chol makom she-hem nimtza'im.","Home is the people you love, wherever they are."]],
  quiz:[{q:"Where was Vincenzo born?",opts:["Berlin","Rosolini, Sicily","Tel Aviv"],a:1},{q:"What has he learned about home?",opts:["It is one fixed place","It is the people you love, wherever they are","It is only Berlin"],a:1}]},
 {id:"s16",t:["בְּבֵית הַמִּרְקַחַת","בבית המרקחת"],en:"At the Pharmacy",lvl:"A2",
  s:[[["אֲנִי לֹא מַרְגִּישׁ טוֹב הַיּוֹם.","אני לא מרגיש טוב היום."],"ani lo margish tov hayom.","I don't feel well today."],
     [["כּוֹאֵב לִי הָרֹאשׁ וְיֵשׁ לִי קְצָת חֹם.","כואב לי הראש ויש לי קצת חום."],"ko'ev li ha-rosh ve-yesh li ktzat chom.","My head hurts and I have a little fever."],
     [["אֲנִי הוֹלֵךְ לְבֵית הַמִּרְקַחַת.","אני הולך לבית המרקחת."],"ani holech le-veit ha-mirkachat.","I go to the pharmacy."],
     [["\u201cמָה כּוֹאֵב לְךָ?\u201d שׁוֹאֶלֶת הָרוֹקַחַת.","\u201cמה כואב לך?\u201d שואלת הרוקחת."],"\u201cma ko'ev lecha?\u201d sho'elet ha-rokachat.","\u201cWhat hurts?\u201d asks the pharmacist."],
     [["הִיא נוֹתֶנֶת לִי כַּדּוּרִים.","היא נותנת לי כדורים."],"hi notenet li kadurim.","She gives me pills."],
     [["\u201cתִּשְׁתֶּה הַרְבֵּה מַיִם וְתָנוּחַ,\u201d הִיא אוֹמֶרֶת.","\u201cתשתה הרבה מים ותנוח,\u201d היא אומרת."],"\u201ctishte harbe mayim ve-tanuach,\u201d hi omeret.","\u201cDrink a lot of water and rest,\u201d she says."],
     [["\u201cתּוֹדָה רַבָּה,\u201d אֲנִי עוֹנֶה.","\u201cתודה רבה,\u201d אני עונה."],"\u201ctoda raba,\u201d ani one.","\u201cThank you very much,\u201d I answer."]],
  quiz:[{q:"What is wrong with Vincenzo?",opts:["His leg hurts","Headache and slight fever","Toothache"],a:1},{q:"What does the pharmacist advise?",opts:["Drink water and rest","Run","Eat more"],a:0}]},
 {id:"s17",t:["קְנִיּוֹת לְשַׁבָּת","קניות לשבת"],en:"Shopping for Shabbat",lvl:"A2",
  s:[[["בַּיּוֹם שִׁישִׁי אֲנַחְנוּ עוֹשִׂים קְנִיּוֹת.","ביום שישי אנחנו עושים קניות."],"ba-yom shishi anachnu osim kniyot.","On Friday we do the shopping."],
     [["אֲנַחְנוּ הוֹלְכִים לַסּוּפֶּרְמַרְקֶט עִם עֲגָלָה גְּדוֹלָה.","אנחנו הולכים לסופרמרקט עם עגלה גדולה."],"anachnu holchim la-supermarket im agala gdola.","We go to the supermarket with a big cart."],
     [["קוֹבִּי לוֹקֵחַ חַלָּה, יַיִן וּגְבִינָה.","קובי לוקח חלה, יין וגבינה."],"Kobi loke'ach chala, yayin u-gvina.","Kobi takes challah, wine and cheese."],
     [["אֲנִי בּוֹחֵר יְרָקוֹת טְרִיִּים לַסָּלָט.","אני בוחר ירקות טריים לסלט."],"ani bocher yerakot tri'im la-salat.","I choose fresh vegetables for the salad."],
     [["יֵשׁ מִבְצָע עַל דָּגִים, אָז אֲנַחְנוּ קוֹנִים שְׁנַיִם.","יש מבצע על דגים, אז אנחנו קונים שניים."],"yesh mivtza al dagim, az anachnu konim shnayim.","There is a deal on fish, so we buy two."],
     [["בַּקֻּפָּה אֲנִי מְשַׁלֵּם בְּכַרְטִיס.","בקופה אני משלם בכרטיס."],"ba-kupa ani meshalem be-kartis.","At the checkout I pay by card."],
     [["עַכְשָׁיו אֲנַחְנוּ מוּכָנִים לְשַׁבָּת.","עכשיו אנחנו מוכנים לשבת."],"achshav anachnu muchanim le-shabat.","Now we are ready for Shabbat."]],
  quiz:[{q:"What does Kobi take?",opts:["Challah, wine and cheese","Only bread","Meat"],a:0},{q:"How does Vincenzo pay?",opts:["Cash","By card","He doesn't pay"],a:1}]},
 {id:"s18",t:["טֵלֵפוֹן מֵהָעֲבוֹדָה","טלפון מהעבודה"],en:"A Call from Work",lvl:"B1",
  s:[[["בְּאֶמְצַע הַיּוֹם קוֹבִּי מִתְקַשֵּׁר אֵלַי.","באמצע היום קובי מתקשר אליי."],"be-emtza ha-yom Kobi mitkasher elai.","In the middle of the day Kobi calls me."],
     [["\u201cשָׁלוֹם מוֹתֶק, אֵיךְ הוֹלֵךְ הַיּוֹם?\u201d","\u201cשלום מותק, איך הולך היום?\u201d"],"\u201cshalom motek, eich holech ha-yom?\u201d","\u201cHi sweetheart, how is the day going?\u201d"],
     [["\u201cיֵשׁ לִי הַרְבֵּה עֲבוֹדָה, אֲבָל הַכֹּל בְּסֵדֶר,\u201d אֲנִי עוֹנֶה.","\u201cיש לי הרבה עבודה, אבל הכול בסדר,\u201d אני עונה."],"\u201cyesh li harbe avoda, aval ha-kol beseder,\u201d ani one.","\u201cI have a lot of work, but everything is fine,\u201d I answer."],
     [["\u201cאַל תִּשְׁכַּח שֶׁהָאוֹרְחִים בָּאִים הָעֶרֶב,\u201d הוּא מַזְכִּיר לִי.","\u201cאל תשכח שהאורחים באים הערב,\u201d הוא מזכיר לי."],"\u201cal tishkach she-ha-orchim ba'im ha-erev,\u201d hu mazkir li.","\u201cDon't forget the guests are coming tonight,\u201d he reminds me."],
     [["\u201cזָכַרְתִּי, אֲנִי כְּבָר חוֹשֵׁב מָה לְבַשֵּׁל,\u201d אֲנִי צוֹחֵק.","\u201cזכרתי, אני כבר חושב מה לבשל,\u201d אני צוחק."],"\u201czacharti, ani kvar choshev ma levashel,\u201d ani tzochek.","\u201cI remembered, I'm already thinking what to cook,\u201d I laugh."],
     [["\u201cמְעֻלֶּה. נִתְרָאֶה בַּבַּיִת,\u201d הוּא אוֹמֵר.","\u201cמעולה. נתראה בבית,\u201d הוא אומר."],"\u201cme'ule. nitra'e ba-bayit,\u201d hu omer.","\u201cExcellent. See you at home,\u201d he says."],
     [["אֲנִי אוֹהֵב שֶׁהוּא מִתְקַשֵּׁר בְּאֶמְצַע הַיּוֹם.","אני אוהב שהוא מתקשר באמצע היום."],"ani ohev she-hu mitkasher be-emtza ha-yom.","I love that he calls in the middle of the day."]],
  quiz:[{q:"What does Kobi remind Vincenzo about?",opts:["A doctor visit","Guests coming tonight","Buying a ticket"],a:1},{q:"What is Vincenzo already thinking about?",opts:["What to cook","Where to travel","What to buy"],a:0}]},
 {id:"s19",t:["אֲרוּחָה בַּמִּסְעָדָה","ארוחה במסעדה"],en:"Dinner at the Restaurant",lvl:"B1",
  s:[[["בָּעֶרֶב יָצָאנוּ לֶאֱכֹל בְּמִסְעָדָה בְּתֵל אָבִיב.","בערב יצאנו לאכול במסעדה בתל אביב."],"ba-erev yatzanu le'echol be-mis'ada be-Tel Aviv.","In the evening we went out to eat at a restaurant in Tel Aviv."],
     [["הַמֶּלְצַר נָתַן לָנוּ תַּפְרִיט וְהִמְלִיץ עַל הַדָּג.","המלצר נתן לנו תפריט והמליץ על הדג."],"ha-meltzar natan lanu tafrit ve-himlitz al ha-dag.","The waiter gave us a menu and recommended the fish."],
     [["קוֹבִּי הִזְמִין דָּג וַאֲנִי הִזְמַנְתִּי מָנָה צִמְחוֹנִית.","קובי הזמין דג ואני הזמנתי מנה צמחונית."],"Kobi hizmin dag va-ani hizmanti mana tzimchonit.","Kobi ordered fish and I ordered a vegetarian dish."],
     [["שָׁתִינוּ יַיִן לָבָן וְדִבַּרְנוּ הַרְבֵּה.","שתינו יין לבן ודיברנו הרבה."],"shatinu yayin lavan ve-dibarnu harbe.","We drank white wine and talked a lot."],
     [["הָאֹכֶל הָיָה טָעִים מְאוֹד.","האוכל היה טעים מאוד."],"ha-ochel haya taim me'od.","The food was very tasty."],
     [["בַּסּוֹף בִּקַּשְׁתִּי אֶת הַחֶשְׁבּוֹן וְשִׁלַּמְתִּי.","בסוף ביקשתי את החשבון ושילמתי."],"ba-sof bikashti et ha-cheshbon ve-shilamti.","In the end I asked for the bill and paid."],
     [["יָצָאנוּ מְרֻצִּים וְהָלַכְנוּ לְיַד הַיָּם.","יצאנו מרוצים והלכנו ליד הים."],"yatzanu merutzim ve-halachnu le-yad ha-yam.","We left satisfied and walked by the sea."]],
  quiz:[{q:"What did Vincenzo order?",opts:["Fish","A vegetarian dish","Soup"],a:1},{q:"What did they do after the meal?",opts:["Went home","Walked by the sea","Went shopping"],a:1}]},
 {id:"s20",t:["הוֹלְכִים לְאִבּוּד בְּתֵל אָבִיב","הולכים לאיבוד בתל אביב"],en:"Getting Lost in Tel Aviv",lvl:"B1",
  s:[[["רָצִינוּ לִמְצֹא אֶת הַנָּמֵל בְּיָפוֹ.","רצינו למצוא את הנמל ביפו."],"ratzinu limtzo et ha-namel be-Yafo.","We wanted to find the port in Jaffa."],
     [["אֲבָל אַחֲרֵי עֶשֶׂר דַּקּוֹת הָבַנּוּ שֶׁהָלַכְנוּ לְאִבּוּד.","אבל אחרי עשר דקות הבנו שהלכנו לאיבוד."],"aval acharei eser dakot hevanu she-halachnu le-ibud.","But after ten minutes we realised we had gotten lost."],
     [["שָׁאַלְתִּי אִישׁ בָּרְחוֹב, \u201cסְלִיחָה, אֵיךְ מַגִּיעִים לַנָּמֵל?\u201d","שאלתי איש ברחוב, \u201cסליחה, איך מגיעים לנמל?\u201d"],"sha'alti ish ba-rechov, \u201cslicha, eich magi'im la-namel?\u201d","I asked a man in the street, \u201cexcuse me, how do you get to the port?\u201d"],
     [["\u201cתֵּלְכוּ יָשָׁר וְאָז יָמִינָה בָּרַמְזוֹר,\u201d הוּא עָנָה.","\u201cתלכו ישר ואז ימינה ברמזור,\u201d הוא ענה."],"\u201ctelchu yashar ve-az yamina ba-ramzor,\u201d hu ana.","\u201cGo straight and then right at the traffic light,\u201d he answered."],
     [["הָלַכְנוּ יָשָׁר, פָּנִינוּ יָמִינָה, וּמָצָאנוּ אֶת הַיָּם.","הלכנו ישר, פנינו ימינה, ומצאנו את הים."],"halachnu yashar, paninu yamina, u-matzanu et ha-yam.","We went straight, turned right, and found the sea."],
     [["לִפְעָמִים לָלֶכֶת לְאִבּוּד זֶה הַחֵלֶק הֲכִי יָפֶה.","לפעמים ללכת לאיבוד זה החלק הכי יפה."],"lif'amim lalechet le-ibud ze ha-chelek hachi yafe.","Sometimes getting lost is the most beautiful part."]],
  quiz:[{q:"What were they looking for?",opts:["A restaurant","The port in Jaffa","A hotel"],a:1},{q:"What directions did the man give?",opts:["Straight then right at the light","Left then back","Straight only"],a:0}]},
 {id:"s21",t:["הַמִּשְׁפָּחָה שֶׁל מִיקִי","המשפחה של מיקי"],en:"Meeting Miki's Family",lvl:"B2",
  s:[[["בַּקַּיִץ טַסְנוּ לְיִשְׂרָאֵל לִפְגֹּשׁ אֶת הַמִּשְׁפָּחָה שֶׁל קוֹבִּי.","בקיץ טסנו לישראל לפגוש את המשפחה של קובי."],"ba-kayitz tasnu le-Yisra'el lifgosh et ha-mishpacha shel Kobi.","In the summer we flew to Israel to meet Kobi's family."],
     [["מִיקִי, הָאָח שֶׁל קוֹבִּי, חִכָּה לָנוּ בִּשְׂדֵה הַתְּעוּפָה.","מיקי, האח של קובי, חיכה לנו בשדה התעופה."],"Miki, ha-ach shel Kobi, chika lanu bi-sde ha-te'ufa.","Miki, Kobi's brother, waited for us at the airport."],
     [["\u201cבָּרוּךְ הַבָּא לַמִּשְׁפָּחָה!\u201d הוּא אָמַר וְחִבֵּק אוֹתִי.","\u201cברוך הבא למשפחה!\u201d הוא אמר וחיבק אותי."],"\u201cbaruch ha-ba la-mishpacha!\u201d hu amar ve-chibek oti.","\u201cWelcome to the family!\u201d he said and hugged me."],
     [["בָּעֶרֶב כֻּלָּנוּ יָשַׁבְנוּ סְבִיב שֻׁלְחָן גָּדוֹל.","בערב כולנו ישבנו סביב שולחן גדול."],"ba-erev kulanu yashavnu sviv shulchan gadol.","In the evening we all sat around a big table."],
     [["הָאִמָּא שֶׁל קוֹבִּי בִּשְּׁלָה אֹכֶל לְכָל הַצָּבָא.","האמא של קובי בישלה אוכל לכל הצבא."],"ha-ima shel Kobi bishla ochel le-chol ha-tzava.","Kobi's mother cooked food for an army."],
     [["דִּבַּרְנוּ עִבְרִית, אִיטַלְקִית וְקְצָת אַנְגְּלִית, הַכֹּל בְּיַחַד.","דיברנו עברית, איטלקית וקצת אנגלית, הכול ביחד."],"dibarnu ivrit, italkit ve-ktzat anglit, ha-kol be-yachad.","We spoke Hebrew, Italian and a little English, all together."],
     [["הֵבַנְתִּי שֶׁמִּשְׁפָּחָה הִיא מִשְׁפָּחָה בְּכָל שָׂפָה.","הבנתי שמשפחה היא משפחה בכל שפה."],"hevanti she-mishpacha hi mishpacha be-chol safa.","I understood that family is family in every language."],
     [["הִרְגַּשְׁתִּי שֶׁקִּבְּלוּ אוֹתִי בְּאַהֲבָה.","הרגשתי שקיבלו אותי באהבה."],"hirgashti she-kiblu oti be-ahava.","I felt that they received me with love."]],
  quiz:[{q:"Who waited at the airport?",opts:["Angela","Miki","Salvatore"],a:1},{q:"What did Vincenzo understand?",opts:["Family is family in every language","Hebrew is hard","Israel is far"],a:0}]},
 {id:"s22",t:["וִכּוּחַ קָטָן","ויכוח קטן"],en:"A Small Argument",lvl:"B2",
  s:[[["אֶתְמוֹל הָיָה לָנוּ וִכּוּחַ קָטָן.","אתמול היה לנו ויכוח קטן."],"etmol haya lanu vikuach katan.","Yesterday we had a small argument."],
     [["אֲנִי רָצִיתִי לְבַלּוֹת אֶת סוֹף הַשָּׁבוּעַ בְּאַבַּאיְטָה.","אני רציתי לבלות את סוף השבוע באבאיטה."],"ani ratziti levalot et sof ha-shavua be-ABAITA.","I wanted to spend the weekend at ABAITA."],
     [["קוֹבִּי רָצָה לְהִישָּׁאֵר בְּבֶּרְלִין כִּי הָיָה עָיֵף.","קובי רצה להישאר בברלין כי היה עייף."],"Kobi ratza lehisha'er be-Berlin ki haya ayef.","Kobi wanted to stay in Berlin because he was tired."],
     [["בַּהַתְחָלָה כָּל אֶחָד חָשַׁב רַק עַל עַצְמוֹ.","בהתחלה כל אחד חשב רק על עצמו."],"ba-hatchala kol echad chashav rak al atzmo.","At first each of us thought only of himself."],
     [["אֲבָל אָז יָשַׁבְנוּ וְדִבַּרְנוּ בְּשֶׁקֶט.","אבל אז ישבנו ודיברנו בשקט."],"aval az yashavnu ve-dibarnu be-sheket.","But then we sat and talked quietly."],
     [["הֵבַנְתִּי שֶׁהוּא בֶּאֱמֶת צָרִיךְ מְנוּחָה.","הבנתי שהוא באמת צריך מנוחה."],"hevanti she-hu be'emet tzarich menucha.","I understood that he really needs rest."],
     [["הִסְכַּמְנוּ לְהִישָּׁאֵר הַשַּׁבָּת וְלִנְסֹעַ בַּשָּׁבוּעַ הַבָּא.","הסכמנו להישאר השבת ולנסוע בשבוע הבא."],"hiskamnu lehisha'er ha-shabat ve-linso'a ba-shavua ha-ba.","We agreed to stay this Shabbat and travel next week."],
     [["וִכּוּחַ טוֹב נִגְמָר בְּפִיּוּס.","ויכוח טוב נגמר בפיוס."],"vikuach tov nigmar be-piyus.","A good argument ends in reconciliation."]],
  quiz:[{q:"Why did Kobi want to stay in Berlin?",opts:["He was tired","He had work","He was sick"],a:0},{q:"How did they resolve it?",opts:["Vincenzo went alone","They agreed to travel next week","They didn't speak"],a:1}]},
 {id:"s23",t:["יוֹם בִּלְתִּי נִשְׁכָּח","יום בלתי נשכח"],en:"An Unforgettable Day",lvl:"B2",
  s:[[["יֵשׁ יָמִים שֶׁנִּשְׁאָרִים אִתְּךָ לְכָל הַחַיִּים.","יש ימים שנשארים איתך לכל החיים."],"yesh yamim she-nish'arim itcha le-chol ha-chayim.","There are days that stay with you for life."],
     [["הַיּוֹם שֶׁבּוֹ הִתְחַתַּנּוּ הָיָה יוֹם כָּזֶה.","היום שבו התחתנו היה יום כזה."],"ha-yom she-bo hitchatanu haya yom kaze.","The day we got married was such a day."],
     [["אֲבָל גַּם הַיּוֹם שֶׁבּוֹ הִתְחַלְתִּי לִלְמֹד עִבְרִית הָיָה מְיֻחָד.","אבל גם היום שבו התחלתי ללמוד עברית היה מיוחד."],"aval gam ha-yom she-bo hitchalti lilmod ivrit haya meyuchad.","But also the day I began learning Hebrew was special."],
     [["זָכַרְתִּי לְמָה הִתְחַלְתִּי: כְּדֵי לְהִתְקָרֵב לְקוֹבִּי וְלַמִּשְׁפָּחָה שֶׁלּוֹ.","זכרתי למה התחלתי: כדי להתקרב לקובי ולמשפחה שלו."],"zacharti lama hitchalti: kdei lehitkarev le-Kobi ve-la-mishpacha shelo.","I remembered why I began: to grow closer to Kobi and his family."],
     [["בְּכָל מִלָּה חֲדָשָׁה אֲנִי מַרְגִּישׁ שֶׁאֲנִי בּוֹנֶה גֶּשֶׁר.","בכל מילה חדשה אני מרגיש שאני בונה גשר."],"be-chol mila chadasha ani margish she-ani bone gesher.","With every new word I feel I am building a bridge."],
     [["הַשָּׂפָה הִיא לֹא רַק מִלִּים, הִיא דֶּרֶךְ לֶאֱהֹב.","השפה היא לא רק מילים, היא דרך לאהוב."],"ha-safa hi lo rak milim, hi derech le'ehov.","Language is not only words, it is a way to love."],
