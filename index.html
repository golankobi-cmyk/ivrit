     [["מִיקִי פּוֹתֵחַ יַיִן אָדֹם.","מיקי פותח יין אדום."],"Miki poteach yayin adom.","Miki opens red wine."],
     [["הַכֻּלָּם שׁוֹתִים לְחַיִּים.","הכולם שותים לחיים."],"ha-kulam shotim lechaim.","Everyone drinks 'lechaim'."],
     [["אֲנִי מַרְגִּישׁ חֵלֶק מֵהַמִּשְׁפָּחָה.","אני מרגיש חלק מהמשפחה."],"ani margish chelek meha-mishpacha.","I feel part of the family."],
     [["זֶה הַשַּׁבָּת הָאָהוּב עָלַי.","זה השבת האהוב עליי."],"ze ha-Shabbat ha-ahuv alai.","This is my favourite Shabbat."],
  ],
  quiz:[{q:"What do the children do?",opts:["Eat","Sing a Shabbat song","Play outside"],a:1},{q:"What does Miki open?",opts:["White wine","Juice","Red wine"],a:2}]},
 {id:"p4",t:["הַגֶּשֶׁם בְּבֶּרְלִין","הגשם בברלין"],en:"Rain in Berlin",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["הַיּוֹם יוֹרֵד גֶּשֶׁם חָזָק.","היום יורד גשם חזק."],"ha-yom yored geshem chazak.","Today there is heavy rain."],
     [["הָרְחוֹב מָלֵא שְׁלוּלִיּוֹת.","הרחוב מלא שלוליות."],"ha-rechov male shluliyot.","The street is full of puddles."],
     [["לְקַחְתִּי מִטְרִיָּה.","לקחתי מטרייה."],"lakachti mitriya.","I took an umbrella."],
     [["הָלַכְתִּי לַשּׁוּק בַּגֶּשֶׁם.","הלכתי לשוק בגשם."],"halachti la-shuk ba-geshem.","I walked to the market in the rain."],
     [["הַשּׁוּק הָיָה שָׁקֵט הַיּוֹם.","השוק היה שקט היום."],"ha-shuk haya shaket ha-yom.","The market was quiet today."],
     [["קָנִיתִי תַּפּוּחִים וְגֶזֶר.","קניתי תפוחים וגזר."],"kaniti tapuchim ve-gezer.","I bought apples and carrots."],
     [["חָזַרְתִּי הַבַּיְתָה רָטֹב.","חזרתי הביתה רטוב."],"chazarti ha-bayta ratov.","I came home wet."],
     [["קוֹבִּי עָשָׂה קָפֶה חַם.","קובי עשה קפה חם."],"Kobi asa kafe cham.","Kobi made hot coffee."],
     [["שָׁתִינוּ יַחַד לְיַד הַחַלּוֹן.","שתינו יחד ליד החלון."],"shatinu yachad leyad ha-chalon.","We drank together by the window."],
     [["בַּחוּץ גֶּשֶׁם, בִּפְנִים חַמִּים.","בחוץ גשם, בפנים חמים."],"ba-chutz geshem, bi-fnim chamim.","Outside rain, inside warm."],
     [["אֲנִי אוֹהֵב יָמִים כָּאֵלֶּה.","אני אוהב ימים כאלה."],"ani ohev yamim ka-ele.","I love days like these."],
     [["בֶּרְלִין יָפָה גַּם בַּגֶּשֶׁם.","ברלין יפה גם בגשם."],"Berlin yafa gam ba-geshem.","Berlin is beautiful even in the rain."],
  ],
  quiz:[{q:"What did Vincenzo take with him?",opts:["A jacket","An umbrella","A bag"],a:1},{q:"Who made hot coffee?",opts:["Vincenzo","Angela","Kobi"],a:1}]},
 {id:"p5",t:["יוֹם הוּלֶדֶת שֶׁל אֶלְיָה","יום הולדת של אליה"],en:"Elia's Birthday",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["הַיּוֹם יוֹם הוּלֶדֶת שֶׁל אֶלְיָה.","היום יום הולדת של אליה."],"ha-yom yom huledet shel Elia.","Today is Elia's birthday."],
     [["אֶלְיָה הוּא בֶּן שֵׁשׁ שָׁנִים.","אליה הוא בן שש שנים."],"Elia hu ben shesh shanim.","Elia is six years old."],
     [["הוּא הַבֵּן הַצָּעִיר שֶׁל טֵרֵזָה.","הוא הבן הצעיר של טרזה."],"hu ha-ben ha-tza'ir shel Teresa.","He is Teresa's youngest son."],
     [["קָנִינוּ לוֹ מַתָּנָה.","קנינו לו מתנה."],"kaninu lo matana.","We bought him a gift."],
     [["קָנִינוּ סֵפֶר עִם תְּמוּנוֹת.","קנינו ספר עם תמונות."],"kaninu sefer im tmunot.","We bought a picture book."],
     [["אֶלְיָה שָׂמֵחַ מְאוֹד.","אליה שמח מאוד."],"Elia sameach me'od.","Elia is very happy."],
     [["הָיְתָה עוּגָה עִם נֵרוֹת.","הייתה עוגה עם נרות."],"hayta uga im nerot.","There was a cake with candles."],
     [["שָׁרִינוּ יוֹם הוּלֶדֶת שָׂמֵחַ.","שרינו יום הולדת שמח."],"sharinu yom huledet sameach.","We sang happy birthday."],
     [["אֶלְיָה נָפַח אֶת הַנֵּרוֹת.","אליה נפח את הנרות."],"Elia nafach et ha-nerot.","Elia blew out the candles."],
     [["אָכַלְנוּ עוּגָה עִם שׁוֹקוֹלָד.","אכלנו עוגה עם שוקולד."],"achalnu uga im shokolad.","We ate a cake with chocolate."],
     [["הַמִּשְׁפָּחָה הָיְתָה שְׂמֵחָה.","המשפחה הייתה שמחה."],"ha-mishpacha hayta smecha.","The family was happy."],
     [["זֹאת הָיְתָה חֲגִיגָה יָפָה.","זאת הייתה חגיגה יפה."],"zot hayta chagiga yafa.","It was a beautiful celebration."],
  ],
  quiz:[{q:"How old is Elia?",opts:["Four","Six","Eight"],a:1},{q:"What did Vincenzo buy?",opts:["Toy","Picture book","Clothes"],a:1}]},
 {id:"q1",t:["הַנְּסִיעָה בְּרַכֶּבֶת","הנסיעה ברכבת"],en:"A Train Journey",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["כָּל שְׁבוּעַ אֲנִי נוֹסֵעַ בָּרַכֶּבֶת.","כל שבוע אני נוסע ברכבת."],"kol shavua ani nose'a ba-rakevet.","Every week I travel by train."],
     [["הָרַכֶּבֶת בְּבֶּרְלִין מְדֻיֶּקֶת.","הרכבת בברלין מדויקת."],"ha-rakevet be-Berlin meduyeket.","The train in Berlin is punctual."],
     [["אֲנִי קוֹנֶה כַּרְטִיס בְּמַחְשֵׁב.","אני קונה כרטיס במחשב."],"ani kone kartis be-machshev.","I buy a ticket by computer."],
     [["הָרְכֶּבֶת בָּאָה בְּדִיּוּק בְּשָׁמֶשׁ.","הרכבת באה בדיוק בשמונה."],"ha-rakevet ba'a bidiyuk be-shmone.","The train comes exactly at eight."],
     [["אֲנִי יוֹשֵׁב לְיַד הַחַלּוֹן.","אני יושב ליד החלון."],"ani yoshev leyad ha-chalon.","I sit by the window."],
     [["הַנּוֹף מִחוּץ לַחַלּוֹן יָפֶה.","הנוף מחוץ לחלון יפה."],"ha-nof michuts la-chalon yafe.","The view outside the window is beautiful."],
     [["לִפְעָמִים אֲנִי קוֹרֵא סֵפֶר.","לפעמים אני קורא ספר."],"lif'amim ani kore sefer.","Sometimes I read a book."],
     [["לִפְעָמִים אֲנִי לוֹמֵד עִבְרִית בַּאֶפְלִיקַצְיָה.","לפעמים אני לומד עברית באפליקציה."],"lif'amim ani lomed ivrit ba-aplikatzya.","Sometimes I study Hebrew in the app."],
     [["הַנְּסִיעָה אוֹרֶכֶת עֶשְׂרִים דַּקּוֹת.","הנסיעה אורכת עשרים דקות."],"ha-nesia orechet esrim dakot.","The journey takes twenty minutes."],
     [["הָרַכֶּבֶת מֵבִיאָה אוֹתִי לַמֶּרְכָּז.","הרכבת מביאה אותי למרכז."],"ha-rakevet mevi'a oti la-merkaz.","The train brings me to the centre."],
     [["שָׁם אֲנִי הוֹלֵךְ לָעֲבוֹדָה.","שם אני הולך לעבודה."],"sham ani holech la-avoda.","There I go to work."],
     [["יוֹם אֶחָד פָּגַשְׁתִּי אִישׁ מְעַנְיֵן.","יום אחד פגשתי איש מעניין."],"yom echad pagashti ish me'anyen.","One day I met an interesting man."],
     [["הוּא סִפֵּר לִי עַל בֶּרְלִין הַיְשָׁנָה.","הוא סיפר לי על ברלין הישנה."],"hu siper li al Berlin ha-yeshana.","He told me about old Berlin."],
     [["זֶה הָיָה מִסְרוֹן מְעַנְיֵן.","זה היה שיחה מעניינת."],"ze haya sicha me'anyenet.","It was an interesting conversation."],
     [["אֲנִי אוֹהֵב אֶת הָרַכֶּבֶת.","אני אוהב את הרכבת."],"ani ohev et ha-rakevet.","I love the train."],
     [["בַּרַּכֶּבֶת בֶּרְלִין מַרְגִּישָׁה כְּמוֹ כְּפָר.","ברכבת ברלין מרגישה כמו כפר."],"ba-rakevet Berlin margisha kmo kfar.","On the train Berlin feels like a village."],
  ],
  quiz:[{q:"How long is the train journey?",opts:["Ten minutes","Twenty minutes","Thirty minutes"],a:1},{q:"What does Vincenzo sometimes do on the train?",opts:["Sleep","Study Hebrew in the app","Call Angela"],a:1}]},
 {id:"q2",t:["הַשּׁוּק הַחָדָשׁ","השוק החדש"],en:"The New Market",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["מָצָאתִי שׁוּק חָדָשׁ בַּשָּׂכוּנָה.","מצאתי שוק חדש בשכונה."],"matzati shuk chadash ba-schuna.","I found a new market in the neighbourhood."],
     [["הוּא קָטָן אֲבָל טוֹב מְאוֹד.","הוא קטן אבל טוב מאוד."],"hu katan aval tov me'od.","It is small but very good."],
     [["יֵשׁ שָׁם חַקְלָאִים מֵהַסְּבִיבָה.","יש שם חקלאים מהסביבה."],"yesh sham chaklayim me-ha-sviva.","There are local farmers there."],
     [["הֵם מוֹכְרִים יְרָקוֹת טְרִיִּים.","הם מוכרים ירקות טריים."],"hem mochrim yerakot tri'im.","They sell fresh vegetables."],
     [["קָנִיתִי עַגְבָנִיּוֹת, מְלָפְפוֹנִים וּפַלְפֵּל.","קניתי עגבניות, מלפפונים ופלפל."],"kaniti agvaniot, melafefonim u-fulful.","I bought tomatoes, cucumbers and pepper."],
     [["הַמּוֹכֶרֶת הִסְבִּירָה לִי כָּל מִין.","המוכרת הסבירה לי כל מין."],"ha-mocheret hisbira li kol min.","The seller explained each variety to me."],
     [["שָׁאַלְתִּי אֵיךְ לְבַשֵּׁל אֶת הַיְרָקוֹת.","שאלתי איך לבשל את הירקות."],"sha'alti eich levashel et ha-yerakot.","I asked how to cook the vegetables."],
     [["הִיא נָתְנָה לִי מִתְכּוֹן פָּשׁוּט.","היא נתנה לי מתכון פשוט."],"hi natna li mitkon fashut.","She gave me a simple recipe."],
     [["שָׁלַמְתִּי בְּמַזּוּמָן.","שילמתי במזומן."],"shilamti be-mazuman.","I paid in cash."],
     [["הַמְּחִירִים זוֹלִים יוֹתֵר מִן הַסּוּפֶּר.","המחירים זולים יותר מן הסופר."],"ha-mechirim zolim yoter min ha-super.","The prices are cheaper than the supermarket."],
     [["חָזַרְתִּי הַבַּיְתָה עִם שְׂקִיּוֹת מְלֵאוֹת.","חזרתי הביתה עם שקיות מלאות."],"chazarti ha-bayta im skiyot mle'ot.","I came home with full bags."],
     [["בִּשַּׁלְתִּי אֶת הַמִּתְכּוֹן שֶׁל הַמּוֹכֶרֶת.","בישלתי את המתכון של המוכרת."],"bishalti et ha-mitkon shel ha-mocheret.","I cooked the seller's recipe."],
     [["קוֹבִּי אָמַר שֶׁזֶּה הָיָה טָעִים.","קובי אמר שזה היה טעים."],"Kobi amar she-ze haya ta'im.","Kobi said it was delicious."],
     [["עַכְשָׁו אֲנִי הוֹלֵךְ לְשָׁם כָּל שַׁבָּת.","עכשיו אני הולך לשם כל שבת."],"achshav ani holech le-sham kol Shabbat.","Now I go there every Saturday."],
     [["הַשּׁוּק נַעֲשָׂה חֵלֶק מֵהַשָּׁבוּעַ שֶׁלִּי.","השוק נעשה חלק מהשבוע שלי."],"ha-shuk na'asa chelek me-ha-shavua sheli.","The market has become part of my week."],
     [["בְּבֶּרְלִין יֵשׁ שׁוּקִים יָפִים מְאוֹד.","בברלין יש שוקים יפים מאוד."],"be-Berlin yesh shukim yafim me'od.","In Berlin there are very beautiful markets."],
  ],
  quiz:[{q:"Why are prices better at the new market?",opts:["Cheaper than supermarket","Same as supermarket","More expensive"],a:0},{q:"What did Vincenzo cook?",opts:["The seller's recipe","His mother's recipe","Pasta"],a:0}]},
 {id:"q3",t:["הַגַּן עַל הַגַּג","הגן על הגג"],en:"The Rooftop Garden",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בִּבְנִיָּן שֶׁלָּנוּ יֵשׁ גַּן עַל הַגַּג.","בבניין שלנו יש גן על הגג."],"be-binyan shelanu yesh gan al ha-gag.","In our building there is a rooftop garden."],
     [["הַגַּן שַׁיָּךְ לְכָל הַדַּיָּרִים.","הגן שייך לכל הדיירים."],"ha-gan shayach le-chol ha-dayayrim.","The garden belongs to all the tenants."],
     [["יֵשׁ שָׁם כִּסְאוֹת וְשֻׁלְחָנוֹת.","יש שם כיסאות ושולחנות."],"yesh sham kis'ot ve-shlchanot.","There are chairs and tables there."],
     [["בַּקַּיִץ כֻּלָּם יוֹשְׁבִים שָׁם.","בקיץ כולם יושבים שם."],"ba-kayitz kulam yoshvim sham.","In summer everyone sits there."],
     [["יֵשׁ גַּם עֲצִים וּפְרָחִים.","יש גם עצים ופרחים."],"yesh gam etzim u-frachim.","There are also trees and flowers."],
     [["אֲנִי אוֹהֵב לְשֶׁבֶת שָׁם בַּבֹּקֶר.","אני אוהב לשבת שם בבוקר."],"ani ohev lashevet sham ba-boker.","I love to sit there in the morning."],
     [["מִן הַגַּג רוֹאִים אֶת כָּל בֶּרְלִין.","מן הגג רואים את כל ברלין."],"min ha-gag ro'im et kol Berlin.","From the roof you see all of Berlin."],
     [["פַּעַם הִזְמַנְתִּי אֶת הַשָּׁכֵן תּוֹמָאס.","פעם הזמנתי את השכן תומאס."],"pa'am hizmanti et ha-shachen Thomas.","Once I invited the neighbour Thomas."],
     [["שָׁתִינוּ יַיִן וְדִבַּרְנוּ עַד הַלַּיְלָה.","שתינו יין ודיברנו עד הלילה."],"shatinu yayin ve-dibarnu ad ha-layla.","We drank wine and talked until night."],
     [["הַשָּׁמַיִם הָיוּ מְלֵאִים כּוֹכָבִים.","השמיים היו מלאים כוכבים."],"ha-shamayim hayu mele'im cochavim.","The sky was full of stars."],
     [["בְּבֶּרְלִין זֶה נָדִיר לִרְאוֹת כּוֹכָבִים.","בברלין זה נדיר לראות כוכבים."],"be-Berlin ze nadir lir'ot cochavim.","In Berlin it is rare to see stars."],
     [["תּוֹמָאס אָמַר שֶׁזֶּה הָיָה לַיְלָה מוֹשְׁלָם.","תומאס אמר שזה היה לילה מושלם."],"Thomas amar she-ze haya layla mushlam.","Thomas said it was a perfect night."],
     [["הַגַּן הוּא הַמָּקוֹם הָאָהוּב עָלַי.","הגן הוא המקום האהוב עליי."],"ha-gan hu ha-makom ha-ahuv alai.","The garden is my favourite place."],
     [["בְּקַיִץ הַבָּא נַעֲשֶׂה שָׁם אֲרוּחָה.","בקיץ הבא נעשה שם ארוחה."],"be-kayitz ha-ba na'ase sham arucha.","Next summer we will have a meal there."],
     [["אֲנִי מְצַפֶּה לָזֶה.","אני מצפה לזה."],"ani metzape la-ze.","I am looking forward to that."],
  ],
  quiz:[{q:"Who does the rooftop garden belong to?",opts:["The owner","All the tenants","Just Vincenzo"],a:1},{q:"What did Thomas say about the evening?",opts:["It was boring","It was too cold","It was a perfect night"],a:2}]},
 {id:"q4",t:["שִׂיחַ עִם הָאֵם","שיח עם האם"],en:"A Chat with Mom",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["כָּל יוֹם שֵׁנִי אֲנִי מִתְקַשֵּׁר לְאַנְגֶ'לָה.","כל יום שני אני מתקשר לאנג'לה."],"kol yom sheni ani mitkasher le-Angela.","Every Monday I call Angela."],
     [["הִיא תָּמִיד שׁוֹאֶלֶת אִם אֲנִי אוֹכֵל מַסְפִּיק.","היא תמיד שואלת אם אני אוכל מספיק."],"hi tamid sho'elet im ani ochel maspiik.","She always asks if I eat enough."],
     [["אֲנִי אוֹמֵר כֵּן, אֲנִי בְּסֵדֶר.","אני אומר כן, אני בסדר."],"ani omer ken, ani beseder.","I say yes, I am fine."],
     [["הִיא שׁוֹאֶלֶת עַל קוֹבִּי.","היא שואלת על קובי."],"hi sho'elet al Kobi.","She asks about Kobi."],
     [["אֲנִי מְסַפֵּר לָהּ עַל הַשָּׁבוּעַ.","אני מספר לה על השבוע."],"ani mesaper la al ha-shavua.","I tell her about the week."],
     [["לִפְעָמִים אֲנִי מְסַפֵּר בָּעֶרְבִּית.","לפעמים אני מספר בערבית."],"lif'amim ani mesaper ba-aravit.","Sometimes I tell her in the mix."],
     [["אֲנִי מְנַסֶּה לְדַבֵּר אִיטַלְקִית נָקִי.","אני מנסה לדבר איטלקית נקי."],"ani menase ledaber italkit naki.","I try to speak clean Italian."],
     [["אַנְגֶ'לָה שׁוֹאֶלֶת מָתַי אָבוֹא.","אנג'לה שואלת מתי אבוא."],"Angela sho'elet matai avo.","Angela asks when I will come."],
     [["אֲנִי אוֹמֵר בְּחַג הַפֶּסַח אוּלַי.","אני אומר בחג הפסח אולי."],"ani omer be-chag ha-Pesach ulay.","I say maybe for Passover."],
     [["הִיא שְׂמֵחָה לִשְׁמֹעַ.","היא שמחה לשמוע."],"hi smecha lishmo'a.","She is happy to hear that."],
     [["אַנְגֶ'לָה מְסַפֶּרֶת עַל הַשְּׁכֵנִים.","אנג'לה מספרת על השכנים."],"Angela mesaperet al ha-shchenim.","Angela tells me about the neighbours."],
     [["אֲנִי שׁוֹמֵעַ בְּסַבְלָנוּת.","אני שומע בסבלנות."],"ani shomea be-savlanut.","I listen patiently."],
     [["לִפְעָמִים הִיא בּוֹכָה.","לפעמים היא בוכה."],"lif'amim hi bocha.","Sometimes she cries."],
     [["אֲנִי מַרְגִּישׁ גַּעְגּוּעִים גְּדוֹלִים.","אני מרגיש געגועים גדולים."],"ani margish ga'agu'im gdolim.","I feel great longing."],
     [["אֲבָל אֲנִי יוֹדֵעַ שֶׁהָאַהֲבָה לֹא תְּלוּיָה בְּמֶרְחָק.","אבל אני יודע שהאהבה לא תלויה במרחק."],"aval ani yodea she-ha-ahava lo tluyah be-merchak.","But I know that love does not depend on distance."],
     [["שִׂיחָה עִם אִמָּא הִיא הַמַּתָּנָה הַכִּי טוֹבָה.","שיחה עם אמא היא המתנה הכי טובה."],"sicha im ima hi ha-matana hachi tova.","A conversation with Mom is the best gift."],
  ],
  quiz:[{q:"When does Vincenzo call Angela?",opts:["Every Sunday","Every Monday","Every Friday"],a:1},{q:"What does Angela always ask?",opts:["If he studies","If he eats enough","If Kobi is well"],a:1}]},
 {id:"r1",t:["הַשָּׂפָה וְהַזֶּהוּת","השפה והזהות"],en:"Language and Identity",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["כָּל שָׂפָה שֶׁאֲנִי לוֹמֵד שׁוֹנָה מִשֶּׁלִּי.","כל שפה שאני לומד שונה משלי."],"kol safa she-ani lomed shona misheli.","Every language I learn is different from my own."],
     [["אִיטַלְקִית הִיא הַלֵּב שֶׁלִּי.","איטלקית היא הלב שלי."],"italkit hi ha-lev sheli.","Italian is my heart."],
     [["אַנְגְּלִית הִיא הַמוֹחַ שֶׁלִּי.","אנגלית היא המוח שלי."],"anglit hi ha-moach sheli.","English is my brain."],
     [["גֶּרְמָנִית הִיא הָרַגְלַיִם שֶׁלִּי בְּבֶּרְלִין.","גרמנית היא הרגליים שלי בברלין."],"germanit hi ha-raglayin sheli be-Berlin.","German is my legs in Berlin."],
     [["וְעִבְרִית? עִבְרִית הִיא הָרוּחַ הַחֲדָשָׁה שֶׁלִּי.","ועברית? עברית היא הרוח החדשה שלי."],"ve-ivrit? ivrit hi ha-ruach ha-chadasha sheli.","And Hebrew? Hebrew is my new spirit."],
     [["כָּל שָׂפָה פּוֹתַחַת עוֹלָם חָדָשׁ.","כל שפה פותחת עולם חדש."],"kol safa potachat olam chadash.","Every language opens a new world."],
     [["כְּשֶׁאֲנִי מְדַבֵּר עִבְרִית אֲנִי מַרְגִּישׁ אַחֵר.","כשאני מדבר עברית אני מרגיש אחר."],"kshe-ani medaber ivrit ani margish acher.","When I speak Hebrew I feel different."],
     [["אֲנִי חוֹשֵׁב בְּאַיִטַלְקִית אֲבָל חוֹלֵם בְּאַנְגְּלִית.","אני חושב באיטלקית אבל חולם באנגלית."],"ani choshev be-italkit aval cholem be-anglit.","I think in Italian but dream in English."],
     [["יוֹם אֶחָד אֲנִי רוֹצֶה לַחְלֹם בְּעִבְרִית.","יום אחד אני רוצה לחלום בעברית."],"yom echad ani rotze lachlom be-ivrit.","One day I want to dream in Hebrew."],
     [["לִלְמֹד שָׂפָה זֶה לִלְמֹד לִחְיוֹת אַחֶרֶת.","ללמוד שפה זה ללמוד לחיות אחרת."],"lilmod safa ze lilmod lichyot acheret.","To learn a language is to learn to live differently."],
     [["עִם עִבְרִית אֲנִי יָכוֹל לְגַעַת בְּחַיָּיו שֶׁל קוֹבִּי.","עם עברית אני יכול לגעת בחייו של קובי."],"im ivrit ani yachol liga'at be-chayav shel Kobi.","With Hebrew I can touch Kobi's world."],
     [["לִפְגֹּשׁ אֶת הַמִּשְׁפָּחָה שֶׁלּוֹ בְּשָׂפָה שֶׁלָּהֶם.","לפגוש את המשפחה שלו בשפה שלהם."],"lifgosh et ha-mishpacha shelo be-safa shelahem.","To meet his family in their language."],
     [["זֶה לֹא רַק מִלִּים.","זה לא רק מילים."],"ze lo rak milim.","It is not just words."],
     [["זֶה כָּבוֹד.","זה כבוד."],"ze kavod.","It is respect."],
     [["יֵשׁ אֲנָשִׁים שֶׁאוֹמְרִים שֶׁהַשָּׂפָה מְגַדֶּרֶת אֶת הַזֶּהוּת.","יש אנשים שאומרים שהשפה מגדרת את הזהות."],"yesh anashim she-omrim she-ha-safa megaderet et ha-zehut.","Some say that language defines identity."],
     [["אֲנִי מַסְכִּים עִם זֶה.","אני מסכים עם זה."],"ani maskim im ze.","I agree with that."],
     [["כָּל פַּעַם שֶׁאֲנִי לוֹמֵד מִלָּה חֲדָשָׁה בְּעִבְרִית.","כל פעם שאני לומד מילה חדשה בעברית."],"kol pa'am she-ani lomed mila chadasha be-ivrit.","Every time I learn a new word in Hebrew."],
     [["אֲנִי מַוְסִיף מִשְׁהוּ חָדָשׁ לַזֶּהוּת שֶׁלִּי.","אני מוסיף משהו חדש לזהות שלי."],"ani mosif mashehu chadash la-zehut sheli.","I add something new to my identity."],
     [["זֶה מְרַגֵּשׁ אוֹתִי כָּל פַּעַם.","זה מרגש אותי כל פעם."],"ze meragesh oti kol pa'am.","It moves me every time."],
     [["הָאֲדָם שֶׁאֲנִי הֹפֵךְ לְהִיוֹת כָּל יוֹם.","האדם שאני הופך להיות כל יום."],"ha-adam she-ani hofech lihyot kol yom.","The person I am becoming every day."],
     [["הוּא גָּדֵל עִם כָּל שָׂפָה חֲדָשָׁה.","הוא גדל עם כל שפה חדשה."],"hu gadel im kol safa chadasha.","Grows with every new language."],
  ],
  quiz:[{q:"What does Hebrew represent to Vincenzo?",opts:["His legs","His brain","His new spirit"],a:2},{q:"What does he want to do one day in Hebrew?",opts:["Write a book","Dream","Sing"],a:1}]},
 {id:"r2",t:["הַיְּמֵי הָרִאשׁוֹנִים בְּבֶּרְלִין","הימים הראשונים בברלין"],en:"The First Days in Berlin",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["כְּשֶׁהִגַּעְתִּי לְבֶּרְלִין בַּפַּעַם הָרִאשׁוֹנָה.","כשהגעתי לברלין בפעם הראשונה."],"kshe-higati le-Berlin ba-pa'am ha-rishona.","When I arrived in Berlin for the first time."],
     [["הָעִיר נִרְאֲתָה גְּדוֹלָה וְלֹא מוּכֶּרֶת.","העיר נראתה גדולה ולא מוכרת."],"ha-ir nir'eta gdola ve-lo muchheret.","The city looked big and unfamiliar."],
     [["לֹא הִכַּרְתִּי אֶת הָרְחוֹבוֹת.","לא הכרתי את הרחובות."],"lo hikarti et ha-rechovot.","I did not know the streets."],
     [["הָרַכֶּבֶת הַתַּחְתִּית בִּלְבְּלָה אוֹתִי.","הרכבת התחתית בלבלה אותי."],"ha-rakevet ha-tachtonit bilbela oti.","The underground confused me."],
     [["קוֹבִּי הָיָה אִתִּי.","קובי היה איתי."],"Kobi haya iti.","Kobi was with me."],
     [["הוּא הֶרְאָה לִי כָּל מָקוֹם.","הוא הראה לי כל מקום."],"hu her'a li kol makom.","He showed me every place."],
     [["הַיּוֹם הָרִאשׁוֹן הָלַכְנוּ לַשּׁוּק.","היום הראשון הלכנו לשוק."],"ha-yom ha-rishon halachnu la-shuk.","On the first day we went to the market."],
     [["קָנִינוּ אֹכֶל לְכָל הַשָּׁבוּעַ.","קנינו אוכל לכל השבוע."],"kaninu ochel le-chol ha-shavua.","We bought food for the whole week."],
     [["בָּעֶרֶב אָכַלְנוּ בַּבַּיִת.","בערב אכלנו בבית."],"ba-erev achalnu ba-bayit.","In the evening we ate at home."],
     [["בִּשַּׁלְתִּי פַּסְטָה לְקוֹבִּי.","בישלתי פסטה לקובי."],"bishalti pasta le-Kobi.","I cooked pasta for Kobi."],
     [["הוּא אָמַר שֶׁזֶּה הָיָה הָאַרוּחָה הֲכִי טוֹבָה בְּחַיָּיו.","הוא אמר שזה היה הארוחה הכי טובה בחייו."],"hu amar she-ze haya ha-arucha hachi tova be-chayav.","He said it was the best meal of his life."],
     [["אַחֲרֵי הָאֲרוּחָה הָלַכְנוּ לְטַיֵּל.","אחרי הארוחה הלכנו לטייל."],"acharei ha-arucha halachnu letayel.","After the meal we went for a walk."],
     [["הָעִיר הָיְתָה שֶׁקֶטָה בַּלַּיְלָה.","העיר הייתה שקטה בלילה."],"ha-ir hayta sheketa ba-layla.","The city was quiet at night."],
     [["הָרְחוֹבוֹת הָיוּ מְאִירִים בָּאוֹרוֹת.","הרחובות היו מאירים באורות."],"ha-rechovot hayu me'irim ba-orot.","The streets were lit by lights."],
     [["הִרְגַּשְׁתִּי שֶׁזֶּה הָרֶגַע הַחָדָשׁ בְּחַיַּי.","הרגשתי שזה הרגע החדש בחיי."],"hirgashti she-ze ha-rega ha-chadash be-chayai.","I felt this was the new moment in my life."],
     [["לֹא יָדַעְתִּי מָה יָבוֹא.","לא ידעתי מה יבוא."],"lo yadati ma yavo.","I did not know what would come."],
     [["אֲבָל הִרְגַּשְׁתִּי שֶׁהַכִּיוּון נָכוֹן.","אבל הרגשתי שהכיוון נכון."],"aval hirgashti she-ha-kivun nachon.","But I felt the direction was right."],
     [["קוֹבִּי הָיָה לְיָדִי, וְזֶה הָיָה מַסְפִּיק.","קובי היה לידי, וזה היה מספיק."],"Kobi haya le-yadi, ve-ze haya maspiik.","Kobi was beside me, and that was enough."],
     [["הַיָּמִים הָרִאשׁוֹנִים בְּבֶּרְלִין הָיוּ קָשִׁים.","הימים הראשונים בברלין היו קשים."],"ha-yamim ha-rishonim be-Berlin hayu kashim.","The first days in Berlin were hard."],
     [["אֲבָל הֵם הָיוּ גַּם הֲכִי מְעַנְיְנִים.","אבל הם היו גם הכי מעניינים."],"aval hem hayu gam hachi me'anyenim.","But they were also the most interesting."],
  ],
  quiz:[{q:"What did Vincenzo cook the first evening?",opts:["Fish","Shakshuka","Pasta"],a:2},{q:"How did he feel that first night?",opts:["Sad and afraid","Directionless","Like the direction was right"],a:2}]},
 {id:"b3",t:["אֶרֶץ יִשְׂרָאֵל · הָרִאשׁוֹן שֶׁלִּי","ארץ ישראל · הראשון שלי"],en:"The Land of Israel: My First Encounter",lvl:"B2",sublevel:"B2",type:"extended",
  s:[
     [["יִשְׂרָאֵל הִיא לֹא רַק מְדִינָה.","ישראל היא לא רק מדינה."],"Yisrael hi lo rak medina.","Israel is not only a country."],
     [["לְקוֹבִּי יִשְׂרָאֵל הִיא הַבַּיִת.","לקובי ישראל היא הבית."],"le-Kobi Yisrael hi ha-bayit.","For Kobi, Israel is home."],
     [["לִי הִיא הָיְתָה תְּעַלּוּמָה גְּדוֹלָה.","לי היא הייתה תעלומה גדולה."],"li hi hayta ta'alumah gdola.","For me it was a great mystery."],
     [["שָׁמַעְתִּי עָלֶיהָ הַרְבֵּה מִקוֹבִּי.","שמעתי עליה הרבה מקובי."],"shamati aleha harbe mi-Kobi.","I had heard much about it from Kobi."],
     [["אֲבָל לֹא יָדַעְתִּי מָה לְצַפּוֹת.","אבל לא ידעתי מה לצפות."],"aval lo yadati ma letzapot.","But I did not know what to expect."],
     [["כְּשֶׁהַמָּטוֹס נָחַת בְּנַתְבֶּ\"ג.","כשהמטוס נחת בנתב\"ג."],"kshe-ha-matos nachat be-Natbag.","When the plane landed at Ben Gurion."],
     [["חָשַׁבְתִּי: הִגַּעְתִּי לְמָקוֹם מִיֻּחָד.","חשבתי: הגעתי למקום מיוחד."],"chashavti: higati le-makom meyuchad.","I thought: I have arrived at a special place."],
     [["הָאֲוִיר הָיָה שׁוֹנֶה מִיָּד.","האוויר היה שונה מיד."],"ha-avir haya shone miyad.","The air was different immediately."],
     [["יוֹתֵר חַם וְיוֹתֵר חָזָק.","יותר חם ויותר חזק."],"yoter cham ve-yoter chazak.","Warmer and stronger."],
     [["הָאֲנָשִׁים בְּנַתְבֶּ\"ג הָיוּ מְהִירִים.","האנשים בנתב\"ג היו מהירים."],"ha-anashim be-Natbag hayu mehirim.","The people at the airport were fast."],
     [["הֵם לֹא עָמְדוּ בְּתוֹר בְּסַבְלָנוּת.","הם לא עמדו בתור בסבלנות."],"hem lo amdu be-tor be-savlanut.","They did not stand in the queue patiently."],
     [["צָחַקְתִּי עַל זֶה.","צחקתי על זה."],"tzachakti al ze.","I laughed at that."],
     [["קוֹבִּי אָמַר: זֶה אִיסְרָאֵלִי.","קובי אמר: זה ישראלי."],"Kobi amar: ze Yisreli.","Kobi said: this is Israeli."],
     [["בַּמְּכוֹנִית נָסַעְנוּ דְּרוֹמָה לְתֵל אָבִיב.","במכונית נסענו דרומה לתל אביב."],"ba-mechonit nasanu druma le-Tel Aviv.","In the car we drove south to Tel Aviv."],
     [["דֶּרֶךְ הַחַלּוֹן רָאִיתִי שָׂדוֹת.","דרך החלון ראיתי שדות."],"derech ha-chalon ra'iti sadot.","Through the window I saw fields."],
     [["וְעֵצֵי הַדַּרְדַּר.","ועצי הדרדר."],"ve-etzei ha-dardar.","And sabra (cactus) plants."],
     [["הַשֶּׁמֶשׁ הָיְתָה נִמְרֶצֶת.","השמש הייתה נמרצת."],"ha-shemesh hayta nimretzet.","The sun was intense."],
     [["הִגַּעְנוּ לְבֵית מִיקִי בָּעֶרֶב.","הגענו לבית מיקי בערב."],"higanu le-beit Miki ba-erev.","We arrived at Miki's house in the evening."],
     [["הָיָה אֹכֶל עַל הַשֻּׁלְחָן כְּבָר.","היה אוכל על השולחן כבר."],"haya ochel al ha-shulchan kvar.","There was already food on the table."],
     [["חוּמוּס, סָלָט וְפִיתָּה.","חומוס, סלט ופיתה."],"chumus, salat ve-pita.","Hummus, salad and pita."],
     [["אָכַלְנוּ וְדִבַּרְנוּ עַד שֶׁקָּמְנוּ.","אכלנו ודיברנו עד שקמנו."],"achalnu ve-dibarnu ad she-kamnu.","We ate and talked until we got up."],
     [["אוֹתוֹ לַיְלָה הֵבַנְתִּי מַשֶּׁהוּ.","אותו לילה הבנתי משהו."],"oto layla hevanti mashehu.","That night I understood something."],
     [["יִשְׂרָאֵל אֵינֶנָּה רַק הָאֶרֶץ שֶׁל קוֹבִּי.","ישראל איננה רק הארץ של קובי."],"Yisrael einena rak ha-aretz shel Kobi.","Israel is not only Kobi's land."],
     [["הִיא גַּם חֵלֶק מִן הַחַיִּים שֶׁלִּי עַכְשָׁו.","היא גם חלק מן החיים שלי עכשיו."],"hi gam chelek min ha-chayim sheli achshav.","It is also part of my life now."],
     [["וְכָל פַּעַם שֶׁאֲנִי חוֹזֵר אֲנִי מַרְגִּישׁ זֹאת יוֹתֵר.","וכל פעם שאני חוזר אני מרגיש זאת יותר."],"ve-chol pa'am she-ani chozer ani margish zot yoter.","And every time I return I feel that more."],
  ],
  quiz:[{q:"How did Vincenzo find the airport queues?",opts:["Organised","Impatient and fast","Slow and boring"],a:1},{q:"What food was already on the table at Miki's?",opts:["Pasta","Hummus salad and pita","Shakshuka and eggs"],a:1}]},
 {id:"e1",t:["הַנְּהָר בְּבֶּרְלִין","הנהר בברלין"],en:"The River in Berlin",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בְּבֶּרְלִין יֵשׁ נְהָרוֹת וּתְעָלוֹת.","בברלין יש נהרות ותעלות."],"be-Berlin yesh neharot u-te'alot.","In Berlin there are rivers and canals."],
     [["הַנָּהָר הָאָהוּב עָלַי הוּא הַשְּׁפְּרֵה.","הנהר האהוב עליי הוא השפרה."],"ha-nahar ha-ahuv alai hu ha-Shpree.","My favourite river is the Spree."],
     [["אֲנִי הוֹלֵךְ לְיָדוֹ כָּל בֹּקֶר.","אני הולך לידו כל בוקר."],"ani holech le-yado kol boker.","I walk beside it every morning."],
     [["הַמַּיִם שָׁקְטִים וְאֲפֹרִים.","המים שקטים ואפורים."],"ha-mayim shaktim ve-aforim.","The water is calm and grey."],
     [["יֵשׁ סְפִינוֹת קְטַנּוֹת.","יש ספינות קטנות."],"yesh sfinot ktanot.","There are small boats."],
     [["אֲנָשִׁים רוֹכְבִים עַל אוֹפַנַּיִם לְיַד הַנָּהָר.","אנשים רוכבים על אופניים ליד הנהר."],"anashim rochvim al ofanayim leyad ha-nahar.","People cycle beside the river."],
     [["בַּקַּיִץ כֻּלָּם שָׁם.","בקיץ כולם שם."],"ba-kayitz kulam sham.","In summer everyone is there."],
     [["אֲנָשִׁים שׁוֹתִים בִּירָה וְאוֹכְלִים.","אנשים שותים בירה ואוכלים."],"anashim shotim bira ve-ochlim.","People drink beer and eat."],
     [["מוּסִיקָה בָּאָה מִבָּר קָרוֹב.","מוסיקה באה מבר קרוב."],"musika ba'a mi-bar karov.","Music comes from a nearby bar."],
     [["קוֹבִּי וַאֲנִי יוֹשְׁבִים שָׁם בָּעֶרֶב.","קובי ואני יושבים שם בערב."],"Kobi va-ani yoshvim sham ba-erev.","Kobi and I sit there in the evening."],
     [["הַנָּהָר מְהַרְגִּיעַ אוֹתִי.","הנהר מרגיע אותי."],"ha-nahar mehargia oti.","The river calms me."],
     [["זֶה הַמָּקוֹם הַטּוֹב שֶׁבְּבֶּרְלִין.","זה המקום הטוב שבברלין."],"ze ha-makom ha-tov she-be-Berlin.","This is the best place in Berlin."]],
  quiz:[{q:"What is Vincenzo's favourite river?",opts:["The Rhine","The Spree","The Thames"],a:1},{q:"What does the river do to him?",opts:["Excites","Calms","Tires"],a:1}]},
 {id:"e2",t:["הַחֲתוּלָה שֶׁל הַשְּׁכֵנָה","החתולה של השכנה"],en:"The Neighbour's Cat",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּבִּנְיָן גָּרָה שְׁכֵנָה שֶׁשְּׁמָהּ אֶלְזֶה.","בבניין גרה שכנה ששמה אלזה."],"ba-binyan gara shchena she-shmah Elze.","In the building lives a neighbour named Elze."],
     [["לְאֶלְזֶה יֵשׁ חֲתוּלָה שְׁחֹרָה.","לאלזה יש חתולה שחורה."],"le-Elze yesh chatula shchora.","Elze has a black cat."],
     [["הַחֲתוּלָה קוֹרְאִים לָהּ לִילִית.","החתולה קוראים לה לילית."],"ha-chatula korim la Lilit.","The cat is called Lilit."],
     [["לִילִית בָּאָה אֵלַי בְּכָל בֹּקֶר.","לילית באה אליי בכל בוקר."],"Lilit ba'a elai be-chol boker.","Lilit comes to me every morning."],
     [["הִיא יוֹשֶׁבֶת לְיַד הַדֶּלֶת וּמְיַיֵּלֶלֶת.","היא יושבת ליד הדלת ומיילת."],"hi yoshevet leyad ha-delet u-meyalelet.","She sits by the door and meows."],
     [["אֲנִי פּוֹתֵחַ וְנוֹתֵן לָהּ חָלָב.","אני פותח ונותן לה חלב."],"ani poteach ve-noten la chalav.","I open and give her milk."],
     [["הִיא שׁוֹתָה וְחוֹזֶרֶת.","היא שותה וחוזרת."],"hi shota ve-chozeret.","She drinks and returns."],
     [["קוֹבִּי לֹא אוֹהֵב חֲתוּלִים.","קובי לא אוהב חתולים."],"Kobi lo ohev chatulim.","Kobi does not like cats."],
     [["אֲבָל לִילִית אוֹהֶבֶת אֶת קוֹבִּי.","אבל לילית אוהבת את קובי."],"aval Lilit ohevet et Kobi.","But Lilit loves Kobi."],
     [["הִיא תָּמִיד קוֹפֶצֶת עָלָיו.","היא תמיד קופצת עליו."],"hi tamid kopetzet alav.","She always jumps on him."],
     [["קוֹבִּי מִתְרַגֵּז קְצָת.","קובי מתרגז קצת."],"Kobi mitragez ktzat.","Kobi gets a little annoyed."],
     [["אֲנִי צוֹחֵק, זֶה מַצְחִיק.","אני צוחק, זה מצחיק."],"ani tzochek, ze matzhik.","I laugh, it is funny."]],
  quiz:[{q:"What is the neighbour's cat called?",opts:["Shira","Lilit","Noa"],a:1},{q:"How does Kobi feel about cats?",opts:["Loves them","Does not like them","Is afraid"],a:1}]},
 {id:"e3",t:["בֵּית הַסֵּפֶר לִבְרִיאוּת","בית הספר לבריאות"],en:"The Health Studio",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["לְיַד הַבַּיִת יֵשׁ חֲדַר כּוֹשֶׁר.","ליד הבית יש חדר כושר."],"leyad ha-bayit yesh chadar kosher.","Near home there is a gym."],
     [["הוּא קָטָן אֲבָל טוֹב.","הוא קטן אבל טוב."],"hu katan aval tov.","It is small but good."],
     [["אֲנִי הוֹלֵךְ לְשָׁם שָׁלוֹשׁ פְּעָמִים בְּשָׁבוּעַ.","אני הולך לשם שלוש פעמים בשבוע."],"ani holech le-sham shalosh pe'amim be-shavua.","I go there three times a week."],
     [["אֲנִי רָץ עַל הַמִּסְלוּל.","אני רץ על המסלול."],"ani ratz al ha-maslul.","I run on the treadmill."],
     [["אַחַר כָּךְ אֲנִי עוֹשֶׂה כֹּחַ.","אחר כך אני עושה כוח."],"achar kach ani ose koach.","Then I do strength training."],
     [["יֵשׁ שָׁם אֲנָשִׁים נֶחְמָדִים.","יש שם אנשים נחמדים."],"yesh sham anashim nechmadim.","There are nice people there."],
     [["שָׂוֹחַ שְׂמִי הַמְאַמֵּן.","שמי המאמן שמו רוני."],"shmo ha-me'amen Roni.","The trainer's name is Roni."],
     [["הוּא מְלַמֵּד אוֹתִי תַּרְגִּילִים חֲדָשִׁים.","הוא מלמד אותי תרגילים חדשים."],"hu melamed oti targiyim chadashim.","He teaches me new exercises."],
     [["לִפְעָמִים זֶה כּוֹאֵב.","לפעמים זה כואב."],"lif'amim ze ko'ev.","Sometimes it hurts."],
     [["אֲבָל אֲנִי מַרְגִּישׁ טוֹב אַחַר כָּךְ.","אבל אני מרגיש טוב אחר כך."],"aval ani margish tov achar kach.","But I feel good afterwards."],
     [["הַגּוּף שֶׁלִּי חָזָק יוֹתֵר עַכְשָׁו.","הגוף שלי חזק יותר עכשיו."],"ha-guf sheli chazak yoter achshav.","My body is stronger now."],
     [["הַבְּרִיאוּת הִיא חֲשׁוּבָה לִי.","הבריאות היא חשובה לי."],"ha-briyut hi chashuva li.","Health is important to me."]],
  quiz:[{q:"How often does Vincenzo go to the gym?",opts:["Once","Three times","Five times"],a:1},{q:"What is the trainer's name?",opts:["Roni","Miki","Kobi"],a:0}]},
 {id:"e4",t:["הַכְּלִי הַמּוּזִיקָלִי","הכלי המוזיקלי"],en:"The Musical Instrument",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בְּסִיצִילְיָה נִגַּנְתִּי בְּגִיטָרָה.","בסיציליה ניגנתי בגיטרה."],"be-Sitzilya niganti be-gitara.","In Sicily I played guitar."],
     [["לְקַחְתִּי אֶת הַגִּיטָרָה לְבֶּרְלִין.","לקחתי את הגיטרה לברלין."],"lakachti et ha-gitara le-Berlin.","I took the guitar to Berlin."],
     [["הִיא עוֹמֶדֶת בְּפִינָּה.","היא עומדת בפינה."],"hi omedet be-pina.","It stands in the corner."],
     [["לִפְעָמִים אֲנִי מְנַגֵּן בָּעֶרֶב.","לפעמים אני מנגן בערב."],"lif'amim ani menagen ba-erev.","Sometimes I play in the evening."],
     [["קוֹבִּי אוֹהֵב לִשְׁמֹעַ.","קובי אוהב לשמוע."],"Kobi ohev lishmo'a.","Kobi loves to listen."],
     [["אֲנִי מְנַגֵּן שִׁירִים אִיטַלְקִיִּים.","אני מנגן שירים איטלקיים."],"ani menagen shirim italkim.","I play Italian songs."],
     [["לִפְעָמִים אֲנִי מְנַסֶּה שִׁירִים עִבְרִיִּים.","לפעמים אני מנסה שירים עבריים."],"lif'amim ani menase shirim ivriim.","Sometimes I try Hebrew songs."],
     [["זֶה קָשֶׁה אֲבָל כֵּיף.","זה קשה אבל כיף."],"ze kashe aval keyf.","It is hard but fun."],
     [["קוֹבִּי יוֹדֵעַ לְנַגֵּן קְצָת.","קובי יודע לנגן קצת."],"Kobi yodea lenagen ktzat.","Kobi knows how to play a little."],
     [["פַּעַם נִגַּנּוּ יַחַד.","פעם ניגנו יחד."],"pa'am niganu yachad.","Once we played together."],
     [["זֶה הָיָה מְשׁוּנֶה וְיָפֶה.","זה היה משונה ויפה."],"ze haya meshune ve-yafe.","It was strange and beautiful."],
     [["מוּסִיקָה הִיא שָׂפָה בֵּינֵינוּ.","מוסיקה היא שפה בינינו."],"musika hi safa beineinu.","Music is a language between us."]],
  quiz:[{q:"Where did Vincenzo play guitar before?",opts:["Berlin","Tel Aviv","Sicily"],a:2},{q:"What does Kobi love?",opts:["To play","To listen","To sing"],a:1}]},
 {id:"e5",t:["הַזְּמַן הַחָפְשִׁי","הזמן החופשי"],en:"Free Time",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בְּסוֹף הַשָּׁבוּעַ יֵשׁ לִי זְמַן חָפְשִׁי.","בסוף השבוע יש לי זמן חופשי."],"be-sof ha-shavua yesh li zman chofshi.","At the weekend I have free time."],
     [["אֲנִי אוֹהֵב לְהִסְתַּכֵּל בַּטֶּלֶוִיזְיָה.","אני אוהב להסתכל בטלוויזיה."],"ani ohev lehistakel ba-televizya.","I love to watch television."],
     [["קוֹבִּי אוֹהֵב לִקְרֹא סְפָרִים.","קובי אוהב לקרוא ספרים."],"Kobi ohev likro sfarim.","Kobi loves to read books."],
     [["אֲנַחְנוּ עוֹשִׂים כָּל אֶחָד מַה שֶּׁהוּא אוֹהֵב.","אנחנו עושים כל אחד מה שהוא אוהב."],"anachnu osim kol echad ma she-hu ohev.","We each do what we love."],
     [["לִפְעָמִים הוֹלְכִים לַקּוֹלְנוֹעַ.","לפעמים הולכים לקולנוע."],"lif'amim holchim la-kolnoa.","Sometimes we go to the cinema."],
     [["אֲנִי אוֹהֵב סְרָטִים עִבְרִיִּים.","אני אוהב סרטים עבריים."],"ani ohev sratim ivriim.","I love Israeli films."],
     [["אֲנִי לוֹמֵד מִלִּים חֲדָשׁוֹת מֵהַסֶּרֶט.","אני לומד מילים חדשות מהסרט."],"ani lomed milim chadashot me-ha-seret.","I learn new words from the film."],
     [["לִפְעָמִים אֲנִי מְבַשֵּׁל מַשֶּׁהוּ חָדָשׁ.","לפעמים אני מבשל משהו חדש."],"lif'amim ani mevashel mashehu chadash.","Sometimes I cook something new."],
     [["קוֹבִּי תָּמִיד נֶהֱנֶה.","קובי תמיד נהנה."],"Kobi tamid nehene.","Kobi always enjoys it."],
     [["לִפְעָמִים הוֹלְכִים לְבֵית קָפֶה עִם חֲבֵרִים.","לפעמים הולכים לבית קפה עם חברים."],"lif'amim holchim le-beit kafe im chaverim.","Sometimes we go to a café with friends."],
     [["הַזְּמַן הַחָפְשִׁי הוּא חָשׁוּב לִי.","הזמן החופשי הוא חשוב לי."],"ha-zman ha-chofshi hu chashuv li.","Free time is important to me."],
     [["זֶה הַמִּטָּעֵן לְשָׁבוּעַ חָדָשׁ.","זה המטען לשבוע חדש."],"ze ha-mita'en le-shavua chadash.","It is the fuel for a new week."]],
  quiz:[{q:"What does Vincenzo love to watch?",opts:["Sports","Television","The sea"],a:1},{q:"Where sometimes do they go with friends?",opts:["The market","The gym","A café"],a:2}]},
 {id:"f1",t:["הַחֶבְרָה שֶׁל קוֹבִּי","החברה של קובי"],en:"Kobi's Friends",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["לְקוֹבִּי יֵשׁ חֲבֵרִים רַבִּים בְּבֶּרְלִין.","לקובי יש חברים רבים בברלין."],"le-Kobi yesh chaverim rabim be-Berlin.","Kobi has many friends in Berlin."],
     [["חֶלְקָם יִשְׂרְאֵלִים שֶׁגָּרִים בָּעִיר.","חלקם ישראלים שגרים בעיר."],"chelkam yisre'elim she-garim ba-ir.","Some of them are Israelis who live in the city."],
     [["חֶלְקָם גֶּרְמָנִים וְיוֹרוֹפֵּאִים.","חלקם גרמנים ויורופאים."],"chelkam germanim ve-europeyim.","Some are Germans and Europeans."],
     [["פַּעַם בְּשָׁבוּעַ כֻּלָּם נִפְגָּשִׁים.","פעם בשבוע כולם נפגשים."],"pa'am be-shavua kulam nifgashim.","Once a week they all meet."],
     [["לִפְעָמִים אֶצְלֵנוּ, לִפְעָמִים בְּבַּר.","לפעמים אצלנו, לפעמים בבר."],"lif'amim etzlenu, lif'amim be-bar.","Sometimes at ours, sometimes at a bar."],
     [["בַּהַתְחָלָה פָּחַדְתִּי.","בהתחלה פחדתי."],"ba-hatchala pachadti.","At first I was nervous."],
     [["לֹא יָדַעְתִּי אֶת הַחֲבֵרִים שֶׁלּוֹ.","לא ידעתי את החברים שלו."],"lo yadati et ha-chaverim shelo.","I did not know his friends."],
     [["אֲבָל הֵם קִבְּלוּ אוֹתִי בְּחֹם.","אבל הם קיבלו אותי בחום."],"aval hem kiblu oti be-chom.","But they welcomed me warmly."],
     [["הֵם שָׁאֲלוּ אוֹתִי עַל סִיצִילְיָה.","הם שאלו אותי על סיציליה."],"hem sha'alu oti al Sitzilya.","They asked me about Sicily."],
     [["עַל הָאֹכֶל, עַל הַתַּרְבּוּת.","על האוכל, על התרבות."],"al ha-ochel, al ha-tarbut.","About the food, about the culture."],
     [["דִּבַּרְתִּי אֲנִי אַנְגְּלִית בְּהַתְחָלָה.","דיברתי אני אנגלית בהתחלה."],"dibarti ani anglit ba-hatchala.","I spoke English at first."],
     [["לְאַט לְאַט הִכְנַסְתִּי מִלִּים בְּעִבְרִית.","לאט לאט הכנסתי מילים בעברית."],"le'at le'at hichnasti milim be-ivrit.","Slowly I inserted words in Hebrew."],
     [["הֵם עוֹדְדוּ אוֹתִי.","הם עודדו אותי."],"hem odadu oti.","They encouraged me."],
     [["עַכְשָׁו אֲנִי מַרְגִּישׁ חֵלֶק מֵהַחֶבְרָה.","עכשיו אני מרגיש חלק מהחברה."],"achshav ani margish chelek me-ha-chevra.","Now I feel part of the group."],
     [["זֶה לָקַח זְמַן, אֲבָל זֶה קָרָה.","זה לקח זמן, אבל זה קרה."],"ze lakach zman, aval ze kara.","It took time, but it happened."]],
  quiz:[{q:"Who are some of Kobi's friends?",opts:["Only Israelis","Israelis Germans and Europeans","Only Germans"],a:1},{q:"How did Vincenzo feel at first?",opts:["Confident","Nervous","Bored"],a:1}]},
 {id:"f2",t:["טִיּוּל בִּירוּשָׁלַיִם","טיול בירושלים"],en:"A Trip to Jerusalem",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["פַּעַם נָסַעְנוּ לִירוּשָׁלַיִם.","פעם נסענו לירושלים."],"pa'am nasanu le-Yerushalayim.","Once we travelled to Jerusalem."],
     [["הָאוֹטוֹבּוּס נָסַע שָׁעָה אַחַת.","האוטובוס נסע שעה אחת."],"ha-otobus nasa sha'a achat.","The bus drove for one hour."],
     [["יְרוּשָׁלַיִם שׁוֹנָה מְאוֹד מִתֵּל אָבִיב.","ירושלים שונה מאוד מתל אביב."],"Yerushalayim shona me'od mi-Tel Aviv.","Jerusalem is very different from Tel Aviv."],
     [["הָאֲבָנִים לְבָנוֹת וְיְשָׁנוֹת.","האבנים לבנות וישנות."],"ha-avanim levanot ve-yeshanot.","The stones are white and old."],
     [["הָלַכְנוּ לָעִיר הָעַתִּיקָה.","הלכנו לעיר העתיקה."],"halachnu la-ir ha-atika.","We walked to the Old City."],
     [["רָאִיתִי אֶת הַכֹּתֶל הַמַּעֲרָבִי.","ראיתי את הכותל המערבי."],"ra'iti et ha-kotel ha-ma'aravi.","I saw the Western Wall."],
     [["הִרְגַּשְׁתִּי אֵיזוֹ רְגִישׁוּת.","הרגשתי איזו רגישות."],"hirgashti eizo regishot.","I felt a certain sensitivity."],
     [["אֲנָשִׁים מִתְפַּלְּלִים שָׁם.","אנשים מתפללים שם."],"anashim mitpallim sham.","People pray there."],
     [["הַמָּקוֹם שָׁקֵט וְכָבֵד.","המקום שקט וכבד."],"ha-makom shaket ve-kaved.","The place is quiet and heavy."],
     [["הָלַכְנוּ גַּם לַשּׁוּק.","הלכנו גם לשוק."],"halachnu gam la-shuk.","We also went to the market."],
     [["יֵשׁ שָׁם בְּשָׂמִים וְתַּבְלִינִים.","יש שם בשמים ותבלינים."],"yesh sham besamim ve-tavlinim.","There are spices and perfumes there."],
     [["הָרֵיחוֹת הָיוּ חֲזָקִים.","הריחות היו חזקים."],"ha-reichot hayu chazakim.","The smells were strong."],
     [["קָנִינוּ זַעֲפְּרָן וְמֶנְתָּה.","קנינו זעפרן ומנתה."],"kaninu za'afran ve-menta.","We bought saffron and mint."],
     [["חָזַרְנוּ לְתֵל אָבִיב עֲיֵפִים.","חזרנו לתל אביב עייפים."],"chazarnu le-Tel Aviv ayefim.","We returned to Tel Aviv tired."],
     [["יְרוּשָׁלַיִם הִיא עִיר שֶׁלֹּא שׁוֹכְחִים.","ירושלים היא עיר שלא שוכחים."],"Yerushalayim hi ir she-lo shochechim.","Jerusalem is a city you don't forget."]],
  quiz:[{q:"How long was the bus journey?",opts:["Half an hour","One hour","Two hours"],a:1},{q:"What did they buy at the market?",opts:["Food","Saffron and mint","Clothes"],a:1}]},
 {id:"f3",t:["לְמַד לְבַשֵּׁל","לימד לבשל"],en:"Learning to Cook",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בְּסִיצִילְיָה אִמָּא לִמְּדָה אוֹתִי לְבַשֵּׁל.","בסיציליה אמא לימדה אותי לבשל."],"be-Sitzilya ima limda oti levashel.","In Sicily Mom taught me to cook."],
     [["הִיא בִּישְּׁלָה פַּסְטָה וְסָלָטִים.","היא בישלה פסטה וסלטים."],"hi bishla pasta ve-salatim.","She cooked pasta and salads."],
     [["לָמַדְתִּי לְהַכִּין רֹטֶב עַגְבָנִיּוֹת.","למדתי להכין רוטב עגבניות."],"lamadti le-hachin rotev agvaniot.","I learned to make tomato sauce."],
     [["זֶה לֹא קָשֶׁה, אֲבָל צָרִיךְ סַבְלָנוּת.","זה לא קשה, אבל צריך סבלנות."],"ze lo kashe, aval tzarich savlanut.","It is not hard, but you need patience."],
     [["בְּבֶּרְלִין הִתְחַלְתִּי לְלַמֵּד אֶת קוֹבִּי.","בברלין התחלתי ללמד את קובי."],"be-Berlin hitchalti lelaem et Kobi.","In Berlin I started to teach Kobi."],
     [["הוּא לֹא יָדַע לְבַשֵּׁל הַרְבֵּה.","הוא לא ידע לבשל הרבה."],"hu lo yada levashel harbe.","He did not know how to cook much."],
     [["לִמַּדְתִּי אוֹתוֹ לְהַכִּין פַּסְטָה.","לימדתי אותו להכין פסטה."],"limadti oto le-hachin pasta.","I taught him to make pasta."],
     [["הוּא עָשָׂה טָעֻיּוֹת בַּהַתְחָלָה.","הוא עשה טעויות בהתחלה."],"hu asa ta'uyot ba-hatchala.","He made mistakes at first."],
     [["שָׂמְתִּי יוֹתֵר מִדַּי מֶלַח.","שמתי יותר מדי מלח."],"samti yoter miday melach.","He added too much salt."],
     [["צָחַקְנוּ וְתִקַּנּוּ.","צחקנו ותיקנו."],"tzachaknu ve-tikanu.","We laughed and corrected."],
     [["עַכְשָׁו קוֹבִּי מְבַשֵּׁל טוֹב מְאוֹד.","עכשיו קובי מבשל טוב מאוד."],"achshav Kobi mevashel tov me'od.","Now Kobi cooks very well."],
     [["לִפְעָמִים הוּא מַפְתִּיעַ אוֹתִי.","לפעמים הוא מפתיע אותי."],"lif'amim hu maftia oti.","Sometimes he surprises me."],
     [["הַמִּטְבָּח שֶׁלָּנוּ הוּא מָקוֹם שֶׁל שִׂמְחָה.","המטבח שלנו הוא מקום של שמחה."],"ha-mitbach shelanu hu makom shel simcha.","Our kitchen is a place of joy."],
     [["בִּישּׁוּל הוּא אַהֲבָה.","בישול הוא אהבה."],"bishul hu ahava.","Cooking is love."],
     [["כָּל אֲרוּחָה מְסַפֶּרֶת מַשֶּׁהוּ.","כל ארוחה מספרת משהו."],"kol arucha mesaperet mashehu.","Every meal tells something."]],
  quiz:[{q:"Who taught Vincenzo to cook?",opts:["His father","His mother","His sister"],a:1},{q:"What mistake did Kobi make?",opts:["Too much pepper","Too much salt","Too little oil"],a:1}]},
 {id:"f4",t:["בֵּית הַכְּנֶסֶת הַגָּדוֹל","בית הכנסת הגדול"],en:"The Great Synagogue",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["יוֹם אֶחָד קוֹבִּי הֶרְאָה לִי בֵּית כְּנֶסֶת בְּבֶּרְלִין.","יום אחד קובי הראה לי בית כנסת בברלין."],"yom echad Kobi her'a li beit kneset be-Berlin.","One day Kobi showed me a synagogue in Berlin."],
     [["הוּא גָּדוֹל וְעַתִּיק.","הוא גדול ועתיק."],"hu gadol ve-atik.","It is big and old."],
     [["בִּלְּנוּ שָׁם כְּשָׁעָה.","בלינו שם כשעה."],"bilinu sham ke-sha'a.","We spent about an hour there."],
     [["קוֹבִּי הִסְבִּיר לִי עַל הַהִיסְטוֹרְיָה.","קובי הסביר לי על ההיסטוריה."],"Kobi hisbir li al ha-historia.","Kobi explained the history to me."],
     [["יְהוּדִים חָיוּ בְּבֶּרְלִין הַרְבֵּה שָׁנִים.","יהודים חיו בברלין הרבה שנים."],"yehudim chayu be-Berlin harbe shanim.","Jews lived in Berlin for many years."],
     [["הַמִּלְחָמָה שִׁנְּתָה אֶת הַכֹּל.","המלחמה שינתה את הכל."],"ha-milchama shineta et ha-kol.","The war changed everything."],
     [["אַחֲרֵי הַמִּלְחָמָה עָלוּ לְיִשְׂרָאֵל.","אחרי המלחמה עלו לישראל."],"acharei ha-milchama alu le-Yisrael.","After the war they went up to Israel."],
     [["הָיְתָה שְׁתִיקָה גְּדוֹלָה שָׁם.","הייתה שתיקה גדולה שם."],"hayta shtika gdola sham.","There was a great silence there."],
     [["הִרְגַּשְׁתִּי כֹּבֶד הַהִיסְטוֹרְיָה.","הרגשתי כובד ההיסטוריה."],"hirgashti koved ha-historia.","I felt the weight of history."],
     [["קוֹבִּי הָיָה שָׁקֵט גַּם כֵּן.","קובי היה שקט גם כן."],"Kobi haya shaket gam ken.","Kobi was also quiet."],
     [["יָצָאנוּ בְּלִי לְדַבֵּר.","יצאנו בלי לדבר."],"yatzanu bli ledaber.","We left without speaking."],
     [["בַּחוּץ שָׁתִינוּ קָפֶה.","בחוץ שתינו קפה."],"ba-chutz shatinu kafe.","Outside we drank coffee."],
     [["קוֹבִּי אָמַר: עַכְשָׁו אַתָּה מֵבִין קְצָת יוֹתֵר.","קובי אמר: עכשיו אתה מבין קצת יותר."],"Kobi amar: achshav ata mevin ktzat yoter.","Kobi said: now you understand a little more."],
     [["כֵּן, הֵבַנְתִּי.","כן, הבנתי."],"ken, hevanti.","Yes, I understood."],
     [["הַהִיסְטוֹרְיָה מַסְבִּירָה הַרְבֵּה.","ההיסטוריה מסבירה הרבה."],"ha-historia masbira harbe.","History explains a lot."]],
  quiz:[{q:"How long did they spend in the synagogue?",opts:["Half an hour","About an hour","Two hours"],a:1},{q:"What happened after they left?",opts:["They had dinner","They drank coffee","They went home"],a:1}]},
 {id:"f5",t:["הַחַגִּיגָה עַל הַגַּג","החגיגה על הגג"],en:"The Rooftop Party",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בְּיוֹם הוּלֶדֶת שֶׁלִּי עָשִׂינוּ מְסִיבָּה.","ביום הולדת שלי עשינו מסיבה."],"be-yom huledet sheli asinu mesiba.","On my birthday we had a party."],
     [["הִזְמַנּוּ עֶשְׂרִים חֲבֵרִים.","הזמנו עשרים חברים."],"hizmanu esrim chaverim.","We invited twenty friends."],
     [["הַמְּסִיבָּה הָיְתָה עַל הַגַּג שֶׁלָּנוּ.","המסיבה הייתה על הגג שלנו."],"ha-mesiba hayta al ha-gag shelanu.","The party was on our rooftop."],
     [["קוֹבִּי עָשָׂה מוּסִיקָה.","קובי עשה מוסיקה."],"Kobi asa musika.","Kobi played music."],
     [["אֲנִי הֵכַנְתִּי אֹכֶל.","אני הכנתי אוכל."],"ani hechanti ochel.","I prepared food."],
     [["בִּשַּׁלְתִּי פַּסְטָה לְכָל הָאֲנָשִׁים.","בישלתי פסטה לכל האנשים."],"bishalti pasta le-chol ha-anashim.","I cooked pasta for all the people."],
     [["הָיָה גַּם שַׁקְשׁוּקָה.","היה גם שקשוקה."],"haya gam shakshuka.","There was also shakshuka."],
     [["כֻּלָּם אָכְלוּ וְשָׂמְחוּ.","כולם אכלו ושמחו."],"kulam achlu ve-samchu.","Everyone ate and was happy."],
     [["תּוֹמָאס הֵבִיא שְׁתֵּי בַּקְבֻּקֵי יַיִן.","תומאס הביא שתי בקבוקי יין."],"Thomas hevi shtei bakbukei yayin.","Thomas brought two bottles of wine."],
     [["מִיקִי הִתְקַשֵּׁר וּבֵּרֵךְ.","מיקי התקשר וברך."],"Miki hitkasher u-verech.","Miki called and blessed me."],
     [["הַשָּׁמַיִם הָיוּ נְקִיִּים.","השמיים היו נקיים."],"ha-shamayim hayu nkiyim.","The sky was clear."],
     [["רָקַדְנוּ עַד מְאֻחָר בַּלַּיְלָה.","רקדנו עד מאוחר בלילה."],"rakadnu ad me'uchar ba-layla.","We danced until late at night."],
     [["זֶה הָיָה יוֹם הוּלֶדֶת מוֹשְׁלָם.","זה היה יום הולדת מושלם."],"ze haya yom huledet mushlam.","It was a perfect birthday."],
     [["תּוֹדָה לְקוֹבִּי עַל הַכֹּל.","תודה לקובי על הכל."],"toda le-Kobi al ha-kol.","Thank you to Kobi for everything."],
     [["הוּא עוֹשֶׂה כָּל יוֹם מְיֻחָד.","הוא עושה כל יום מיוחד."],"hu ose kol yom meyuchad.","He makes every day special."]],
  quiz:[{q:"How many friends were invited?",opts:["Ten","Fifteen","Twenty"],a:2},{q:"What did Thomas bring?",opts:["A cake","Two bottles of wine","Flowers"],a:1}]},
 {id:"g1",t:["הַחֻקִּים שֶׁל בֶּרְלִין","החוקים של ברלין"],en:"The Rules of Berlin",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["כְּשֶׁעָבַרְתִּי לְבֶּרְלִין הָיוּ דְּבָרִים מוּזָרִים.","כשעברתי לברלין היו דברים מוזרים."],"kshe-avarti le-Berlin hayu dvarim muzarim.","When I moved to Berlin there were strange things."],
     [["בְּסִיצִילְיָה לֹא עוֹצְרִים בְּאָדֹם כְּשֶׁאֵין מְכוֹנִיּוֹת.","בסיציליה לא עוצרים באדום כשאין מכוניות."],"be-Sitzilya lo otzrim be-adom kshe-ein mechoniyot.","In Sicily you don't stop at red when there are no cars."],
     [["בְּבֶּרְלִין עוֹצְרִים תָּמִיד.","בברלין עוצרים תמיד."],"be-Berlin otzrim tamid.","In Berlin you always stop."],
     [["פַּעַם לֹא עָצַרְתִּי.","פעם לא עצרתי."],"pa'am lo atzarti.","Once I didn't stop."],
     [["שָׁכֵן הִסְתַּכֵּל עָלַי בְּזַעַם.","שכן הסתכל עליי בזעם."],"shachen histakel alai be-za'am.","A neighbour stared at me angrily."],
     [["לָמַדְתִּי אֶת הַחֹק מַהֵר.","למדתי את החוק מהר."],"lamadti et ha-chok maher.","I learned the rule quickly."],
     [["בְּגֶּרְמַנְיָה הַחֻקִּים חֲשׁוּבִים מְאוֹד.","בגרמניה החוקים חשובים מאוד."],"be-Germania ha-chukim chashuvim me'od.","In Germany the rules are very important."],
     [["פַּעַם שָׁכַחְתִּי לִהְיוֹת שָׁקֵט בַּמּוֹשַׁב הַנוֹסְעִים.","פעם שכחתי להיות שקט במושב הנוסעים."],"pa'am shachachti lihyot shaket ba-moshav ha-nos'im.","Once I forgot to be quiet in the passenger seat."],
     [["הָיִיתִי בְּטֶלֶפוֹן בְּקוֹל רָם.","הייתי בטלפון בקול רם."],"hayiti be-telefon be-kol ram.","I was on the phone loudly."],
     [["אֲנָשִׁים הִסְתַּכְּלוּ.","אנשים הסתכלו."],"anashim histaklu.","People looked."],
     [["בִּסְיצִילְיָה זֶה נוֹרְמָלִי.","בסיציליה זה נורמלי."],"be-Sitzilya ze normal.","In Sicily this is normal."],
     [["פֹּה פָּחוֹת.","פה פחות."],"po pachot.","Here, less so."],
     [["לָמַדְתִּי לְהִתְאִים עַצְמִי.","למדתי להתאים עצמי."],"lamadti lehit'im atzmi.","I learned to adapt myself."],
     [["לֹא לִשְׁנוֹת אֶת עַצְמִי לְגַמְרֵי.","לא לשנות את עצמי לגמרי."],"lo leshanot et atzmi legamrei.","Not to change myself completely."],
     [["אֲבָל לִכְבֵּד אֶת הַתַּרְבּוּת שֶׁל הַמָּקוֹם.","אבל לכבד את התרבות של המקום."],"aval lechaved et ha-tarbut shel ha-makom.","But to respect the culture of the place."],
     [["זֶה הַאֲיזּוּן הָנָכוֹן.","זה האיזון הנכון."],"ze ha-izun ha-nachon.","This is the right balance."],
     [["הָיוֹת זָר מְלַמֵּד אֶת זֶה.","היות זר מלמד את זה."],"hayot zar melaem et ze.","Being a foreigner teaches you that."]],
  quiz:[{q:"What traffic rule was different in Sicily?",opts:["Parking rules","Not stopping at red when no cars","Speed limits"],a:1},{q:"What did Vincenzo learn to do?",opts:["Ignore rules","Adapt without changing himself","Leave Berlin"],a:1}]},
 {id:"g2",t:["הַשֻּׁלְחָן שֶׁל שְׁנֵי תַּרְבֻּיּוֹת","השולחן של שתי תרבויות"],en:"The Table of Two Cultures",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["בְּבַיִת שֶׁלָּנוּ יֵשׁ שֻׁלְחָן גָּדוֹל.","בבית שלנו יש שולחן גדול."],"be-bayit shelanu yesh shulchan gadol.","In our home there is a big table."],
     [["עַל הַשֻּׁלְחָן הַזֶּה כָּל הַחַיִּים שֶׁלָּנוּ.","על השולחן הזה כל החיים שלנו."],"al ha-shulchan ha-ze kol ha-chayim shelanu.","On this table all our life."],
     [["בְּשַׁבָּת יֵשׁ חַלָּה וְיַיִן.","בשבת יש חלה ויין."],"be-Shabbat yesh chala ve-yayin.","On Shabbat there is challah and wine."],
     [["בְּיוֹם שִׁשִּׁי לִפְעָמִים יֵשׁ פַּסְטָה.","ביום שישי לפעמים יש פסטה."],"be-yom shishi lif'amim yesh pasta.","On Friday sometimes there is pasta."],
     [["לִפְעָמִים חוּמוּס וּפִיתָּה.","לפעמים חומוס ופיתה."],"lif'amim chumus ve-pita.","Sometimes hummus and pita."],
     [["לִפְעָמִים פַּסְטָה עִם רֹטֶב מָרוֹקָאִי.","לפעמים פסטה עם רוטב מרוקאי."],"lif'amim pasta im rotev moroka'i.","Sometimes pasta with Moroccan sauce."],
     [["הַשֻּׁלְחָן שֶׁלָּנוּ הוּא עַרְבּוּב.","השולחן שלנו הוא ערבוב."],"ha-shulchan shelanu hu irbub.","Our table is a mix."],
     [["כְּמוֹ הַחַיִּים שֶׁלָּנוּ.","כמו החיים שלנו."],"kmo ha-chayim shelanu.","Like our life."],
     [["כְּשֶׁמִּיקִי בָּא אֲנַחְנוּ עוֹשִׂים כֵּבָד.","כשמיקי בא אנחנו עושים כבד."],"kshe-Miki ba anachnu osim kaved.","When Miki comes we make it heavy (a big feast)."],
     [["כֵּבָד בְּעִבְרִית אוֹמֵר הַרְבֵּה אֹכֶל.","כבד בעברית אומר הרבה אוכל."],"kaved be-ivrit omer harbe ochel.","Heavy in Hebrew means a lot of food."],
     [["כְּשֶׁהוֹרַי בָּאִים אֲנַחְנוּ עוֹשִׂים פַּסְטָה בְּסִיצִילְיָאנִי.","כשהורי באים אנחנו עושים פסטה בסיציליאני."],"kshe-horai ba'im anachnu osim pasta be-sitziliani.","When my parents come we make Sicilian pasta."],
     [["קוֹבִּי לוֹמֵד לֶאֱכֹל כְּאִיטַלְקִי.","קובי לומד לאכול כאיטלקי."],"Kobi lomed le'echol ke-italki.","Kobi learns to eat like an Italian."],
     [["אֲנִי לוֹמֵד לֶאֱכֹל כְּיִשְׂרְאֵלִי.","אני לומד לאכול כישראלי."],"ani lomed le'echol ke-yisre'eli.","I learn to eat like an Israeli."],
     [["הַשֻּׁלְחָן הוּא הַמָּקוֹם שֶׁבּוֹ שְׁתֵּי הַתַּרְבֻּיּוֹת נִפְגָּשׁוֹת.","השולחן הוא המקום שבו שתי התרבויות נפגשות."],"ha-shulchan hu ha-makom she-bo shtei ha-tarbuyot nifgashot.","The table is the place where the two cultures meet."],
     [["הַאֹכֶל הוּא הַשָּׂפָה הָרִאשׁוֹנָה שֶׁלָּנוּ.","האוכל הוא השפה הראשונה שלנו."],"ha-ochel hu ha-safa ha-rishona shelanu.","Food is our first language."]],
  quiz:[{q:"What does the word 'kaved' mean in this context?",opts:["Heavy/serious","A big feast","Formal"],a:1},{q:"Who comes and triggers the Sicilian pasta?",opts:["Miki","Angela and Salvatore","Thomas"],a:1}]},
 {id:"g3",t:["הַקִּיץ בְּאַבַּאיְטָה","הקיץ באבאיטה"],en:"Summer at ABAITA",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["בְּקַיִץ אֲנַחְנוּ נוֹסְעִים לְאַבַּאיְטָה לַחֹדֶשׁ.","בקיץ אנחנו נוסעים לאבאיטה לחודש."],"be-kayitz anachnu nos'im le-ABAITA la-chodesh.","In summer we travel to ABAITA for a month."],
     [["אַבַּאיְטָה הִיא בַּיִת בַּטֶּבַע.","אבאיטה היא בית בטבע."],"ABAITA hi bayit ba-teva.","ABAITA is a house in nature."],
     [["בְּבְרַנְדֶּנְבּוּרְג, כְּשָׁעָה מִבֶּרְלִין.","בברנדנבורג, כשעה מברלין."],"be-Brandenburg, ke-sha'a mi-Berlin.","In Brandenburg, about an hour from Berlin."],
     [["יֵשׁ שָׁם יַעַר, אֲגַם וּגִינָה גְּדוֹלָה.","יש שם יער, אגם וגינה גדולה."],"yesh sham ya'ar, agam u-gina gdola.","There is a forest, a lake and a large garden."],
     [["בַּבֹּקֶר אֲנִי שׁוֹתֶה קָפֶה בַּחוּץ.","בבוקר אני שותה קפה בחוץ."],"ba-boker ani shote kafe ba-chutz.","In the morning I drink coffee outside."],
     [["שׁוֹמֵעַ רַק צִפּוֹרִים.","שומע רק ציפורים."],"shomea rak tziporim.","I hear only birds."],
     [["אֵין רַעַשׁ שֶׁל עִיר.","אין רעש של עיר."],"ein ra'ash shel ir.","There is no city noise."],
     [["זֶה מְרַגֵּשׁ אוֹתִי עַד דְּמָעוֹת לִפְעָמִים.","זה מרגש אותי עד דמעות לפעמים."],"ze meragesh oti ad dma'ot lif'amim.","It moves me to tears sometimes."],
     [["חֲבֵרִים בָּאִים לְסוֹף שָׁבוּעַ.","חברים באים לסוף שבוע."],"chaverim ba'im le-sof shavua.","Friends come for the weekend."],
     [["כֻּלָּם מְבִיאִים אֹכֶל.","כולם מביאים אוכל."],"kulam mevi'im ochel.","Everyone brings food."],
     [["מַבְעִילִים בָּאֵשׁ בָּעֶרֶב.","מבעילים באש בערב."],"mav'ilim ba-esh ba-erev.","We light a fire in the evening."],
     [["שָׁרִים וּמְדַבְּרִים עַד מְאֻחָר.","שרים ומדברים עד מאוחר."],"sharim u-medabrim ad me'uchar.","We sing and talk until late."],
     [["הַכְּלָבִים שֶׁל הָאוֹרְחִים רָצִים בַּגִּינָה.","הכלבים של האורחים רצים בגינה."],"ha-klavim shel ha-orchim ratzim ba-gina.","The guests' dogs run in the garden."],
     [["אַבַּאיְטָה הוּא הַחֹפֶשׁ הָאֲמִיתִּי.","אבאיטה הוא החופש האמיתי."],"ABAITA hu ha-chofesh ha-amiti.","ABAITA is the real holiday."],
     [["שָׁם אֲנִי מֵבִין מָה חָשׁוּב בָּאֱמֶת.","שם אני מבין מה חשוב באמת."],"sham ani mevin ma chashuv ba-emet.","There I understand what is really important."],
     [["הַטֶּבַע, הָאֲנָשִׁים וְהַשֶּׁקֶט.","הטבע, האנשים והשקט."],"ha-teva, ha-anashim ve-ha-sheket.","Nature, people and quiet."]],
  quiz:[{q:"Where is ABAITA?",opts:["By the sea","In the mountains","In Brandenburg"],a:2},{q:"What moves Vincenzo to tears sometimes?",opts:["Missing Sicily","The quiet and nature","The fire"],a:1}]},

 {id:"h1",t:["הַמִּסְפָּרָה","המספרה"],en:"The Barber",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["אֲנִי הוֹלֵךְ לַמִּסְפָּרָה פַּעַם בַּחֹדֶשׁ.","אני הולך למספרה פעם בחודש."],"ani holech la-mispara pa'am ba-chodesh.","I go to the barber once a month."],
     [["הַסַּפָּר שֶׁלִּי שְׁמוֹ אָלֶכְּסַנְדֶּר.","הספר שלי שמו אלכסנדר."],"ha-sapar sheli shmo Alexander.","My barber is called Alexander."],
     [["הוּא מִרוּסְיָה.","הוא מרוסיה."],"hu mi-Rusya.","He is from Russia."],
     [["הוּא מְדַבֵּר גֶּרְמָנִית וְרוּסִית.","הוא מדבר גרמנית ורוסית."],"hu medaber germanit ve-rusit.","He speaks German and Russian."],
     [["אֲנִי מְדַבֵּר אִיטַלְקִית וְעִבְרִית קְצָת.","אני מדבר איטלקית ועברית קצת."],"ani medaber italkit ve-ivrit ktzat.","I speak Italian and a little Hebrew."],
     [["אֲנַחְנוּ מְדַבְּרִים אַנְגְּלִית בֵּינֵינוּ.","אנחנו מדברים אנגלית בינינו."],"anachnu medabrim anglit beineinu.","We speak English between us."],
     [["הוּא שׁוֹאֵל אֵיךְ הַחַיִּים.","הוא שואל איך החיים."],"hu sho'el eich ha-chayim.","He asks how life is."],
     [["אֲנִי מְסַפֵּר לוֹ עַל הָעֲבוֹדָה.","אני מספר לו על העבודה."],"ani mesaper lo al ha-avoda.","I tell him about work."],
     [["הוּא מְסַפֵּר לִי עַל הַמִּשְׁפָּחָה שֶׁלּוֹ.","הוא מספר לי על המשפחה שלו."],"hu mesaper li al ha-mishpacha shelo.","He tells me about his family."],
     [["הַשָּׂעָר יוֹצֵא טוֹב.","השיער יוצא טוב."],"ha-sa'ar yotze tov.","My hair comes out well."],
     [["אֲנִי מְשַׁלֵּם עֶשְׂרִים יוּרוֹ.","אני משלם עשרים יורו."],"ani meshale'em esrim yuro.","I pay twenty euros."],
     [["נִפְגָּשִׁים בַּחֹדֶשׁ הַבָּא.","נפגשים בחודש הבא."],"nifgashim ba-chodesh ha-ba.","See you next month."]],
  quiz:[{q:"What language does Vincenzo speak with Alexander?",opts:["German","English","Russian"],a:1},{q:"How much does the haircut cost?",opts:["Ten euros","Twenty euros","Thirty euros"],a:1}]},
 {id:"h2",t:["הָרְחוֹב הַשֵּׁקֵט","הרחוב השקט"],en:"The Quiet Street",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["יֵשׁ רְחוֹב שָׁקֵט קָרוֹב לַבַּיִת.","יש רחוב שקט קרוב לבית."],"yesh rechov shaket karov la-bayit.","There is a quiet street near home."],
     [["אֲנִי הוֹלֵךְ שָׁם כָּל עֶרֶב.","אני הולך שם כל ערב."],"ani holech sham kol erev.","I walk there every evening."],
     [["יֵשׁ עֵצִים גְּבוֹהִים מִשְּׁנֵי הַצְּדָדִים.","יש עצים גבוהים משני הצדדים."],"yesh etzim gvohim mi-shnei ha-tzadadim.","There are tall trees on both sides."],
     [["בָּסֶתֶו הֶעָלִים נוֹפְלִים.","בסתיו העלים נופלים."],"ba-stav ha-alim noflim.","In autumn the leaves fall."],
     [["הָרְחוֹב מִתְמַלֵּא בְּצִבְעֵי כָּתֹם וְאָדֹם.","הרחוב מתמלא בצבעי כתום ואדום."],"ha-rechov mitmaleh be-tziv'ei katom ve-adom.","The street fills with orange and red colours."],
     [["אֲנִי אוֹהֵב אֶת הַסְּתָו בְּבֶּרְלִין.","אני אוהב את הסתיו בברלין."],"ani ohev et ha-stav be-Berlin.","I love autumn in Berlin."],
     [["הָאֲוִיר קַר קְצָת.","האוויר קר קצת."],"ha-avir kar ktzat.","The air is a little cold."],
     [["לוֹבֵשׁ מְעִיל.","לובש מעיל."],"lovesh me'il.","I wear a coat."],
     [["יֵשׁ כֶּלֶב קָטָן שֶׁתָּמִיד שָׁם.","יש כלב קטן שתמיד שם."],"yesh kelev katan she-tamid sham.","There is a small dog that is always there."],
     [["הוּא מַסְתַּכֵּל עָלַי.","הוא מסתכל עליי."],"hu mistakel alai.","It looks at me."],
     [["אֲנִי מְחַיֵּךְ אֵלָיו.","אני מחייך אליו."],"ani mechayech elav.","I smile at it."],
     [["הָרְחוֹב הַשֵּׁקֵט עוֹזֵר לִי לַחְשֹׁב.","הרחוב השקט עוזר לי לחשוב."],"ha-rechov ha-shaket ozer li lachshov.","The quiet street helps me to think."]],
  quiz:[{q:"What season does Vincenzo love in Berlin?",opts:["Spring","Autumn","Winter"],a:1},{q:"What animal is always on the street?",opts:["A cat","A small dog","A bird"],a:1}]},
 {id:"h3",t:["הַיָּמִים הָקְצָרִים","הימים הקצרים"],en:"The Short Days",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בַּחֹרֶף הַיָּמִים קְצָרִים.","בחורף הימים קצרים."],"ba-choref ha-yamim ktzarim.","In winter the days are short."],
     [["בְּשֵׁשׁ בָּעֶרֶב כְּבָר חָשׁוּךְ.","בשש בערב כבר חשוך."],"be-shesh ba-erev kvar chashuch.","At six in the evening it is already dark."],
     [["בְּסִיצִילְיָה זֶה שׁוֹנֶה.","בסיציליה זה שונה."],"be-Sitzilya ze shone.","In Sicily it is different."],
     [["הַשֶּׁמֶשׁ שָׁם הַרְבֵּה יוֹתֵר.","השמש שם הרבה יותר."],"ha-shemesh sham harbe yoter.","The sun is there much more."],
     [["בְּבֶּרְלִין הַחֹרֶף כּוֹלֵל הַרְבֵּה עֲנָנִים.","בברלין החורף כולל הרבה עננים."],"be-Berlin ha-choref kolel harbe anannim.","In Berlin winter includes many clouds."],
     [["אֲנִי מַדְלִיק אֶת הַנּוֹרוֹת בַּבַּיִת.","אני מדליק את הנורות בבית."],"ani madlik et ha-norot ba-bayit.","I turn on the lights at home."],
     [["הַבַּיִת נַעֲשֶׂה חַמִּים.","הבית נעשה חמים."],"ha-bayit na'ase chamim.","The home becomes warm."],
     [["אֲנִי אוֹהֵב לֶאֱכֹל מְרַק חַם.","אני אוהב לאכול מרק חם."],"ani ohev le'echol marak cham.","I love to eat hot soup."],
     [["קוֹבִּי עוֹשֶׂה מְרַק עוֹף טָעִים.","קובי עושה מרק עוף טעים."],"Kobi ose marak of ta'im.","Kobi makes tasty chicken soup."],
     [["אֲנִי שׁוֹתֶה תֵּה חַם.","אני שותה תה חם."],"ani shote te cham.","I drink hot tea."],
     [["הַחֹרֶף בְּבֶּרְלִין קָשֶׁה.","החורף בברלין קשה."],"ha-choref be-Berlin kashe.","Winter in Berlin is hard."],
     [["אֲבָל בְּבַיִת חַמִּים הוּא יָפֶה.","אבל בבית חמים הוא יפה."],"aval be-bayit chamim hu yafe.","But in a warm home it is beautiful."]],
  quiz:[{q:"What does Vincenzo love to eat in winter?",opts:["Pasta","Hot soup","Salad"],a:1},{q:"What does Kobi make well?",opts:["Shakshuka","Chicken soup","Pasta"],a:1}]},
 {id:"h4",t:["הָאוּנִיבֶרְסִיטָה","האוניברסיטה"],en:"The University",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בְּבֶּרְלִין יֵשׁ הַרְבֵּה אוּנִיבֶרְסִיטָאוֹת.","בברלין יש הרבה אוניברסיטאות."],"be-Berlin yesh harbe universita'ot.","In Berlin there are many universities."],
     [["חֲבֵרִים שֶׁלִּי לוֹמְדִים שָׁם.","חברים שלי לומדים שם."],"chaverim sheli lomdim sham.","Friends of mine study there."],
     [["אֲנִי עוֹבֵד, לֹא לוֹמֵד.","אני עובד, לא לומד."],"ani oved, lo lomed.","I work, I do not study."],
     [["אֲבָל אֲנִי לוֹמֵד עִבְרִית בָּעֶרֶב.","אבל אני לומד עברית בערב."],"aval ani lomed ivrit ba-erev.","But I study Hebrew in the evening."],
     [["יֵשׁ קוּרְס אוֹנְלַיְן טוֹב.","יש קורס אונליין טוב."],"yesh kurs online tov.","There is a good online course."],
     [["אֲנִי גַּם מְדַבֵּר עִם קוֹבִּי.","אני גם מדבר עם קובי."],"ani gam medaber im Kobi.","I also speak with Kobi."],
     [["קוֹבִּי הוּא הַמּוֹרֶה הַטּוֹב שֶׁלִּי.","קובי הוא המורה הטוב שלי."],"Kobi hu ha-more ha-tov sheli.","Kobi is my good teacher."],
     [["הוּא סַבְלָנִי מְאוֹד.","הוא סבלני מאוד."],"hu savlani me'od.","He is very patient."],
     [["לִפְעָמִים אֲנִי עוֹשֶׂה שְׁגִיאוֹת.","לפעמים אני עושה שגיאות."],"lif'amim ani ose shgi'ot.","Sometimes I make mistakes."],
     [["קוֹבִּי מְתַקֵּן אוֹתִי בְּעֶדְנָה.","קובי מתקן אותי בעדינות."],"Kobi metaken oti be-adina.","Kobi corrects me gently."],
     [["בְּכָל שָׁבוּעַ אֲנִי מִתְקַדֵּם.","בכל שבוע אני מתקדם."],"be-chol shavua ani mitkaddem.","Every week I progress."],
     [["יוֹם אֶחָד אֲנִי אֲדַבֵּר שׁוֹטֵף.","יום אחד אני אדבר שוטף."],"yom echad ani adaber shoted.","One day I will speak fluently."]],
  quiz:[{q:"Where does Vincenzo study Hebrew?",opts:["At university","In the evening online","At a school"],a:1},{q:"How does Kobi correct Vincenzo?",opts:["Harshly","Gently","Never"],a:1}]},
 {id:"h5",t:["הַסּוֹפֶּר","הסופר"],en:"The Supermarket",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["אֲנִי קוֹנֶה בְּסוּפֶּר גָּדוֹל.","אני קונה בסופר גדול."],"ani kone be-super gadol.","I shop at a big supermarket."],
     [["הַסּוּפֶּר פָּתוּחַ כָּל הַיּוֹם.","הסופר פתוח כל היום."],"ha-super patuach kol ha-yom.","The supermarket is open all day."],
     [["אֲנִי כּוֹתֵב רְשִׁימָה לִפְנֵי שֶׁאֲנִי יוֹצֵא.","אני כותב רשימה לפני שאני יוצא."],"ani kotev reshima lifnei she-ani yotze.","I write a list before I go out."],
     [["בְּרְשִׁימָה יֵשׁ: חָלָב, לֶחֶם, בֵּיצִים.","ברשימה יש: חלב, לחם, ביצים."],"ba-reshima yesh: chalav, lechem, beitzim.","On the list: milk, bread, eggs."],
     [["גַּם יְרָקוֹת וּפֵרוֹת.","גם ירקות ופירות."],"gam yerakot u-perot.","Also vegetables and fruit."],
     [["אֲנִי מְחַפֵּשׂ כָּל מִין בְּסֵדֶר.","אני מחפש כל מין בסדר."],"ani mechapes kol min be-seder.","I look for each item in order."],
     [["לִפְעָמִים אֲנִי שׁוֹכֵחַ מַשֶּׁהוּ.","לפעמים אני שוכח משהו."],"lif'amim ani shokeach mashehu.","Sometimes I forget something."],
     [["אָז אֲנִי חוֹזֵר לְחֵלֶק הַנָּכוֹן.","אז אני חוזר לחלק הנכון."],"az ani chozer le-chelek ha-nachon.","Then I go back to the right section."],
     [["הַקֻּפָּאִית תָּמִיד אוֹמֶרֶת שָׁלוֹם.","הקופאית תמיד אומרת שלום."],"ha-kupa'it tamid omeret shalom.","The cashier always says hello."],
     [["אֲנִי מְשַׁלֵּם בְּכַרְטִיס.","אני משלם בכרטיס."],"ani meshale'em be-kartis.","I pay by card."],
     [["לוֹקֵחַ אֶת הַשַּׂקִּיּוֹת.","לוקח את השקיות."],"lokech et ha-sakiyot.","I take the bags."],
     [["חוֹזֵר הַבַּיְתָה מְאֻשָּׁר.","חוזר הביתה מאושר."],"chozer ha-bayta me'ushar.","I return home happy."]],
  quiz:[{q:"What does Vincenzo write before going out?",opts:["A recipe","A list","A message"],a:1},{q:"How does Vincenzo pay?",opts:["Cash","Card","App"],a:1}]},
 {id:"i1",t:["הַמּוֹרֶה הָעִבְרִי","המורה העברי"],en:"The Hebrew Teacher",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["מִלְּבַד קוֹבִּי, יֵשׁ לִי מוֹרָה בְּמֶרְכָּז.","מלבד קובי, יש לי מורה במרכז."],"milvad Kobi, yesh li more be-merkaz.","Besides Kobi, I have a teacher in the centre."],
     [["שְׁמוֹ אֱלִיעָד.","שמו אליעד."],"shmo Eliad.","His name is Eliad."],
     [["הוּא מְלַמֵּד עִבְרִית לְזָרִים.","הוא מלמד עברית לזרים."],"hu melaem ivrit le-zarim.","He teaches Hebrew to foreigners."],
     [["הַשִּׁעוּר הוּא פַּעֲמַיִם בְּשָׁבוּעַ.","השיעור הוא פעמיים בשבוע."],"ha-shi'ur hu pa'amatayim be-shavua.","The lesson is twice a week."],
     [["יֵשׁ עֶשְׂרָה תַּלְמִידִים בְּכִתָּה.","יש עשרה תלמידים בכיתה."],"yesh asara talmidim be-kita.","There are ten students in the class."],
     [["כֻּלָּם מִמְּדִינוֹת שׁוֹנוֹת.","כולם ממדינות שונות."],"kulam mi-medinot shonot.","They are all from different countries."],
     [["יֵשׁ אֲמֶרִיקָנִים, צָרְפָתִים וְאִיטַלְקִים.","יש אמריקנים, צרפתים ואיטלקים."],"yesh amerikayim, tzarfatim ve-italkim.","There are Americans, French and Italians."],
     [["אֲנִי הָאִיטַלְקִי הַיָּחִיד.","אני האיטלקי היחיד."],"ani ha-italki ha-yachid.","I am the only Italian."],
     [["אֱלִיעָד מְלַמֵּד בְּדֶרֶךְ מְהַנָּה.","אליעד מלמד בדרך מהנה."],"Eliad melaem be-derech mehana.","Eliad teaches in a fun way."],
     [["הוּא מְדַבֵּר רַק עִבְרִית.","הוא מדבר רק עברית."],"hu medaber rak ivrit.","He speaks only Hebrew."],
     [["בַּהַתְחָלָה לֹא הֵבַנְתִּי הַרְבֵּה.","בהתחלה לא הבנתי הרבה."],"ba-hatchala lo hevanti harbe.","At first I didn't understand much."],
     [["אַחֲרֵי חֹדֶשׁ הֵבַנְתִּי יוֹתֵר.","אחרי חודש הבנתי יותר."],"acharei chodesh hevanti yoter.","After a month I understood more."],
     [["עַכְשָׁו אֲנִי עוֹנֶה לַשְּׁאֵלוֹת.","עכשיו אני עונה לשאלות."],"achshav ani one la-she'elot.","Now I answer the questions."],
     [["הַכִּתָּה עוֹזֶרֶת לִי לִלְמֹד.","הכיתה עוזרת לי ללמוד."],"ha-kita ozeret li lilmod.","The class helps me to learn."],
     [["אֲנִי מְחַכֶּה לְכָל שִׁעוּר.","אני מחכה לכל שיעור."],"ani mechake le-chol shi'ur.","I look forward to every lesson."]],
  quiz:[{q:"How many students are in the class?",opts:["Five","Eight","Ten"],a:2},{q:"What language does Eliad speak in class?",opts:["Only English","Only Hebrew","Mix of languages"],a:1}]},
 {id:"i2",t:["הַחֻפְשָׁה בְּדָנֶמַרְק","החופשה בדנמרק"],en:"The Holiday in Denmark",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["בְּסֶפְּטֶמְבֶּר 2023 נִשַּׂאנוּ בְּקוֹפֶּנְהָגֶן.","בספטמבר 2023 נישאנו בקופנהגן."],"be-September 2023 nisa'nu be-Copenhagen.","In September 2023 we got married in Copenhagen."],
     [["זֶה הָיָה הָרֶגַע הֲכִי חָשׁוּב בְּחַיַּי.","זה היה הרגע הכי חשוב בחיי."],"ze haya ha-rega hachi chashuv be-chayai.","It was the most important moment of my life."],
     [["קוֹפֶּנְהָגֶן הִיא עִיר יָפָה מְאוֹד.","קופנהגן היא עיר יפה מאוד."],"Copenhagen hi ir yafa me'od.","Copenhagen is a very beautiful city."],
     [["הָלַכְנוּ לְאֶמְצַע הָעִיר.","הלכנו לאמצע העיר."],"halachnu le-emtza ha-ir.","We walked to the city centre."],
     [["יֵשׁ שָׁם אוֹפַנַּיִם בְּכָל מָקוֹם.","יש שם אופניים בכל מקום."],"yesh sham ofanayim be-chol makom.","There are bicycles everywhere."],
     [["אָכַלְנוּ אֹכֶל דָּנִי.","אכלנו אוכל דני."],"achalnu ochel dani.","We ate Danish food."],
     [["הָיָה קַר קְצָת.","היה קר קצת."],"haya kar ktzat.","It was a little cold."],
     [["לָבַשְׁנוּ מְעִילִים.","לבשנו מעילים."],"lavashnu me'ilim.","We wore coats."],
     [["הַחֲתֻנָּה הָיְתָה פְּשׁוּטָה וְיָפָה.","החתונה הייתה פשוטה ויפה."],"ha-chatuna hayta pshuta ve-yafa.","The wedding was simple and beautiful."],
     [["רַק מִשְׁפָּחָה קְרוֹבָה הָיְתָה שָׁם.","רק משפחה קרובה הייתה שם."],"rak mishpacha krova hayta sham.","Only close family was there."],
     [["מִיקִי בָּא מִיִּשְׂרָאֵל.","מיקי בא מישראל."],"Miki ba mi-Yisrael.","Miki came from Israel."],
     [["אַנְגֶ'לָה בָּכְתָה מִשִּׂמְחָה.","אנג'לה בכתה משמחה."],"Angela bachta mi-simcha.","Angela cried from joy."],
     [["הָיְתָה אֲרוּחָה יָפָה.","הייתה ארוחה יפה."],"hayta arucha yafa.","There was a beautiful meal."],
     [["שָׁתִינוּ שַׁמְפַּנְיָה.","שתינו שמפנייה."],"shatinu shampayna.","We drank champagne."],
     [["הַתִּשְׁעָה בְּסֶפְּטֶמְבֶּר הוּא הַיּוֹם הַטּוֹב בְּחַיַּי.","התשעה בספטמבר הוא היום הטוב בחיי."],"ha-tish'a be-September hu ha-yom ha-tov be-chayai.","The 9th of September is the best day of my life."]],
  quiz:[{q:"Where did Vincenzo and Kobi get married?",opts:["Tel Aviv","Berlin","Copenhagen"],a:2},{q:"Who cried from joy?",opts:["Miki","Angela","Teresa"],a:1}]},
 {id:"i3",t:["הָעֶבֶד הַקָּטָן","עצירה בדרך"],en:"A Stop on the Way",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בַּדֶּרֶךְ לָעֲבוֹדָה עוֹצְרִים לְקָפֶה.","בדרך לעבודה עוצרים לקפה."],"ba-derech la-avoda otzrim le-kafe.","On the way to work I stop for coffee."],
     [["יֵשׁ בֵּית קָפֶה קָטָן בְּפִינָּה.","יש בית קפה קטן בפינה."],"yesh beit kafe katan be-pina.","There is a small café on the corner."],
     [["הַבַּרִיסְטָה שְׁמוֹ יוּסֵף.","הבריסטה שמו יוסף."],"ha-barista shmo Yosef.","The barista's name is Yosef."],
     [["הוּא זוֹכֵר אֶת הַהַזְמָנָה שֶׁלִּי.","הוא זוכר את ההזמנה שלי."],"hu zocher et ha-hazmana sheli.","He remembers my order."],
     [["אֶסְפְּרֶסּוֹ כָּפוּל, בְּלִי סֻּכָּר.","אספרסו כפול, בלי סוכר."],"espresso kaful, bli sukar.","Double espresso, no sugar."],
     [["יוֹסֵף שׁוֹאֵל אֵיךְ הָיָה הַלַּיְלָה.","יוסף שואל איך היה הלילה."],"Yosef sho'el eich haya ha-layla.","Yosef asks how the night was."],
     [["אֲנִי אוֹמֵר טוֹב, תּוֹדָה.","אני אומר טוב, תודה."],"ani omer tov, toda.","I say good, thank you."],
     [["הוּא מְכִין אֶת הַקָּפֶה מַהֵר.","הוא מכין את הקפה מהר."],"hu mechin et ha-kafe maher.","He prepares the coffee fast."],
     [["הָרֵיחַ מְדַהִים.","הריח מדהים."],"ha-reiach medahim.","The smell is amazing."],
     [["שׁוֹתֶה לְאַט לְיַד הַחַלּוֹן.","שותה לאט ליד החלון."],"shote le'at leyad ha-chalon.","I drink slowly by the window."],
     [["חֲמֵשׁ דַּקּוֹת שֶׁל שֶׁקֶט.","חמש דקות של שקט."],"chamesh dakot shel sheket.","Five minutes of quiet."],
     [["אַחַר כָּךְ לָעֲבוֹדָה.","אחר כך לעבודה."],"achar kach la-avoda.","Then to work."],
     [["הַקָּפֶה בַּבֹּקֶר הוּא הַטֶּקֶס שֶׁלִּי.","הקפה בבוקר הוא הטקס שלי."],"ha-kafe ba-boker hu ha-teks sheli.","Morning coffee is my ritual."],
     [["בְּלַעֲדָיו הַיּוֹם לֹא יַתְחִיל.","בלעדיו היום לא יתחיל."],"bel'adav ha-yom lo yatchil.","Without it the day does not start."],
     [["יוֹסֵף הוּא חֵלֶק מֵהַבֹּקֶר שֶׁלִּי.","יוסף הוא חלק מהבוקר שלי."],"Yosef hu chelek me-ha-boker sheli.","Yosef is part of my morning."]],
  quiz:[{q:"What is Vincenzo's order?",opts:["Single espresso no sugar","Double espresso no sugar","Latte with milk"],a:1},{q:"What are the five minutes at the café?",opts:["Loud and social","Five minutes of quiet","For reading news"],a:1}]},
 {id:"i4",t:["הַסּוֹף שֶׁל הַשָּׁנָה","סוף השנה"],en:"End of Year",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["בְּסוֹף הַשָּׁנָה אֲנִי חוֹשֵׁב.","בסוף השנה אני חושב."],"be-sof ha-shana ani choshev.","At the end of the year I think."],
     [["חוֹשֵׁב עַל כָּל מַה שֶּׁהָיָה.","חושב על כל מה שהיה."],"choshev al kol ma she-haya.","I think about everything that was."],
     [["עַל הַהַצְלָחוֹת וְעַל הָרְגָעִים הַקָּשִׁים.","על ההצלחות ועל הרגעים הקשים."],"al ha-hatzlachot ve-al ha-rga'im ha-kashim.","About the successes and the difficult moments."],
     [["הַשָּׁנָה הַזֹּאת הָיְתָה שָׁנָה שֶׁל גְּדִילָה.","השנה הזאת הייתה שנה של גדילה."],"ha-shana ha-zot hayta shana shel gdila.","This year was a year of growth."],
     [["לָמַדְתִּי הַרְבֵּה עִבְרִית.","למדתי הרבה עברית."],"lamadti harbe ivrit.","I learned a lot of Hebrew."],
     [["הִכַּרְתִּי חֲבֵרִים חֲדָשִׁים.","הכרתי חברים חדשים."],"hikarti chaverim chadashim.","I met new friends."],
     [["קוֹבִּי וַאֲנִי הִתְחַזַּקְנוּ יַחַד.","קובי ואני התחזקנו יחד."],"Kobi va-ani hitchazkanu yachad.","Kobi and I grew stronger together."],
     [["הִתְגַּעְגַּעְתִּי לְסִיצִילְיָה.","התגעגעתי לסיציליה."],"hitga'aga'ti le-Sitzilya.","I missed Sicily."],
     [["אֲבָל בֶּרְלִין הָפְכָה לְבַיִת.","אבל ברלין הפכה לבית."],"aval Berlin hafcha le-bayit.","But Berlin became home."],
     [["לַשָּׁנָה הַבָּאָה יֵשׁ לִי תִּקְווֹת.","לשנה הבאה יש לי תקוות."],"la-shana ha-ba'a yesh li tikvot.","For the coming year I have hopes."],
     [["לִלְמֹד יוֹתֵר עִבְרִית.","ללמוד יותר עברית."],"lilmod yoter ivrit.","To learn more Hebrew."],
     [["לִנְסֹעַ לְיִשְׂרָאֵל שׁוּב.","לנסוע לישראל שוב."],"linso'a le-Yisrael shuv.","To travel to Israel again."],
     [["לִרְאוֹת אֶת אַנְגֶ'לָה.","לראות את אנג'לה."],"lir'ot et Angela.","To see Angela."],
     [["כָּל יוֹם הוּא הַתְחָלָה חֲדָשָׁה.","כל יום הוא התחלה חדשה."],"kol yom hu hatchala chadasha.","Every day is a new beginning."],
     [["זֶה מַה שֶׁלָּמַדְתִּי הַשָּׁנָה.","זה מה שלמדתי השנה."],"ze ma she-lamadti ha-shana.","This is what I learned this year."]],
  quiz:[{q:"How does Vincenzo describe this year?",opts:["A year of loss","A year of growth","A boring year"],a:1},{q:"What hope does he have for next year?",opts:["To move city","To learn more Hebrew","To stop working"],a:1}]},
 {id:"i5",t:["אֶת מִי פָּגַשְׁתִּי","את מי פגשתי"],en:"Who I Met",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בְּבֶּרְלִין פָּגַשְׁתִּי אֲנָשִׁים מֵהָעוֹלָם.","בברלין פגשתי אנשים מהעולם."],"be-Berlin pagashti anashim me-ha-olam.","In Berlin I met people from the world."],
     [["בֵּית הַקָּפֶה שֶׁלָּנוּ הוּא כְּמוֹ פַּרְלָמֶנְט.","בית הקפה שלנו הוא כמו פרלמנט."],"beit ha-kafe shelanu hu kmo parlement.","Our café is like a parliament."],
     [["כֻּלָּם בָּאִים וּמְדַבְּרִים.","כולם באים ומדברים."],"kulam ba'im u-medabrim.","Everyone comes and talks."],
     [["שָׁם פָּגַשְׁתִּי אֶת מְאִיר מִיִּשְׂרָאֵל.","שם פגשתי את מאיר מישראל."],"sham pagashti et Meir mi-Yisrael.","There I met Meir from Israel."],
     [["הוּא צַלָּם וְאָמָּן.","הוא צלם ואמן."],"hu tzalam ve-aman.","He is a photographer and artist."],
     [["הוּא מְצַלֵּם אֶת בֶּרְלִין.","הוא מצלם את ברלין."],"hu metzalem et Berlin.","He photographs Berlin."],
     [["הֵרְאָה לִי תְּמוּנוֹת מֵהָרְחוֹבוֹת.","הראה לי תמונות מהרחובות."],"her'a li tmunot me-ha-rechovot.","He showed me photos from the streets."],
     [["הַתְּמוּנוֹת הָיוּ מְדַהִימוֹת.","התמונות היו מדהימות."],"ha-tmunot hayu medahimot.","The photos were stunning."],
     [["מְאִיר בֶּרְלִין בְּעֵינַיִם אַחֶרֶת.","מאיר רואה ברלין בעיניים אחרות."],"Meir ro'e Berlin be-einayim acherot.","Meir sees Berlin through different eyes."],
     [["גַּם אֲנִי מַתְחִיל לִרְאוֹת אַחֶרֶת.","גם אני מתחיל לראות אחרת."],"gam ani matchil lir'ot acheret.","I also start to see differently."],
     [["עִיר זֶה לֹא רַק בְּנִינִים.","עיר זה לא רק בניינים."],"ir ze lo rak bnayanim.","A city is not just buildings."],
     [["זֶה אֲנָשִׁים, סִפּוּרִים, זִכְרוֹנוֹת.","זה אנשים, סיפורים, זכרונות."],"ze anashim, siporim, zichronot.","It is people, stories, memories."],
     [["מְאִיר לִמֵּד אוֹתִי לְהַסְתַּכֵּל.","מאיר למד אותי להסתכל."],"Meir limed oti lehistakel.","Meir taught me to look."],
     [["זֶה מַתָּנָה גְּדוֹלָה.","זה מתנה גדולה."],"ze matana gdola.","This is a great gift."],
     [["בֶּרְלִין מְלֵאָה אֲנָשִׁים כָּאֵלֶּה.","ברלין מלאה אנשים כאלה."],"Berlin mele'a anashim ka-ele.","Berlin is full of people like that."]],
  quiz:[{q:"What is Meir's profession?",opts:["Musician","Photographer and artist","Writer"],a:1},{q:"What did Meir teach Vincenzo?",opts:["To cook","To look","To ride a bike"],a:1}]},
 {id:"j1",t:["הַגּוּף וְהַשָּׂפָה","הגוף והשפה"],en:"Body and Language",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["כְּשֶׁאֲנִי מְדַבֵּר עִבְרִית גּוּפִי מִשְׁתַּנֶּה.","כשאני מדבר עברית גופי משתנה."],"kshe-ani medaber ivrit gufi mishtane.","When I speak Hebrew my body changes."],
     [["אֲנִי מַתְחִיל לְדַבֵּר בְּיָדַיִם יוֹתֵר.","אני מתחיל לדבר בידיים יותר."],"ani matchil ledaber be-yadayim yoter.","I start to speak more with my hands."],
     [["הַיִּשְׂרְאֵלִים מְדַבְּרִים בְּכָל הַגּוּף.","הישראלים מדברים בכל הגוף."],"ha-Yisre'elim medabrim be-chol ha-guf.","Israelis speak with their whole body."],
     [["גַּם הַפָּנִים, גַּם הַכְּתֵפַיִם.","גם הפנים, גם הכתפיים."],"gam ha-panim, gam ha-ktafayim.","The face too, the shoulders too."],
     [["בְּסִיצִילְיָה דּוֹמֶה.","בסיציליה דומה."],"be-Sitzilya dome.","In Sicily it is similar."],
     [["אֲנִי מֵבִין כָּל הָרֶגֶשׁ הַזֶּה.","אני מבין כל הרגש הזה."],"ani mevin kol ha-regesh ha-ze.","I understand all this emotion."],
     [["כְּשֶׁמִּיקִי מְדַבֵּר הוּא מְחַיֵּךְ בְּעֵינַיִם.","כשמיקי מדבר הוא מחייך בעיניים."],"kshe-Miki medaber hu mechayech be-einayim.","When Miki talks he smiles with his eyes."],
     [["קוֹבִּי מַנִּיעַ יָדוֹ כְּשֶׁהוּא מַסְבִּיר.","קובי מניע ידו כשהוא מסביר."],"Kobi mani'a yado kshe-hu masbir.","Kobi moves his hand when he explains."],
     [["אֵלֶּה שָׂפוֹת בְּתוֹךְ שָׂפָה.","אלה שפות בתוך שפה."],"ele safot be-toch safa.","These are languages within a language."],
     [["כְּשֶׁאֲנִי עָיֵף הָעִבְרִית נִשְׁמַעַת יוֹתֵר קָשָׁה.","כשאני עייף העברית נשמעת יותר קשה."],"kshe-ani ayef ha-ivrit nishma'at yoter kasha.","When I am tired Hebrew sounds harder."],
     [["הַמוֹחַ לֹא עוֹבֵד טוֹב.","המוח לא עובד טוב."],"ha-moach lo oved tov.","The brain does not work well."],
     [["לְעוּמַת זֹאת בְּסוֹף הַשָּׁבוּעַ אֲנִי מְדַבֵּר טוֹב יוֹתֵר.","לעומת זאת בסוף השבוע אני מדבר טוב יותר."],"le-umat zot be-sof ha-shavua ani medaber tov yoter.","On the other hand at the weekend I speak better."],
     [["כְּשֶׁאֲנִי רָגוּעַ הַמִּלִּים בָּאוֹת לְבַד.","כשאני רגוע המילים באות לבד."],"kshe-ani ragu'a ha-milim ba'ot levad.","When I am relaxed the words come by themselves."],
     [["זֶה מְלַמֵּד אוֹתִי לִנְשֹׁם.","זה מלמד אותי לנשום."],"ze melaem oti linshom.","This teaches me to breathe."],
     [["שָׂפָה חֲדָשָׁה הִיא גַּם אִמּוּן גּוּפָנִי.","שפה חדשה היא גם אימון גופני."],"safa chadasha hi gam imun gufani.","A new language is also physical training."],
     [["הַגּוּף וְהַמּוֹחַ לוֹמְדִים יַחַד.","הגוף והמוח לומדים יחד."],"ha-guf ve-ha-moach lomdim yachad.","The body and brain learn together."],
     [["זֶה מַסְבִּיר לָמָּה זֶה כָּל כָּךְ עָיֵף.","זה מסביר למה זה כל כך עייף."],"ze masbir lama ze kol kach ayef.","This explains why it is so tiring."],
     [["וְגַם לָמָּה זֶה כָּל כָּךְ מְרַגֵּשׁ.","וגם למה זה כל כך מרגש."],"ve-gam lama ze kol kach meragesh.","And also why it is so exciting."]],
  quiz:[{q:"What does Vincenzo notice about how Israelis speak?",opts:["Very quietly","With their whole body","Only with words"],a:1},{q:"When does Vincenzo speak Hebrew best?",opts:["When tired","At the weekend when relaxed","Early in the morning"],a:1}]},
 {id:"j2",t:["הַמִּסְעָדָה הָאֵיטַלְקִית","המסעדה האיטלקית"],en:"The Italian Restaurant",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["בְּפְּרֶנְצְלָאוּ בֶּרְג יֵשׁ מִסְעָדָה אֵיטַלְקִית.","בפרנצלאו ברג יש מסעדה איטלקית."],"be-Prenzlauer Berg yesh mis'ada italkit.","In Prenzlauer Berg there is an Italian restaurant."],
     [["בַּעַל הַמִּסְעָדָה מִנַּפּוֹלִי.","בעל המסעדה מנפולי."],"ba'al ha-mis'ada mi-Napoli.","The owner is from Naples."],
     [["שְׁמוֹ אַנְטוֹנִיוֹ.","שמו אנטוניו."],"shmo Antonio.","His name is Antonio."],
     [["כְּשֶׁאֲנִי נִכְנָס הוּא תָּמִיד מְקַבֵּל אוֹתִי בְּאִיטַלְקִית.","כשאני נכנס הוא תמיד מקבל אותי באיטלקית."],"kshe-ani nichnas hu tamid mekabel oti be-italkit.","When I enter he always greets me in Italian."],
     [["אֲנִי מַרְגִּישׁ כְּמוֹ בְּבַיִת.","אני מרגיש כמו בבית."],"ani margish kmo be-bayit.","I feel like at home."],
     [["הַפַּסְטָה שָׁם כְּמוֹ בְּסִיצִילְיָה.","הפסטה שם כמו בסיציליה."],"ha-pasta sham kmo be-Sitzilya.","The pasta there is like in Sicily."],
