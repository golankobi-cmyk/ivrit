 {id:"ff1",t:["הַמַּפָּה שֶׁל הָעִיר","המפה של העיר"],en:"The City Map",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בַּהַתְחָלָה הָלַכְתִּי עִם מַפָּה.","בהתחלה הלכתי עם מפה."],"ba-hatchala halachti im mapa.","At first I walked with a map."],
     [["לֹא יָדַעְתִּי אֶת הָרְחוֹבוֹת.","לא ידעתי את הרחובות."],"lo yadati et ha-rechovot.","I did not know the streets."],
     [["הָלַכְתִּי לְאִבּוּד הַרְבֵּה פְּעָמִים.","הלכתי לאיבוד הרבה פעמים."],"halachti le-ibud harbe pe'amim.","I got lost many times."],
     [["שָׁאַלְתִּי אֲנָשִׁים אֵיךְ לְהַגִּיעַ.","שאלתי אנשים איך להגיע."],"sha'alti anashim eich lehagia.","I asked people how to get there."],
     [["רֻבָּם הָיוּ נֶחְמָדִים.","רובם היו נחמדים."],"rubam hayu nechmadim.","Most were nice."],
     [["לְאַט לְאַט לָמַדְתִּי אֶת הָעִיר.","לאט לאט למדתי את העיר."],"le'at le'at lamadti et ha-ir.","Slowly I learned the city."],
     [["עַכְשָׁו אֲנִי לֹא צָרִיךְ מַפָּה.","עכשיו אני לא צריך מפה."],"achshav ani lo tzarich mapa.","Now I do not need a map."],
     [["אֲנִי מַכִּיר כָּל פִּינָּה.","אני מכיר כל פינה."],"ani makir kol pina.","I know every corner."],
     [["בֶּרְלִין נַעֲשְׂתָה מֻכֶּרֶת.","ברלין נעשתה מוכרת."],"Berlin na'asta mukeret.","Berlin became familiar."],
     [["עִיר נַעֲשֵׂית בַּיִת לְאַט לְאַט.","עיר נעשית בית לאט לאט."],"ir na'aseit bayit le'at le'at.","A city becomes home slowly."]],
  quiz:[{q:"What did Vincenzo use at first?",opts:["A car","A map","A bike"],a:1},{q:"Does he need a map now?",opts:["Yes","No","Sometimes"],a:1}]},
 {id:"ff2",t:["הַשָּׁעוֹן בַּתַּחֲנָה","השעון בתחנה"],en:"The Station Clock",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּתַּחֲנָה יֵשׁ שָׁעוֹן גָּדוֹל.","בתחנה יש שעון גדול."],"ba-tachana yesh sha'on gadol.","At the station there is a big clock."],
     [["כֻּלָּם מִסְתַּכְּלִים עָלָיו.","כולם מסתכלים עליו."],"kulam mistaklim alav.","Everyone looks at it."],
     [["הָרַכָּבוֹת בְּבֶּרְלִין מְדֻיָּקוֹת.","הרכבות בברלין מדויקות."],"ha-rakavot be-Berlin meduyakot.","The trains in Berlin are punctual."],
     [["אִם כָּתוּב שֶׁבַע, זֶה שֶׁבַע.","אם כתוב שבע, זה שבע."],"im katuv sheva, ze sheva.","If it says seven, it is seven."],
     [["בְּסִיצִילְיָה זֶה אַחֶרֶת.","בסיציליה זה אחרת."],"be-Sitzilya ze acheret.","In Sicily it is different."],
     [["שָׁם הַזְּמַן יוֹתֵר גָּמִישׁ.","שם הזמן יותר גמיש."],"sham ha-zman yoter gamish.","There time is more flexible."],
     [["לָמַדְתִּי לִהְיוֹת בַּזְּמַן.","למדתי להיות בזמן."],"lamadti lihyot ba-zman.","I learned to be on time."],
     [["עַכְשָׁו אֲנִי אַף פַּעַם לֹא מְאַחֵר.","עכשיו אני אף פעם לא מאחר."],"achshav ani af pa'am lo me'acher.","Now I am never late."],
     [["קוֹבִּי צוֹחֵק שֶׁנַּעֲשֵׂיתִי גֶּרְמָנִי.","קובי צוחק שנעשיתי גרמני."],"Kobi tzochek she-na'aseiti germani.","Kobi laughs that I became German."],
     [["אוּלַי קְצָת.","אולי קצת."],"ulay ktzat.","Maybe a little."]],
  quiz:[{q:"Are Berlin trains punctual?",opts:["No","Yes","Sometimes"],a:1},{q:"What does Kobi joke?",opts:["That Vincenzo is late","That Vincenzo became German","That Vincenzo is tired"],a:1}]},
 {id:"ff3",t:["הַגֶּשֶׁם וְהַקָּפֶה","הגשם והקפה"],en:"Rain and Coffee",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["יוֹרֵד גֶּשֶׁם בַּחוּץ.","יורד גשם בחוץ."],"yored geshem ba-chutz.","It is raining outside."],
     [["אֲנִי יוֹשֵׁב בְּבֵית קָפֶה.","אני יושב בבית קפה."],"ani yoshev be-veit kafe.","I sit in a café."],
     [["שׁוֹתֶה אֶסְפְּרֶסּוֹ חַם.","שותה אספרסו חם."],"shote espresso cham.","I drink a hot espresso."],
     [["מִסְתַּכֵּל עַל הַגֶּשֶׁם דֶּרֶךְ הַחַלּוֹן.","מסתכל על הגשם דרך החלון."],"mistakel al ha-geshem derech ha-chalon.","I watch the rain through the window."],
     [["אֲנָשִׁים רָצִים עִם מִטְרִיּוֹת.","אנשים רצים עם מטריות."],"anashim ratzim im mitriyot.","People run with umbrellas."],
     [["בְּבֵית הַקָּפֶה חַם וְנָעִים.","בבית הקפה חם ונעים."],"be-veit ha-kafe cham ve-na'im.","In the café it is warm and pleasant."],
     [["אֲנִי קוֹרֵא סֵפֶר.","אני קורא ספר."],"ani kore sefer.","I read a book."],
     [["אֵין לִי לְאָן לְמַהֵר.","אין לי לאן למהר."],"ein li le-an lemaher.","I have nowhere to rush."],
     [["יָמִים גְּשׁוּמִים הֵם שֶׁקֶט.","ימים גשומים הם שקט."],"yamim gshumim hem sheket.","Rainy days are quiet."],
     [["אֲנִי אוֹהֵב אוֹתָם.","אני אוהב אותם."],"ani ohev otam.","I love them."]],
  quiz:[{q:"Where is Vincenzo sitting?",opts:["At home","In a café","At work"],a:1},{q:"What does he do there?",opts:["Sleeps","Reads a book","Works"],a:1}]},
 {id:"gg1",t:["הַיּוֹם בַּחוֹף","היום בחוף"],en:"A Day at the Beach",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בְּתֵל אָבִיב הָלַכְנוּ לַחוֹף.","בתל אביב הלכנו לחוף."],"be-Tel Aviv halachnu la-chof.","In Tel Aviv we went to the beach."],
     [["הַיָּם הָיָה כָּחֹל וְחַם.","הים היה כחול וחם."],"ha-yam haya kachol ve-cham.","The sea was blue and warm."],
     [["שָׂחִינוּ הַרְבֵּה.","שחינו הרבה."],"sachinu harbe.","We swam a lot."],
     [["הַמַּיִם הָיוּ נְעִימִים.","המים היו נעימים."],"ha-mayim hayu ne'imim.","The water was pleasant."],
     [["עַל הַחוֹף הָיוּ הַרְבֵּה אֲנָשִׁים.","על החוף היו הרבה אנשים."],"al ha-chof hayu harbe anashim.","On the beach there were many people."],
     [["יְלָדִים שִׂחֲקוּ בְּכַדּוּר.","ילדים שיחקו בכדור."],"yeladim sichaku be-kadur.","Children played with a ball."],
     [["מָכַרְנוּ גְּלִידָה לְיַד הַיָּם.","קנינו גלידה ליד הים."],"kaninu glida leyad ha-yam.","We bought ice cream by the sea."],
     [["שָׁכַבְנוּ עַל הַחוֹל.","שכבנו על החול."],"shachavnu al ha-chol.","We lay on the sand."],
     [["הַשֶּׁמֶשׁ הָיְתָה חֲזָקָה.","השמש הייתה חזקה."],"ha-shemesh hayta chazaka.","The sun was strong."],
     [["שָׂמְתִּי קְרֵם הֲגָנָה.","שמתי קרם הגנה."],"samti krem hagana.","I put on sunscreen."],
     [["בָּעֶרֶב רָאִינוּ אֶת הַשְּׁקִיעָה.","בערב ראינו את השקיעה."],"ba-erev ra'inu et ha-shki'a.","In the evening we saw the sunset."],
     [["הַשָּׁמַיִם נַעֲשׂוּ כְּתֻמִּים.","השמיים נעשו כתומים."],"ha-shamayim na'asu ktumim.","The sky became orange."],
     [["זֶה הָיָה יוֹם מֻשְׁלָם.","זה היה יום מושלם."],"ze haya yom mushlam.","It was a perfect day."],
     [["תֵּל אָבִיב יָפָה לְיַד הַיָּם.","תל אביב יפה ליד הים."],"Tel Aviv yafa leyad ha-yam.","Tel Aviv is beautiful by the sea."],
     [["אֲנִי אוֹהֵב אֶת הָעִיר הַזֹּאת.","אני אוהב את העיר הזאת."],"ani ohev et ha-ir ha-zot.","I love this city."]],
  quiz:[{q:"What colour was the sea?",opts:["Grey","Blue","Green"],a:1},{q:"What did they see in the evening?",opts:["A storm","The sunset","Fireworks"],a:1}]},
 {id:"gg2",t:["הַשּׁוּק בְּתֵל אָבִיב","השוק בתל אביב"],en:"The Market in Tel Aviv",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["בְּתֵל אָבִיב יֵשׁ שׁוּק גָּדוֹל.","בתל אביב יש שוק גדול."],"be-Tel Aviv yesh shuk gadol.","In Tel Aviv there is a big market."],
     [["שְׁמוֹ שׁוּק הַכַּרְמֶל.","שמו שוק הכרמל."],"shmo shuk ha-Carmel.","It is called the Carmel Market."],
     [["הוּא מָלֵא צְבָעִים וְרֵיחוֹת.","הוא מלא צבעים וריחות."],"hu male tzva'im ve-reichot.","It is full of colours and smells."],
     [["מוֹכְרִים פֵּרוֹת, יְרָקוֹת וּתְבַלִּינִים.","מוכרים פירות, ירקות ותבלינים."],"mochrim perot, yerakot u-tvalinim.","They sell fruit, vegetables and spices."],
     [["הַמּוֹכְרִים צוֹעֲקִים בְּקוֹל רָם.","המוכרים צועקים בקול רם."],"ha-mochrim tzo'akim be-kol ram.","The sellers shout loudly."],
     [["קָנִיתִי תְּמָרִים וְרִמּוֹנִים.","קניתי תמרים ורימונים."],"kaniti tmarim ve-rimonim.","I bought dates and pomegranates."],
     [["טָעַמְתִּי חוּמוּס טָרִי.","טעמתי חומוס טרי."],"ta'amti chumus tari.","I tasted fresh hummus."],
     [["הָיָה גַּם פָלָאפֶל חַם.","היה גם פלאפל חם."],"haya gam falafel cham.","There was also hot falafel."],
     [["הַשּׁוּק הָיָה מָלֵא חַיִּים.","השוק היה מלא חיים."],"ha-shuk haya male chayim.","The market was full of life."],
     [["קוֹבִּי הִכִּיר הַרְבֵּה מוֹכְרִים.","קובי הכיר הרבה מוכרים."],"Kobi hikir harbe mochrim.","Kobi knew many sellers."],
     [["הֵם דִּבְּרוּ אִתּוֹ בְּחֹם.","הם דיברו איתו בחום."],"hem dibru ito be-chom.","They spoke with him warmly."],
     [["הֶרְגַּשְׁתִּי אֶת הַחֹם שֶׁל יִשְׂרָאֵל.","הרגשתי את החום של ישראל."],"hirgashti et ha-chom shel Yisrael.","I felt the warmth of Israel."],
     [["אֲנָשִׁים פֹּה פְּתוּחִים.","אנשים פה פתוחים."],"anashim po ptuchim.","People here are open."],
     [["הַשּׁוּק הוּא הַלֵּב שֶׁל הָעִיר.","השוק הוא הלב של העיר."],"ha-shuk hu ha-lev shel ha-ir.","The market is the heart of the city."],
     [["אֲנִי רוֹצֶה לַחְזֹר שׁוּב.","אני רוצה לחזור שוב."],"ani rotze lachzor shuv.","I want to come back again."]],
  quiz:[{q:"What is the market called?",opts:["Mahane Yehuda","Carmel Market","Levinsky"],a:1},{q:"Who knew many sellers?",opts:["Vincenzo","Kobi","Miki"],a:1}]},
 {id:"gg3",t:["הַשָּׂפָה שֶׁל הַיָּדַיִם","שפת הידיים"],en:"The Language of Hands",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["הָאִיטַלְקִים מְדַבְּרִים עִם הַיָּדַיִם.","האיטלקים מדברים עם הידיים."],"ha-italkim medabrim im ha-yadayin.","Italians speak with their hands."],
     [["גַּם הַיִּשְׂרְאֵלִים.","גם הישראלים."],"gam ha-yisre'elim.","Israelis too."],
     [["בַּהַתְחָלָה לֹא יָדַעְתִּי הַרְבֵּה מִלִּים.","בהתחלה לא ידעתי הרבה מילים."],"ba-hatchala lo yadati harbe milim.","At first I did not know many words."],
     [["אָז דִּבַּרְתִּי עִם הַיָּדַיִם.","אז דיברתי עם הידיים."],"az dibarti im ha-yadayin.","So I spoke with my hands."],
     [["הֶרְאֵיתִי בְּתְנוּעוֹת מָה אֲנִי רוֹצֶה.","הראיתי בתנועות מה אני רוצה."],"her'eti bi-tnu'ot ma ani rotze.","I showed with gestures what I wanted."],
     [["בַּשּׁוּק זֶה עָבַד טוֹב.","בשוק זה עבד טוב."],"ba-shuk ze avad tov.","At the market it worked well."],
     [["הִצְבַּעְתִּי עַל הַיְּרָקוֹת.","הצבעתי על הירקות."],"hitzbati al ha-yerakot.","I pointed at the vegetables."],
     [["הַמּוֹכֵר הֵבִין אוֹתִי.","המוכר הבין אותי."],"ha-mocher hevin oti.","The seller understood me."],
     [["לְאַט לְאַט לָמַדְתִּי מִלִּים.","לאט לאט למדתי מילים."],"le'at le'at lamadti milim.","Slowly I learned words."],
     [["אֲבָל הַיָּדַיִם נִשְׁאֲרוּ.","אבל הידיים נשארו."],"aval ha-yadayin nish'aru.","But the hands stayed."],
     [["עַד הַיּוֹם אֲנִי מְדַבֵּר אִתָּן.","עד היום אני מדבר איתן."],"ad ha-yom ani medaber itan.","To this day I speak with them."],
     [["הַתִּקְשֹׁרֶת הִיא יוֹתֵר מִמִּלִּים.","התקשורת היא יותר ממילים."],"ha-tikshoret hi yoter mi-milim.","Communication is more than words."],
     [["הַגּוּף מְדַבֵּר גַּם.","הגוף מדבר גם."],"ha-guf medaber gam.","The body speaks too."],
     [["זֶה מַשֶּׁהוּ שֶׁמְּחַבֵּר אִיטַלְקִים וְיִשְׂרְאֵלִים.","זה משהו שמחבר איטלקים וישראלים."],"ze mashehu she-mechaber italkim ve-yisre'elim.","It is something that connects Italians and Israelis."],
     [["שְׂפַת הַלֵּב.","שפת הלב."],"sfat ha-lev.","The language of the heart."]],
  quiz:[{q:"How did Vincenzo communicate at first?",opts:["By writing","With his hands","Only English"],a:1},{q:"What connects Italians and Israelis?",opts:["Food only","Hand gestures","Music"],a:1}]},
 {id:"hh1",t:["הָאוֹרֵחַ","האורח"],en:"The Guest",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["הָעֶרֶב בָּא אֵלֵינוּ אוֹרֵחַ.","הערב בא אלינו אורח."],"ha-erev ba eleinu oreach.","This evening a guest came to us."],
     [["הוּא חָבֵר שֶׁל קוֹבִּי מֵהַצָּבָא.","הוא חבר של קובי מהצבא."],"hu chaver shel Kobi me-ha-tzava.","He is a friend of Kobi from the army."],
     [["שְׁמוֹ דָּנִי.","שמו דני."],"shmo Dani.","His name is Dani."],
     [["הוּא הֵבִיא יַיִן וְעוּגָה.","הוא הביא יין ועוגה."],"hu hevi yayin ve-uga.","He brought wine and cake."],
     [["בִּשַּׁלְתִּי אֲרוּחָה גְּדוֹלָה.","בישלתי ארוחה גדולה."],"bishalti arucha gdola.","I cooked a big meal."],
     [["אָכַלְנוּ וְדִבַּרְנוּ הַרְבֵּה.","אכלנו ודיברנו הרבה."],"achalnu ve-dibarnu harbe.","We ate and talked a lot."],
     [["דָּנִי סִפֵּר סִפּוּרִים מַצְחִיקִים.","דני סיפר סיפורים מצחיקים."],"Dani siper sipurim matzhikim.","Dani told funny stories."],
     [["צָחַקְנוּ עַד הַלַּיְלָה.","צחקנו עד הלילה."],"tzachaknu ad ha-layla.","We laughed until night."],
     [["הָיָה עֶרֶב נֶהְדָּר.","היה ערב נהדר."],"haya erev nehedar.","It was a wonderful evening."],
     [["חֲבֵרִים טוֹבִים הֵם מַתָּנָה.","חברים טובים הם מתנה."],"chaverim tovim hem matana.","Good friends are a gift."]],
  quiz:[{q:"Where does Dani know Kobi from?",opts:["School","The army","Work"],a:1},{q:"What did Dani bring?",opts:["Flowers","Wine and cake","Books"],a:1}]},
 {id:"hh2",t:["הַמּוּסִיקָה בַּבַּיִת","המוסיקה בבית"],en:"Music at Home",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּבַּיִת שֶׁלָּנוּ תָּמִיד יֵשׁ מוּסִיקָה.","בבית שלנו תמיד יש מוסיקה."],"ba-bayit shelanu tamid yesh musika.","In our home there is always music."],
     [["בַּבֹּקֶר קוֹבִּי שָׂם מוּסִיקָה שְׁקֵטָה.","בבוקר קובי שם מוסיקה שקטה."],"ba-boker Kobi sam musika sheketa.","In the morning Kobi plays quiet music."],
     [["בָּעֶרֶב אֲנִי שָׂם מוּסִיקָה אִיטַלְקִית.","בערב אני שם מוסיקה איטלקית."],"ba-erev ani sam musika italkit.","In the evening I play Italian music."],
     [["לִפְעָמִים שִׁירִים יִשְׂרְאֵלִים.","לפעמים שירים ישראלים."],"lif'amim shirim yisre'elim.","Sometimes Israeli songs."],
     [["אֲנִי לוֹמֵד מִלִּים מֵהַשִּׁירִים.","אני לומד מילים מהשירים."],"ani lomed milim me-ha-shirim.","I learn words from the songs."],
     [["קוֹבִּי שָׁר אִתִּי.","קובי שר איתי."],"Kobi shar iti.","Kobi sings with me."],
     [["אֲנַחְנוּ לֹא זַמָּרִים טוֹבִים.","אנחנו לא זמרים טובים."],"anachnu lo zamarim tovim.","We are not good singers."],
     [["אֲבָל זֶה כֵּיף.","אבל זה כיף."],"aval ze keyf.","But it is fun."],
     [["מוּסִיקָה עוֹשָׂה אֶת הַבַּיִת חַי.","מוסיקה עושה את הבית חי."],"musika osa et ha-bayit chai.","Music makes the home alive."],
     [["אֲנִי אוֹהֵב אֶת הַבַּיִת שֶׁלָּנוּ.","אני אוהב את הבית שלנו."],"ani ohev et ha-bayit shelanu.","I love our home."]],
  quiz:[{q:"What music does Kobi play in the morning?",opts:["Loud rock","Quiet music","Italian songs"],a:1},{q:"What does Vincenzo learn from songs?",opts:["Grammar","Words","Nothing"],a:1}]},
 {id:"hh3",t:["הַמְּעִיל הֶחָדָשׁ","המעיל החדש"],en:"The New Coat",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["הָיָה קַר מְאוֹד בְּבֶּרְלִין.","היה קר מאוד בברלין."],"haya kar me'od be-Berlin.","It was very cold in Berlin."],
     [["הַמְּעִיל הַיָּשָׁן שֶׁלִּי הָיָה דַּק.","המעיל הישן שלי היה דק."],"ha-me'il ha-yashan sheli haya dak.","My old coat was thin."],
     [["הָלַכְתִּי לִקְנוֹת מְעִיל חָדָשׁ.","הלכתי לקנות מעיל חדש."],"halachti liknot me'il chadash.","I went to buy a new coat."],
     [["הַחֲנוּת הָיְתָה מְלֵאָה מְעִילִים.","החנות הייתה מלאה מעילים."],"ha-chanut hayta mle'a me'ilim.","The shop was full of coats."],
     [["נִסִּיתִי כַּמָּה.","ניסיתי כמה."],"nisiti kama.","I tried a few."],
     [["בָּחַרְתִּי מְעִיל שָׁחֹר וְחַם.","בחרתי מעיל שחור וחם."],"bacharti me'il shachor ve-cham.","I chose a black and warm coat."],
     [["הוּא הָיָה בְּדִיּוּק בַּמִּדָּה.","הוא היה בדיוק במידה."],"hu haya bidiyuk ba-mida.","It was exactly my size."],
     [["שָׁלַמְתִּי וְלָבַשְׁתִּי אוֹתוֹ.","שילמתי ולבשתי אותו."],"shilamti ve-lavashti oto.","I paid and put it on."],
     [["בַּחוּץ הָיָה קַר אֲבָל הִרְגַּשְׁתִּי חַם.","בחוץ היה קר אבל הרגשתי חם."],"ba-chutz haya kar aval hirgashti cham.","Outside it was cold but I felt warm."],
     [["עַכְשָׁו אֲנִי מוּכָן לַחֹרֶף.","עכשיו אני מוכן לחורף."],"achshav ani muchan la-choref.","Now I am ready for winter."]],
  quiz:[{q:"Why did Vincenzo need a new coat?",opts:["The old one was thin","He lost it","It was a gift"],a:0},{q:"What colour coat did he choose?",opts:["Blue","Black","Grey"],a:1}]},
 {id:"ii1",t:["הַשָּׁכֵן שֶׁמְּנַגֵּן","השכן שמנגן"],en:"The Neighbour Who Plays",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["מֵעָלֵינוּ גָּר שָׁכֵן שֶׁמְּנַגֵּן בְּפְּסַנְתֵּר.","מעלינו גר שכן שמנגן בפסנתר."],"me'aleinu gar shachen she-menagen be-fsanter.","Above us lives a neighbour who plays piano."],
     [["כָּל עֶרֶב הוּא מְנַגֵּן.","כל ערב הוא מנגן."],"kol erev hu menagen.","Every evening he plays."],
     [["בַּהַתְחָלָה זֶה הִפְרִיעַ לִי.","בהתחלה זה הפריע לי."],"ba-hatchala ze hifria li.","At first it bothered me."],
     [["אֲבָל לְאַט לְאַט אָהַבְתִּי אֶת זֶה.","אבל לאט לאט אהבתי את זה."],"aval le'at le'at ahavti et ze.","But slowly I came to love it."],
     [["הַמּוּסִיקָה שֶׁלּוֹ יָפָה.","המוסיקה שלו יפה."],"ha-musika shelo yafa.","His music is beautiful."],
     [["יוֹם אֶחָד פָּגַשְׁתִּי אוֹתוֹ בַּמַּדְרֵגוֹת.","יום אחד פגשתי אותו במדרגות."],"yom echad pagashti oto ba-madregot.","One day I met him on the stairs."],
     [["אָמַרְתִּי לוֹ שֶׁאֲנִי אוֹהֵב אֶת הַנְּגִינָה.","אמרתי לו שאני אוהב את הנגינה."],"amarti lo she-ani ohev et ha-negina.","I told him I love his playing."],
     [["הוּא הָיָה מְאֻשָּׁר לִשְׁמֹעַ.","הוא היה מאושר לשמוע."],"hu haya me'ushar lishmo'a.","He was happy to hear it."],
     [["הוּא מוּזִיקַאי מִפּוֹלִין.","הוא מוזיקאי מפולין."],"hu muzika'i mi-Polin.","He is a musician from Poland."],
     [["הוּא הִזְמִין אוֹתִי לִשְׁמֹעַ קוֹנְצֶרְט.","הוא הזמין אותי לשמוע קונצרט."],"hu hizmin oti lishmo'a kontzert.","He invited me to hear a concert."],
     [["הָלַכְתִּי עִם קוֹבִּי.","הלכתי עם קובי."],"halachti im Kobi.","I went with Kobi."],
     [["הַקּוֹנְצֶרְט הָיָה נִפְלָא.","הקונצרט היה נפלא."],"ha-kontzert haya nifla.","The concert was wonderful."],
     [["עַכְשָׁו הוּא חָבֵר.","עכשיו הוא חבר."],"achshav hu chaver.","Now he is a friend."],
     [["מוּסִיקָה מְחַבֶּרֶת אֲנָשִׁים.","מוסיקה מחברת אנשים."],"musika mechaberet anashim.","Music connects people."],
     [["גַּם בְּבֶּרְלִין הַקָּרָה.","גם בברלין הקרה."],"gam be-Berlin ha-kara.","Even in cold Berlin."]],
  quiz:[{q:"What instrument does the neighbour play?",opts:["Guitar","Piano","Violin"],a:1},{q:"Where is the musician from?",opts:["Russia","Poland","Germany"],a:1}]},
 {id:"ii2",t:["יוֹם הַזִּכָּרוֹן","יום הזיכרון"],en:"A Day of Remembrance",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["בְּיִשְׂרָאֵל יֵשׁ יוֹם זִכָּרוֹן.","בישראל יש יום זיכרון."],"be-Yisrael yesh yom zikaron.","In Israel there is a memorial day."],
     [["בַּיּוֹם הַזֶּה זוֹכְרִים אֶת הַנּוֹפְלִים.","ביום הזה זוכרים את הנופלים."],"ba-yom ha-ze zochrim et ha-noflim.","On this day they remember the fallen."],
     [["בַּבֹּקֶר יֵשׁ צְפִירָה.","בבוקר יש צפירה."],"ba-boker yesh tzfira.","In the morning there is a siren."],
     [["כָּל הַמְּדִינָה עוֹצֶרֶת.","כל המדינה עוצרת."],"kol ha-medina otzeret.","The whole country stops."],
     [["אֲנָשִׁים עוֹמְדִים בְּשֶׁקֶט.","אנשים עומדים בשקט."],"anashim omdim be-sheket.","People stand in silence."],
     [["גַּם הַמְּכוֹנִיּוֹת עוֹצְרוֹת בַּכְּבִישׁ.","גם המכוניות עוצרות בכביש."],"gam ha-mechoniyot otzrot ba-kvish.","Even the cars stop on the road."],
     [["רָאִיתִי אֶת זֶה בַּפַּעַם הָרִאשׁוֹנָה עִם קוֹבִּי.","ראיתי את זה בפעם הראשונה עם קובי."],"ra'iti et ze ba-pa'am ha-rishona im Kobi.","I saw this for the first time with Kobi."],
     [["הָיִיתִי מֻפְתָּע מְאוֹד.","הייתי מופתע מאוד."],"hayiti mufta me'od.","I was very surprised."],
     [["מְדִינָה שְׁלֵמָה שֶׁעוֹצֶרֶת יַחַד.","מדינה שלמה שעוצרת יחד."],"medina shlema she-otzeret yachad.","A whole country that stops together."],
     [["זֶה רֶגַע חָזָק מְאוֹד.","זה רגע חזק מאוד."],"ze rega chazak me'od.","It is a very powerful moment."],
     [["קוֹבִּי עָמַד לְיָדִי בְּשֶׁקֶט.","קובי עמד לידי בשקט."],"Kobi amad le-yadi be-sheket.","Kobi stood beside me in silence."],
     [["הִרְגַּשְׁתִּי אֶת הַכְּאֵב שֶׁל הָעָם.","הרגשתי את הכאב של העם."],"hirgashti et ha-ke'ev shel ha-am.","I felt the pain of the people."],
     [["בְּאִיטַלְיָה אֵין דָּבָר כָּזֶה.","באיטליה אין דבר כזה."],"be-Italia ein davar ka-ze.","In Italy there is nothing like this."],
     [["לָמַדְתִּי מַשֶּׁהוּ עָמֹק עַל יִשְׂרָאֵל.","למדתי משהו עמוק על ישראל."],"lamadti mashehu amok al Yisrael.","I learned something deep about Israel."],
     [["עַל הַזִּכָּרוֹן וְעַל הַחַיִּים.","על הזיכרון ועל החיים."],"al ha-zikaron ve-al ha-chayim.","About memory and about life."],
     [["אַחֲרֵי יוֹם הַזִּכָּרוֹן בָּא יוֹם הָעַצְמָאוּת.","אחרי יום הזיכרון בא יום העצמאות."],"acharei yom ha-zikaron ba yom ha-atzma'ut.","After the memorial day comes independence day."],
     [["מֵעֶצֶב לְשִׂמְחָה בְּיוֹם אֶחָד.","מעצב לשמחה ביום אחד."],"me-etzev le-simcha be-yom echad.","From sadness to joy in one day."],
     [["זֶה מַשֶּׁהוּ מְיֻחָד מְאוֹד.","זה משהו מיוחד מאוד."],"ze mashehu meyuchad me'od.","It is something very special."],
     [["עַם שֶׁיּוֹדֵעַ לִזְכֹּר וְלִשְׂמֹחַ.","עם שיודע לזכור ולשמוח."],"am she-yodea lizkor ve-lismoach.","A people that knows to remember and to rejoice."],
     [["זֶה לִמֵּד אוֹתִי הַרְבֵּה.","זה לימד אותי הרבה."],"ze limed oti harbe.","This taught me a lot."]],
  quiz:[{q:"What happens during the morning siren?",opts:["People dance","The whole country stops","Shops open"],a:1},{q:"What comes after the memorial day?",opts:["A holiday of food","Independence day","A normal day"],a:1}]},
 {id:"jj1",t:["הַתְּמוּנָה עַל הַקִּיר","התמונה על הקיר"],en:"The Picture on the Wall",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בַּסָּלוֹן יֵשׁ תְּמוּנָה גְּדוֹלָה.","בסלון יש תמונה גדולה."],"ba-salon yesh tmuna gdola.","In the living room there is a big picture."],
     [["זוֹ תְּמוּנָה שֶׁל סִיצִילְיָה.","זו תמונה של סיציליה."],"zo tmuna shel Sitzilya.","It is a picture of Sicily."],
     [["רוֹאִים בָּהּ אֶת הַיָּם וְהַשֶּׁמֶשׁ.","רואים בה את הים והשמש."],"ro'im ba et ha-yam ve-ha-shemesh.","You can see the sea and the sun in it."],
     [["אִמָּא נָתְנָה לִי אוֹתָהּ.","אמא נתנה לי אותה."],"ima natna li ota.","Mom gave it to me."],
     [["כְּשֶׁאֲנִי מִתְגַּעְגֵּעַ אֲנִי מִסְתַּכֵּל עָלֶיהָ.","כשאני מתגעגע אני מסתכל עליה."],"kshe-ani mitga'age'a ani mistakel aleha.","When I miss home I look at it."],
     [["הִיא מַזְכִּירָה לִי מֵאַיִן בָּאתִי.","היא מזכירה לי מאיין באתי."],"hi mazkira li me-ayin bati.","It reminds me where I came from."],
     [["קוֹבִּי אוֹהֵב אוֹתָהּ גַּם.","קובי אוהב אותה גם."],"Kobi ohev ota gam.","Kobi loves it too."],
     [["הוּא אוֹמֵר שֶׁהַצְּבָעִים יָפִים.","הוא אומר שהצבעים יפים."],"hu omer she-ha-tzva'im yafim.","He says the colours are beautiful."],
     [["הַתְּמוּנָה הִיא חֵלֶק מֵהַבַּיִת.","התמונה היא חלק מהבית."],"ha-tmuna hi chelek me-ha-bayit.","The picture is part of the home."],
     [["חֵלֶק מִמֶּנִּי.","חלק ממני."],"chelek mimeni.","Part of me."]],
  quiz:[{q:"What is the picture of?",opts:["Berlin","Sicily","Tel Aviv"],a:1},{q:"Who gave it to Vincenzo?",opts:["Kobi","His mom","Miki"],a:1}]},
 {id:"jj2",t:["הַחֲבֵרִים בַּפַּארְק","החברים בפארק"],en:"Friends in the Park",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בְּסוֹף הַשָּׁבוּעַ אֲנַחְנוּ הוֹלְכִים לַפַּארְק.","בסוף השבוע אנחנו הולכים לפארק."],"be-sof ha-shavua anachnu holchim la-park.","At the weekend we go to the park."],
     [["נִפְגָּשִׁים שָׁם עִם חֲבֵרִים.","נפגשים שם עם חברים."],"nifgashim sham im chaverim.","We meet friends there."],
     [["מְבִיאִים אֹכֶל וּשְׁמִיכָה.","מביאים אוכל ושמיכה."],"mevi'im ochel u-shmicha.","We bring food and a blanket."],
     [["יוֹשְׁבִים עַל הַדֶּשֶׁא.","יושבים על הדשא."],"yoshvim al ha-deshe.","We sit on the grass."],
     [["הַיְּלָדִים מְשַׂחֲקִים.","הילדים משחקים."],"ha-yeladim mesachakim.","The children play."],
     [["אֲנַחְנוּ מְדַבְּרִים וְצוֹחֲקִים.","אנחנו מדברים וצוחקים."],"anachnu medabrim ve-tzochakim.","We talk and laugh."],
     [["הַשֶּׁמֶשׁ חַמָּה וְנְעִימָה.","השמש חמה ונעימה."],"ha-shemesh chama u-ne'ima.","The sun is warm and pleasant."],
     [["זֶה כְּמוֹ בְּאִיטַלְיָה.","זה כמו באיטליה."],"ze kmo be-Italia.","It is like in Italy."],
     [["בֶּרְלִין בַּקַּיִץ יָפָה.","ברלין בקיץ יפה."],"Berlin ba-kayitz yafa.","Berlin in summer is beautiful."],
     [["יָמִים כָּאֵלֶּה הֵם מַתָּנָה.","ימים כאלה הם מתנה."],"yamim ka-ele hem matana.","Days like these are a gift."]],
  quiz:[{q:"What do they bring to the park?",opts:["Books","Food and a blanket","Bicycles"],a:1},{q:"What is Berlin like in summer?",opts:["Cold","Beautiful","Boring"],a:1}]},
 {id:"kk1",t:["הַשִּׁעוּר הָאַחֲרוֹן","השיעור האחרון"],en:"The Last Lesson",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["הַיּוֹם הָיָה הַשִּׁעוּר הָאַחֲרוֹן בַּקּוּרְס.","היום היה השיעור האחרון בקורס."],"ha-yom haya ha-shi'ur ha-acharon ba-kurs.","Today was the last lesson in the course."],
     [["לָמַדְנוּ יַחַד חֲצִי שָׁנָה.","למדנו יחד חצי שנה."],"lamadnu yachad chatzi shana.","We studied together for half a year."],
     [["הַכִּתָּה הָיְתָה קְטַנָּה אֲבָל חַמָּה.","הכיתה הייתה קטנה אבל חמה."],"ha-kita hayta ktana aval chama.","The class was small but warm."],
     [["הִכַּרְתִּי אֲנָשִׁים מֵהָעוֹלָם.","הכרתי אנשים מהעולם."],"hikarti anashim me-ha-olam.","I met people from the world."],
     [["אֱלִיעָד הָיָה מוֹרֶה מְצֻיָּן.","אליעד היה מורה מצוין."],"Eliad haya more metzuyan.","Eliad was an excellent teacher."],
     [["הוּא לִמֵּד אוֹתָנוּ בְּסַבְלָנוּת.","הוא לימד אותנו בסבלנות."],"hu limed otanu be-savlanut.","He taught us with patience."],
     [["בַּשִּׁעוּר הָאַחֲרוֹן הֵבֵאנוּ אֹכֶל.","בשיעור האחרון הבאנו אוכל."],"ba-shi'ur ha-acharon hevenu ochel.","In the last lesson we brought food."],
     [["כָּל אֶחָד מֵאֶרֶץ אַחֶרֶת.","כל אחד מארץ אחרת."],"kol echad me-eretz acheret.","Each one from a different country."],
     [["אֲנִי הֵבֵאתִי פַּסְטָה.","אני הבאתי פסטה."],"ani heveti pasta.","I brought pasta."],
     [["אָכַלְנוּ וְדִבַּרְנוּ בְּעִבְרִית.","אכלנו ודיברנו בעברית."],"achalnu ve-dibarnu be-ivrit.","We ate and talked in Hebrew."],
     [["הָיִינוּ גֵּאִים בְּעַצְמֵנוּ.","היינו גאים בעצמנו."],"hayinu ge'im be-atzmenu.","We were proud of ourselves."],
     [["לִפְנֵי חֲצִי שָׁנָה לֹא יָדַעְנוּ כְּלוּם.","לפני חצי שנה לא ידענו כלום."],"lifnei chatzi shana lo yadanu klum.","Half a year ago we knew nothing."],
     [["עַכְשָׁו אֲנַחְנוּ מְדַבְּרִים.","עכשיו אנחנו מדברים."],"achshav anachnu medabrim.","Now we speak."],
     [["זֶה הָיָה מַסָּע יָפֶה.","זה היה מסע יפה."],"ze haya masa yafe.","It was a beautiful journey."],
     [["אֲבָל הַלִּמּוּד נִמְשָׁךְ.","אבל הלימוד נמשך."],"aval ha-limud nimshach.","But the learning continues."]],
  quiz:[{q:"How long was the course?",opts:["A month","Half a year","Two years"],a:1},{q:"What food did Vincenzo bring?",opts:["Falafel","Pasta","Cake"],a:1}]},
 {id:"kk2",t:["הָעֲבוֹדָה הֲכִי טוֹבָה","העבודה הכי טובה"],en:"The Best Job",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["אֲנִי עוֹבֵד כִּמְעַצֵּב פְּנִים.","אני עובד כמעצב פנים."],"ani oved ke-me'atzev pnim.","I work as an interior designer."],
     [["אֲנִי אוֹהֵב אֶת הָעֲבוֹדָה שֶׁלִּי.","אני אוהב את העבודה שלי."],"ani ohev et ha-avoda sheli.","I love my job."],
     [["אֲנִי עוֹזֵר לַאֲנָשִׁים לְעַצֵּב בָּתִּים.","אני עוזר לאנשים לעצב בתים."],"ani ozer la-anashim le'atzev batim.","I help people design homes."],
     [["כָּל לָקוֹחַ הוּא שׁוֹנֶה.","כל לקוח הוא שונה."],"kol lakoach hu shone.","Every client is different."],
     [["אֲנִי מְקַשִּׁיב לְמָה שֶׁהֵם רוֹצִים.","אני מקשיב למה שהם רוצים."],"ani makshiv le-ma she-hem rotzim.","I listen to what they want."],
     [["אַחַר כָּךְ אֲנִי מַצִּיעַ רַעְיוֹנוֹת.","אחר כך אני מציע רעיונות."],"achar kach ani matzia ra'ayonot.","Then I suggest ideas."],
     [["אֲנִי אוֹהֵב צְבָעִים חַמִּים.","אני אוהב צבעים חמים."],"ani ohev tzva'im chamim.","I love warm colours."],
     [["עֵץ, אֶבֶן, אוֹר טִבְעִי.","עץ, אבן, אור טבעי."],"etz, even, or tiv'i.","Wood, stone, natural light."],
     [["הַסִּגְנוֹן שֶׁלִּי הוּא פָּשׁוּט וְחַם.","הסגנון שלי הוא פשוט וחם."],"ha-signon sheli hu pashut ve-cham.","My style is simple and warm."],
     [["הַלָּקוֹחוֹת מְרֻצִּים.","הלקוחות מרוצים."],"ha-lakochot merutzim.","The clients are satisfied."],
     [["כְּשֶׁבַּיִת נַעֲשֶׂה יָפֶה אֲנִי שָׂמֵחַ.","כשבית נעשה יפה אני שמח."],"kshe-bayit na'ase yafe ani sameach.","When a home becomes beautiful I am happy."],
     [["עֲבוֹדָה טוֹבָה הִיא כְּשֶׁאַתָּה אוֹהֵב אוֹתָהּ.","עבודה טובה היא כשאתה אוהב אותה."],"avoda tova hi kshe-ata ohev ota.","A good job is when you love it."],
     [["אֲנִי בַּר מַזָּל.","אני בר מזל."],"ani bar mazal.","I am lucky."],
     [["בֶּרְלִין נָתְנָה לִי הִזְדַּמְּנוּת.","ברלין נתנה לי הזדמנות."],"Berlin natna li hizdamnut.","Berlin gave me an opportunity."],
     [["וַאֲנִי מְנַצֵּל אוֹתָהּ.","ואני מנצל אותה."],"va-ani menatzel ota.","And I make the most of it."]],
  quiz:[{q:"What is Vincenzo's job?",opts:["Chef","Interior designer","Teacher"],a:1},{q:"What colours does he love?",opts:["Cold colours","Warm colours","No colours"],a:1}]},
 {id:"ll1",t:["הַשִּׁיר הָרִאשׁוֹן","השיר הראשון"],en:"The First Song",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["לָמַדְתִּי אֶת הַשִּׁיר הָעִבְרִי הָרִאשׁוֹן שֶׁלִּי.","למדתי את השיר העברי הראשון שלי."],"lamadti et ha-shir ha-ivri ha-rishon sheli.","I learned my first Hebrew song."],
     [["קוֹבִּי לִמֵּד אוֹתִי אוֹתוֹ.","קובי לימד אותי אותו."],"Kobi limed oti oto.","Kobi taught it to me."],
     [["זֶה שִׁיר יָשָׁן וְיָפֶה.","זה שיר ישן ויפה."],"ze shir yashan ve-yafe.","It is an old and beautiful song."],
     [["בַּהַתְחָלָה לֹא הֵבַנְתִּי אֶת הַמִּלִּים.","בהתחלה לא הבנתי את המילים."],"ba-hatchala lo hevanti et ha-milim.","At first I did not understand the words."],
     [["קוֹבִּי הִסְבִּיר לִי כָּל מִלָּה.","קובי הסביר לי כל מילה."],"Kobi hisbir li kol mila.","Kobi explained each word to me."],
     [["שָׁרְנוּ אוֹתוֹ יַחַד.","שרנו אותו יחד."],"sharnu oto yachad.","We sang it together."],
     [["אֲנִי לֹא זַמָּר טוֹב.","אני לא זמר טוב."],"ani lo zamar tov.","I am not a good singer."],
     [["אֲבָל זֶה לֹא חָשׁוּב.","אבל זה לא חשוב."],"aval ze lo chashuv.","But it does not matter."],
     [["עַכְשָׁו זֶה הַשִּׁיר שֶׁלָּנוּ.","עכשיו זה השיר שלנו."],"achshav ze ha-shir shelanu.","Now it is our song."],
     [["מוּסִיקָה מְלַמֶּדֶת עִבְרִית בְּדֶרֶךְ יָפָה.","מוסיקה מלמדת עברית בדרך יפה."],"musika melaem et ivrit be-derech yafa.","Music teaches Hebrew in a beautiful way."]],
  quiz:[{q:"Who taught Vincenzo the song?",opts:["Miki","Kobi","A teacher"],a:1},{q:"What does Vincenzo say about his singing?",opts:["He is great","He is not good","He never sings"],a:1}]},
 {id:"ll2",t:["הַבֹּקֶר בַּשּׁוּק","הבוקר בשוק"],en:"Morning at the Market",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּבֹּקֶר אֲנִי הוֹלֵךְ לַשּׁוּק.","בבוקר אני הולך לשוק."],"ba-boker ani holech la-shuk.","In the morning I go to the market."],
     [["הַשּׁוּק פָּתוּחַ מֻקְדָּם.","השוק פתוח מוקדם."],"ha-shuk patuach mukdam.","The market opens early."],
     [["יֵשׁ פֵּרוֹת טְרִיִּים.","יש פירות טריים."],"yesh perot tri'im.","There is fresh fruit."],
     [["אֲנִי קוֹנֶה תַּפּוּחִים וּבָנָנוֹת.","אני קונה תפוחים ובננות."],"ani kone tapuchim u-vananot.","I buy apples and bananas."],
     [["גַּם לֶחֶם טָרִי.","גם לחם טרי."],"gam lechem tari.","Also fresh bread."],
     [["הַמּוֹכֵר מַכִּיר אוֹתִי.","המוכר מכיר אותי."],"ha-mocher makir oti.","The seller knows me."],
     [["הוּא אוֹמֵר לִי בֹּקֶר טוֹב.","הוא אומר לי בוקר טוב."],"hu omer li boker tov.","He says good morning to me."],
     [["אֲנִי עוֹנֶה בְּעִבְרִית.","אני עונה בעברית."],"ani one be-ivrit.","I answer in Hebrew."],
     [["זֶה רֶגַע קָטָן וְיָפֶה.","זה רגע קטן ויפה."],"ze rega katan ve-yafe.","It is a small and beautiful moment."],
     [["הַשּׁוּק הוּא חֵלֶק מֵהַבֹּקֶר שֶׁלִּי.","השוק הוא חלק מהבוקר שלי."],"ha-shuk hu chelek me-ha-boker sheli.","The market is part of my morning."]],
  quiz:[{q:"When does the market open?",opts:["Late","Early","At noon"],a:1},{q:"How does Vincenzo answer the seller?",opts:["In Italian","In Hebrew","In English"],a:1}]},
 {id:"ll3",t:["הַחֲבֵרָה שֶׁל אַנְגֶ'לָה","החברה של אנג'לה"],en:"Angela's Friend",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["לְאַנְגֶ'לָה יֵשׁ חֲבֵרָה טוֹבָה.","לאנג'לה יש חברה טובה."],"le-Angela yesh chavera tova.","Angela has a good friend."],
     [["שְׁמָהּ מָרִיָּה.","שמה מריה."],"shma Maria.","Her name is Maria."],
     [["הֵן חֲבֵרוֹת מֵהַיַּלְדוּת.","הן חברות מהילדות."],"hen chaverot me-ha-yaldut.","They are friends from childhood."],
     [["מָרִיָּה גָּרָה לְיַד אִמָּא בְּרוֹסוֹלִינִי.","מריה גרה ליד אמא ברוסוליני."],"Maria gara leyad ima be-Rosolini.","Maria lives near Mom in Rosolini."],
     [["הֵן שׁוֹתוֹת קָפֶה יַחַד כָּל יוֹם.","הן שותות קפה יחד כל יום."],"hen shotot kafe yachad kol yom.","They drink coffee together every day."],
     [["כְּשֶׁאֲנִי מִתְקַשֵּׁר, אֲנִי שׁוֹאֵל עַל מָרִיָּה.","כשאני מתקשר, אני שואל על מריה."],"kshe-ani mitkasher, ani sho'el al Maria.","When I call, I ask about Maria."],
     [["הִיא תָּמִיד שׁוֹלַחַת לִי שָׁלוֹם.","היא תמיד שולחת לי שלום."],"hi tamid sholachat li shalom.","She always sends me regards."],
     [["אֲנִי שָׂמֵחַ שֶׁלְּאִמָּא יֵשׁ חֲבֵרָה.","אני שמח שלאמא יש חברה."],"ani sameach she-le-ima yesh chavera.","I am glad Mom has a friend."],
     [["חֲבֵרוּת טוֹבָה הִיא חֲשׁוּבָה.","חברות טובה היא חשובה."],"chaverut tova hi chashuva.","Good friendship is important."],
     [["גַּם כְּשֶׁמַּזְקִינִים.","גם כשמזקינים."],"gam kshe-mazkinim.","Even as you grow old."]],
  quiz:[{q:"How long have Angela and Maria been friends?",opts:["A year","Since childhood","A month"],a:1},{q:"What does Maria always send Vincenzo?",opts:["Money","Regards","Food"],a:1}]},
 {id:"mm1",t:["הַחֹרֶף הָרִאשׁוֹן","החורף הראשון"],en:"The First Winter",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["הַחֹרֶף הָרִאשׁוֹן שֶׁלִּי בְּבֶּרְלִין הָיָה קָשֶׁה.","החורף הראשון שלי בברלין היה קשה."],"ha-choref ha-rishon sheli be-Berlin haya kashe.","My first winter in Berlin was hard."],
     [["הָיָה קַר מְאוֹד.","היה קר מאוד."],"haya kar me'od.","It was very cold."],
     [["בְּסִיצִילְיָה אֵין חֹרֶף כָּזֶה.","בסיציליה אין חורף כזה."],"be-Sitzilya ein choref ka-ze.","In Sicily there is no winter like this."],
     [["הַיָּמִים הָיוּ קְצָרִים וַחֲשׁוּכִים.","הימים היו קצרים וחשוכים."],"ha-yamim hayu ktzarim va-chashuchim.","The days were short and dark."],
     [["הִרְגַּשְׁתִּי עָצוּב לִפְעָמִים.","הרגשתי עצוב לפעמים."],"hirgashti atzuv lif'amim.","I felt sad sometimes."],
     [["קוֹבִּי רָאָה אֶת זֶה.","קובי ראה את זה."],"Kobi ra'a et ze.","Kobi saw that."],
     [["הוּא קָנָה הַרְבֵּה נֵרוֹת.","הוא קנה הרבה נרות."],"hu kana harbe nerot.","He bought many candles."],
     [["הוּא בִּשֵּׁל אֹכֶל חַם כָּל עֶרֶב.","הוא בישל אוכל חם כל ערב."],"hu bishel ochel cham kol erev.","He cooked warm food every evening."],
     [["הוּא עָשָׂה אֶת הַבַּיִת חַמִּים.","הוא עשה את הבית חמים."],"hu asa et ha-bayit chamim.","He made the home warm."],
     [["לְאַט לְאַט הִתְרַגַּלְתִּי לַחֹרֶף.","לאט לאט התרגלתי לחורף."],"le'at le'at hitragalti la-choref.","Slowly I got used to winter."],
     [["לָמַדְתִּי לִמְצֹא חֹם בְּתוֹךְ הַקֹּר.","למדתי למצוא חום בתוך הקור."],"lamadti limtzo chom be-toch ha-kor.","I learned to find warmth inside the cold."],
     [["הַחֹם בָּא מֵהַאֲנָשִׁים.","החום בא מהאנשים."],"ha-chom ba me-ha-anashim.","The warmth comes from the people."],
     [["לֹא מֵהַמֶּזֶג אֲוִיר.","לא מהמזג אוויר."],"lo me-ha-mezeg avir.","Not from the weather."],
     [["עַכְשָׁו אֲנִי אוֹהֵב גַּם אֶת הַחֹרֶף.","עכשיו אני אוהב גם את החורף."],"achshav ani ohev gam et ha-choref.","Now I love winter too."],
     [["כִּי קוֹבִּי לְיָדִי.","כי קובי לידי."],"ki Kobi le-yadi.","Because Kobi is beside me."]],
  quiz:[{q:"Why was the first winter hard?",opts:["Too hot","Very cold and dark","Too rainy"],a:1},{q:"Where does the warmth come from?",opts:["The weather","The people","The candles"],a:1}]},
 {id:"mm2",t:["הַבֵּיקוּר בְּמוּזֵיאוֹן יְהוּדִי","הביקור במוזיאון יהודי"],en:"Visit to the Jewish Museum",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["בְּבֶּרְלִין יֵשׁ מוּזֵיאוֹן יְהוּדִי.","בברלין יש מוזיאון יהודי."],"be-Berlin yesh muze'on yehudi.","In Berlin there is a Jewish museum."],
     [["קוֹבִּי רָצָה שֶׁנֵּלֵךְ.","קובי רצה שנלך."],"Kobi ratza she-nelech.","Kobi wanted us to go."],
     [["הַבִּנְיָן עַצְמוֹ מְיֻחָד.","הבניין עצמו מיוחד."],"ha-binyan atzmo meyuchad.","The building itself is special."],
     [["הוּא בָּנוּי בְּצוּרָה מוּזָרָה.","הוא בנוי בצורה מוזרה."],"hu banui be-tzura muzara.","It is built in a strange shape."],
     [["בְּתוֹכוֹ יֵשׁ הַרְבֵּה סִפּוּרִים.","בתוכו יש הרבה סיפורים."],"be-tocho yesh harbe sipurim.","Inside there are many stories."],
     [["עַל הַחַיִּים שֶׁל יְהוּדִים בְּגֶּרְמַנְיָה.","על החיים של יהודים בגרמניה."],"al ha-chayim shel yehudim be-Germania.","About Jewish life in Germany."],
     [["הָיוּ חֲלָקִים שְׂמֵחִים וַעֲצוּבִים.","היו חלקים שמחים ועצובים."],"hayu chalakim smechim va-atzuvim.","There were happy and sad parts."],
     [["רָאִיתִי תְּמוּנוֹת יְשָׁנוֹת.","ראיתי תמונות ישנות."],"ra'iti tmunot yeshanot.","I saw old photographs."],
     [["קָרָאתִי מִכְתָּבִים יְשָׁנִים.","קראתי מכתבים ישנים."],"karati michtavim yeshanim.","I read old letters."],
     [["הָיָה רֶגַע שֶׁל שֶׁקֶט גָּדוֹל.","היה רגע של שקט גדול."],"haya rega shel sheket gadol.","There was a moment of great silence."],
     [["קוֹבִּי הֶחְזִיק אֶת יָדִי.","קובי החזיק את ידי."],"Kobi hechzik et yadi.","Kobi held my hand."],
     [["הֵבַנְתִּי יוֹתֵר עַל הַמִּשְׁפָּחָה שֶׁלּוֹ.","הבנתי יותר על המשפחה שלו."],"hevanti yoter al ha-mishpacha shelo.","I understood more about his family."],
     [["הִיסְטוֹרְיָה הִיא חֵלֶק מֵהָאַהֲבָה.","היסטוריה היא חלק מהאהבה."],"historia hi chelek me-ha-ahava.","History is part of love."],
     [["לְהָבִין מֵאַיִן בָּא מִי שֶׁאַתָּה אוֹהֵב.","להבין מאיין בא מי שאתה אוהב."],"lehavin me-ayin ba mi she-ata ohev.","To understand where the one you love comes from."],
     [["יָצָאנוּ שְׁקֵטִים אֲבָל קְרוֹבִים יוֹתֵר.","יצאנו שקטים אבל קרובים יותר."],"yatzanu shketim aval krovim yoter.","We left quiet but closer."]],
  quiz:[{q:"What is special about the museum building?",opts:["It is very small","It is built in a strange shape","It is underground"],a:1},{q:"What did Vincenzo understand better?",opts:["German history only","Kobi's family","Art"],a:1}]},
 {id:"nn1",t:["הָאוֹר בַּמִּטְבָּח","האור במטבח"],en:"Light in the Kitchen",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["הַמִּטְבָּח שֶׁלָּנוּ קָטָן אֲבָל מוּאָר.","המטבח שלנו קטן אבל מואר."],"ha-mitbach shelanu katan aval mu'ar.","Our kitchen is small but bright."],
     [["יֵשׁ בּוֹ חַלּוֹן גָּדוֹל.","יש בו חלון גדול."],"yesh bo chalon gadol.","It has a big window."],
     [["בַּבֹּקֶר הַשֶּׁמֶשׁ נִכְנֶסֶת.","בבוקר השמש נכנסת."],"ba-boker ha-shemesh nichneset.","In the morning the sun comes in."],
     [["אֲנִי אוֹהֵב לְבַשֵּׁל שָׁם.","אני אוהב לבשל שם."],"ani ohev levashel sham.","I love to cook there."],
     [["הָאוֹר עוֹשֶׂה אֶת הַכֹּל יָפֶה.","האור עושה את הכל יפה."],"ha-or osa et ha-kol yafe.","The light makes everything beautiful."],
     [["עַל הַשֻּׁלְחָן יֵשׁ פְּרָחִים.","על השולחן יש פרחים."],"al ha-shulchan yesh prachim.","On the table there are flowers."],
     [["אֲנִי מֵכִין קָפֶה בַּבֹּקֶר.","אני מכין קפה בבוקר."],"ani mechin kafe ba-boker.","I make coffee in the morning."],
     [["קוֹבִּי בָּא וְיוֹשֵׁב.","קובי בא ויושב."],"Kobi ba ve-yoshev.","Kobi comes and sits."],
     [["אֲנַחְנוּ מַתְחִילִים אֶת הַיּוֹם יַחַד.","אנחנו מתחילים את היום יחד."],"anachnu matchilim et ha-yom yachad.","We start the day together."],
     [["הַמִּטְבָּח הוּא הַלֵּב שֶׁל הַבַּיִת.","המטבח הוא הלב של הבית."],"ha-mitbach hu ha-lev shel ha-bayit.","The kitchen is the heart of the home."]],
  quiz:[{q:"What does the kitchen have?",opts:["A small window","A big window","No window"],a:1},{q:"What is on the table?",opts:["Books","Flowers","Plates"],a:1}]},
 {id:"nn2",t:["הַטִּיּוּל בָּעֵרֶב","הטיול בערב"],en:"The Evening Walk",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בָּעֶרֶב אֲנַחְנוּ יוֹצְאִים לְטַיֵּל.","בערב אנחנו יוצאים לטייל."],"ba-erev anachnu yotz'im letayel.","In the evening we go for a walk."],
     [["הָרְחוֹבוֹת שְׁקֵטִים.","הרחובות שקטים."],"ha-rechovot shketim.","The streets are quiet."],
     [["הָאוֹרוֹת דּוֹלְקִים.","האורות דולקים."],"ha-orot dolkim.","The lights are on."],
     [["אֲנַחְנוּ הוֹלְכִים לְיַד הַנָּהָר.","אנחנו הולכים ליד הנהר."],"anachnu holchim leyad ha-nahar.","We walk beside the river."],
     [["מְדַבְּרִים עַל הַיּוֹם.","מדברים על היום."],"medabrim al ha-yom.","We talk about the day."],
     [["לִפְעָמִים אֲנַחְנוּ שׁוֹתְקִים.","לפעמים אנחנו שותקים."],"lif'amim anachnu shotkim.","Sometimes we are silent."],
     [["שֶׁקֶט טוֹב הוּא גַּם שִׂיחָה.","שקט טוב הוא גם שיחה."],"sheket tov hu gam sicha.","Good silence is also a conversation."],
     [["הָאֲוִיר קָרִיר וְנָעִים.","האוויר קריר ונעים."],"ha-avir karir ve-na'im.","The air is cool and pleasant."],
     [["חוֹזְרִים הַבַּיְתָה רְגוּעִים.","חוזרים הביתה רגועים."],"chozrim ha-bayta regu'im.","We return home relaxed."],
     [["טִיּוּל עֶרֶב הוּא הַטֶּקֶס שֶׁלָּנוּ.","טיול ערב הוא הטקס שלנו."],"tiyul erev hu ha-tekes shelanu.","An evening walk is our ritual."]],
  quiz:[{q:"Where do they walk?",opts:["By the river","In the park","Downtown"],a:0},{q:"How do they return home?",opts:["Tired","Relaxed","Hungry"],a:1}]},
 {id:"nn3",t:["הַסֵּפֶר הָאַחֲרוֹן","הספר האחרון"],en:"The Last Book",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["גָּמַרְתִּי לִקְרֹא סֵפֶר בְּעִבְרִית.","גמרתי לקרוא ספר בעברית."],"gamarti likro sefer be-ivrit.","I finished reading a book in Hebrew."],
     [["זֶה הָיָה סֵפֶר קָטָן וְקַל.","זה היה ספר קטן וקל."],"ze haya sefer katan ve-kal.","It was a small and easy book."],
     [["אֲבָל זֶה הָרִאשׁוֹן שֶׁגָּמַרְתִּי.","אבל זה הראשון שגמרתי."],"aval ze ha-rishon she-gamarti.","But it is the first one I finished."],
     [["הִרְגַּשְׁתִּי גֵּאֶה מְאוֹד.","הרגשתי גאה מאוד."],"hirgashti ge'e me'od.","I felt very proud."],
     [["הֶרְאֵיתִי אוֹתוֹ לְקוֹבִּי.","הראיתי אותו לקובי."],"her'eti oto le-Kobi.","I showed it to Kobi."],
     [["הוּא חִיֵּךְ וְאָמַר כָּל הַכָּבוֹד.","הוא חייך ואמר כל הכבוד."],"hu chiyech ve-amar kol ha-kavod.","He smiled and said well done."],
     [["לֹא הֵבַנְתִּי כָּל מִלָּה.","לא הבנתי כל מילה."],"lo hevanti kol mila.","I did not understand every word."],
     [["אֲבָל הֵבַנְתִּי אֶת הַסִּפּוּר.","אבל הבנתי את הסיפור."],"aval hevanti et ha-sipur.","But I understood the story."],
     [["עַכְשָׁו אֲנִי רוֹצֶה סֵפֶר חָדָשׁ.","עכשיו אני רוצה ספר חדש."],"achshav ani rotze sefer chadash.","Now I want a new book."],
     [["קְרִיאָה הִיא הַדֶּרֶךְ הֲכִי טוֹבָה לִלְמֹד.","קריאה היא הדרך הכי טובה ללמוד."],"kri'a hi ha-derech hachi tova lilmod.","Reading is the best way to learn."]],
  quiz:[{q:"What did Vincenzo finish?",opts:["A film","His first Hebrew book","A course"],a:1},{q:"Did he understand every word?",opts:["Yes","No, but the story","Nothing"],a:1}]},
 {id:"oo1",t:["הַשְּׁכֵנָה הַזְּקֵנָה","השכנה הזקנה"],en:"The Old Neighbour",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בַּקּוֹמָה שֶׁלָּנוּ גָּרָה אִשָּׁה זְקֵנָה.","בקומה שלנו גרה אישה זקנה."],"ba-koma shelanu gara isha zkena.","On our floor lives an old woman."],
     [["שְׁמָהּ אִינְגֶּה וְהִיא בַּת שְׁמוֹנִים.","שמה אינגה והיא בת שמונים."],"shma Inge ve-hi bat shmonim.","Her name is Inge and she is eighty."],
     [["הִיא גָּרָה לְבַד.","היא גרה לבד."],"hi gara levad.","She lives alone."],
     [["הַיְּלָדִים שֶׁלָּהּ רְחוֹקִים.","הילדים שלה רחוקים."],"ha-yeladim shela rechokim.","Her children are far away."],
     [["לִפְעָמִים אֲנִי קוֹנֶה לָהּ דְּבָרִים.","לפעמים אני קונה לה דברים."],"lif'amim ani kone la dvarim.","Sometimes I buy her things."],
     [["הִיא שְׂמֵחָה לִרְאוֹת אוֹתִי.","היא שמחה לראות אותי."],"hi smecha lir'ot oti.","She is happy to see me."],
     [["הִיא מְסַפֶּרֶת לִי עַל בֶּרְלִין הַיְשָׁנָה.","היא מספרת לי על ברלין הישנה."],"hi mesaperet li al Berlin ha-yeshana.","She tells me about old Berlin."],
     [["הָעִיר הִשְׁתַּנְּתָה הַרְבֵּה.","העיר השתנתה הרבה."],"ha-ir hishtanta harbe.","The city changed a lot."],
     [["אֲנִי אוֹהֵב אֶת הַסִּפּוּרִים שֶׁלָּהּ.","אני אוהב את הסיפורים שלה."],"ani ohev et ha-sipurim shela.","I love her stories."],
     [["הִיא כְּמוֹ סָבְתָא לִי.","היא כמו סבתא לי."],"hi kmo savta li.","She is like a grandmother to me."],
     [["לִפְעָמִים אֲנִי מֵבִיא לָהּ פַּסְטָה.","לפעמים אני מביא לה פסטה."],"lif'amim ani mevi la pasta.","Sometimes I bring her pasta."],
     [["הִיא אוֹמֶרֶת שֶׁזֶּה הָאֹכֶל הֲכִי טוֹב.","היא אומרת שזה האוכל הכי טוב."],"hi omeret she-ze ha-ochel hachi tov.","She says it is the best food."],
     [["לַעֲזֹר לִשְׁכֵנִים זֶה חָשׁוּב.","לעזור לשכנים זה חשוב."],"la'azor li-shchenim ze chashuv.","Helping neighbours is important."],
     [["בְּעִיר גְּדוֹלָה אֲנָשִׁים לִפְעָמִים בּוֹדְדִים.","בעיר גדולה אנשים לפעמים בודדים."],"be-ir gdola anashim lif'amim bodedim.","In a big city people are sometimes lonely."],
     [["קֶשֶׁר קָטָן יָכוֹל לְשַׁנּוֹת יוֹם.","קשר קטן יכול לשנות יום."],"kesher katan yachol leshanot yom.","A small connection can change a day."]],
  quiz:[{q:"How old is Inge?",opts:["Seventy","Eighty","Ninety"],a:1},{q:"What does Vincenzo sometimes bring her?",opts:["Bread","Pasta","Flowers"],a:1}]},
 {id:"oo2",t:["הַיּוֹם שֶׁל גֶּשֶׁם וּמַחְשָׁבוֹת","יום של גשם ומחשבות"],en:"A Day of Rain and Thoughts",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["הָיָה יוֹם גָּשׁוּם וְאָפֹר.","היה יום גשום ואפור."],"haya yom gashum ve-afor.","It was a rainy and grey day."],
     [["נִשְׁאַרְתִּי בַּבַּיִת.","נשארתי בבית."],"nish'arti ba-bayit.","I stayed home."],
     [["יָשַׁבְתִּי לְיַד הַחַלּוֹן.","ישבתי ליד החלון."],"yashavti leyad ha-chalon.","I sat by the window."],
     [["חָשַׁבְתִּי עַל הַחַיִּים שֶׁלִּי.","חשבתי על החיים שלי."],"chashavti al ha-chayim sheli.","I thought about my life."],
     [["לִפְנֵי חָמֵשׁ שָׁנִים גַּרְתִּי בְּסִיצִילְיָה.","לפני חמש שנים גרתי בסיציליה."],"lifnei chamesh shanim garti be-Sitzilya.","Five years ago I lived in Sicily."],
     [["לֹא יָדַעְתִּי שֶׁאֶהְיֶה בְּבֶּרְלִין.","לא ידעתי שאהיה בברלין."],"lo yadati she-ehye be-Berlin.","I did not know I would be in Berlin."],
     [["לֹא יָדַעְתִּי שֶׁאֶתְחַתֵּן עִם קוֹבִּי.","לא ידעתי שאתחתן עם קובי."],"lo yadati she-etchaten im Kobi.","I did not know I would marry Kobi."],
     [["הַחַיִּים לוֹקְחִים אוֹתָנוּ לִמְקוֹמוֹת.","החיים לוקחים אותנו למקומות."],"ha-chayim lokchim otanu li-mkomot.","Life takes us to places."],
     [["מְקוֹמוֹת שֶׁלֹּא חָלַמְנוּ עֲלֵיהֶם.","מקומות שלא חלמנו עליהם."],"mkomot she-lo chalamnu aleihem.","Places we never dreamed of."],
     [["הַגֶּשֶׁם הִמְשִׁיךְ לָרֶדֶת.","הגשם המשיך לרדת."],"ha-geshem himshich laredet.","The rain kept falling."],
     [["הִרְגַּשְׁתִּי הַכָּרַת תּוֹדָה.","הרגשתי הכרת תודה."],"hirgashti hakarat toda.","I felt gratitude."],
     [["עַל הַדֶּרֶךְ שֶׁעָבַרְתִּי.","על הדרך שעברתי."],"al ha-derech she-avarti.","For the road I have traveled."],
     [["קוֹבִּי בָּא וְהֵבִיא לִי תֵּה.","קובי בא והביא לי תה."],"Kobi ba ve-hevi li te.","Kobi came and brought me tea."],
     [["יָשַׁבְנוּ יַחַד בְּשֶׁקֶט.","ישבנו יחד בשקט."],"yashavnu yachad be-sheket.","We sat together in silence."],
     [["יָמִים גְּשׁוּמִים טוֹבִים לְמַחְשָׁבוֹת.","ימים גשומים טובים למחשבות."],"yamim gshumim tovim le-machshavot.","Rainy days are good for thoughts."]],
  quiz:[{q:"What did Vincenzo do on the rainy day?",opts:["Went out","Stayed home and thought","Worked"],a:1},{q:"What did he feel?",opts:["Anger","Gratitude","Boredom"],a:1}]},
 {id:"pp1",t:["הָאֲרוּחָה שֶׁל יוֹם רִאשׁוֹן","הארוחה של יום ראשון"],en:"Sunday Lunch",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בְּיוֹם רִאשׁוֹן אֲנַחְנוּ אוֹכְלִים אֲרוּחָה גְּדוֹלָה.","ביום ראשון אנחנו אוכלים ארוחה גדולה."],"be-yom rishon anachnu ochlim arucha gdola.","On Sunday we eat a big meal."],
     [["אֲנִי מְבַשֵּׁל פַּסְטָה.","אני מבשל פסטה."],"ani mevashel pasta.","I cook pasta."],
     [["קוֹבִּי עוֹשֶׂה סָלָט.","קובי עושה סלט."],"Kobi osa salat.","Kobi makes salad."],
     [["אֲנַחְנוּ אוֹכְלִים לְאַט.","אנחנו אוכלים לאט."],"anachnu ochlim le'at.","We eat slowly."],
     [["מְדַבְּרִים עַל הַשָּׁבוּעַ.","מדברים על השבוע."],"medabrim al ha-shavua.","We talk about the week."],
     [["שׁוֹתִים יַיִן אָדֹם.","שותים יין אדום."],"shotim yayin adom.","We drink red wine."],
     [["אַחֲרֵי הָאֲרוּחָה נָחִים.","אחרי הארוחה נחים."],"acharei ha-arucha nachim.","After the meal we rest."],
     [["זֶה כְּמוֹ בְּאִיטַלְיָה.","זה כמו באיטליה."],"ze kmo be-Italia.","It is like in Italy."],
     [["אֲרוּחָה אִיטִּית הִיא אַהֲבָה.","ארוחה איטית היא אהבה."],"arucha itit hi ahava.","A slow meal is love."],
     [["יוֹם רִאשׁוֹן הוּא יוֹם שֶׁל מִשְׁפָּחָה.","יום ראשון הוא יום של משפחה."],"yom rishon hu yom shel mishpacha.","Sunday is a family day."]],
  quiz:[{q:"What does Vincenzo cook on Sunday?",opts:["Fish","Pasta","Soup"],a:1},{q:"What do they do after the meal?",opts:["Work","Rest","Go out"],a:1}]},
 {id:"pp2",t:["הַמַּתָּנָה מֵאִיטַלְיָה","המתנה מאיטליה"],en:"A Gift from Italy",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["אַנְגֶ'לָה שָׁלְחָה לִי חֲבִילָה.","אנג'לה שלחה לי חבילה."],"Angela shalcha li chavila.","Angela sent me a parcel."],
     [["בִּפְנִים הָיוּ דְּבָרִים מֵהַבַּיִת.","בפנים היו דברים מהבית."],"bifnim hayu dvarim me-ha-bayit.","Inside were things from home."],
     [["שֶׁמֶן זַיִת, פַּסְטָה וְגְּבִינָה.","שמן זית, פסטה וגבינה."],"shemen zayit, pasta ve-gvina.","Olive oil, pasta and cheese."],
     [["גַּם עוּגִיּוֹת שֶׁל אִמָּא.","גם עוגיות של אמא."],"gam ugiyot shel ima.","Also Mom's cookies."],
     [["הָרֵיחַ הִזְכִּיר לִי אֶת הַבַּיִת.","הריח הזכיר לי את הבית."],"ha-reiach hizkir li et ha-bayit.","The smell reminded me of home."],
     [["טָעַמְתִּי עוּגִיָּה.","טעמתי עוגייה."],"ta'amti ugiya.","I tasted a cookie."],
     [["הִרְגַּשְׁתִּי גַּעְגּוּעַ.","הרגשתי געגוע."],"hirgashti ga'agua.","I felt longing."],
     [["אֲבָל גַּם אֹשֶׁר.","אבל גם אושר."],"aval gam osher.","But also happiness."],
     [["הִתְקַשַּׁרְתִּי לְאַנְגֶ'לָה לְהוֹדוֹת.","התקשרתי לאנג'לה להודות."],"hitkasharti le-Angela lehodot.","I called Angela to thank her."],
     [["אַהֲבָה נוֹסַעַת בַּדֹּאַר.","אהבה נוסעת בדואר."],"ahava nosa'at ba-do'ar.","Love travels by post."]],
  quiz:[{q:"Who sent the parcel?",opts:["Kobi","Angela","Teresa"],a:1},{q:"What did the smell remind him of?",opts:["Work","Home","Berlin"],a:1}]},
 {id:"pp3",t:["יוֹם קַיִץ חַם","יום קיץ חם"],en:"A Hot Summer Day",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["הַיּוֹם חַם מְאוֹד בְּבֶּרְלִין.","היום חם מאוד בברלין."],"ha-yom cham me'od be-Berlin.","Today is very hot in Berlin."],
     [["הַשֶּׁמֶשׁ חֲזָקָה.","השמש חזקה."],"ha-shemesh chazaka.","The sun is strong."],
     [["אֲנַחְנוּ הוֹלְכִים לָאֲגַם.","אנחנו הולכים לאגם."],"anachnu holchim la-agam.","We go to the lake."],
     [["הַמַּיִם קָרִים וְנֶחְמָדִים.","המים קרים ונחמדים."],"ha-mayim karim ve-nechmadim.","The water is cold and nice."],
     [["אֲנִי שׂוֹחֶה.","אני שוחה."],"ani socheh.","I swim."],
     [["קוֹבִּי יוֹשֵׁב בַּצֵּל.","קובי יושב בצל."],"Kobi yoshev ba-tzel.","Kobi sits in the shade."],
     [["אוֹכְלִים אֲבַטִּיחַ.","אוכלים אבטיח."],"ochlim avatiach.","We eat watermelon."],
     [["הוּא מָתוֹק וְקַר.","הוא מתוק וקר."],"hu matok ve-kar.","It is sweet and cold."],
     [["בָּעֶרֶב חוֹזְרִים הַבַּיְתָה.","בערב חוזרים הביתה."],"ba-erev chozrim ha-bayta.","In the evening we go home."],
     [["יוֹם קַיִץ מֻשְׁלָם.","יום קיץ מושלם."],"yom kayitz mushlam.","A perfect summer day."]],
  quiz:[{q:"Where do they go on the hot day?",opts:["The beach","The lake","The mountains"],a:1},{q:"What do they eat?",opts:["Ice cream","Watermelon","Cake"],a:1}]},
 {id:"qq1",t:["הַשָּׂפָה הַשְּׁלִישִׁית","השפה השלישית"],en:"The Third Language",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בַּבַּיִת שֶׁלָּנוּ יֵשׁ שָׁלוֹשׁ שָׂפוֹת.","בבית שלנו יש שלוש שפות."],"ba-bayit shelanu yesh shalosh safot.","In our home there are three languages."],
     [["אִיטַלְקִית, עִבְרִית וְאַנְגְּלִית.","איטלקית, עברית ואנגלית."],"italkit, ivrit ve-anglit.","Italian, Hebrew and English."],
     [["אֲנִי מְדַבֵּר אִיטַלְקִית עִם הַמִּשְׁפָּחָה שֶׁלִּי.","אני מדבר איטלקית עם המשפחה שלי."],"ani medaber italkit im ha-mishpacha sheli.","I speak Italian with my family."],
     [["קוֹבִּי מְדַבֵּר עִבְרִית עִם מִיקִי.","קובי מדבר עברית עם מיקי."],"Kobi medaber ivrit im Miki.","Kobi speaks Hebrew with Miki."],
     [["בֵּינֵינוּ אֲנַחְנוּ מְדַבְּרִים אַנְגְּלִית.","בינינו אנחנו מדברים אנגלית."],"beineinu anachnu medabrim anglit.","Between us we speak English."],
     [["אֲבָל עַכְשָׁו אֲנִי מְנַסֶּה עִבְרִית.","אבל עכשיו אני מנסה עברית."],"aval achshav ani menase ivrit.","But now I try Hebrew."],
     [["קוֹבִּי שָׂמֵחַ כְּשֶׁאֲנִי מְדַבֵּר עִבְרִית.","קובי שמח כשאני מדבר עברית."],"Kobi sameach kshe-ani medaber ivrit.","Kobi is happy when I speak Hebrew."],
     [["זֶה מְקָרֵב אוֹתָנוּ.","זה מקרב אותנו."],"ze mekarev otanu.","It brings us closer."],
     [["שָׂפָה הִיא דֶּרֶךְ לַלֵּב.","שפה היא דרך ללב."],"safa hi derech la-lev.","Language is a way to the heart."],
     [["בַּבַּיִת שֶׁלָּנוּ שָׂפוֹת מִתְעַרְבְּבוֹת.","בבית שלנו שפות מתערבבות."],"ba-bayit shelanu safot mit'arbevot.","In our home languages mix."],
     [["לִפְעָמִים מִשְׁפָּט אֶחָד בְּשָׁלוֹשׁ שָׂפוֹת.","לפעמים משפט אחד בשלוש שפות."],"lif'amim mishpat echad be-shalosh safot.","Sometimes one sentence in three languages."],
     [["זֶה מַצְחִיק אֲבָל יָפֶה.","זה מצחיק אבל יפה."],"ze matzhik aval yafe.","It is funny but beautiful."],
     [["הַבַּיִת שֶׁלָּנוּ הוּא עוֹלָם קָטָן.","הבית שלנו הוא עולם קטן."],"ha-bayit shelanu hu olam katan.","Our home is a small world."],
     [["מָלֵא קוֹלוֹת וּצְלִילִים.","מלא קולות וצלילים."],"male kolot u-tzlilim.","Full of voices and sounds."],
     [["אֲנִי אוֹהֵב אֶת הָעוֹלָם הַזֶּה.","אני אוהב את העולם הזה."],"ani ohev et ha-olam ha-ze.","I love this world."]],
  quiz:[{q:"How many languages are in their home?",opts:["Two","Three","Four"],a:1},{q:"What language do Vincenzo and Kobi speak between them?",opts:["Hebrew","English","Italian"],a:1}]},
 {id:"rr1",t:["מָה זֶה בַּיִת","מה זה בית"],en:"What Is Home",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["שָׁאַלְתִּי אֶת עַצְמִי: מָה זֶה בַּיִת.","שאלתי את עצמי: מה זה בית."],"sha'alti et atzmi: ma ze bayit.","I asked myself: what is home."],
     [["פַּעַם חָשַׁבְתִּי שֶׁבַּיִת הוּא מָקוֹם.","פעם חשבתי שבית הוא מקום."],"pa'am chashavti she-bayit hu makom.","I once thought home is a place."],
     [["רוֹסוֹלִינִי, הָעִיר שֶׁבָּהּ נוֹלַדְתִּי.","רוסוליני, העיר שבה נולדתי."],"Rosolini, ha-ir she-ba noladti.","Rosolini, the city where I was born."],
     [["אֲבָל אַחַר כָּךְ עָבַרְתִּי לְבֶּרְלִין.","אבל אחר כך עברתי לברלין."],"aval achar kach avarti le-Berlin.","But then I moved to Berlin."],
     [["בַּהַתְחָלָה בֶּרְלִין לֹא הָיְתָה בַּיִת.","בהתחלה ברלין לא הייתה בית."],"ba-hatchala Berlin lo hayta bayit.","At first Berlin was not home."],
     [["הָיָה לִי קַר וְזָר.","היה לי קר וזר."],"haya li kar ve-zar.","I felt cold and foreign."],
     [["אֲבָל קוֹבִּי הָיָה שָׁם.","אבל קובי היה שם."],"aval Kobi haya sham.","But Kobi was there."],
     [["וְלְאַט לְאַט הִרְגַּשְׁתִּי בַּבַּיִת.","ולאט לאט הרגשתי בבית."],"ve-le'at le'at hirgashti ba-bayit.","And slowly I felt at home."],
     [["הֵבַנְתִּי מַשֶּׁהוּ חָשׁוּב.","הבנתי משהו חשוב."],"hevanti mashehu chashuv.","I understood something important."],
     [["בַּיִת הוּא לֹא מָקוֹם.","בית הוא לא מקום."],"bayit hu lo makom.","Home is not a place."],
     [["בַּיִת הוּא אֲנָשִׁים.","בית הוא אנשים."],"bayit hu anashim.","Home is people."],
     [["בַּיִת הוּא אֵיפֹה שֶׁאַתָּה אָהוּב.","בית הוא איפה שאתה אהוב."],"bayit hu eifo she-ata ahuv.","Home is where you are loved."],
     [["עַכְשָׁו יֵשׁ לִי שְׁנֵי בָּתִּים.","עכשיו יש לי שני בתים."],"achshav yesh li shnei batim.","Now I have two homes."],
     [["רוֹסוֹלִינִי בַּלֵּב, בֶּרְלִין בַּחַיִּים.","רוסוליני בלב, ברלין בחיים."],"Rosolini ba-lev, Berlin ba-chayim.","Rosolini in the heart, Berlin in life."],
     [["וְקוֹבִּי הוּא הַבַּיִת הָאֲמִתִּי.","וקובי הוא הבית האמיתי."],"ve-Kobi hu ha-bayit ha-amiti.","And Kobi is the real home."],
     [["בַּיִת הוּא לֹא קִירוֹת.","בית הוא לא קירות."],"bayit hu lo kirot.","Home is not walls."],
     [["בַּיִת הוּא לֵב.","בית הוא לב."],"bayit hu lev.","Home is a heart."],
     [["זֶה מָה שֶׁלָּמַדְתִּי בְּבֶּרְלִין.","זה מה שלמדתי בברלין."],"ze ma she-lamadti be-Berlin.","This is what I learned in Berlin."],
     [["הַשִּׁעוּר הֲכִי חָשׁוּב בְּחַיַּי.","השיעור הכי חשוב בחיי."],"ha-shi'ur hachi chashuv be-chayai.","The most important lesson of my life."],
     [["בַּיִת הוּא אַהֲבָה.","בית הוא אהבה."],"bayit hu ahava.","Home is love."]],
  quiz:[{q:"What did Vincenzo first think home was?",opts:["A feeling","A place","A language"],a:1},{q:"What did he conclude home really is?",opts:["Walls","People and love","A city"],a:1}]},
 {id:"ss1",t:["הַשִּׂיחָה בָּרְחוֹב","השיחה ברחוב"],en:"A Chat on the Street",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["פָּגַשְׁתִּי שָׁכֵן בָּרְחוֹב.","פגשתי שכן ברחוב."],"pagashti shachen ba-rechov.","I met a neighbour on the street."],
     [["אָמַרְתִּי לוֹ בֹּקֶר טוֹב.","אמרתי לו בוקר טוב."],"amarti lo boker tov.","I said good morning to him."],
     [["הוּא עָנָה בְּעִבְרִית.","הוא ענה בעברית."],"hu ana be-ivrit.","He answered in Hebrew."],
     [["שָׁאַלְתִּי אֵיךְ הוּא מַרְגִּישׁ.","שאלתי איך הוא מרגיש."],"sha'alti eich hu margish.","I asked how he feels."],
     [["הוּא אָמַר שֶׁהַכֹּל בְּסֵדֶר.","הוא אמר שהכל בסדר."],"hu amar she-ha-kol beseder.","He said everything is fine."],
     [["דִּבַּרְנוּ עַל מֶזֶג הָאֲוִיר.","דיברנו על מזג האוויר."],"dibarnu al mezeg ha-avir.","We talked about the weather."],
     [["הָיָה יוֹם יָפֶה.","היה יום יפה."],"haya yom yafe.","It was a nice day."],
     [["דִּבַּרְתִּי בְּעִבְרִית בְּלִי פַּחַד.","דיברתי בעברית בלי פחד."],"dibarti be-ivrit bli pachad.","I spoke Hebrew without fear."],
     [["הִרְגַּשְׁתִּי טוֹב עִם עַצְמִי.","הרגשתי טוב עם עצמי."],"hirgashti tov im atzmi.","I felt good about myself."],
     [["שִׂיחָה קְטַנָּה הִיא נִצָּחוֹן גָּדוֹל.","שיחה קטנה היא ניצחון גדול."],"sicha ktana hi nitzachon gadol.","A small conversation is a big victory."]],
  quiz:[{q:"In what language did the neighbour answer?",opts:["Italian","Hebrew","German"],a:1},{q:"How did Vincenzo feel after?",opts:["Bad","Good about himself","Tired"],a:1}]},
 {id:"ss2",t:["הַקָּפֶה שֶׁל יוֹם שִׁשִּׁי","הקפה של יום שישי"],en:"Friday Coffee",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בְּיוֹם שִׁשִּׁי אֲנִי לֹא עוֹבֵד.","ביום שישי אני לא עובד."],"be-yom shishi ani lo oved.","On Friday I don't work."],
     [["אֲנִי שׁוֹתֶה קָפֶה לְאַט.","אני שותה קפה לאט."],"ani shote kafe le'at.","I drink coffee slowly."],
     [["קוֹרֵא עִתּוֹן בְּעִבְרִית.","קורא עיתון בעברית."],"kore iton be-ivrit.","I read a newspaper in Hebrew."],
     [["לֹא מֵבִין כָּל מִלָּה.","לא מבין כל מילה."],"lo mevin kol mila.","I don't understand every word."],
     [["אֲבָל מֵבִין יוֹתֵר מִכָּל שָׁבוּעַ.","אבל מבין יותר מכל שבוע."],"aval mevin yoter mi-kol shavua.","But I understand more each week."],
     [["קוֹבִּי עוֹשֶׂה אֲרוּחַת בֹּקֶר.","קובי עושה ארוחת בוקר."],"Kobi osa aruchat boker.","Kobi makes breakfast."],
     [["יֵשׁ בֵּיצִים וְלֶחֶם טָרִי.","יש ביצים ולחם טרי."],"yesh beitzim ve-lechem tari.","There are eggs and fresh bread."],
     [["יוֹם שִׁשִּׁי הוּא יוֹם רָגוּעַ.","יום שישי הוא יום רגוע."],"yom shishi hu yom ragu'a.","Friday is a relaxed day."],
     [["אֲנַחְנוּ מִתְכּוֹנְנִים לְשַׁבָּת.","אנחנו מתכוננים לשבת."],"anachnu mitkonenim le-Shabbat.","We prepare for Shabbat."],
     [["אֲנִי אוֹהֵב אֶת הַיּוֹם הַזֶּה.","אני אוהב את היום הזה."],"ani ohev et ha-yom ha-ze.","I love this day."]],
  quiz:[{q:"What does Vincenzo read on Friday?",opts:["A book","A newspaper in Hebrew","Emails"],a:1},{q:"What are they preparing for?",opts:["A trip","Shabbat","Work"],a:1}]},
 {id:"ss3",t:["הַמַּסָּע לָעֲבוֹדָה","המסע לעבודה"],en:"The Commute to Work",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["כָּל בֹּקֶר אֲנִי נוֹסֵעַ לָעֲבוֹדָה.","כל בוקר אני נוסע לעבודה."],"kol boker ani nose'a la-avoda.","Every morning I travel to work."],
     [["אֲנִי לוֹקֵחַ אֶת הָרַכֶּבֶת.","אני לוקח את הרכבת."],"ani lokeach et ha-rakevet.","I take the train."],
     [["הַנְּסִיעָה אוֹרֶכֶת רֶבַע שָׁעָה.","הנסיעה אורכת רבע שעה."],"ha-nesia orechet reva sha'a.","The journey takes a quarter of an hour."],
     [["בָּרַכֶּבֶת אֲנִי לוֹמֵד עִבְרִית.","ברכבת אני לומד עברית."],"ba-rakevet ani lomed ivrit.","On the train I study Hebrew."],
     [["יֵשׁ לִי אֶפְלִיקַצְיָה בַּטֶּלֶפוֹן.","יש לי אפליקציה בטלפון."],"yesh li aplikatzya ba-telefon.","I have an app on my phone."],
     [["אֲנִי לוֹמֵד מִלָּה אַחַת כָּל יוֹם.","אני לומד מילה אחת כל יום."],"ani lomed mila achat kol yom.","I learn one word every day."],
     [["הַזְּמַן בָּרַכֶּבֶת לֹא הוֹלֵךְ לְאִבּוּד.","הזמן ברכבת לא הולך לאיבוד."],"ha-zman ba-rakevet lo holech le-ibud.","The time on the train is not wasted."],
     [["אֲנִי מַגִּיעַ לָעֲבוֹדָה מוּכָן.","אני מגיע לעבודה מוכן."],"ani magia la-avoda muchan.","I arrive at work ready."],
     [["לִלְמֹד קְצָת כָּל יוֹם זֶה הַסּוֹד.","ללמוד קצת כל יום זה הסוד."],"lilmod ktzat kol yom ze ha-sod.","Learning a little every day is the secret."],
     [["צַעַד קָטָן כָּל יוֹם.","צעד קטן כל יום."],"tza'ad katan kol yom.","A small step every day."]],
  quiz:[{q:"How long is the commute?",opts:["An hour","A quarter of an hour","Five minutes"],a:1},{q:"What does Vincenzo do on the train?",opts:["Sleep","Study Hebrew","Eat"],a:1}]},
 {id:"tt1",t:["הַחֲנוּת שֶׁל הַסְּפָרִים","חנות הספרים"],en:"The Bookshop",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בִּשְׁכוּנָה שֶׁלָּנוּ יֵשׁ חֲנוּת סְפָרִים יְשָׁנָה.","בשכונה שלנו יש חנות ספרים ישנה."],"bi-schuna shelanu yesh chanut sfarim yeshana.","In our neighbourhood there is an old bookshop."],
     [["הִיא קְטַנָּה וּמְלֵאָה סְפָרִים.","היא קטנה ומלאה ספרים."],"hi ktana u-mle'a sfarim.","It is small and full of books."],
     [["הָרֵיחַ שֶׁל הַסְּפָרִים הַיְּשָׁנִים נֶהְדָּר.","הריח של הספרים הישנים נהדר."],"ha-reiach shel ha-sfarim ha-yeshanim nehedar.","The smell of old books is wonderful."],
     [["הַבַּעַל הוּא אִישׁ זָקֵן וְחָכָם.","הבעל הוא איש זקן וחכם."],"ha-ba'al hu ish zaken ve-chacham.","The owner is an old and wise man."],
     [["הוּא יוֹדֵעַ כָּל סֵפֶר בַּחֲנוּת.","הוא יודע כל ספר בחנות."],"hu yodea kol sefer ba-chanut.","He knows every book in the shop."],
     [["שָׁאַלְתִּי אוֹתוֹ עַל סֵפֶר קַל בְּעִבְרִית.","שאלתי אותו על ספר קל בעברית."],"sha'alti oto al sefer kal be-ivrit.","I asked him about an easy book in Hebrew."],
     [["הוּא חִיֵּךְ וְהֶרְאָה לִי כַּמָּה.","הוא חייך והראה לי כמה."],"hu chiyech ve-her'a li kama.","He smiled and showed me a few."],
     [["בָּחַרְתִּי סֵפֶר עִם תְּמוּנוֹת.","בחרתי ספר עם תמונות."],"bacharti sefer im tmunot.","I chose a book with pictures."],
     [["הוּא אָמַר שֶׁזֶּה סֵפֶר טוֹב לְהַתְחָלָה.","הוא אמר שזה ספר טוב להתחלה."],"hu amar she-ze sefer tov le-hatchala.","He said it is a good book to start."],
     [["עַכְשָׁו אֲנִי הוֹלֵךְ לְשָׁם כָּל שָׁבוּעַ.","עכשיו אני הולך לשם כל שבוע."],"achshav ani holech le-sham kol shavua.","Now I go there every week."],
     [["קוֹנֶה סֵפֶר חָדָשׁ כָּל פַּעַם.","קונה ספר חדש כל פעם."],"kone sefer chadash kol pa'am.","I buy a new book each time."],
     [["הַחֲנוּת נַעֲשְׂתָה הַמָּקוֹם הָאָהוּב עָלַי.","החנות נעשתה המקום האהוב עליי."],"ha-chanut na'asta ha-makom ha-ahuv alai.","The shop became my favourite place."],
     [["סְפָרִים הֵם חֲבֵרִים שְׁקֵטִים.","ספרים הם חברים שקטים."],"sfarim hem chaverim shketim.","Books are quiet friends."],
     [["הֵם מְלַמְּדִים בְּלִי לָחַץ.","הם מלמדים בלי לחץ."],"hem melamdim bli lachatz.","They teach without pressure."],
     [["זֶה הַקֶּצֶב שֶׁלִּי.","זה הקצב שלי."],"ze ha-ketzev sheli.","This is my pace."]],
  quiz:[{q:"Who owns the bookshop?",opts:["A young woman","An old wise man","Kobi"],a:1},{q:"What kind of book did Vincenzo choose?",opts:["A novel","A book with pictures","A dictionary"],a:1}]},
 {id:"uu1",t:["הַתֵּה עִם הַשְּׁכֵנָה","התה עם השכנה"],en:"Tea with the Neighbour",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["אִינְגֶּה הַשְּׁכֵנָה הִזְמִינָה אוֹתִי לְתֵה.","אינגה השכנה הזמינה אותי לתה."],"Inge ha-shchena hizmina oti le-te.","Inge the neighbour invited me for tea."],
     [["הָלַכְתִּי אֵלֶיהָ בְּיוֹם רִאשׁוֹן.","הלכתי אליה ביום ראשון."],"halachti eleha be-yom rishon.","I went to her on Sunday."],
     [["הַדִּירָה שֶׁלָּהּ קְטַנָּה וְחַמָּה.","הדירה שלה קטנה וחמה."],"ha-dira shela ktana ve-chama.","Her apartment is small and warm."],
     [["יֵשׁ הַרְבֵּה תְּמוּנוֹת יְשָׁנוֹת.","יש הרבה תמונות ישנות."],"yesh harbe tmunot yeshanot.","There are many old photographs."],
     [["הִיא סִפְּרָה לִי עַל בַּעְלָהּ.","היא סיפרה לי על בעלה."],"hi sipra li al ba'ala.","She told me about her husband."],
     [["הוּא נִפְטַר לִפְנֵי עֶשֶׂר שָׁנִים.","הוא נפטר לפני עשר שנים."],"hu niftar lifnei eser shanim.","He passed away ten years ago."],
     [["הִיא הָיְתָה קְצָת עֲצוּבָה.","היא הייתה קצת עצובה."],"hi hayta ktzat atzuva.","She was a little sad."],
     [["הִקְשַׁבְתִּי לָהּ בְּשֶׁקֶט.","הקשבתי לה בשקט."],"hikshavti la be-sheket.","I listened to her quietly."],
     [["לִפְעָמִים אֲנָשִׁים רַק רוֹצִים מִישֶׁהוּ שֶׁיַּקְשִׁיב.","לפעמים אנשים רק רוצים מישהו שיקשיב."],"lif'amim anashim rak rotzim mishehu she-yakshiv.","Sometimes people just want someone to listen."],
     [["יָצָאתִי בְּהַרְגָּשָׁה טוֹבָה.","יצאתי בהרגשה טובה."],"yatzati be-hargasha tova.","I left feeling good."]],
  quiz:[{q:"When did Vincenzo visit Inge?",opts:["Friday","Sunday","Monday"],a:1},{q:"What did Vincenzo do while she talked?",opts:["Interrupted","Listened quietly","Left early"],a:1}]},
 {id:"uu2",t:["הַגֶּשֶׁם הָרִאשׁוֹן","הגשם הראשון"],en:"The First Rain",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["הַיּוֹם יָרַד הַגֶּשֶׁם הָרִאשׁוֹן שֶׁל הַסְּתָו.","היום ירד הגשם הראשון של הסתיו."],"ha-yom yarad ha-geshem ha-rishon shel ha-stav.","Today the first rain of autumn fell."],
     [["הָאֲוִיר נַעֲשָׂה קָרִיר.","האוויר נעשה קריר."],"ha-avir na'ase karir.","The air became cool."],
     [["הָרֵיחַ שֶׁל הַגֶּשֶׁם נֶהְדָּר.","הריח של הגשם נהדר."],"ha-reiach shel ha-geshem nehedar.","The smell of the rain is wonderful."],
     [["פָּתַחְתִּי אֶת הַחַלּוֹן.","פתחתי את החלון."],"patachti et ha-chalon.","I opened the window."],
     [["הִקְשַׁבְתִּי לַטִּפּוֹת.","הקשבתי לטיפות."],"hikshavti la-tipot.","I listened to the drops."],
     [["שָׁתִיתִי תֵּה חַם.","שתיתי תה חם."],"shatiti te cham.","I drank hot tea."],
     [["קוֹבִּי קָרָא סֵפֶר לְיָדִי.","קובי קרא ספר לידי."],"Kobi kara sefer le-yadi.","Kobi read a book beside me."],
     [["הָיָה רֶגַע שָׁקֵט וְיָפֶה.","היה רגע שקט ויפה."],"haya rega shaket ve-yafe.","It was a quiet and beautiful moment."],
     [["אֲנִי אוֹהֵב אֶת הַסְּתָו.","אני אוהב את הסתיו."],"ani ohev et ha-stav.","I love autumn."],
     [["הַגֶּשֶׁם מֵבִיא שֶׁקֶט.","הגשם מביא שקט."],"ha-geshem mevi sheket.","The rain brings quiet."]],
  quiz:[{q:"What season's first rain was it?",opts:["Spring","Autumn","Winter"],a:1},{q:"What did Kobi do beside Vincenzo?",opts:["Slept","Read a book","Cooked"],a:1}]},
 {id:"uu3",t:["הַתְּמוּנָה הַמְּשֻׁתֶּפֶת","התמונה המשותפת"],en:"The Shared Photo",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["מָצָאתִי תְּמוּנָה יְשָׁנָה בַּטֶּלֶפוֹן.","מצאתי תמונה ישנה בטלפון."],"matzati tmuna yeshana ba-telefon.","I found an old photo on the phone."],
     [["זוֹ תְּמוּנָה מֵהַחֲתֻנָּה שֶׁלָּנוּ.","זו תמונה מהחתונה שלנו."],"zo tmuna me-ha-chatuna shelanu.","It is a photo from our wedding."],
     [["קוֹבִּי וַאֲנִי צוֹחֲקִים בָּהּ.","קובי ואני צוחקים בה."],"Kobi va-ani tzochakim ba.","Kobi and I are laughing in it."],
     [["מֵאֲחוֹרֵינוּ רוֹאִים אֶת קוֹפֶּנְהָגֶן.","מאחורינו רואים את קופנהגן."],"me'achoreinu ro'im et Copenhagen.","Behind us you can see Copenhagen."],
     [["הֶרְאֵיתִי אֶת הַתְּמוּנָה לְקוֹבִּי.","הראיתי את התמונה לקובי."],"her'eti et ha-tmuna le-Kobi.","I showed the photo to Kobi."],
     [["הוּא חִיֵּךְ וְזָכַר אֶת הַיּוֹם.","הוא חייך וזכר את היום."],"hu chiyech ve-zachar et ha-yom.","He smiled and remembered the day."],
     [["דִּבַּרְנוּ עַל הַחֲתֻנָּה.","דיברנו על החתונה."],"dibarnu al ha-chatuna.","We talked about the wedding."],
     [["זֶה הָיָה יוֹם מֻשְׁלָם.","זה היה יום מושלם."],"ze haya yom mushlam.","It was a perfect day."],
     [["תְּמוּנוֹת שׁוֹמְרוֹת זִכְרוֹנוֹת.","תמונות שומרות זכרונות."],"tmunot shomrot zichronot.","Photos keep memories."],
     [["שָׁמַרְתִּי אֶת הַתְּמוּנָה.","שמרתי את התמונה."],"shamarti et ha-tmuna.","I saved the photo."]],
  quiz:[{q:"Where was the photo taken?",opts:["Berlin","Copenhagen","Tel Aviv"],a:1},{q:"What event was the photo from?",opts:["A birthday","Their wedding","A trip"],a:1}]},
 {id:"vv1",t:["הַשִּׁעוּר עִם אֵלְיָה","השיעור עם אליה"],en:"A Lesson with Elia",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["אֵלְיָה הוּא הַבֵּן שֶׁל טֵרֵזָה.","אליה הוא הבן של טרזה."],"Elia hu ha-ben shel Teresa.","Elia is Teresa's son."],
     [["הוּא בֶּן שֶׁבַע.","הוא בן שבע."],"hu ben sheva.","He is seven years old."],
     [["בַּוִּידֵאוֹ הוּא רָצָה לִלְמֹד עִבְרִית.","בוידאו הוא רצה ללמוד עברית."],"ba-video hu ratza lilmod ivrit.","On the video he wanted to learn Hebrew."],
     [["לִמַּדְתִּי אוֹתוֹ כַּמָּה מִלִּים.","לימדתי אותו כמה מילים."],"limadti oto kama milim.","I taught him a few words."],
     [["שָׁלוֹם, תּוֹדָה, כֶּלֶב, חָתוּל.","שלום, תודה, כלב, חתול."],"shalom, toda, kelev, chatul.","Hello, thank you, dog, cat."],
     [["אֵלְיָה חָזַר עַל הַמִּלִּים.","אליה חזר על המילים."],"Elia chazar al ha-milim.","Elia repeated the words."],
     [["הוּא צָחַק כְּשֶׁאָמַר חָתוּל.","הוא צחק כשאמר חתול."],"hu tzachak kshe-amar chatul.","He laughed when he said cat."],
     [["הַמִּלָּה נִשְׁמְעָה לוֹ מַצְחִיקָה.","המילה נשמעה לו מצחיקה."],"ha-mila nishme'a lo matzhika.","The word sounded funny to him."],
     [["לִמַּדְתִּי אוֹתוֹ גַּם לִסְפֹּר.","לימדתי אותו גם לספור."],"limadti oto gam lispor.","I also taught him to count."],
     [["אֶחָד, שְׁנַיִם, שָׁלוֹשׁ.","אחד, שניים, שלוש."],"echad, shnayim, shalosh.","One, two, three."],
     [["הוּא לָמַד מַהֵר.","הוא למד מהר."],"hu lamad maher.","He learned fast."],
     [["יְלָדִים לוֹמְדִים בְּלִי פַּחַד.","ילדים לומדים בלי פחד."],"yeladim lomdim bli pachad.","Children learn without fear."],
     [["זֶה מַשֶּׁהוּ שֶׁאֲנִי רוֹצֶה לִלְמֹד מֵהֶם.","זה משהו שאני רוצה ללמוד מהם."],"ze mashehu she-ani rotze lilmod mehem.","This is something I want to learn from them."],
     [["לֹא לְפַחֵד לִטְעוֹת.","לא לפחד לטעות."],"lo lefached lit'ot.","Not to fear mistakes."],
     [["אֵלְיָה הָיָה הַמּוֹרֶה שֶׁלִּי הַיּוֹם.","אליה היה המורה שלי היום."],"Elia haya ha-more sheli ha-yom.","Elia was my teacher today."]],
  quiz:[{q:"How old is Elia?",opts:["Five","Seven","Ten"],a:1},{q:"What does Vincenzo want to learn from children?",opts:["To count","Not to fear mistakes","To draw"],a:1}]},
 {id:"ww1",t:["הַשֻּׁלְחָן שֶׁל שַׁבָּת","השולחן של שבת"],en:"The Shabbat Table",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בְּעֶרֶב שַׁבָּת אֲנַחְנוּ עוֹרְכִים שֻׁלְחָן.","בערב שבת אנחנו עורכים שולחן."],"be-erev Shabbat anachnu orchim shulchan.","On Friday evening we set the table."],
     [["יֵשׁ חַלָּה וְיַיִן.","יש חלה ויין."],"yesh chala ve-yayin.","There is challah and wine."],
     [["קוֹבִּי מַדְלִיק נֵרוֹת.","קובי מדליק נרות."],"Kobi madlik nerot.","Kobi lights candles."],
     [["הָאוֹר חַם וְנָעִים.","האור חם ונעים."],"ha-or cham ve-na'im.","The light is warm and pleasant."],
     [["אֲנַחְנוּ אוֹמְרִים שַׁבָּת שָׁלוֹם.","אנחנו אומרים שבת שלום."],"anachnu omrim Shabbat shalom.","We say Shabbat shalom."],
     [["אוֹכְלִים אֲרוּחָה גְּדוֹלָה.","אוכלים ארוחה גדולה."],"ochlim arucha gdola.","We eat a big meal."],
     [["אֵין טֶלֶפוֹנִים בַּשֻּׁלְחָן.","אין טלפונים בשולחן."],"ein telefonim ba-shulchan.","No phones at the table."],
     [["רַק אֲנַחְנוּ וְהָאֹכֶל.","רק אנחנו והאוכל."],"rak anachnu ve-ha-ochel.","Just us and the food."],
     [["זֶה רֶגַע מְיֻחָד בַּשָּׁבוּעַ.","זה רגע מיוחד בשבוע."],"ze rega meyuchad ba-shavua.","It is a special moment in the week."],
     [["לָמַדְתִּי לֶאֱהֹב אֶת שַׁבָּת.","למדתי לאהוב את שבת."],"lamadti le'ehov et Shabbat.","I learned to love Shabbat."]],
  quiz:[{q:"Who lights the candles?",opts:["Vincenzo","Kobi","Miki"],a:1},{q:"What is not at the table?",opts:["Food","Phones","Wine"],a:1}]},
 {id:"ww2",t:["הַבֹּקֶר שֶׁל קַיִץ","הבוקר של קיץ"],en:"A Summer Morning",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּקַּיִץ הַבֹּקֶר מַתְחִיל מֻקְדָּם.","בקיץ הבוקר מתחיל מוקדם."],"ba-kayitz ha-boker matchil mukdam.","In summer the morning starts early."],
     [["הַשֶּׁמֶשׁ נִכְנֶסֶת דֶּרֶךְ הַחַלּוֹן.","השמש נכנסת דרך החלון."],"ha-shemesh nichneset derech ha-chalon.","The sun comes in through the window."],
     [["הַצִּפּוֹרִים שָׁרוֹת.","הציפורים שרות."],"ha-tziporim sharot.","The birds are singing."],
     [["אֲנִי קָם וּפוֹתֵחַ אֶת הַחַלּוֹן.","אני קם ופותח את החלון."],"ani kam u-foteach et ha-chalon.","I get up and open the window."],
     [["הָאֲוִיר נָעִים וְרַעֲנָן.","האוויר נעים ורענן."],"ha-avir na'im ve-ra'anan.","The air is pleasant and fresh."],
     [["אֲנִי עוֹשֶׂה קָפֶה.","אני עושה קפה."],"ani ose kafe.","I make coffee."],
     [["יוֹשֵׁב בַּמִּרְפֶּסֶת.","יושב במרפסת."],"yoshev ba-mirpeset.","I sit on the balcony."],
     [["הַשְּׁכוּנָה עוֹד יְשֵׁנָה.","השכונה עוד ישנה."],"ha-schuna od yeshena.","The neighbourhood is still asleep."],
     [["אֲנִי אוֹהֵב אֶת הַשֶּׁקֶט הַזֶּה.","אני אוהב את השקט הזה."],"ani ohev et ha-sheket ha-ze.","I love this quiet."],
     [["בְּקָרֵי קַיִץ הֵם מַתָּנָה.","בקרי קיץ הם מתנה."],"bokrei kayitz hem matana.","Summer mornings are a gift."]],
  quiz:[{q:"What comes in through the window?",opts:["Rain","The sun","Wind"],a:1},{q:"Where does Vincenzo sit with coffee?",opts:["The kitchen","The balcony","The park"],a:1}]},
 {id:"xx1",t:["הַמַּסָּע לְיִשְׂרָאֵל","המסע לישראל"],en:"The Trip to Israel",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["בַּקַּיִץ נָסַעְנוּ לְיִשְׂרָאֵל.","בקיץ נסענו לישראל."],"ba-kayitz nasanu le-Yisrael.","In summer we traveled to Israel."],
     [["הַטִּיסָה הָיְתָה אֲרֻכָּה.","הטיסה הייתה ארוכה."],"ha-tisa hayta aruka.","The flight was long."],
     [["מִיקִי חִכָּה לָנוּ בִּנְמַל הַתְּעוּפָה.","מיקי חיכה לנו בנמל התעופה."],"Miki chika lanu bi-nmal ha-te'ufa.","Miki waited for us at the airport."],
     [["הָיָה חַם מְאוֹד בְּתֵל אָבִיב.","היה חם מאוד בתל אביב."],"haya cham me'od be-Tel Aviv.","It was very hot in Tel Aviv."],

/* normalize: backfill type / sublevel / readingTime on every story */
(function normalizeStories(){
  const lvlMin={A1:3,A2:4,B1:6,B2:8};
  const typeMin={short:3,long:5,extended:8,magazine:4};
  STORIES.forEach(st=>{
    if(!st.sublevel)st.sublevel=st.lvl+(st.lvl==='A1'||st.lvl==='A2'?'.1':'');
    if(!st.type){const n=st.s.length;st.type=n>=20?'extended':n>=14?'long':'short';}
    /* BUG 2 FIX: count real Hebrew word tokens, divide by 40wpm (Hebrew with nikud) */
    const words=st.s.reduce((n,x)=>n+stripN(x[0][0]).split(/\s+/).filter(Boolean).length,0);
    const raw=Math.ceil(words/40);
    const floorLvl=lvlMin[st.lvl]||3;
    const floorType=typeMin[st.type]||3;
    st.readingTime=Math.max(raw,floorLvl,floorType);
  });
})();

/* ===================================================================
   LEXICON INDEX  (all vocab as flat, addressable items)
=================================================================== */
const LEX=[];
function buildLex(){
  LEX.length=0;
  VOCAB.forEach(c=>c.words.forEach((w,i)=>LEX.push({key:'v|'+c.cat+'|'+i,v:w[0][0],p:w[0][1],tl:w[1],en:w[2],it:w[3],cat:c.cat,lvl:c.lvl})));
  (S.customVocab||[]).forEach((w,i)=>LEX.push({key:'cv|'+i,v:w.v,p:w.p||'',tl:w.tl,en:w.en,it:w.it||'',cat:'My words',lvl:''}));
}
function catItems(name){return LEX.filter(it=>it.cat===name);}

/* ===================================================================
   MASTERY MODEL   states: 0 seen · 1 weak · 2 familiar · 3 mastered
=================================================================== */
function mState(k){const m=S.mastery[k];return m?m.s:-1;}
function mSeen(k){if(!S.mastery[k])S.mastery[k]={s:0,n:0,c:0,due:Date.now()};}
function mAnswer(k,ok){let m=S.mastery[k]||{s:0,n:0,c:0,due:Date.now()};m.n++;
  if(ok){m.c++;m.s=m.c>=4?3:m.c>=2?2:Math.max(m.s,1);m.due=Date.now()+(m.s===3?7:m.s===2?2:1)*864e5;}
  else{m.c=0;m.s=1;m.due=Date.now()+6e5;}
  S.mastery[k]=m;}
/* explicit self-rating from word cards: knew=familiar, sort-of=weak, new=seen */
function mSetState(k,s){let m=S.mastery[k]||{s:0,n:0,c:0,due:Date.now()};m.s=s;m.n=(m.n||0)+1;
  if(s>=2){m.c=Math.max(m.c||0,2);m.due=Date.now()+2*864e5;}else if(s===1){m.c=0;m.due=Date.now()+6e5;}else{m.c=0;m.due=Date.now();}
  S.mastery[k]=m;}
function lessonKnown(l){const items=catItems(l.vocab);const known=items.filter(it=>mState(it.key)>=2).length;return {known,total:items.length};}
function masteryCounts(){const c={enc:0,weak:0,fam:0,mas:0};for(const k in S.mastery){const s=S.mastery[k].s;if(s===0)c.enc++;else if(s===1)c.weak++;else if(s===2)c.fam++;else if(s>=3)c.mas++;}return c;}
function mpill(k){const s=mState(k);if(s<0)return '<span class="mpill new">new</span>';return['<span class="mpill enc">seen</span>','<span class="mpill weak">weak</span>','<span class="mpill fam">familiar</span>','<span class="mpill mas">mastered</span>'][s];}
function weakPool(limit){const now=Date.now();const arr=[];
  LEX.forEach(it=>{const m=S.mastery[it.key];if(!m)return;if(m.s<=1)arr.push({it,pri:0});else if(m.due<=now)arr.push({it,pri:1});});
  arr.sort((a,b)=>a.pri-b.pri);return arr.slice(0,limit||20).map(x=>x.it);}
function learnedPool(){return LEX.filter(it=>S.mastery[it.key]);}

   {h:"Examples",ex:[["אֲנִי לוֹמֵד עִבְרִית","ani lomed ivrit","I study Hebrew"],["קוֹבִּי עוֹבֵד מֵהַבַּיִת","Kobi oved me-ha-bayit","Kobi works from home"],["אֲנִי שׁוֹתֶה קָפֶה כָּל בֹּקֶר","ani shote kafe kol boker","I drink coffee every morning"]]},
  ]},
 {id:11,chap:3,title:"הוֹוֶה: כָּל אַרְבַּע הַצּוּרוֹת",sub:"A1.2",lvl:"A1",vocab:"Verbs of daily life",grammar:3,story:"s2",
  intro:"Now that you know the m.sg form, add the other three. The pattern is the same for almost every Pa'al verb.",
  goals:["Use all four present forms correctly","Describe what different people do","Match verb form to subject gender and number"],
  key:"הוֹלֵךְ / הוֹלֶכֶת / הוֹלְכִים / הוֹלְכוֹת",
  teach:[
   {h:"The four forms side by side — root ה-ל-כ",tbl:[["m.sg","הוֹלֵךְ","holech","he / I (m) go"],["f.sg","הוֹלֶכֶת","holecet","she / I (f) go"],["m.pl","הוֹלְכִים","holchim","they(m) / we go"],["f.pl","הוֹלְכוֹת","holchot","they(f) go"]]},
   {h:"Forming the feminine singular",p:"The feminine singular adds ־ֶת (-et) to the masculine form. לוֹמֵד → לוֹמֶדֶת. אוֹהֵב → אוֹהֶבֶת. If the m.sg ends in ה (like שׁוֹתֶה, רוֹאֶה), the f.sg is the same form: שׁוֹתָה, רוֹאָה."},
   {h:"Plural: add -im (m) or -ot (f)",p:"לוֹמֵד → לוֹמְדִים (m.pl), לוֹמְדוֹת (f.pl). This is regular for most Pa'al verbs. You use m.pl for mixed groups or when gender is unknown."},
   {h:"In context",ex:[["אַנְגֶ׳לָה אוֹכֶלֶת פַּסְטָה","Angela ochelet pasta","Angela eats pasta"],["הַיְּלָדִים שׁוֹתִים מַיִם","ha-yeladim shotim mayim","The children drink water"],["טֵרֵזָה וְלוּקָה גָּרִים בְּרוֹזוֹלִינִי","Teresa ve-Luka garim be-Rosolini","Teresa and Luca live in Rosolini"]]},
  ]},
 {id:12,chap:3,title:"פְּעָלִים שֶׁל חַיֵּי יוֹם-יוֹם",sub:"A1.2",lvl:"A1",vocab:"Verbs of daily life",grammar:3,story:"s25",
