     [["לִפְעָמִים אֲנִי מֵבִיא קוֹבִּי.","לפעמים אני מביא קובי."],"lif'amim ani mevi Kobi.","Sometimes I bring Kobi."],
     [["קוֹבִּי אוֹהֵב אֶת הַאִיטַלְקִים.","קובי אוהב את האיטלקים."],"Kobi ohev et ha-italkim.","Kobi loves the Italians."],
     [["הוּא אוֹמֵר שֶׁהֵם כְּמוֹ יִשְׂרְאֵלִים.","הוא אומר שהם כמו ישראלים."],"hu omer she-hem kmo Yisre'elim.","He says they are like Israelis."],
     [["רוֹעֲשִׁים, חַמִּים וּמַרְגִּישִׁים הַכֹּל.","רועשים, חמים ומרגישים הכל."],"ro'ashim, chamim u-margishim ha-kol.","Noisy, warm and feeling everything."],
     [["אֲנִי צוֹחֵק כְּשֶׁהוּא אוֹמֵר זֶה.","אני צוחק כשהוא אומר זה."],"ani tzochek kshe-hu omer ze.","I laugh when he says that."],
     [["אַנְטוֹנִיוֹ מוֹכֵר יַיִן אֵיטַלְקִי גַּם.","אנטוניו מוכר יין איטלקי גם."],"Antonio mocher yayin italki gam.","Antonio also sells Italian wine."],
     [["לִפְעָמִים אֲנִי קוֹנֶה בַּקְבּוּק הַבַּיְתָה.","לפעמים אני קונה בקבוק הביתה."],"lif'amim ani kone bakbuk ha-bayta.","Sometimes I buy a bottle for home."],
     [["הַמִּסְעָדָה הַזֹּאת הִיא גֶּשֶׁר בֵּין שְׁתֵּי הָאֲרָצוֹת.","המסעדה הזאת היא גשר בין שתי הארצות."],"ha-mis'ada ha-zot hi gesher bein shtei ha-aratzot.","This restaurant is a bridge between two countries."],
     [["כָּל בֵּיקוּר שָׁם הוּא טִיּוּל קָצָר לְאִיטַלְיָה.","כל ביקור שם הוא טיול קצר לאיטליה."],"kol bikur sham hu tiyul katzar le-Italia.","Every visit there is a short trip to Italy."],
     [["בְּלִי לְעַזֹּב אֶת בֶּרְלִין.","בלי לעזוב את ברלין."],"bli le'azov et Berlin.","Without leaving Berlin."]],
  quiz:[{q:"Where is Antonio from?",opts:["Sicily","Rome","Naples"],a:2},{q:"What does Kobi say about Italians?",opts:["They are too loud","They are like Israelis","They are boring"],a:1}]},
 {id:"j3",t:["הָאֲדָמָה שֶׁל אַבְּאיְטָה","האדמה של אבאיטה"],en:"The Land of ABAITA",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["אֲנַחְנוּ קָנִינוּ אֶת אַבַּאיְטָה לִפְנֵי שָׁלוֹשׁ שָׁנִים.","אנחנו קנינו את אבאיטה לפני שלוש שנים."],"anachnu kaninu et ABAITA lifnei shalosh shanim.","We bought ABAITA three years ago."],
     [["הָיְתָה שָׁם בֵּית יָשָׁן שֶׁצָּרִיךְ שִׁפּוּץ.","הייתה שם בית ישן שצריך שיפוץ."],"hayta sham bayit yashan she-tzarich shiputs.","There was an old house that needed renovation."],
     [["עָבַדְנוּ עָלָיו כָּל הַקַּיִץ.","עבדנו עליו כל הקיץ."],"avadnu alav kol ha-kayitz.","We worked on it all summer."],
     [["קוֹבִּי הָיָה טוֹב בְּבִנְיָיִן.","קובי היה טוב בבנייה."],"Kobi haya tov be-binyan.","Kobi was good at building."],
     [["אֲנִי הָיִיתִי טוֹב בַּצֶּבַע.","אני הייתי טוב בצבע."],"ani hayiti tov ba-tzeva.","I was good at painting."],
     [["הַגִּינָה הָיְתָה פְּרָאִית לְגַמְרֵי.","הגינה הייתה פראית לגמרי."],"ha-gina hayta pra'it legamrei.","The garden was completely wild."],
     [["חָתַכְנוּ עַצִּים וְנָטַעְנוּ פְּרָחִים.","חתכנו עצים ונטענו פרחים."],"chatachnu atzim ve-nata'nu prachim.","We cut trees and planted flowers."],
     [["אֲנִי לָמַדְתִּי לִנְטֹעַ.","אני למדתי לנטוע."],"ani lamadti linato'a.","I learned to plant."],
     [["זֶה הָיָה חָדָשׁ לְגַמְרֵי בִּשְׁבִילִי.","זה היה חדש לגמרי בשבילי."],"ze haya chadash legamrei bishvili.","It was completely new for me."],
     [["בְּסִיצִילְיָה חָיִינוּ בָּעִיר.","בסיציליה חיינו בעיר."],"be-Sitzilya chayinu ba-ir.","In Sicily we lived in the city."],
     [["הָאֲדָמָה לִמְּדָה אוֹתִי סַבְלָנוּת.","האדמה לימדה אותי סבלנות."],"ha-adama limda oti savlanut.","The land taught me patience."],
     [["פְּרָחִים לֹא גְּדֵלִים בְּיוֹם אֶחָד.","פרחים לא גדלים ביום אחד."],"prachim lo gdeilim be-yom echad.","Flowers do not grow in one day."],
     [["אַבַּאיְטָה לִמְּדָה אוֹתִי זֶה.","אבאיטה לימדה אותי זה."],"ABAITA limda oti ze.","ABAITA taught me that."],
     [["גַּם עִבְרִית לֹא גְּדֵלָה בְּיוֹם אֶחָד.","גם עברית לא גדלה ביום אחד."],"gam ivrit lo gdela be-yom echad.","Hebrew also doesn't grow in one day."],
     [["שְׁנֵיהֶם צוֹמְחִים לְאַט, עִם אַהֲבָה.","שניהם צומחים לאט, עם אהבה."],"shneihem tzomchim le'at, im ahava.","Both grow slowly, with love."],
     [["זֶה הַשִּׁעוּר שֶׁל אַבַּאיְטָה.","זה השיעור של אבאיטה."],"ze ha-shi'ur shel ABAITA.","This is the lesson of ABAITA."]],
  quiz:[{q:"When did they buy ABAITA?",opts:["Last year","Five years ago","Three years ago"],a:2},{q:"What did the land teach Vincenzo?",opts:["Strength","Patience","Speed"],a:1}]},
 {id:"k1",t:["מְחַכִּים לִוִינְצֶנְצוֹ","מחכים לוינצנצו"],en:"Waiting for Vincenzo",lvl:"B2",sublevel:"B2",type:"extended",
  s:[
     [["כָּל פַּעַם שֶׁאֲנִי חוֹזֵר לְרוֹסוֹלִינִי.","כל פעם שאני חוזר לרוסולינִי."],"kol pa'am she-ani chozer le-Rosolini.","Every time I return to Rosolini."],
     [["הַבַּיִת שֶׁל הוֹרַי מְחַכֶּה לִי.","הבית של הוריי מחכה לי."],"ha-bayit shel horai mechake li.","My parents' house is waiting for me."],
     [["אַנְגֶ'לָה מֵכִינָה אֹכֶל כָּל הַיּוֹם לְפָנָי.","אנג'לה מכינה אוכל כל היום לפניי."],"Angela mechina ochel kol ha-yom lefanai.","Angela prepares food all day for me."],
     [["סַלְבָאטוֹרֶה קוֹנֶה יַיִן חָדָשׁ.","סלבאטורה קונה יין חדש."],"Salvatore kone yayin chadash.","Salvatore buys new wine."],
     [["הַשֻּׁלְחָן מְלֵא לִפְנֵי שֶׁאֲנִי מַגִּיעַ.","השולחן מלא לפני שאני מגיע."],"ha-shulchan male lifnei she-ani magia.","The table is full before I arrive."],
     [["טֵרֵזָה מְבִיאָה אֶת מַרְתָּא וְאֵלְיָה.","טרזה מביאה את מרתה ואליה."],"Teresa mevi'a et Marta ve-Elia.","Teresa brings Marta and Elia."],
     [["הַיְּלָדִים רָצִים אֵלַי.","הילדים רצים אליי."],"ha-yeladim ratzim elai.","The children run to me."],
     [["אֵלְיָה צוֹעֵק: וִינְצֶנְצוֹ בָּא.","אליה צועק: וינצנצו בא."],"Elia tzo'ek: Vintzentzo ba.","Elia shouts: Vincenzo is coming."],
     [["מַרְתָּא שׁוֹאֶלֶת: הֵבֵאתָ מַתָּנָה.","מרתה שואלת: הבאת מתנה."],"Marta sho'elet: heveta matana.","Marta asks: did you bring a gift."],
     [["תָּמִיד מֵבִיא.","תמיד מביא."],"tamid mevi.","I always bring."],
     [["לַמַּרְתָּה עִפָּרוֹן וְנְיָּרוֹת.","למרתה עיפרון וניירות."],"la-Marta iparon ve-niyarot.","For Marta pencils and papers."],
     [["לְאֵלְיָה מִשְׂחָקִים.","לאליה משחקים."],"le-Elia mischakim.","For Elia games."],
     [["הֵם שׂוֹמְחִים בְּכָל מַתָּנָה.","הם שמחים בכל מתנה."],"hem smeichim be-chol matana.","They are happy with any gift."],
     [["לוּקָּה בָּא מְאוּחָר.","לוקה בא מאוחר."],"Luca ba me'uchar.","Luca comes late."],
     [["הוּא עוֹבֵד הַרְבֵּה.","הוא עובד הרבה."],"hu oved harbe.","He works a lot."],
     [["אֲבָל תָּמִיד בָּא.","אבל תמיד בא."],"aval tamid ba.","But he always comes."],
     [["הָאֲרוּחָה אוֹרֶכֶת שָׁלוֹשׁ שָׁעוֹת.","הארוחה אורכת שלוש שעות."],"ha-arucha orechet shalosh sha'ot.","The meal lasts three hours."],
     [["מְדַבְּרִים עַל כָּל דָּבָר.","מדברים על כל דבר."],"medabrim al kol davar.","We talk about everything."],
     [["עַל הַפּוֹלִיטִיקָה, עַל הָאֹכֶל, עַל הַמִּשְׁפָּחָה.","על הפוליטיקה, על האוכל, על המשפחה."],"al ha-politika, al ha-ochel, al ha-mishpacha.","About politics, food, family."],
     [["בֶּרְלִין הִיא עֵין רְחוֹקָה.","ברלין היא עין רחוקה."],"Berlin hi ayin rechoka.","Berlin is a distant eye."],
     [["כַּאן הָאֹכֶל וְהַסּוֹד.","כאן האוכל והסוד."],"kan ha-ochel ve-ha-sod.","Here is the food and the secret."],
     [["הַסּוֹד שֶׁאֲנִי חוֹזֵר.","הסוד שאני חוזר."],"ha-sod she-ani chozer.","The secret is that I return."],
     [["כָּל פַּעַם.","כל פעם."],"kol pa'am.","Every time."],
     [["כִּי רוֹסוֹלִינִי הִיא תָּמִיד בִּי.","כי רוסוליני היא תמיד בי."],"ki Rosolini hi tamid bi.","Because Rosolini is always within me."],
     [["הֲלִיכוֹת, רֵיחוֹת, קוֹלוֹת.","הליכות, ריחות, קולות."],"halikhot, reichot, kolot.","Walks, smells, sounds."]],
  quiz:[{q:"Who runs to Vincenzo when he arrives?",opts:["Angela","The children Marta and Elia","Luca"],a:1},{q:"How long does the meal last?",opts:["One hour","Two hours","Three hours"],a:2}]},
 {id:"k2",t:["מַה שֶּׁעִבְרִית נוֹתֶנֶת לִי","מה שעברית נותנת לי"],en:"What Hebrew Gives Me",lvl:"B2",sublevel:"B2",type:"extended",
  s:[
     [["לָמַדְתִּי הַרְבֵּה שָׂפוֹת בְּחַיַּי.","למדתי הרבה שפות בחיי."],"lamadti harbe safot be-chayai.","I have learned many languages in my life."],
     [["אַנְגְּלִית הָיְתָה הָרִאשׁוֹנָה אַחֲרֵי אִיטַלְקִית.","אנגלית הייתה הראשונה אחרי איטלקית."],"anglit hayta ha-rishona acharei italkit.","English was the first after Italian."],
     [["גֶּרְמָנִית בָּאָה עִם בֶּרְלִין.","גרמנית באה עם ברלין."],"germanit ba'a im Berlin.","German came with Berlin."],
     [["כָּל שָׂפָה נָתְנָה לִי כְּלִי חָדָשׁ.","כל שפה נתנה לי כלי חדש."],"kol safa natna li kli chadash.","Every language gave me a new tool."],
     [["עִבְרִית שׁוֹנָה מִכֻּלָּן.","עברית שונה מכולן."],"ivrit shona mi-kulan.","Hebrew is different from all of them."],
     [["הִיא עַתִּיקָה אֲבָל חַיָּה.","היא עתיקה אבל חיה."],"hi atika aval chaya.","It is ancient but alive."],
     [["הַשּׁוֹרָשִׁים שֶׁל הַמִּלִּים עֲמֻקִּים.","השורשים של המילים עמוקים."],"ha-shorashim shel ha-milim amukim.","The roots of the words are deep."],
     [["שׁוֹרֶשׁ שְׁלוֹשָׁה אוֹתִיּוֹת יוֹצֵר עֵשֶׂר מִלִּים.","שורש שלושה אותיות יוצר עשר מילים."],"shoresh shlosheh otiyot yotzer eser milim.","Three-letter root creates ten words."],
     [["זֶה הִגְּיוֹן שִׁפָּה שׁוֹנֶה מִכָּל מַה שֶׁיָּדַעְתִּי.","זה היגיון שפה שונה מכל מה שידעתי."],"ze higayon safa shone mi-kol ma she-yadati.","This is a linguistic logic different from all I knew."],
     [["כְּשֶׁאֲנִי לוֹמֵד שׁוֹרֶשׁ חָדָשׁ.","כשאני לומד שורש חדש."],"kshe-ani lomed shoresh chadash.","When I learn a new root."],
     [["אֲנִי מֵבִין עֶשֶׂר מִלִּים בְּבַת אַחַת.","אני מבין עשר מילים בבת אחת."],"ani mevin eser milim be-vat achat.","I understand ten words at once."],
     [["עִבְרִית נוֹתֶנֶת לִי גַּם מַשֶּׁהוּ אֲחֵר.","עברית נותנת לי גם משהו אחר."],"ivrit notenet li gam mashehu acher.","Hebrew gives me something else too."],
     [["קֶשֶׁר לִמִּשְׁפָּחָה שֶׁל קוֹבִּי.","קשר למשפחה של קובי."],"kesher le-mishpacha shel Kobi.","A connection to Kobi's family."],
     [["כְּשֶׁאֲנִי מְדַבֵּר עִם מִיקִי בְּעִבְרִית.","כשאני מדבר עם מיקי בעברית."],"kshe-ani medaber im Miki be-ivrit.","When I speak with Miki in Hebrew."],
     [["הוּא מְחַיֵּךְ אֵלַי אַחֶרֶת.","הוא מחייך אליי אחרת."],"hu mechayech elai acheret.","He smiles at me differently."],
     [["כְּמוֹ שֶׁנָּגַעְתִּי בְּמַשֶּׁהוּ עָמֹק יוֹתֵר.","כמו שנגעתי במשהו עמוק יותר."],"kmo she-nagati be-mashehu amok yoter.","Like I touched something deeper."],
     [["עִבְרִית הִיא לֹא רַק שָׂפָה.","עברית היא לא רק שפה."],"ivrit hi lo rak safa.","Hebrew is not just a language."],
     [["הִיא קוֹד לְעוֹלָם.","היא קוד לעולם."],"hi kod le-olam.","It is a code to a world."],
     [["וּלְמִי שֶׁאֲנִי אוֹהֵב.","ולמי שאני אוהב."],"u-le-mi she-ani ohev.","And to those I love."],
     [["הָ'אֶהֱבָה' שֶׁלִּי בְּעִבְרִית.","האהבה שלי בעברית."],"ha-'ahava' sheli be-ivrit.","My 'ahava' in Hebrew."],
     [["אוֹתָהּ מִלָּה, עוֹד מַשְׁמָעוּת.","אותה מילה, עוד משמעות."],"otah mila, od mashma'ut.","Same word, another meaning."],
     [["עָמֹק יוֹתֵר.","עמוק יותר."],"amok yoter.","Deeper."]],
  quiz:[{q:"What makes Hebrew different from other languages Vincenzo learned?",opts:["It is easier","Ancient but alive with deep roots","It is similar to Italian"],a:1},{q:"When does Miki smile differently?",opts:["When Vincenzo cooks","When Vincenzo speaks Hebrew with him","When Vincenzo visits"],a:1}]},
 {id:"m7",t:["אוֹכֶל רְחוֹב בְּתֵל אָבִיב","אוכל רחוב בתל אביב"],en:"Street Food in Tel Aviv",lvl:"A2",sublevel:"A2.2",type:"magazine",
  s:[
     [["תֵּל אָבִיב הִיא גַּן עֵדֶן לְאוֹהֲבֵי אֹכֶל.","תל אביב היא גן עדן לאוהבי אוכל."],"Tel Aviv hi gan eden le-ohavei ochel.","Tel Aviv is a paradise for food lovers."],
     [["בָּרְחוֹבוֹת יֵשׁ אֹכֶל בְּכָל פִּינָּה.","ברחובות יש אוכל בכל פינה."],"ba-rechovot yesh ochel be-chol pina.","In the streets there is food on every corner."],
     [["הַפַּלָּאפֶל הוּא הַמֶּלֶךְ שֶׁל רְחוֹב.","הפלאפל הוא המלך של רחוב."],"ha-falafel hu ha-melech shel rechov.","Falafel is the king of the street."],
     [["כַּדּוּרִים שֶׁל חֻמְּצָה בְּתוֹךְ פִּיתָּה.","כדורים של חומצה בתוך פיתה."],"kadurim shel chumtza be-toch pita.","Balls of chickpea inside pita."],
     [["שׁוּם, חוּמוּס, וְסָלָט.","שום, חומוס, וסלט."],"shum, chumus, ve-salat.","Garlic, hummus and salad."],
     [["הַשַּׁקְשׁוּקָה גַּם פּוֹפּוּלַרִית.","השקשוקה גם פופולרית."],"ha-shakshuka gam popularity.","Shakshuka is also popular."],
     [["בֵּיצִים בְּרֹטֶב עַגְבָנִיּוֹת.","ביצים ברוטב עגבניות."],"beitzim be-rotev agvaniot.","Eggs in tomato sauce."],
     [["אֶפְשָׁר לֶאֱכֹל אוֹתָהּ בַּבֹּקֶר וּבָעֶרֶב.","אפשר לאכול אותה בבוקר ובערב."],"efshar le'echol ota ba-boker u-va-erev.","You can eat it morning and evening."],
     [["הַסָּבִיךְ הוּא יוֹתֵר חָדָשׁ.","הסביח הוא יותר חדש."],"ha-sabich hu yoter chadash.","Sabich is more recent."],
     [["חֲצִיל מְטֻגָּן בְּפִיתָּה עִם בֵּיצָה.","חציל מטוגן בפיתה עם ביצה."],"chatzil metugaan be-pita im beitza.","Fried eggplant in pita with egg."],
     [["הָעִיר לֹא נִרְדֶּמֶת.","העיר לא נרדמת."],"ha-ir lo niredemet.","The city does not sleep."],
     [["גַּם בְּאַחַת בַּלַּיְלָה יֵשׁ מִסְעָדוֹת פְּתוּחוֹת.","גם באחת בלילה יש מסעדות פתוחות."],"gam be-achat ba-layla yesh mis'adot ptuchot.","Even at one at night there are open restaurants."],
     [["הָאֹכֶל בְּתֵל אָבִיב מְשַׁקֵּף אֶת הָעִיר.","האוכל בתל אביב משקף את העיר."],"ha-ochel be-Tel Aviv meshakef et ha-ir.","The food in Tel Aviv reflects the city."],
     [["פְּתוּחָה, מְעֹרְבֶּבֶת, חַיָּה.","פתוחה, מעורבבת, חיה."],"ptucha, me'orevet, chaya.","Open, mixed, alive."]],
  quiz:[{q:"What is called the king of the street?",opts:["Shakshuka","Falafel","Sabich"],a:1},{q:"What is sabich?",opts:["Fried eggplant in pita","Hummus with meat","Sweet pastry"],a:0}]},
 {id:"m8",t:["הַמּוּסִיקָה שֶׁל יִשְׂרָאֵל","המוסיקה של ישראל"],en:"The Music of Israel",lvl:"B1",sublevel:"B1",type:"magazine",
  s:[
     [["הַמּוּסִיקָה הַיִּשְׂרְאֵלִית שׁוֹנָה מְאוֹד.","המוסיקה הישראלית שונה מאוד."],"ha-musika ha-Yisre'elit shona me'od.","Israeli music is very diverse."],
     [["יֵשׁ פּוֹפ, רוֹק, מִזְרָחִי וְמוּסִיקַת יַם.","יש פופ, רוק, מזרחי ומוסיקת ים."],"yesh pop, rock, mizrachi ve-musikat yam.","There is pop, rock, Mizrahi and Mediterranean music."],
     [["הַמּוּסִיקָה הַמִּזְרָחִית בָּאָה מֵהָאֶזוֹר.","המוסיקה המזרחית באה מהאזור."],"ha-musika ha-mizrachit ba'a me-ha-ezor.","Mizrahi music comes from the region."],
     [["שִׁירֵי גָּלוּת, שִׁירֵי בַּיִת.","שירי גלות, שירי בית."],"shirei galut, shirei bayit.","Songs of exile, songs of home."],
     [["כָּל עָלִיָּה הֵבִיאָה מוּסִיקָה חֲדָשָׁה.","כל עלייה הביאה מוסיקה חדשה."],"kol aliya hevi'a musika chadasha.","Every immigration wave brought new music."],
     [["מֵרוּסְיָה, מִמָּרוֹקּוֹ, מֵאֶתְיוֹפְּיָה.","מרוסיה, ממרוקו, מאתיופיה."],"me-Rusya, mi-Maroko, me-Ethiopia.","From Russia, Morocco, Ethiopia."],
     [["הַמּוּסִיקָה הַיִּשְׂרְאֵלִית הִיא עֵרְבּוּב.","המוסיקה הישראלית היא ערבוב."],"ha-musika ha-Yisre'elit hi irbub.","Israeli music is a mix."],
     [["כְּמוֹ הָעַם עַצְמוֹ.","כמו העם עצמו."],"kmo ha-am atzmo.","Like the people themselves."],
     [["קוֹבִּי אוֹהֵב שִׁירֵי הַשָּׁמוֹנִים וְהַתִּשְׁעִים.","קובי אוהב שירי השמונים והתשעים."],"Kobi ohev shirei ha-shmonim ve-ha-tish'im.","Kobi loves songs of the eighties and nineties."],
     [["שִׁירִים כְּמוֹ שִׁירֵי עִבְרִית לְחֲלוּטִין.","שירים כמו שירי עברית לחלוטין."],"shirim kmo shirei ivrit le-chalut in.","Songs that are completely Hebrew."],
     [["אֲנִי מְנַסֶּה לְהָבִין אֶת הַמִּלִּים.","אני מנסה להבין את המילים."],"ani menase lehavin et ha-milim.","I try to understand the words."],
     [["לִפְעָמִים מַצְלִיחַ, לִפְעָמִים לֹא.","לפעמים מצליח, לפעמים לא."],"lif'amim matzliach, lif'amim lo.","Sometimes I succeed, sometimes not."],
     [["אֲבָל הַמֶּלוֹדְיָּה תָּמִיד מְדַבֶּרֶת.","אבל המלודיה תמיד מדברת."],"aval ha-melody tamid medaberet.","But the melody always speaks."],
     [["מוּסִיקָה הִיא שָׂפָה שֶׁחוֹצֶה גְּבוּלוֹת.","מוסיקה היא שפה שחוצה גבולות."],"musika hi safa she-chotze gvulot.","Music is a language that crosses borders."]],
  quiz:[{q:"What is Mizrahi music described as?",opts:["Pop and rock","Songs of exile and home","Classical"],a:1},{q:"What does Kobi love?",opts:["Modern pop","Songs of the eighties and nineties","Jazz"],a:1}]},
 {id:"n1",t:["הַשָּׁכֵן הֶחָדָשׁ","השכן החדש"],en:"The New Neighbour",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["יֵשׁ שָׁכֵן חָדָשׁ בַּבִּנְיָן.","יש שכן חדש בבניין."],"yesh shachen chadash ba-binyan.","There is a new neighbour in the building."],
     [["שְׁמוֹ פֶּטֶר וְהוּא מֵאוֹסְטְרִיָּה.","שמו פטר והוא מאוסטריה."],"shmo Peter ve-hu me-Ostriya.","His name is Peter and he is from Austria."],
     [["הוּא צָעִיר וְנֶחְמָד.","הוא צעיר ונחמד."],"hu tza'ir ve-nechmad.","He is young and nice."],
     [["פָּגַשְׁתִּי אוֹתוֹ בַּמַּעֲלִית.","פגשתי אותו במעלית."],"pagashti oto ba-ma'alit.","I met him in the lift."],
     [["אָמַרְתִּי לוֹ שָׁלוֹם.","אמרתי לו שלום."],"amarti lo shalom.","I said hello to him."],
     [["הוּא שָׁאַל מֵאַיִן אֲנִי.","הוא שאל מאיין אני."],"hu sha'al me-ayin ani.","He asked where I am from."],
     [["אָמַרְתִּי שֶׁאֲנִי מֵאִיטַלְיָה.","אמרתי שאני מאיטליה."],"amarti she-ani me-Italia.","I said I am from Italy."],
     [["הוּא שָׂמַח לִשְׁמֹעַ.","הוא שמח לשמוע."],"hu samach lishmo'a.","He was glad to hear that."],
     [["הִזְמַנְתִּי אוֹתוֹ לְקָפֶה.","הזמנתי אותו לקפה."],"hizmanti oto le-kafe.","I invited him for coffee."],
     [["הוּא אָמַר תּוֹדָה, אוּלַי מָחָר.","הוא אמר תודה, אולי מחר."],"hu amar toda, ulay machar.","He said thanks, maybe tomorrow."],
     [["נֶחְמָד לִפְגֹּשׁ שְׁכֵנִים חֲדָשִׁים.","נחמד לפגוש שכנים חדשים."],"nechmad lifgosh shchenim chadashim.","It is nice to meet new neighbours."],
     [["בֶּרְלִין מְלֵאָה אֲנָשִׁים מֵהָעוֹלָם.","ברלין מלאה אנשים מהעולם."],"Berlin mele'a anashim me-ha-olam.","Berlin is full of people from the world."]],
  quiz:[{q:"Where is Peter from?",opts:["Italy","Austria","Germany"],a:1},{q:"What did Vincenzo invite Peter for?",opts:["Dinner","Coffee","A walk"],a:1}]},
 {id:"n2",t:["הַשָּׁעוֹן הַמְעוֹרֵר","השעון המעורר"],en:"The Alarm Clock",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּבֹּקֶר הַשָּׁעוֹן מְצַלְצֵל בְּשֵׁשׁ וָחֵצִי.","בבוקר השעון מצלצל בשש וחצי."],"ba-boker ha-sha'on metzaltzel be-shesh va-chetzi.","In the morning the clock rings at six thirty."],
     [["אֲנִי לֹא אוֹהֵב לָקוּם מֻקְדָּם.","אני לא אוהב לקום מוקדם."],"ani lo ohev lakum mukdam.","I do not like to get up early."],
     [["אֲבָל צָרִיךְ לְהַגִּיעַ לָעֲבוֹדָה.","אבל צריך להגיע לעבודה."],"aval tzarich lehagia la-avoda.","But I must get to work."],
     [["קוֹבִּי קָם לְפָנַי.","קובי קם לפניי."],"Kobi kam lefanai.","Kobi gets up before me."],
     [["הוּא מֵכִין קָפֶה.","הוא מכין קפה."],"hu mechin kafe.","He makes coffee."],
     [["הָרֵיחַ שֶׁל הַקָּפֶה מֵעִיר אוֹתִי.","הריח של הקפה מעיר אותי."],"ha-reiach shel ha-kafe me'ir oti.","The smell of the coffee wakes me up."],
     [["אֲנִי קָם לְאַט.","אני קם לאט."],"ani kam le'at.","I get up slowly."],
     [["מִתְקַלֵּחַ וּמִתְלַבֵּשׁ.","מתקלח ומתלבש."],"mitkaleach u-mitlabesh.","I shower and dress."],
     [["שׁוֹתֶה אֶת הַקָּפֶה מַהֵר.","שותה את הקפה מהר."],"shote et ha-kafe maher.","I drink the coffee fast."],
     [["נוֹתֵן נְשִׁיקָה לְקוֹבִּי.","נותן נשיקה לקובי."],"noten neshika le-Kobi.","I give Kobi a kiss."],
     [["יוֹצֵא מֵהַבַּיִת בְּשֶׁבַע וְרֶבַע.","יוצא מהבית בשבע ורבע."],"yotze me-ha-bayit be-sheva va-reva.","I leave home at seven fifteen."],
     [["יוֹם חָדָשׁ מַתְחִיל.","יום חדש מתחיל."],"yom chadash matchil.","A new day begins."]],
  quiz:[{q:"What time does the alarm ring?",opts:["Six","Six thirty","Seven"],a:1},{q:"What wakes Vincenzo up?",opts:["The alarm","The smell of coffee","Kobi"],a:1}]},
 {id:"n3",t:["הַמַּתָּנָה לְקוֹבִּי","המתנה לקובי"],en:"A Gift for Kobi",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["מָחָר יוֹם הַהוּלֶדֶת שֶׁל קוֹבִּי.","מחר יום ההולדת של קובי."],"machar yom ha-huledet shel Kobi.","Tomorrow is Kobi's birthday."],
     [["אֲנִי רוֹצֶה לִקְנוֹת מַתָּנָה יָפָה.","אני רוצה לקנות מתנה יפה."],"ani rotze liknot matana yafa.","I want to buy a nice gift."],
     [["הָלַכְתִּי לַחֲנוּת סְפָרִים.","הלכתי לחנות ספרים."],"halachti la-chanut sfarim.","I went to a bookshop."],
     [["קוֹבִּי אוֹהֵב לִקְרֹא הִיסְטוֹרְיָה.","קובי אוהב לקרוא היסטוריה."],"Kobi ohev likro historia.","Kobi loves to read history."],
     [["מָצָאתִי סֵפֶר עַל יְרוּשָׁלַיִם.","מצאתי ספר על ירושלים."],"matzati sefer al Yerushalayim.","I found a book about Jerusalem."],
     [["הַסֵּפֶר הָיָה יָקָר קְצָת.","הספר היה יקר קצת."],"ha-sefer haya yakar ktzat.","The book was a bit expensive."],
     [["אֲבָל זֶה בִּשְׁבִיל קוֹבִּי.","אבל זה בשביל קובי."],"aval ze bishvil Kobi.","But it is for Kobi."],
     [["קָנִיתִי אֶת הַסֵּפֶר.","קניתי את הספר."],"kaniti et ha-sefer.","I bought the book."],
     [["הַמּוֹכֵר עָטַף אוֹתוֹ יָפֶה.","המוכר עטף אותו יפה."],"ha-mocher ataf oto yafe.","The seller wrapped it nicely."],
     [["הֶחְבֵּאתִי אֶת הַמַּתָּנָה בָּאֲרוֹן.","החבאתי את המתנה בארון."],"hechbeti et ha-matana ba-aron.","I hid the gift in the closet."],
     [["אֲנִי מְצַפֶּה לִרְאוֹת אֶת קוֹבִּי שָׂמֵחַ.","אני מצפה לראות את קובי שמח."],"ani metzape lir'ot et Kobi sameach.","I am looking forward to seeing Kobi happy."],
     [["אַהֲבָה הִיא בַּפְּרָטִים הַקְּטַנִּים.","אהבה היא בפרטים הקטנים."],"ahava hi ba-pratim ha-ktanim.","Love is in the small details."]],
  quiz:[{q:"What does Kobi love to read?",opts:["Novels","History","Poetry"],a:1},{q:"Where did Vincenzo hide the gift?",opts:["Under the bed","In the closet","At a friend's"],a:1}]},
 {id:"n4",t:["יוֹם גָּשׁוּם בָּעֲבוֹדָה","יום גשום בעבודה"],en:"A Rainy Day at Work",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["הַבֹּקֶר הָיָה גָּשׁוּם מְאוֹד.","הבוקר היה גשום מאוד."],"ha-boker haya gashum me'od.","The morning was very rainy."],
     [["הָאוֹטוֹבּוּס אֵחֵר.","האוטובוס איחר."],"ha-otobus icher.","The bus was late."],
     [["הִגַּעְתִּי לָעֲבוֹדָה רָטֹב.","הגעתי לעבודה רטוב."],"higati la-avoda ratov.","I arrived at work wet."],
     [["הַחֲבֵרִים שֶׁלִּי צָחֲקוּ קְצָת.","החברים שלי צחקו קצת."],"ha-chaverim sheli tzachaku ktzat.","My colleagues laughed a little."],
     [["הָיָה הַרְבֵּה עֲבוֹדָה הַיּוֹם.","היה הרבה עבודה היום."],"haya harbe avoda ha-yom.","There was a lot of work today."],
     [["עָנִיתִי לַהֲרְבֵּה הוֹדָעוֹת.","עניתי להרבה הודעות."],"aniti le-harbe hoda'ot.","I answered many messages."],
     [["בַּצָּהֳרַיִם אָכַלְתִּי סֶנְדְּוִיץ'.","בצהריים אכלתי סנדוויץ'."],"ba-tzohorayim achalti sandwich.","At noon I ate a sandwich."],
     [["שָׁתִיתִי קָפֶה חַם.","שתיתי קפה חם."],"shatiti kafe cham.","I drank a hot coffee."],
     [["אַחַר הַצָּהֳרַיִם הַגֶּשֶׁם נֶעֱצַר.","אחר הצהריים הגשם נעצר."],"achar ha-tzohorayim ha-geshem ne'etzar.","In the afternoon the rain stopped."],
     [["בְּסוֹף הַיּוֹם הָלַכְתִּי הַבַּיְתָה.","בסוף היום הלכתי הביתה."],"be-sof ha-yom halachti ha-bayta.","At the end of the day I went home."],
     [["קוֹבִּי חִכָּה לִי עִם אֲרוּחָה חַמָּה.","קובי חיכה לי עם ארוחה חמה."],"Kobi chika li im arucha chama.","Kobi waited for me with a hot meal."],
     [["יוֹם קָשֶׁה נִגְמַר טוֹב.","יום קשה נגמר טוב."],"yom kashe nigmar tov.","A hard day ended well."]],
  quiz:[{q:"Why was Vincenzo wet at work?",opts:["He swam","It was rainy and the bus was late","He spilled water"],a:1},{q:"What waited for him at home?",opts:["A letter","A hot meal","Friends"],a:1}]},
 {id:"n5",t:["הָאֲגַם בַּקַּיִץ","האגם בקיץ"],en:"The Lake in Summer",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּקַּיִץ אֲנַחְנוּ הוֹלְכִים לָאֲגַם.","בקיץ אנחנו הולכים לאגם."],"ba-kayitz anachnu holchim la-agam.","In summer we go to the lake."],
     [["יֵשׁ אֲגַמִּים יָפִים לְיַד בֶּרְלִין.","יש אגמים יפים ליד ברלין."],"yesh agamim yafim leyad Berlin.","There are beautiful lakes near Berlin."],
     [["הַמַּיִם קָרִים וּנְקִיִּים.","המים קרים ונקיים."],"ha-mayim karim u-nkiyim.","The water is cold and clean."],
     [["אֲנִי שׂוֹחֶה קְצָת.","אני שוחה קצת."],"ani socheh ktzat.","I swim a little."],
     [["קוֹבִּי יוֹשֵׁב עַל הַחוֹף.","קובי יושב על החוף."],"Kobi yoshev al ha-chof.","Kobi sits on the shore."],
     [["אֲנַחְנוּ אוֹכְלִים פֵּרוֹת.","אנחנו אוכלים פירות."],"anachnu ochlim perot.","We eat fruit."],
     [["יֵשׁ הַרְבֵּה מִשְׁפָּחוֹת שָׁם.","יש הרבה משפחות שם."],"yesh harbe mishpachot sham.","There are many families there."],
     [["הַיְּלָדִים מְשַׂחֲקִים בַּמַּיִם.","הילדים משחקים במים."],"ha-yeladim mesachakim ba-mayim.","The children play in the water."],
     [["הַשֶּׁמֶשׁ חַמָּה וְנְעִימָה.","השמש חמה ונעימה."],"ha-shemesh chama u-ne'ima.","The sun is warm and pleasant."],
     [["בָּעֶרֶב אֲנַחְנוּ חוֹזְרִים הַבַּיְתָה.","בערב אנחנו חוזרים הביתה."],"ba-erev anachnu chozrim ha-bayta.","In the evening we return home."],
     [["עֲיֵפִים אֲבָל מְאֻשָּׁרִים.","עייפים אבל מאושרים."],"ayefim aval me'usharim.","Tired but happy."],
     [["הַקַּיִץ בְּבֶּרְלִין קָצָר אֲבָל יָפֶה.","הקיץ בברלין קצר אבל יפה."],"ha-kayitz be-Berlin katzar aval yafe.","Summer in Berlin is short but beautiful."]],
  quiz:[{q:"What is the water like at the lake?",opts:["Warm and dirty","Cold and clean","Deep and dark"],a:1},{q:"What does Kobi do at the lake?",opts:["Swims","Sits on the shore","Plays with children"],a:1}]},
 {id:"o1",t:["הַחֲנוּת שֶׁל אַנְטוֹנִיוֹ","חנות היין"],en:"The Wine Shop",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בִּשְׁכוּנָה שֶׁלָּנוּ יֵשׁ חֲנוּת יַיִן.","בשכונה שלנו יש חנות יין."],"bi-schuna shelanu yesh chanut yayin.","In our neighbourhood there is a wine shop."],
     [["הַבַּעַל מֵאִיטַלְיָה כְּמוֹנִי.","הבעל מאיטליה כמוני."],"ha-ba'al me-Italia kamoni.","The owner is from Italy like me."],
     [["שְׁמוֹ אַנְטוֹנִיוֹ.","שמו אנטוניו."],"shmo Antonio.","His name is Antonio."],
     [["הוּא מוֹכֵר יַיִן מִכָּל אִיטַלְיָה.","הוא מוכר יין מכל איטליה."],"hu mocher yayin mi-kol Italia.","He sells wine from all of Italy."],
     [["יֵשׁ יַיִן מִסִּיצִילְיָה גַּם.","יש יין מסיציליה גם."],"yesh yayin mi-Sitzilya gam.","There is wine from Sicily too."],
     [["כְּשֶׁאֲנִי נִכְנָס אֲנַחְנוּ מְדַבְּרִים אִיטַלְקִית.","כשאני נכנס אנחנו מדברים איטלקית."],"kshe-ani nichnas anachnu medabrim italkit.","When I enter we speak Italian."],
     [["זֶה כְּמוֹ חֵלֶק קָטָן מֵהַבַּיִת.","זה כמו חלק קטן מהבית."],"ze kmo chelek katan me-ha-bayit.","It is like a little piece of home."],
     [["אַנְטוֹנִיוֹ מַמְלִיץ לִי כָּל פַּעַם.","אנטוניו ממליץ לי כל פעם."],"Antonio mamlizt li kol pa'am.","Antonio recommends to me each time."],
     [["הוּא יוֹדֵעַ מָה אֲנִי אוֹהֵב.","הוא יודע מה אני אוהב."],"hu yodea ma ani ohev.","He knows what I like."],
     [["בְּשַׁבָּת אֲנִי קוֹנֶה בַּקְבּוּק טוֹב.","בשבת אני קונה בקבוק טוב."],"be-Shabbat ani kone bakbuk tov.","On Shabbat I buy a good bottle."],
     [["קוֹבִּי וַאֲנִי שׁוֹתִים בָּעֶרֶב.","קובי ואני שותים בערב."],"Kobi va-ani shotim ba-erev.","Kobi and I drink in the evening."],
     [["יַיִן טוֹב הוּא זִכָּרוֹן מֵאִיטַלְיָה.","יין טוב הוא זיכרון מאיטליה."],"yayin tov hu zikaron me-Italia.","Good wine is a memory from Italy."],
     [["אַנְטוֹנִיוֹ נַעֲשָׂה חָבֵר.","אנטוניו נעשה חבר."],"Antonio na'asa chaver.","Antonio has become a friend."],
     [["חֲנוּת קְטַנָּה, קֶשֶׁר גָּדוֹל.","חנות קטנה, קשר גדול."],"chanut ktana, kesher gadol.","A small shop, a big connection."],
     [["בֶּרְלִין מְחַבֶּרֶת אֲנָשִׁים.","ברלין מחברת אנשים."],"Berlin mechaberet anashim.","Berlin connects people."]],
  quiz:[{q:"Where is Antonio from?",opts:["Sicily","Italy","Spain"],a:1},{q:"When does Vincenzo buy a good bottle?",opts:["Every day","On Shabbat","On Mondays"],a:1}]},
 {id:"o2",t:["שִׁעוּר הָרִקּוּד","שיעור הריקוד"],en:"The Dance Lesson",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["קוֹבִּי רָצָה שֶׁנִּלְמַד לִרְקֹד.","קובי רצה שנלמד לרקוד."],"Kobi ratza she-nilmad lirkod.","Kobi wanted us to learn to dance."],
     [["מָצָאנוּ שִׁעוּר רִקּוּד בַּשְּׁכוּנָה.","מצאנו שיעור ריקוד בשכונה."],"matzanu shi'ur rikud ba-schuna.","We found a dance class in the neighbourhood."],
     [["הַמּוֹרָה הָיְתָה מִסְפָּרַד.","המורה הייתה מספרד."],"ha-mora hayta mi-Sfarad.","The teacher was from Spain."],
     [["בַּהַתְחָלָה הָיִינוּ מְבֻיָּשִׁים.","בהתחלה היינו מבויישים."],"ba-hatchala hayinu mevuyashim.","At first we were shy."],
     [["לֹא יָדַעְנוּ אֵיךְ לָזוּז.","לא ידענו איך לזוז."],"lo yadanu eich lazuz.","We did not know how to move."],
     [["הַמּוֹרָה הָיְתָה סַבְלָנִית.","המורה הייתה סבלנית."],"ha-mora hayta savlanit.","The teacher was patient."],
     [["לְאַט לְאַט לָמַדְנוּ אֶת הַצְּעָדִים.","לאט לאט למדנו את הצעדים."],"le'at le'at lamadnu et ha-tze'adim.","Slowly we learned the steps."],
     [["דָּרַכְתִּי עַל הָרֶגֶל שֶׁל קוֹבִּי.","דרכתי על הרגל של קובי."],"darachti al ha-regel shel Kobi.","I stepped on Kobi's foot."],
     [["שְׁנֵינוּ צָחַקְנוּ הַרְבֵּה.","שנינו צחקנו הרבה."],"shneinu tzachaknu harbe.","We both laughed a lot."],
     [["אַחֲרֵי חֹדֶשׁ רָקַדְנוּ טוֹב יוֹתֵר.","אחרי חודש רקדנו טוב יותר."],"acharei chodesh rakadnu tov yoter.","After a month we danced better."],
     [["הָרִקּוּד קֵרֵב אוֹתָנוּ.","הריקוד קירב אותנו."],"ha-rikud kerev otanu.","The dancing brought us closer."],
     [["עַכְשָׁו אֲנַחְנוּ רוֹקְדִים בַּמִּטְבָּח.","עכשיו אנחנו רוקדים במטבח."],"achshav anachnu rokdim ba-mitbach.","Now we dance in the kitchen."],
     [["כְּשֶׁמְּבַשְּׁלִים עִם מוּסִיקָה.","כשמבשלים עם מוסיקה."],"kshe-mevashlim im musika.","When we cook with music."],
     [["הַחַיִּים יוֹתֵר יָפִים עִם רִקּוּד.","החיים יותר יפים עם ריקוד."],"ha-chayim yoter yafim im rikud.","Life is more beautiful with dancing."],
     [["תּוֹדָה לְקוֹבִּי עַל הָרַעְיוֹן.","תודה לקובי על הרעיון."],"toda le-Kobi al ha-ra'ayon.","Thank you to Kobi for the idea."]],
  quiz:[{q:"Where was the dance teacher from?",opts:["Italy","Spain","France"],a:1},{q:"What happened during the lesson?",opts:["Vincenzo left early","Vincenzo stepped on Kobi's foot","They argued"],a:1}]},
 {id:"o3",t:["הַבֵּיקוּר שֶׁל אַנְגֶ'לָה","הביקור של אנג'לה"],en:"Angela's Visit",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["אַנְגֶ'לָה בָּאָה לְבַקֵּר בְּבֶּרְלִין.","אנג'לה באה לבקר בברלין."],"Angela ba'a levaker be-Berlin.","Angela came to visit Berlin."],
     [["זוֹ הָיְתָה הַפַּעַם הָרִאשׁוֹנָה שֶׁלָּהּ.","זו הייתה הפעם הראשונה שלה."],"zo hayta ha-pa'am ha-rishona shela.","It was her first time."],
     [["הִיא פָּחֲדָה קְצָת מֵהַטִּיסָה.","היא פחדה קצת מהטיסה."],"hi pachada ktzat me-ha-tisa.","She was a little afraid of the flight."],
     [["אֲבָל הִיא הִגִּיעָה בְּשָׁלוֹם.","אבל היא הגיעה בשלום."],"aval hi higi'a be-shalom.","But she arrived safely."],
     [["חִכִּיתִי לָהּ בִּנְמַל הַתְּעוּפָה.","חיכיתי לה בנמל התעופה."],"chikiti la bi-nmal ha-te'ufa.","I waited for her at the airport."],
     [["כְּשֶׁרָאֲתָה אוֹתִי הִיא בָּכְתָה.","כשראתה אותי היא בכתה."],"kshe-ra'ata oti hi bachta.","When she saw me she cried."],
     [["חִבַּקְתִּי אוֹתָהּ חָזָק.","חיבקתי אותה חזק."],"chibakti ota chazak.","I hugged her tight."],
     [["הֶרְאֵיתִי לָהּ אֶת הַבַּיִת.","הראיתי לה את הבית."],"her'eti la et ha-bayit.","I showed her our home."],
     [["קוֹבִּי הֵכִין אֲרוּחָה מְיֻחֶדֶת.","קובי הכין ארוחה מיוחדת."],"Kobi hechin arucha meyuchedet.","Kobi made a special meal."],
     [["אַנְגֶ'לָה אָהֲבָה אֶת קוֹבִּי מְאוֹד.","אנג'לה אהבה את קובי מאוד."],"Angela ahava et Kobi me'od.","Angela loved Kobi very much."],

 {id:"v2",t:["הַשִּׁעוּר הָרִאשׁוֹן","השיעור הראשון"],en:"The First Lesson",lvl:"A2",sublevel:"A2.2",type:"long",

     [["הוּא כָּתַב לִי אֶת הָאוֹתִיּוֹת.","הוא כתב לי את האותיות."],"hu katav li et ha-otiyot.","He wrote the letters for me."],
     [["הָאוֹתִיּוֹת נִרְאוּ מוּזָרוֹת.","האותיות נראו מוזרות."],"ha-otiyot nir'u muzarot.","The letters looked strange."],
     [["לֹא הֵבַנְתִּי כְּלוּם בַּהַתְחָלָה.","לא הבנתי כלום בהתחלה."],"lo hevanti klum ba-hatchala.","I understood nothing at first."],

     [["לָמַדְתִּי אֶת הַמִּלָּה הָרִאשׁוֹנָה: שָׁלוֹם.","למדתי את המילה הראשונה: שלום."],"lamadti et ha-mila ha-rishona: shalom.","I learned the first word: shalom."],

     [["פָּתַחְתִּי דֶּלֶת לְעוֹלָם חָדָשׁ.","פתחתי דלת לעולם חדש."],"patachti delet le-olam chadash.","I opened a door to a new world."],
     [["מֵאָז עָבְרוּ הַרְבֵּה שִׁעוּרִים.","מאז עברו הרבה שיעורים."],"me'az avru harbe shi'urim.","Since then many lessons have passed."],

     [["הַשֶּׁמֶשׁ שָׁם זוֹרַחַת כָּל הַשָּׁנָה.","השמש שם זורחת כל השנה."],"ha-shemesh sham zorachat kol ha-shana.","The sun there shines all year."],
     [["כֻּלָּם מַכִּירִים אֶת כֻּלָּם.","כולם מכירים את כולם."],"kulam makirim et kulam.","Everyone knows everyone."],
     [["בֶּרְלִין גְּדוֹלָה וְקָרָה.","ברלין גדולה וקרה."],"Berlin gdola ve-kara.","Berlin is big and cold."],
     [["אֲבָל מְלֵאָה אֶפְשָׁרֻיּוֹת.","אבל מלאה אפשרויות."],"aval mle'a efsharuyot.","But full of possibilities."],
     [["בְּרוֹסוֹלִינִי אֲנִי הַבֵּן שֶׁל אַנְגֶ'לָה.","ברוסוליני אני הבן של אנג'לה."],"be-Rosolini ani ha-ben shel Angela.","In Rosolini I am Angela's son."],
     [["בְּבֶּרְלִין אֲנִי וִינְצֶנְצוֹ הֶחָדָשׁ.","בברלין אני וינצנצו החדש."],"be-Berlin ani Vintzentzo he-chadash.","In Berlin I am the new Vincenzo."],
     [["בְּרוֹסוֹלִינִי יֵשׁ אֶת הֶעָבָר.","ברוסוליני יש את העבר."],"be-Rosolini yesh et he-avar.","In Rosolini there is the past."],
     [["בְּבֶּרְלִין יֵשׁ אֶת הֶעָתִיד.","בברלין יש את העתיד."],"be-Berlin yesh et he-atid.","In Berlin there is the future."],
     [["אֲנִי אוֹהֵב אֶת שְׁתֵּיהֶן.","אני אוהב את שתיהן."],"ani ohev et shteihen.","I love them both."],
     [["הֵן שְׁתֵּי חֲצָאֵי לֵב אֶחָד.","הן שתי חצאי לב אחד."],"hen shtei chatzaei lev echad.","They are two halves of one heart."],
     [["אֵין צֹרֶךְ לִבְחֹר.","אין צורך לבחור."],"ein tzorech livchor.","There is no need to choose."],
     [["אֶפְשָׁר לֶאֱהֹב שְׁנֵי בָּתִּים.","אפשר לאהוב שני בתים."],"efshar le'ehov shnei batim.","You can love two homes."],
     [["זֶה מָה שֶׁלָּמַדְתִּי.","זה מה שלמדתי."],"ze ma she-lamadti.","This is what I learned."],
     [["הַלֵּב גָּדוֹל מַסְפִּיק לִשְׁנַיִם.","הלב גדול מספיק לשניים."],"ha-lev gadol maspiik li-shnayim.","The heart is big enough for two."],
     [["רוֹסוֹלִינִי וּבֶּרְלִין.","רוסוליני וברלין."],"Rosolini u-Berlin.","Rosolini and Berlin."],
     [["שְׁתֵּי עָרִים, חַיִּים אֶחָד.","שתי ערים, חיים אחד."],"shtei arim, chayim echad.","Two cities, one life."]],
  quiz:[{q:"What does Vincenzo say about Rosolini?",opts:["Big and cold","Small and warm","Full of possibilities"],a:1},{q:"What is the lesson he learned?",opts:["You must choose one home","You can love two homes","Cities don't matter"],a:1}]},
 {id:"y1",t:["הַדֹּאַר","הדואר"],en:"The Post Office",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["הָלַכְתִּי לַדֹּאַר הַיּוֹם.","הלכתי לדואר היום."],"halachti la-do'ar ha-yom.","I went to the post office today."],
     [["רָצִיתִי לִשְׁלֹחַ חֲבִילָה לְאִמָּא.","רציתי לשלוח חבילה לאמא."],"ratziti lishloach chavila le-ima.","I wanted to send a parcel to Mom."],
     [["בָּחֲבִילָה הָיוּ מַתָּנוֹת קְטַנּוֹת.","בחבילה היו מתנות קטנות."],"ba-chavila hayu matanot ktanot.","In the parcel were small gifts."],
     [["הַתּוֹר הָיָה אָרֹךְ.","התור היה ארוך."],"ha-tor haya aroch.","The queue was long."],
     [["חִכִּיתִי כְּמוֹ עֶשְׂרִים דַּקּוֹת.","חיכיתי כמו עשרים דקות."],"chikiti kmo esrim dakot.","I waited about twenty minutes."],
     [["הַפְּקִידָה הָיְתָה נֶחְמָדָה.","הפקידה הייתה נחמדה."],"ha-pkida hayta nechmada.","The clerk was nice."],
     [["הִיא שָׁקְלָה אֶת הַחֲבִילָה.","היא שקלה את החבילה."],"hi shakla et ha-chavila.","She weighed the parcel."],
     [["שָׁלַמְתִּי וְקִבַּלְתִּי קַבָּלָה.","שילמתי וקיבלתי קבלה."],"shilamti ve-kibalti kabala.","I paid and got a receipt."],
     [["הַחֲבִילָה תַּגִּיעַ בְּעוֹד שָׁבוּעַ.","החבילה תגיע בעוד שבוע."],"ha-chavila tagia be-od shavua.","The parcel will arrive in a week."],
     [["אַנְגֶ'לָה תִּהְיֶה מְאֻשֶּׁרֶת.","אנג'לה תהיה מאושרת."],"Angela tihye me'usheret.","Angela will be happy."]],
  quiz:[{q:"What did Vincenzo send?",opts:["A letter","A parcel of gifts","Money"],a:1},{q:"How long did he wait?",opts:["Five minutes","About twenty minutes","An hour"],a:1}]},
 {id:"y2",t:["הָאוֹר בַּחֹרֶף","האור בחורף"],en:"Light in Winter",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּחֹרֶף בְּבֶּרְלִין יֵשׁ מְעַט אוֹר.","בחורף בברלין יש מעט אור."],"ba-choref be-Berlin yesh me'at or.","In winter in Berlin there is little light."],
     [["הַשֶּׁמֶשׁ שׁוֹקַעַת מֻקְדָּם.","השמש שוקעת מוקדם."],"ha-shemesh shoka'at mukdam.","The sun sets early."],
     [["אֲנִי קוֹנֶה נֵרוֹת רַבִּים.","אני קונה נרות רבים."],"ani kone nerot rabim.","I buy many candles."],
     [["בָּעֶרֶב אֲנִי מַדְלִיק אוֹתָם.","בערב אני מדליק אותם."],"ba-erev ani madlik otam.","In the evening I light them."],
     [["הָאוֹר הֶחָם עוֹזֵר לִי.","האור החם עוזר לי."],"ha-or ha-cham ozer li.","The warm light helps me."],
     [["קוֹבִּי אוֹהֵב אֶת הַנֵּרוֹת.","קובי אוהב את הנרות."],"Kobi ohev et ha-nerot.","Kobi loves the candles."],
     [["אֲנַחְנוּ יוֹשְׁבִים בַּשֶּׁקֶט.","אנחנו יושבים בשקט."],"anachnu yoshvim ba-sheket.","We sit in the quiet."],
     [["שׁוֹתִים תֵּה וּמְדַבְּרִים.","שותים תה ומדברים."],"shotim te u-medabrim.","We drink tea and talk."],
     [["הַחֹרֶף קָשֶׁה אֲבָל אִינְטִימִי.","החורף קשה אבל אינטימי."],"ha-choref kashe aval intimi.","Winter is hard but intimate."],
     [["הָאוֹר הַקָּטָן מַסְפִּיק.","האור הקטן מספיק."],"ha-or ha-katan maspiik.","The little light is enough."]],
  quiz:[{q:"When does the sun set in Berlin winter?",opts:["Late","Early","At midnight"],a:1},{q:"What does Vincenzo buy for winter?",opts:["Blankets","Candles","Tea"],a:1}]},
 {id:"y3",t:["הַחָבֵר מֵאִיטַלְיָה","החבר מאיטליה"],en:"The Friend from Italy",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["חָבֵר מֵרוֹסוֹלִינִי בָּא לְבַקֵּר.","חבר מרוסוליני בא לבקר."],"chaver mi-Rosolini ba levaker.","A friend from Rosolini came to visit."],
     [["שְׁמוֹ מַרְקוֹ וַאֲנַחְנוּ חֲבֵרִים יְשָׁנִים.","שמו מרקו ואנחנו חברים ישנים."],"shmo Marco va-anachnu chaverim yeshanim.","His name is Marco and we are old friends."],
     [["הוּא נִשְׁאַר אֶצְלֵנוּ שָׁבוּעַ.","הוא נשאר אצלנו שבוע."],"hu nish'ar etzlenu shavua.","He stayed with us for a week."],
     [["הֶרְאֵיתִי לוֹ אֶת בֶּרְלִין.","הראיתי לו את ברלין."],"her'eti lo et Berlin.","I showed him Berlin."],
     [["הָלַכְנוּ לַשּׁוּק וְלַפַּארְק.","הלכנו לשוק ולפארק."],"halachnu la-shuk ve-la-park.","We went to the market and the park."],
     [["מַרְקוֹ אָהַב אֶת הָעִיר.","מרקו אהב את העיר."],"Marco ahav et ha-ir.","Marco loved the city."],
     [["בִּשַּׁלְתִּי לוֹ אֲרוּחָה סִיצִילְיָנִית.","בישלתי לו ארוחה סיציליאנית."],"bishalti lo arucha sitzilianit.","I cooked him a Sicilian meal."],
     [["דִּבַּרְנוּ עַל הַיָּמִים הַיְשָׁנִים.","דיברנו על הימים הישנים."],"dibarnu al ha-yamim ha-yeshanim.","We talked about the old days."],
     [["כְּשֶׁהוּא עָזַב הִתְגַּעְגַּעְתִּי.","כשהוא עזב התגעגעתי."],"kshe-hu azav hitga'aga'ti.","When he left I missed him."],
     [["חֲבֵרִים יְשָׁנִים הֵם אוֹצָר.","חברים ישנים הם אוצר."],"chaverim yeshanim hem otzar.","Old friends are a treasure."]],
  quiz:[{q:"Where is Marco from?",opts:["Berlin","Rosolini","Tel Aviv"],a:1},{q:"What did Vincenzo cook for Marco?",opts:["Shakshuka","A Sicilian meal","Falafel"],a:1}]},
 {id:"y4",t:["יוֹם שֶׁל מְנוּחָה","יום של מנוחה"],en:"A Day of Rest",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בְּשַׁבָּת אֲנַחְנוּ נָחִים.","בשבת אנחנו נחים."],"be-Shabbat anachnu nachim.","On Shabbat we rest."],
     [["אֵין עֲבוֹדָה, אֵין מַהֵרוּת.","אין עבודה, אין מהירות."],"ein avoda, ein mehirut.","No work, no rush."],
     [["קָמִים מְאֻחָר.","קמים מאוחר."],"kamim me'uchar.","We get up late."],
     [["אוֹכְלִים אֲרוּחַת בֹּקֶר גְּדוֹלָה.","אוכלים ארוחת בוקר גדולה."],"ochlim aruchat boker gdola.","We eat a big breakfast."],
     [["אַחַר כָּךְ הוֹלְכִים לְטַיֵּל.","אחר כך הולכים לטייל."],"achar kach holchim letayel.","Then we go for a walk."],
     [["הַפַּארְק שָׁקֵט בַּבֹּקֶר.","הפארק שקט בבוקר."],"ha-park shaket ba-boker.","The park is quiet in the morning."],
     [["חוֹזְרִים הַבַּיְתָה וְקוֹרְאִים.","חוזרים הביתה וקוראים."],"chozrim ha-bayta ve-korim.","We come home and read."],
     [["בָּעֶרֶב מַזְמִינִים אֹכֶל.","בערב מזמינים אוכל."],"ba-erev mazminim ochel.","In the evening we order food."],
     [["שַׁבָּת הִיא מַתָּנָה.","שבת היא מתנה."],"Shabbat hi matana.","Shabbat is a gift."],
     [["לָמַדְתִּי לָנוּחַ בְּיִשְׂרָאֵל.","למדתי לנוח בישראל."],"lamadti lanuach be-Yisrael.","I learned to rest in Israel."]],
  quiz:[{q:"What do they do on Shabbat?",opts:["Work","Rest","Travel"],a:1},{q:"What did Vincenzo learn in Israel?",opts:["To work hard","To rest","To cook"],a:1}]},
 {id:"y5",t:["הַטִּיסָה הָרִאשׁוֹנָה","הטיסה הראשונה"],en:"The First Flight",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["הַטִּיסָה הָרִאשׁוֹנָה לְיִשְׂרָאֵל הָיְתָה מַרְגֶּשֶׁת.","הטיסה הראשונה לישראל הייתה מרגשת."],"ha-tisa ha-rishona le-Yisrael hayta meragesh et.","The first flight to Israel was exciting."],
     [["יָשַׁבְתִּי לְיַד הַחַלּוֹן.","ישבתי ליד החלון."],"yashavti leyad ha-chalon.","I sat by the window."],
     [["רָאִיתִי אֶת הַיָּם הַתִּיכוֹן.","ראיתי את הים התיכון."],"ra'iti et ha-yam ha-tichon.","I saw the Mediterranean Sea."],
     [["הַמַּיִם הָיוּ כְּחֻלִּים מְאוֹד.","המים היו כחולים מאוד."],"ha-mayim hayu kchulim me'od.","The water was very blue."],
     [["קוֹבִּי הָיָה לְיָדִי.","קובי היה לידי."],"Kobi haya le-yadi.","Kobi was beside me."],
     [["הוּא הָיָה רָגוּעַ.","הוא היה רגוע."],"hu haya ragu'a.","He was calm."],
     [["אֲנִי הָיִיתִי קְצָת לָחוּץ.","אני הייתי קצת לחוץ."],"ani hayiti ktzat lachutz.","I was a little nervous."],
     [["אֲבָל גַּם נִרְגָּשׁ.","אבל גם נרגש."],"aval gam nirgash.","But also excited."],
     [["כְּשֶׁנָּחַתְנוּ הִרְגַּשְׁתִּי הַחֹם.","כשנחתנו הרגשתי החום."],"kshe-nachatnu hirgashti ha-chom.","When we landed I felt the heat."],
     [["הָאֶרֶץ הַחֲדָשָׁה חִכְּתָה לִי.","הארץ החדשה חיכתה לי."],"ha-aretz ha-chadasha chikta li.","The new land waited for me."]],
  quiz:[{q:"Where did Vincenzo sit on the plane?",opts:["By the aisle","By the window","In the middle"],a:1},{q:"What did he see from the plane?",opts:["Mountains","The Mediterranean Sea","A desert"],a:1}]},
 {id:"y6",t:["הַסְּפָרִים שֶׁל קוֹבִּי","הספרים של קובי"],en:"Kobi's Books",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בַּבַּיִת שֶׁלָּנוּ יֵשׁ הַרְבֵּה סְפָרִים.","בבית שלנו יש הרבה ספרים."],"ba-bayit shelanu yesh harbe sfarim.","In our home there are many books."],
     [["רֻבָּם שֶׁל קוֹבִּי.","רובם של קובי."],"rubam shel Kobi.","Most of them are Kobi's."],
     [["יֵשׁ סְפָרִים בְּעִבְרִית וּבְאַנְגְּלִית.","יש ספרים בעברית ובאנגלית."],"yesh sfarim be-ivrit u-ve-anglit.","There are books in Hebrew and English."],
     [["אֲנִי מַתְחִיל לִקְרֹא סְפָרִים קַלִּים בְּעִבְרִית.","אני מתחיל לקרוא ספרים קלים בעברית."],"ani matchil likro sfarim kalim be-ivrit.","I start to read easy books in Hebrew."],
     [["סְפָרִים לִילָדִים הֵם טוֹבִים לְהַתְחָלָה.","ספרים לילדים הם טובים להתחלה."],"sfarim li-yeladim hem tovim le-hatchala.","Children's books are good to begin."],
     [["הַמִּלִּים פְּשׁוּטוֹת.","המילים פשוטות."],"ha-milim pshutot.","The words are simple."],
     [["יֵשׁ תְּמוּנוֹת שֶׁעוֹזְרוֹת.","יש תמונות שעוזרות."],"yesh tmunot she-ozrot.","There are pictures that help."],
     [["קוֹבִּי קוֹרֵא לִי לִפְעָמִים.","קובי קורא לי לפעמים."],"Kobi kore li lif'amim.","Kobi reads to me sometimes."],
     [["אֲנִי אוֹהֵב לִשְׁמֹעַ אֶת הַקּוֹל שֶׁלּוֹ.","אני אוהב לשמוע את הקול שלו."],"ani ohev lishmo'a et ha-kol shelo.","I love to hear his voice."],
     [["סְפָרִים פּוֹתְחִים עוֹלָמוֹת.","ספרים פותחים עולמות."],"sfarim potchim olamot.","Books open worlds."]],
  quiz:[{q:"Whose books are most of them?",opts:["Vincenzo's","Kobi's","Miki's"],a:1},{q:"What kind of books does Vincenzo start with?",opts:["Long novels","Children's books","Newspapers"],a:1}]},
 {id:"z1",t:["הַחֲגִיגָה שֶׁל מַרְתָּא","החגיגה של מרתה"],en:"Marta's Celebration",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["מַרְתָּא, הַבַּת שֶׁל טֵרֵזָה, סִיְּמָה אֶת הַשָּׁנָה בְּבֵית הַסֵּפֶר.","מרתה, הבת של טרזה, סיימה את השנה בבית הספר."],"Marta, ha-bat shel Teresa, siyma et ha-shana be-veit ha-sefer.","Marta, Teresa's daughter, finished the school year."],
     [["עָשׂוּ לָהּ חֲגִיגָה גְּדוֹלָה.","עשו לה חגיגה גדולה."],"asu la chagiga gdola.","They held a big celebration for her."],
     [["הִתְקַשַּׁרְתִּי בַּוִּידֵאוֹ מִבֶּרְלִין.","התקשרתי בוידאו מברלין."],"hitkasharti ba-video mi-Berlin.","I called by video from Berlin."],
     [["מַרְתָּא הֶרְאֲתָה לִי אֶת הַתְּעוּדָה.","מרתה הראתה לי את התעודה."],"Marta her'ata li et ha-te'uda.","Marta showed me her certificate."],
     [["הִיא קִבְּלָה צִיּוּנִים טוֹבִים.","היא קיבלה ציונים טובים."],"hi kibla tziyunim tovim.","She got good grades."],
     [["אָמַרְתִּי לָהּ כָּל הַכָּבוֹד.","אמרתי לה כל הכבוד."],"amarti la kol ha-kavod.","I said to her well done."],
     [["הַמִּשְׁפָּחָה כֻּלָּהּ הָיְתָה שָׁם.","המשפחה כולה הייתה שם."],"ha-mishpacha kula hayta sham.","The whole family was there."],
     [["רָאִיתִי אֶת אַנְגֶ'לָה וְסַלְבָאטוֹרֶה.","ראיתי את אנג'לה וסלבאטורה."],"ra'iti et Angela ve-Salvatore.","I saw Angela and Salvatore."],
     [["גַּם אֵלְיָה הָיָה שָׁם.","גם אליה היה שם."],"gam Elia haya sham.","Elia was also there."],
     [["הִתְגַּעְגַּעְתִּי אֲלֵיהֶם מְאוֹד.","התגעגעתי אליהם מאוד."],"hitga'aga'ti aleihem me'od.","I missed them very much."],
     [["הַמֶּרְחָק קָשֶׁה לִפְעָמִים.","המרחק קשה לפעמים."],"ha-merchak kashe lif'amim.","Distance is hard sometimes."],
     [["אֲבָל הַוִּידֵאוֹ מְקָרֵב.","אבל הוידאו מקרב."],"aval ha-video mekarev.","But video brings us closer."],
     [["רָאִיתִי אֶת הַחִיּוּךְ שֶׁל מַרְתָּא.","ראיתי את החיוך של מרתה."],"ra'iti et ha-chiyuch shel Marta.","I saw Marta's smile."],
     [["זֶה הָיָה מַסְפִּיק.","זה היה מספיק."],"ze haya maspiik.","That was enough."],
     [["מִשְׁפָּחָה הִיא תָּמִיד קְרוֹבָה בַּלֵּב.","משפחה היא תמיד קרובה בלב."],"mishpacha hi tamid krova ba-lev.","Family is always close in the heart."]],
  quiz:[{q:"How did Vincenzo join Marta's celebration?",opts:["He flew over","By video call","He sent a letter"],a:1},{q:"What did Marta show him?",opts:["A gift","Her certificate","A drawing"],a:1}]},
 {id:"aa1",t:["הַמַּפְתֵּחַ הָאָבוּד","המפתח האבוד"],en:"The Lost Key",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["בַּבֹּקֶר לֹא מָצָאתִי אֶת הַמַּפְתֵּחַ.","בבוקר לא מצאתי את המפתח."],"ba-boker lo matzati et ha-mafteach.","In the morning I couldn't find the key."],
     [["חִפַּשְׂתִּי בְּכָל מָקוֹם.","חיפשתי בכל מקום."],"chipasti be-chol makom.","I looked everywhere."],
     [["בַּמְּעִיל, בַּמִּטְבָּח, עַל הַשֻּׁלְחָן.","במעיל, במטבח, על השולחן."],"ba-me'il, ba-mitbach, al ha-shulchan.","In the coat, in the kitchen, on the table."],
     [["קוֹבִּי עָזַר לִי לְחַפֵּשׂ.","קובי עזר לי לחפש."],"Kobi azar li lechapes.","Kobi helped me look."],
     [["חִפַּשְׂנוּ עֶשֶׂר דַּקּוֹת.","חיפשנו עשר דקות."],"chipasnu eser dakot.","We searched for ten minutes."],
     [["פִּתְאוֹם קוֹבִּי צָחַק.","פתאום קובי צחק."],"pit'om Kobi tzachak.","Suddenly Kobi laughed."],
     [["הַמַּפְתֵּחַ הָיָה בַּכִּיס שֶׁלִּי.","המפתח היה בכיס שלי."],"ha-mafteach haya ba-kis sheli.","The key was in my pocket."],
     [["גַּם אֲנִי צָחַקְתִּי.","גם אני צחקתי."],"gam ani tzachakti.","I laughed too."],
     [["לִפְעָמִים מְחַפְּשִׂים רָחוֹק מַשֶּׁהוּ קָרוֹב.","לפעמים מחפשים רחוק משהו קרוב."],"lif'amim mechapsim rachok mashehu karov.","Sometimes we search far for something close."],
     [["יָצָאתִי מְאֻחָר אֲבָל מְחַיֵּךְ.","יצאתי מאוחר אבל מחייך."],"yatzati me'uchar aval mechayech.","I left late but smiling."]],
  quiz:[{q:"Where was the key?",opts:["In the kitchen","In his pocket","On the table"],a:1},{q:"Who helped look for it?",opts:["Miki","Kobi","Angela"],a:1}]},
 {id:"aa2",t:["הַתֵּה שֶׁל הַבֹּקֶר","התה של הבוקר"],en:"Morning Tea",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["כָּל בֹּקֶר אֲנִי שׁוֹתֶה תֵּה.","כל בוקר אני שותה תה."],"kol boker ani shote te.","Every morning I drink tea."],
     [["קוֹבִּי שׁוֹתֶה קָפֶה.","קובי שותה קפה."],"Kobi shote kafe.","Kobi drinks coffee."],
     [["אֲנִי מַעֲדִיף תֵּה עִם נְעְנָע.","אני מעדיף תה עם נענע."],"ani ma'adif te im na'ana.","I prefer tea with mint."],
     [["הַנְּעְנָע גְּדֵלָה בַּגִּנָּה שֶׁלָּנוּ.","הנענע גדלה בגינה שלנו."],"ha-na'ana gdela ba-gina shelanu.","The mint grows in our garden."],
     [["אֲנִי קוֹטֵף עָלִים טְרִיִּים.","אני קוטף עלים טריים."],"ani kotef alim tri'im.","I pick fresh leaves."],
     [["שָׂם אוֹתָם בַּכּוֹס.","שם אותם בכוס."],"sam otam ba-kos.","I put them in the cup."],
     [["הַתֵּה רֵיחָנִי וְחַם.","התה ריחני וחם."],"ha-te reichani ve-cham.","The tea is fragrant and hot."],
     [["אֲנִי שׁוֹתֶה אוֹתוֹ לְאַט.","אני שותה אותו לאט."],"ani shote oto le'at.","I drink it slowly."],
     [["זֶה הָרֶגַע הַשֵּׁקֵט שֶׁלִּי.","זה הרגע השקט שלי."],"ze ha-rega ha-shaket sheli.","This is my quiet moment."],
     [["הַיּוֹם מַתְחִיל טוֹב.","היום מתחיל טוב."],"ha-yom matchil tov.","The day starts well."]],
  quiz:[{q:"What does Vincenzo prefer in the morning?",opts:["Coffee","Tea with mint","Water"],a:1},{q:"Where does the mint grow?",opts:["At the market","In their garden","At a shop"],a:1}]},
 {id:"aa3",t:["הַשִּׁעוּר בָּאֶפְלִיקַצְיָה","השיעור באפליקציה"],en:"The Lesson in the App",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["יֵשׁ לִי אֶפְלִיקַצְיָה לְלִמּוּד עִבְרִית.","יש לי אפליקציה ללימוד עברית."],"yesh li aplikatzya le-limud ivrit.","I have an app for learning Hebrew."],
     [["אֲנִי לוֹמֵד בָּהּ כָּל יוֹם.","אני לומד בה כל יום."],"ani lomed ba kol yom.","I study in it every day."],
     [["יֵשׁ מִלִּים, סִפּוּרִים וְתַרְגִּילִים.","יש מילים, סיפורים ותרגילים."],"yesh milim, sipurim ve-targilim.","There are words, stories and exercises."],
     [["אֲנִי אוֹהֵב אֶת הַסִּפּוּרִים.","אני אוהב את הסיפורים."],"ani ohev et ha-sipurim.","I love the stories."],
     [["הֵם עַל הַחַיִּים שֶׁלִּי.","הם על החיים שלי."],"hem al ha-chayim sheli.","They are about my life."],
     [["עַל בֶּרְלִין, עַל קוֹבִּי, עַל סִיצִילְיָה.","על ברלין, על קובי, על סיציליה."],"al Berlin, al Kobi, al Sitzilya.","About Berlin, Kobi, Sicily."],
     [["אֲנִי שׁוֹמֵעַ אֶת הַמִּלִּים.","אני שומע את המילים."],"ani shomea et ha-milim.","I hear the words."],
     [["וְחוֹזֵר עֲלֵיהֶן.","וחוזר עליהן."],"ve-chozer aleihen.","And repeat them."],
     [["כָּל יוֹם אֲנִי יוֹדֵעַ קְצָת יוֹתֵר.","כל יום אני יודע קצת יותר."],"kol yom ani yodea ktzat yoter.","Every day I know a little more."],
     [["טֶכְנוֹלוֹגְיָה עוֹזֶרֶת לִלְמֹד.","טכנולוגיה עוזרת ללמוד."],"technologya ozeret lilmod.","Technology helps learning."]],
  quiz:[{q:"What does Vincenzo love in the app?",opts:["The games","The stories","The music"],a:1},{q:"How often does he study?",opts:["Once a week","Every day","Rarely"],a:1}]},
 {id:"aa4",t:["הָעֲנָנִים שֶׁל בֶּרְלִין","העננים של ברלין"],en:"The Clouds of Berlin",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בְּבֶּרְלִין יֵשׁ הַרְבֵּה עֲנָנִים.","בברלין יש הרבה עננים."],"be-Berlin yesh harbe anannim.","In Berlin there are many clouds."],
     [["הַשָּׁמַיִם אֲפֹרִים לִפְעָמִים.","השמיים אפורים לפעמים."],"ha-shamayim aforim lif'amim.","The sky is grey sometimes."],
     [["בְּסִיצִילְיָה הַשָּׁמַיִם כְּחֻלִּים.","בסיציליה השמיים כחולים."],"be-Sitzilya ha-shamayim kchulim.","In Sicily the sky is blue."],
     [["בַּהַתְחָלָה הָעֲנָנִים הֶעֱצִיבוּ אוֹתִי.","בהתחלה העננים העציבו אותי."],"ba-hatchala ha-anannim he'etzivu oti.","At first the clouds made me sad."],
     [["אֲבָל לְאַט לְאַט הִתְרַגַּלְתִּי.","אבל לאט לאט התרגלתי."],"aval le'at le'at hitragalti.","But slowly I got used to it."],
     [["עַכְשָׁו אֲנִי רוֹאֶה יֹפִי בָּעֲנָנִים.","עכשיו אני רואה יופי בעננים."],"achshav ani roe yofi ba-anannim.","Now I see beauty in the clouds."],
     [["הֵם זָזִים לְאַט בַּשָּׁמַיִם.","הם זזים לאט בשמיים."],"hem zazim le'at ba-shamayim.","They move slowly in the sky."],
     [["כְּשֶׁהַשֶּׁמֶשׁ יוֹצֵאת, זֶה מַתָּנָה.","כשהשמש יוצאת, זה מתנה."],"kshe-ha-shemesh yotzet, ze matana.","When the sun comes out, it's a gift."],
     [["לָמַדְתִּי לְהַעֲרִיךְ אֶת הָאוֹר.","למדתי להעריך את האור."],"lamadti leha'arich et ha-or.","I learned to appreciate the light."],
     [["כָּל מָקוֹם מְלַמֵּד מַשֶּׁהוּ.","כל מקום מלמד משהו."],"kol makom melaem mashehu.","Every place teaches something."]],
  quiz:[{q:"How is the sky in Sicily?",opts:["Grey","Blue","Cloudy"],a:1},{q:"What did Vincenzo learn to do?",opts:["Hate clouds","Appreciate the light","Stay inside"],a:1}]},
 {id:"bb1",t:["הַשְּׁכֵנִים שֶׁל אַבַּאיְטָה","השכנים של אבאיטה"],en:"The Neighbours at ABAITA",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["בְּאַבַּאיְטָה יֵשׁ לָנוּ שְׁכֵנִים גֶּרְמָנִים.","באבאיטה יש לנו שכנים גרמנים."],"be-ABAITA yesh lanu shchenim germanim.","At ABAITA we have German neighbours."],
     [["הֵם חַקְלָאִים זְקֵנִים.","הם חקלאים זקנים."],"hem chaklayim zkenim.","They are old farmers."],
     [["שְׁמָם הַנְס וְגֵרְדָּה.","שמם הנס וגרדה."],"shmam Hans ve-Gerda.","Their names are Hans and Gerda."],
     [["הֵם גָּרִים שָׁם כָּל חַיֵּיהֶם.","הם גרים שם כל חייהם."],"hem garim sham kol chayeihem.","They have lived there all their lives."],
     [["הַנְס מֵבִיא לָנוּ בֵּיצִים טְרִיּוֹת.","הנס מביא לנו ביצים טריות."],"Hans mevi lanu beitzim tri'ot.","Hans brings us fresh eggs."],
     [["גֵרְדָּה נוֹתֶנֶת לָנוּ יְרָקוֹת מֵהַגִּינָה.","גרדה נותנת לנו ירקות מהגינה."],"Gerda notenet lanu yerakot me-ha-gina.","Gerda gives us vegetables from the garden."],
     [["אֲנַחְנוּ נוֹתְנִים לָהֶם פַּסְטָה אִיטַלְקִית.","אנחנו נותנים להם פסטה איטלקית."],"anachnu notnim lahem pasta italkit.","We give them Italian pasta."],
     [["הֵם אוֹהֲבִים אוֹתָהּ מְאוֹד.","הם אוהבים אותה מאוד."],"hem ohavim ota me'od.","They love it very much."],
     [["הַגֶּרְמָנִית שֶׁלִּי לֹא מֻשְׁלֶמֶת.","הגרמנית שלי לא מושלמת."],"ha-germanit sheli lo mushlemet.","My German is not perfect."],
     [["אֲבָל אֲנַחְנוּ מְבִינִים אֶחָד אֶת הַשֵּׁנִי.","אבל אנחנו מבינים אחד את השני."],"aval anachnu mevinim echad et ha-sheni.","But we understand each other."],
     [["יֵשׁ שָׂפָה שֶׁמֵּעֵבֶר לַמִּלִּים.","יש שפה שמעבר למילים."],"yesh safa she-me'ever la-milim.","There is a language beyond words."],
     [["שְׂפַת הַשְּׁכֵנוּת הַטּוֹבָה.","שפת השכנות הטובה."],"sfat ha-shchenut ha-tova.","The language of good neighbourliness."],
     [["הַנְס וְגֵרְדָּה נַעֲשׂוּ חֲבֵרִים.","הנס וגרדה נעשו חברים."],"Hans ve-Gerda na'asu chaverim.","Hans and Gerda became friends."],
     [["הַחַיִּים בַּכְּפָר הֵם פְּשׁוּטִים וְטוֹבִים.","החיים בכפר הם פשוטים וטובים."],"ha-chayim ba-kfar hem pshutim ve-tovim.","Life in the village is simple and good."],
     [["אֲנִי מַעֲרִיךְ אֶת זֶה מְאוֹד.","אני מעריך את זה מאוד."],"ani ma'arich et ze me'od.","I appreciate this very much."]],
  quiz:[{q:"What does Hans bring the couple?",opts:["Bread","Fresh eggs","Wine"],a:1},{q:"What do Vincenzo and Kobi give the neighbours?",opts:["German cake","Italian pasta","Fish"],a:1}]},
 {id:"bb2",t:["הַיּוֹם בְּפְּרֶנְצְלָאוּ בֶּרְג","היום בפרנצלאו ברג"],en:"A Day in Prenzlauer Berg",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["אֲנַחְנוּ גָּרִים בִּשְׁכוּנַת פְּרֶנְצְלָאוּ בֶּרְג.","אנחנו גרים בשכונת פרנצלאו ברג."],"anachnu garim bi-schunat Prenzlauer Berg.","We live in the Prenzlauer Berg neighbourhood."],
     [["זֹאת שְׁכוּנָה יָפָה בְּבֶּרְלִין.","זאת שכונה יפה בברלין."],"zot schuna yafa be-Berlin.","It is a beautiful neighbourhood in Berlin."],
     [["יֵשׁ בָּתִּים יְשָׁנִים וְיָפִים.","יש בתים ישנים ויפים."],"yesh batim yeshanim ve-yafim.","There are old and beautiful buildings."],
     [["בָּרְחוֹבוֹת יֵשׁ הַרְבֵּה בָּתֵּי קָפֶה.","ברחובות יש הרבה בתי קפה."],"ba-rechovot yesh harbe batei kafe.","On the streets there are many cafés."],
     [["בְּסוֹף הַשָּׁבוּעַ יֵשׁ שׁוּק קָטָן.","בסוף השבוע יש שוק קטן."],"be-sof ha-shavua yesh shuk katan.","At the weekend there is a small market."],
     [["מוֹכְרִים שָׁם אֹכֶל וּבְגָדִים.","מוכרים שם אוכל ובגדים."],"mochrim sham ochel u-vgadim.","They sell food and clothes there."],
     [["יֵשׁ הַרְבֵּה מִשְׁפָּחוֹת צְעִירוֹת.","יש הרבה משפחות צעירות."],"yesh harbe mishpachot tze'irot.","There are many young families."],
     [["הַיְּלָדִים מְשַׂחֲקִים בַּגַּנִּים.","הילדים משחקים בגנים."],"ha-yeladim mesachakim ba-ganim.","The children play in the parks."],
     [["אֲנִי אוֹהֵב לָלֶכֶת בָּרְחוֹבוֹת.","אני אוהב ללכת ברחובות."],"ani ohev lalechet ba-rechovot.","I love to walk the streets."],
     [["כָּל פִּינָּה יֵשׁ בָּהּ מַשֶּׁהוּ.","כל פינה יש בה משהו."],"kol pina yesh ba mashehu.","Every corner has something."],
     [["בֵּית קָפֶה, חֲנוּת סְפָרִים, גַּלֶּרְיָה.","בית קפה, חנות ספרים, גלריה."],"beit kafe, chanut sfarim, galerya.","A café, a bookshop, a gallery."],
     [["פְּרֶנְצְלָאוּ בֶּרְג נַעֲשָׂה הַבַּיִת שֶׁלִּי.","פרנצלאו ברג נעשה הבית שלי."],"Prenzlauer Berg na'asa ha-bayit sheli.","Prenzlauer Berg became my home."],
     [["בַּהַתְחָלָה זֶה הָיָה זָר.","בהתחלה זה היה זר."],"ba-hatchala ze haya zar.","At first it was foreign."],
     [["עַכְשָׁו זֶה מֻכָּר וְאָהוּב.","עכשיו זה מוכר ואהוב."],"achshav ze mukar ve-ahuv.","Now it is familiar and loved."],
     [["בַּיִת הוּא מָקוֹם שֶׁאַתָּה לוֹמֵד לֶאֱהֹב.","בית הוא מקום שאתה לומד לאהוב."],"bayit hu makom she-ata lomed le'ehov.","Home is a place you learn to love."]],
  quiz:[{q:"What neighbourhood do they live in?",opts:["Mitte","Prenzlauer Berg","Kreuzberg"],a:1},{q:"What is at the weekend in the neighbourhood?",opts:["A festival","A small market","A parade"],a:1}]},
 {id:"cc1",t:["הַזְּהוּת שֶׁל מְהַגֵּר","הזהות של מהגר"],en:"The Identity of a Migrant",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["אֲנִי מְהַגֵּר.","אני מהגר."],"ani mehager.","I am a migrant."],
     [["עָזַבְתִּי אֶת סִיצִילְיָה לִפְנֵי שָׁנִים.","עזבתי את סיציליה לפני שנים."],"azavti et Sitzilya lifnei shanim.","I left Sicily years ago."],
     [["בָּאתִי לְבֶּרְלִין בִּשְׁבִיל אַהֲבָה.","באתי לברלין בשביל אהבה."],"bati le-Berlin bishvil ahava.","I came to Berlin for love."],
     [["בַּהַתְחָלָה הַכֹּל הָיָה זָר.","בהתחלה הכל היה זר."],"ba-hatchala ha-kol haya zar.","At first everything was foreign."],
     [["הַשָּׂפָה, הָאֲנָשִׁים, הָאֹכֶל.","השפה, האנשים, האוכל."],"ha-safa, ha-anashim, ha-ochel.","The language, the people, the food."],
     [["הִרְגַּשְׁתִּי לִפְעָמִים בּוֹדֵד.","הרגשתי לפעמים בודד."],"hirgashti lif'amim boded.","I sometimes felt lonely."],
     [["אֲבָל קוֹבִּי הָיָה הַבַּיִת שֶׁלִּי.","אבל קובי היה הבית שלי."],"aval Kobi haya ha-bayit sheli.","But Kobi was my home."],
     [["לְאַט לְאַט בָּנִיתִי חַיִּים חֲדָשִׁים.","לאט לאט בניתי חיים חדשים."],"le'at le'at baniti chayim chadashim.","Slowly I built a new life."],
     [["מָצָאתִי עֲבוֹדָה.","מצאתי עבודה."],"matzati avoda.","I found work."],
     [["מָצָאתִי חֲבֵרִים.","מצאתי חברים."],"matzati chaverim.","I found friends."],
     [["הִתְחַלְתִּי לִלְמֹד גֶּרְמָנִית וְעִבְרִית.","התחלתי ללמוד גרמנית ועברית."],"hitchalti lilmod germanit ve-ivrit.","I started to learn German and Hebrew."],
     [["כָּל שָׂפָה חֲדָשָׁה נָתְנָה לִי בַּיִת חָדָשׁ.","כל שפה חדשה נתנה לי בית חדש."],"kol safa chadasha natna li bayit chadash.","Every new language gave me a new home."],
     [["עַכְשָׁו יֵשׁ בִּי כַּמָּה זֶהוּיוֹת.","עכשיו יש בי כמה זהויות."],"achshav yesh bi kama zehuyot.","Now there are several identities in me."],
     [["אֲנִי אִיטַלְקִי.","אני איטלקי."],"ani italki.","I am Italian."],
     [["אֲנִי בֶּן בֶּרְלִין.","אני בן ברלין."],"ani ben Berlin.","I am a Berliner."],
     [["וְקְצָת אֲנִי גַּם יִשְׂרְאֵלִי בַּלֵּב.","וקצת אני גם ישראלי בלב."],"ve-ktzat ani gam yisre'eli ba-lev.","And a little I am also Israeli at heart."],
     [["לְהַגֵּר זֶה לֹא לְאַבֵּד אֶת עַצְמְךָ.","להגר זה לא לאבד את עצמך."],"lehager ze lo le'abed et atzmecha.","To migrate is not to lose yourself."],
     [["זֶה לְהוֹסִיף לְעַצְמְךָ.","זה להוסיף לעצמך."],"ze lehosif le-atzmecha.","It is to add to yourself."],
     [["אֲנִי גָּדוֹל יוֹתֵר מִמַּה שֶּׁהָיִיתִי.","אני גדול יותר ממה שהייתי."],"ani gadol yoter mi-ma she-hayiti.","I am bigger than I was."],
     [["וַאֲנִי גֵּאֶה בְּמִי שֶׁאֲנִי.","ואני גאה במי שאני."],"va-ani ge'e be-mi she-ani.","And I am proud of who I am."]],
  quiz:[{q:"Why did Vincenzo come to Berlin?",opts:["For work","For love","For study"],a:1},{q:"What does Vincenzo say migration means?",opts:["Losing yourself","Adding to yourself","Forgetting the past"],a:1}]},
 {id:"cc2",t:["אֵיךְ לוֹמְדִים שָׂפָה","איך לומדים שפה"],en:"How You Learn a Language",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["לִלְמֹד שָׂפָה לוֹקֵחַ זְמַן.","ללמוד שפה לוקח זמן."],"lilmod safa lokeach zman.","Learning a language takes time."],
     [["אֵין דֶּרֶךְ קְצָרָה.","אין דרך קצרה."],"ein derech ktzara.","There is no shortcut."],
     [["בַּהַתְחָלָה לוֹמְדִים מִלִּים.","בהתחלה לומדים מילים."],"ba-hatchala lomdim milim.","At first you learn words."],
     [["אַחַר כָּךְ לוֹמְדִים מִשְׁפָּטִים.","אחר כך לומדים משפטים."],"achar kach lomdim mishpatim.","Then you learn sentences."],
     [["הַטָּעֻיּוֹת הֵן חֵלֶק מֵהַתַּהֲלִיךְ.","הטעויות הן חלק מהתהליך."],"ha-ta'uyot hen chelek me-ha-tahalich.","Mistakes are part of the process."],
     [["פָּחַדְתִּי לְדַבֵּר בַּהַתְחָלָה.","פחדתי לדבר בהתחלה."],"pachadti ledaber ba-hatchala.","I was afraid to speak at first."],
     [["חָשַׁבְתִּי שֶׁכֻּלָּם יִצְחֲקוּ.","חשבתי שכולם יצחקו."],"chashavti she-kulam yitzchaku.","I thought everyone would laugh."],
     [["אֲבָל אַף אֶחָד לֹא צָחַק.","אבל אף אחד לא צחק."],"aval af echad lo tzachak.","But no one laughed."],
     [["הַיִּשְׂרְאֵלִים שָׂמְחוּ שֶׁאֲנִי מְנַסֶּה.","הישראלים שמחו שאני מנסה."],"ha-yisre'elim samchu she-ani menase.","The Israelis were glad I was trying."],
     [["זֶה נָתַן לִי בִּטָּחוֹן.","זה נתן לי ביטחון."],"ze natan li bitachon.","That gave me confidence."],
     [["הִתְחַלְתִּי לְדַבֵּר יוֹתֵר.","התחלתי לדבר יותר."],"hitchalti ledaber yoter.","I started to speak more."],
     [["בְּכָל יוֹם קְצָת יוֹתֵר.","בכל יום קצת יותר."],"be-chol yom ktzat yoter.","Each day a little more."],
     [["שָׂפָה הִיא לֹא רַק לִמּוּד.","שפה היא לא רק לימוד."],"safa hi lo rak limud.","A language is not only study."],
     [["הִיא אֹמֶץ.","היא אומץ."],"hi ometz.","It is courage."],
     [["הָאֹמֶץ לִטְעוֹת.","האומץ לטעות."],"ha-ometz lit'ot.","The courage to make mistakes."],
     [["הָאֹמֶץ לְהִשָּׁמַע מַצְחִיק.","האומץ להישמע מצחיק."],"ha-ometz lehishama matzhik.","The courage to sound funny."],
     [["הָאֹמֶץ לְהַמְשִׁיךְ.","האומץ להמשיך."],"ha-ometz lehamshich.","The courage to keep going."],
     [["מִי שֶׁמְּנַסֶּה, מַצְלִיחַ.","מי שמנסה, מצליח."],"mi she-menase, matzliach.","Whoever tries, succeeds."],
     [["הַסּוֹד הוּא לֹא לְהַפְסִיק.","הסוד הוא לא להפסיק."],"ha-sod hu lo lehafsik.","The secret is not to stop."],
     [["יוֹם אֶחָד, פִּתְאוֹם, אַתָּה מֵבִין הַכֹּל.","יום אחד, פתאום, אתה מבין הכל."],"yom echad, pit'om, ata mevin ha-kol.","One day, suddenly, you understand everything."]],
  quiz:[{q:"What was Vincenzo afraid of at first?",opts:["Reading","Speaking","Writing"],a:1},{q:"What does Vincenzo say a language requires?",opts:["Money","Courage","Talent"],a:1}]},
 {id:"cc3",t:["הָאֹכֶל שֶׁל אִמָּא","האוכל של אמא"],en:"Mom's Food",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["הָאֹכֶל שֶׁל אַנְגֶ'לָה הוּא הַטּוֹב בָּעוֹלָם.","האוכל של אנג'לה הוא הטוב בעולם."],"ha-ochel shel Angela hu ha-tov ba-olam.","Angela's food is the best in the world."],
     [["הִיא מְבַשֶּׁלֶת כְּמוֹ סָבְתָא שֶׁלָּהּ.","היא מבשלת כמו סבתא שלה."],"hi mevashelet kmo savta shela.","She cooks like her grandmother."],
     [["הָרֹטֶב שֶׁלָּהּ לוֹקֵחַ שָׁעוֹת.","הרוטב שלה לוקח שעות."],"ha-rotev shela lokeach sha'ot.","Her sauce takes hours."],
     [["הִיא לֹא מְמַהֶרֶת אַף פַּעַם.","היא לא ממהרת אף פעם."],"hi lo memaheret af pa'am.","She never rushes."],
     [["כָּל מָנָה הִיא אַהֲבָה.","כל מנה היא אהבה."],"kol mana hi ahava.","Every dish is love."],
     [["כְּשֶׁאֲנִי בְּבֶּרְלִין אֲנִי מִתְגַּעְגֵּעַ לְזֶה.","כשאני בברלין אני מתגעגע לזה."],"kshe-ani be-Berlin ani mitga'age'a le-ze.","When I am in Berlin I miss it."],
     [["נִסִּיתִי לְבַשֵּׁל אֶת הַמִּתְכּוֹנִים שֶׁלָּהּ.","ניסיתי לבשל את המתכונים שלה."],"nisiti levashel et ha-mitkonim shela.","I tried to cook her recipes."],
     [["הִתְקַשַּׁרְתִּי אֵלֶיהָ לִשְׁאֹל.","התקשרתי אליה לשאול."],"hitkasharti eleha lish'ol.","I called her to ask."],
     [["הִיא אָמְרָה: שִׂים אַהֲבָה, לֹא מַתְכּוֹן.","היא אמרה: שים אהבה, לא מתכון."],"hi amra: sim ahava, lo mitkon.","She said: add love, not a recipe."],
     [["בִּשַּׁלְתִּי לְקוֹבִּי אֶת הָרֹטֶב.","בישלתי לקובי את הרוטב."],"bishalti le-Kobi et ha-rotev.","I cooked the sauce for Kobi."],
     [["הוּא אָמַר שֶׁזֶּה טָעִים מְאוֹד.","הוא אמר שזה טעים מאוד."],"hu amar she-ze ta'im me'od.","He said it was very tasty."],
     [["אֲבָל זֶה לֹא בְּדִיּוּק כְּמוֹ שֶׁל אִמָּא.","אבל זה לא בדיוק כמו של אמא."],"aval ze lo bidiyuk kmo shel ima.","But it is not exactly like Mom's."],
     [["חָסֵר מַשֶּׁהוּ.","חסר משהו."],"chaser mashehu.","Something is missing."],
     [["אוּלַי זֶה הַיָּדַיִם שֶׁלָּהּ.","אולי זה הידיים שלה."],"ulay ze ha-yadayin shela.","Maybe it is her hands."],
     [["אוּלַי זֶה הַמִּטְבָּח בְּרוֹסוֹלִינִי.","אולי זה המטבח ברוסוליני."],"ulay ze ha-mitbach be-Rosolini.","Maybe it is the kitchen in Rosolini."],
     [["אוּלַי זֶה הַזִּכָּרוֹן שֶׁל הַיַּלְדוּת.","אולי זה הזיכרון של הילדות."],"ulay ze ha-zikaron shel ha-yaldut.","Maybe it is the memory of childhood."],
     [["אֹכֶל הוּא לֹא רַק טַעַם.","אוכל הוא לא רק טעם."],"ochel hu lo rak ta'am.","Food is not only taste."],
     [["הוּא מָקוֹם, זְמַן, אֲנָשִׁים.","הוא מקום, זמן, אנשים."],"hu makom, zman, anashim.","It is place, time, people."],
     [["כְּשֶׁאֲנִי מְבַשֵּׁל, אֲנִי חוֹזֵר הַבַּיְתָה.","כשאני מבשל, אני חוזר הביתה."],"kshe-ani mevashel, ani chozer ha-bayta.","When I cook, I return home."],
     [["גַּם אִם הַבַּיִת רָחוֹק.","גם אם הבית רחוק."],"gam im ha-bayit rachok.","Even if home is far."]],
  quiz:[{q:"What did Angela say to add?",opts:["More salt","Love, not a recipe","More time"],a:1},{q:"What does Vincenzo feel is missing from his sauce?",opts:["Salt","Something hard to name","Tomatoes"],a:1}]},
 {id:"dd1",t:["הָרוֹפֵא הֶחָדָשׁ","הרופא החדש"],en:"The New Doctor",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["הָיִיתִי צָרִיךְ לִמְצֹא רוֹפֵא בְּבֶּרְלִין.","הייתי צריך למצוא רופא בברלין."],"hayiti tzarich limtzo rofe be-Berlin.","I needed to find a doctor in Berlin."],
     [["קוֹבִּי הִמְלִיץ לִי עַל אֶחָד טוֹב.","קובי המליץ לי על אחד טוב."],"Kobi himlitz li al echad tov.","Kobi recommended a good one to me."],
     [["קָבַעְתִּי תּוֹר בַּטֶּלֶפוֹן.","קבעתי תור בטלפון."],"kavati tor ba-telefon.","I made an appointment by phone."],
     [["הַמִּרְפָּאָה הָיְתָה נְקִיָּה וְשֵׁקֵטָה.","המרפאה הייתה נקייה ושקטה."],"ha-mirpa'a hayta nkiya ve-sheketa.","The clinic was clean and quiet."],
     [["חִכִּיתִי קְצָת בַּחֶדֶר הַמְּתָנָה.","חיכיתי קצת בחדר המתנה."],"chikiti ktzat ba-cheder ha-hamtana.","I waited a bit in the waiting room."],
     [["הָרוֹפֵא דִּבֵּר אַנְגְּלִית.","הרופא דיבר אנגלית."],"ha-rofe diber anglit.","The doctor spoke English."],
     [["אֲבָל נִסִּיתִי קְצָת עִבְרִית.","אבל ניסיתי קצת עברית."],"aval nisiti ktzat ivrit.","But I tried a little Hebrew."],
     [["הוּא הֻפְתַּע שֶׁאֲנִי יוֹדֵעַ עִבְרִית.","הוא הופתע שאני יודע עברית."],"hu hufta she-ani yodea ivrit.","He was surprised I know Hebrew."],
     [["הוּא בָּדַק אוֹתִי בִּזְהִירוּת.","הוא בדק אותי בזהירות."],"hu badak oti bi-zhirut.","He examined me carefully."],
     [["אָמַר שֶׁאֲנִי בָּרִיא.","אמר שאני בריא."],"amar she-ani bari.","He said I am healthy."],
     [["רַק צָרִיךְ לָנוּחַ יוֹתֵר.","רק צריך לנוח יותר."],"rak tzarich lanuach yoter.","I just need to rest more."],
     [["הוֹדֵיתִי לוֹ.","הודיתי לו."],"hodeti lo.","I thanked him."],
     [["יָצָאתִי בְּהַרְגָּשָׁה טוֹבָה.","יצאתי בהרגשה טובה."],"yatzati be-hargasha tova.","I left feeling good."],
     [["בְּרִיאוּת הִיא הַדָּבָר הֲכִי חָשׁוּב.","בריאות היא הדבר הכי חשוב."],"briyut hi ha-davar hachi chashuv.","Health is the most important thing."],
     [["בְּלִי בְּרִיאוּת אֵין כְּלוּם.","בלי בריאות אין כלום."],"bli briyut ein klum.","Without health there is nothing."]],
  quiz:[{q:"Who recommended the doctor?",opts:["Miki","Kobi","Thomas"],a:1},{q:"What did the doctor say Vincenzo needs?",opts:["Medicine","To rest more","Surgery"],a:1}]},
 {id:"ee1",t:["הַחֲתֻנָּה בְּקוֹפֶּנְהָגֶן","החתונה בקופנהגן"],en:"The Wedding in Copenhagen",lvl:"B2",sublevel:"B2",type:"extended",
  s:[
     [["הִתְחַתַּנּוּ בַּתִּשְׁעָה בְּסֶפְּטֶמְבֶּר.","התחתנו בתשעה בספטמבר."],"hitchatanu ba-tish'a be-September.","We got married on the ninth of September."],
     [["בָּחַרְנוּ אֶת קוֹפֶּנְהָגֶן.","בחרנו את קופנהגן."],"bacharnu et Copenhagen.","We chose Copenhagen."],
     [["זוֹ עִיר נֵיטְרָלִית בִּשְׁבִיל שְׁנֵינוּ.","זו עיר ניטרלית בשביל שנינו."],"zo ir neutralit bishvil shneinu.","It is a neutral city for both of us."],
     [["לֹא אִיטַלְיָה וְלֹא יִשְׂרָאֵל.","לא איטליה ולא ישראל."],"lo Italia ve-lo Yisrael.","Not Italy and not Israel."],
     [["מָקוֹם חָדָשׁ לְהַתְחָלָה חֲדָשָׁה.","מקום חדש להתחלה חדשה."],"makom chadash le-hatchala chadasha.","A new place for a new beginning."],
     [["הַמִּשְׁפָּחוֹת בָּאוּ מִשְּׁנֵי הַצְּדָדִים.","המשפחות באו משני הצדדים."],"ha-mishpachot ba'u mi-shnei ha-tzadadim.","The families came from both sides."],
     [["אַנְגֶ'לָה וְסַלְבָאטוֹרֶה מֵאִיטַלְיָה.","אנג'לה וסלבאטורה מאיטליה."],"Angela ve-Salvatore me-Italia.","Angela and Salvatore from Italy."],
     [["מִיקִי וְהַהוֹרִים שֶׁל קוֹבִּי מִיִּשְׂרָאֵל.","מיקי וההורים של קובי מישראל."],"Miki ve-ha-horim shel Kobi mi-Yisrael.","Miki and Kobi's parents from Israel."],
     [["הָיָה רֶגַע מְיֻחָד מְאוֹד.","היה רגע מיוחד מאוד."],"haya rega meyuchad me'od.","There was a very special moment."],
     [["שְׁתֵּי הָאִמָּהוֹת בָּכוּ יַחַד.","שתי האמהות בכו יחד."],"shtei ha-imahot bachu yachad.","The two mothers cried together."],
     [["אַחַת דִּבְּרָה אִיטַלְקִית, הַשְּׁנִיָּה עִבְרִית.","אחת דיברה איטלקית, השנייה עברית."],"achat dibra italkit, ha-shniya ivrit.","One spoke Italian, the other Hebrew."],
     [["אֲבָל הֵן הֵבִינוּ אַחַת אֶת הַשְּׁנִיָּה.","אבל הן הבינו אחת את השנייה."],"aval hen hevinu achat et ha-shniya.","But they understood each other."],
     [["אַהֲבָה הִיא שָׂפָה מְשֻׁתֶּפֶת.","אהבה היא שפה משותפת."],"ahava hi safa meshutefet.","Love is a shared language."],
     [["אָמַרְנוּ אֶת הַהַבְטָחוֹת שֶׁלָּנוּ.","אמרנו את ההבטחות שלנו."],"amarnu et ha-havtachot shelanu.","We said our vows."],
     [["קוֹבִּי אָמַר שֶׁלּוֹ בְּעִבְרִית.","קובי אמר שלו בעברית."],"Kobi amar shelo be-ivrit.","Kobi said his in Hebrew."],
     [["אֲנִי אָמַרְתִּי שֶׁלִּי בְּאִיטַלְקִית.","אני אמרתי שלי באיטלקית."],"ani amarti sheli be-italkit.","I said mine in Italian."],
     [["וְשִׁבֹּלֶת אַחַת בְּעִבְרִית.","ושיבולת אחת בעברית."],"ve-shibolet achat be-ivrit.","And one phrase in Hebrew."],
     [["אָמַרְתִּי: אֲנִי אוֹהֵב אוֹתְךָ.","אמרתי: אני אוהב אותך."],"amarti: ani ohev otcha.","I said: I love you."],
     [["קוֹבִּי בָּכָה כְּשֶׁשָּׁמַע אֶת זֶה.","קובי בכה כששמע את זה."],"Kobi bacha kshe-shama et ze.","Kobi cried when he heard it."],
     [["זֶה הָיָה הָרֶגַע הֲכִי יָפֶה בְּחַיַּי.","זה היה הרגע הכי יפה בחיי."],"ze haya ha-rega hachi yafe be-chayai.","It was the most beautiful moment of my life."],
     [["רָקַדְנוּ עַד הַבֹּקֶר.","רקדנו עד הבוקר."],"rakadnu ad ha-boker.","We danced until morning."],
     [["שְׁתֵּי מִשְׁפָּחוֹת נַעֲשׂוּ אַחַת.","שתי משפחות נעשו אחת."],"shtei mishpachot na'asu achat.","Two families became one."],
     [["זֶה מָה שֶׁאַהֲבָה עוֹשָׂה.","זה מה שאהבה עושה."],"ze ma she-ahava osa.","This is what love does."],
     [["הִיא מְחַבֶּרֶת עוֹלָמוֹת.","היא מחברת עולמות."],"hi mechaberet olamot.","It connects worlds."]],
  quiz:[{q:"Why did they choose Copenhagen?",opts:["It was cheap","A neutral place for both","Kobi was born there"],a:1},{q:"What phrase did Vincenzo say in Hebrew?",opts:["Thank you","I love you","Good night"],a:1}]},
 {id:"ee2",t:["הָאֹמָּנוּת שֶׁל לְהַקְשִׁיב","האומנות של להקשיב"],en:"The Art of Listening",lvl:"B1",sublevel:"B1",type:"extended",
  s:[
     [["בְּשָׂפָה חֲדָשָׁה, לְהַקְשִׁיב חָשׁוּב מִלְּדַבֵּר.","בשפה חדשה, להקשיב חשוב מלדבר."],"be-safa chadasha, lehakshiv chashuv mi-ledaber.","In a new language, listening is more important than speaking."],
     [["בַּהַתְחָלָה הִקְשַׁבְתִּי הַרְבֵּה.","בהתחלה הקשבתי הרבה."],"ba-hatchala hikshavti harbe.","At first I listened a lot."],
     [["לֹא הֵבַנְתִּי כָּל מִלָּה.","לא הבנתי כל מילה."],"lo hevanti kol mila.","I did not understand every word."],
     [["אֲבָל הֵבַנְתִּי אֶת הַמּוּסִיקָה שֶׁל הַשָּׂפָה.","אבל הבנתי את המוסיקה של השפה."],"aval hevanti et ha-musika shel ha-safa.","But I understood the music of the language."],
     [["הַקֶּצֶב, הַטּוֹן, הָרֶגֶשׁ.","הקצב, הטון, הרגש."],"ha-ketzev, ha-ton, ha-regesh.","The rhythm, the tone, the emotion."],
     [["שָׁמַעְתִּי אֶת קוֹבִּי מְדַבֵּר עִם מִיקִי.","שמעתי את קובי מדבר עם מיקי."],"shamati et Kobi medaber im Miki.","I heard Kobi talking with Miki."],
     [["הֵם דִּבְּרוּ מַהֵר וּבְחֹם.","הם דיברו מהר ובחום."],"hem dibru maher u-ve-chom.","They spoke fast and warmly."],
     [["רָצִיתִי לְהָבִין אוֹתָם.","רציתי להבין אותם."],"ratziti lehavin otam.","I wanted to understand them."],
     [["אָז הִקְשַׁבְתִּי בְּכָל יוֹם.","אז הקשבתי בכל יום."],"az hikshavti be-chol yom.","So I listened every day."],
     [["שָׁמַעְתִּי רַדְיוֹ, פּוֹדְקַאסְט, מוּסִיקָה.","שמעתי רדיו, פודקאסט, מוסיקה."],"shamati radyo, podcast, musika.","I heard radio, podcasts, music."],
     [["לְאַט לְאַט הַמִּלִּים הִתְבַּהֲרוּ.","לאט לאט המילים התבהרו."],"le'at le'at ha-milim hitbaharu.","Slowly the words became clear."],
     [["יוֹם אֶחָד הֵבַנְתִּי שִׂיחָה שְׁלֵמָה.","יום אחד הבנתי שיחה שלמה."],"yom echad hevanti sicha shlema.","One day I understood a whole conversation."],
     [["זֶה הָיָה רֶגַע גָּדוֹל.","זה היה רגע גדול."],"ze haya rega gadol.","It was a big moment."],
     [["הִרְגַּשְׁתִּי שֶׁהַדֶּלֶת נִפְתְּחָה.","הרגשתי שהדלת נפתחה."],"hirgashti she-ha-delet niftecha.","I felt the door had opened."],
     [["לְהַקְשִׁיב זֶה כָּבוֹד.","להקשיב זה כבוד."],"lehakshiv ze kavod.","To listen is respect."],
     [["זֶה לוֹמַר: אַתָּה חָשׁוּב לִי.","זה לומר: אתה חשוב לי."],"ze lomar: ata chashuv li.","It is to say: you are important to me."],
     [["בְּלִי לְהַקְשִׁיב אֵין שָׂפָה.","בלי להקשיב אין שפה."],"bli lehakshiv ein safa.","Without listening there is no language."],
     [["וְאֵין קֶשֶׁר בֵּין אֲנָשִׁים.","ואין קשר בין אנשים."],"ve-ein kesher bein anashim.","And no connection between people."],
     [["לָכֵן אֲנִי מַקְשִׁיב.","לכן אני מקשיב."],"lachen ani makshiv.","That is why I listen."],
     [["בְּכָל יוֹם, קְצָת יוֹתֵר.","בכל יום, קצת יותר."],"be-chol yom, ktzat yoter.","Every day, a little more."]],
  quiz:[{q:"What did Vincenzo understand before words?",opts:["Grammar","The music of the language","Spelling"],a:1},{q:"What does Vincenzo say listening is?",opts:["A waste of time","Respect","Boring"],a:1}]},
 {id:"ee3",t:["הַסְּתָו הָרִאשׁוֹן","הסתיו הראשון"],en:"The First Autumn",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[
     [["הַסְּתָו הָרִאשׁוֹן שֶׁלִּי בְּבֶּרְלִין הָיָה מְיֻחָד.","הסתיו הראשון שלי בברלין היה מיוחד."],"ha-stav ha-rishon sheli be-Berlin haya meyuchad.","My first autumn in Berlin was special."],
     [["בְּסִיצִילְיָה אֵין סְתָו אֲמִתִּי.","בסיציליה אין סתיו אמיתי."],"be-Sitzilya ein stav amiti.","In Sicily there is no real autumn."],
     [["שָׁם חַם כִּמְעַט כָּל הַשָּׁנָה.","שם חם כמעט כל השנה."],"sham cham kim'at kol ha-shana.","There it is hot almost all year."],
     [["בְּבֶּרְלִין הֶעָלִים מִשְׁתַּנִּים.","בברלין העלים משתנים."],"be-Berlin he-alim mishtanim.","In Berlin the leaves change."],
     [["הֵם נַעֲשִׂים כְּתֻמִּים וַאֲדֻמִּים.","הם נעשים כתומים ואדומים."],"hem na'asim ktumim va-adumim.","They become orange and red."],
     [["הָרְחוֹבוֹת מִתְמַלְּאִים בְּצֶבַע.","הרחובות מתמלאים בצבע."],"ha-rechovot mitmal'im be-tzeva.","The streets fill with colour."],
     [["אֲנִי אוֹסֵף עֲלֵי שַׁלֶּכֶת.","אני אוסף עלי שלכת."],"ani osef alei shalechet.","I collect fallen leaves."],
     [["שָׂם אוֹתָם בְּסֵפֶר.","שם אותם בספר."],"sam otam be-sefer.","I put them in a book."],
     [["הָאֲוִיר נַעֲשֶׂה קַר.","האוויר נעשה קר."],"ha-avir na'ase kar.","The air becomes cold."],
     [["אֲנִי לוֹבֵשׁ צָעִיף וּמְעִיל.","אני לובש צעיף ומעיל."],"ani lovesh tza'if u-me'il.","I wear a scarf and a coat."],
     [["שׁוֹתֶה תֵּה חַם בָּעֶרֶב.","שותה תה חם בערב."],"shote te cham ba-erev.","I drink hot tea in the evening."],
     [["הַסְּתָו מְלַמֵּד אוֹתִי לְהֶאֱטֵל.","הסתיו מלמד אותי להאט."],"ha-stav melaem oti leha'et.","Autumn teaches me to slow down."],
     [["הַטֶּבַע מִתְכּוֹנֵן לַחֹרֶף.","הטבע מתכונן לחורף."],"ha-teva mitkonen la-choref.","Nature prepares for winter."],
     [["גַּם אֲנִי מִתְכּוֹנֵן.","גם אני מתכונן."],"gam ani mitkonen.","I also prepare."],
     [["כָּל עוֹנָה יֵשׁ בָּהּ יֹפִי מִשֶּׁלָּהּ.","כל עונה יש בה יופי משלה."],"kol ona yesh ba yofi misheya.","Every season has its own beauty."],
     [["לָמַדְתִּי לְהַעֲרִיךְ אֶת הַשִּׁנּוּיִים.","למדתי להעריך את השינויים."],"lamadti leha'arich et ha-shinuyim.","I learned to appreciate the changes."]],
  quiz:[{q:"Why is autumn special for Vincenzo?",opts:["Sicily has no real autumn","It's his birthday","He hates it"],a:0},{q:"What does he collect?",opts:["Stones","Fallen leaves","Flowers"],a:1}]},
 {id:"ee4",t:["הַשִּׂיחָה עִם מִיקִי","השיחה עם מיקי"],en:"A Talk with Miki",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[
     [["מִיקִי הוּא הָאָח שֶׁל קוֹבִּי.","מיקי הוא האח של קובי."],"Miki hu ha-ach shel Kobi.","Miki is Kobi's brother."],
     [["הוּא גָּר בְּתֵל אָבִיב.","הוא גר בתל אביב."],"hu gar be-Tel Aviv.","He lives in Tel Aviv."],
     [["אֲנַחְנוּ מְדַבְּרִים בַּטֶּלֶפוֹן לִפְעָמִים.","אנחנו מדברים בטלפון לפעמים."],"anachnu medabrim ba-telefon lif'amim.","We talk on the phone sometimes."],
     [["מִיקִי תָּמִיד מַצְחִיק אוֹתִי.","מיקי תמיד מצחיק אותי."],"Miki tamid matzhik oti.","Miki always makes me laugh."],
     [["הוּא מְדַבֵּר מַהֵר אֲבָל בְּסַבְלָנוּת אִתִּי.","הוא מדבר מהר אבל בסבלנות איתי."],"hu medaber maher aval be-savlanut iti.","He speaks fast but patiently with me."],
     [["הוּא מְתַקֵּן אֶת הָעִבְרִית שֶׁלִּי.","הוא מתקן את העברית שלי."],"hu metaken et ha-ivrit sheli.","He corrects my Hebrew."],
     [["אֲבָל בְּדֶרֶךְ נֶחְמָדָה.","אבל בדרך נחמדה."],"aval be-derech nechmada.","But in a nice way."],
     [["הוּא אוֹמֵר שֶׁאֲנִי מִשְׁתַּפֵּר.","הוא אומר שאני משתפר."],"hu omer she-ani mishtaper.","He says I am improving."],
     [["מִיקִי שׁוֹאֵל עַל סִיצִילְיָה.","מיקי שואל על סיציליה."],"Miki sho'el al Sitzilya.","Miki asks about Sicily."],
     [["הוּא רוֹצֶה לְבַקֵּר יוֹם אֶחָד.","הוא רוצה לבקר יום אחד."],"hu rotze levaker yom echad.","He wants to visit one day."],
     [["הִבְטַחְתִּי לְהַרְאוֹת לוֹ אֶת רוֹסוֹלִינִי.","הבטחתי להראות לו את רוסוליני."],"hivtachti lehar'ot lo et Rosolini.","I promised to show him Rosolini."],
     [["מִיקִי כְּמוֹ אָח גַּם בִּשְׁבִילִי.","מיקי כמו אח גם בשבילי."],"Miki kmo ach gam bishvili.","Miki is like a brother to me too."],
     [["הַמִּשְׁפָּחָה שֶׁל קוֹבִּי הִיא הַמִּשְׁפָּחָה שֶׁלִּי.","המשפחה של קובי היא המשפחה שלי."],"ha-mishpacha shel Kobi hi ha-mishpacha sheli.","Kobi's family is my family."],
     [["נִשּׂוּאִים מְחַבְּרִים שְׁתֵּי מִשְׁפָּחוֹת.","נישואים מחברים שתי משפחות."],"nisuim mechabrim shtei mishpachot.","Marriage connects two families."],
     [["אֲנִי מַרְגִּישׁ בַּר מַזָּל.","אני מרגיש בר מזל."],"ani margish bar mazal.","I feel lucky."]],
  quiz:[{q:"Where does Miki live?",opts:["Jerusalem","Tel Aviv","Berlin"],a:1},{q:"What did Vincenzo promise Miki?",opts:["To call daily","To show him Rosolini","To teach him Italian"],a:1}]},
