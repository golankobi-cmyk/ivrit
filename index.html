     [["וְכָל יוֹם שֶׁאֲנִי לוֹמֵד, אֲנִי מַמְשִׁיךְ לִבְנוֹת.","וכל יום שאני לומד, אני ממשיך לבנות."],"ve-chol yom she-ani lomed, ani mamshich livnot.","And every day that I learn, I keep building."]],
  quiz:[{q:"Why did Vincenzo start learning Hebrew?",opts:["For work","To grow closer to Kobi and his family","For travel"],a:1},{q:"What does he compare language to?",opts:["A bridge / a way to love","A mountain","A book"],a:0}]},
 {id:"s24",t:["הַבֹּקֶר שֶׁלִּי בְּבֶּרְלִין","הבוקר שלי בברלין"],en:"My Morning in Berlin",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[[["בְּשֶׁבַע בַּבֹּקֶר אֲנִי קָם.","בשבע בבוקר אני קם."],"be-sheva ba-boker ani kam.","At seven in the morning I get up."],
     [["אֲנִי הוֹלֵךְ לַמִּטְבָּח.","אני הולך למטבח."],"ani holech la-mitbach.","I go to the kitchen."],
     [["אֲנִי שׁוֹתֶה קָפֶה שָׁחֹר.","אני שותה קפה שחור."],"ani shote kafe shachor.","I drink black coffee."],
     [["קוֹבִּי עוֹד יָשֵׁן.","קובי עוד ישן."],"Kobi od yashen.","Kobi is still sleeping."],
     [["בַּחַלּוֹן אֲנִי רוֹאֶה אֶת הָרְחוֹב.","בחלון אני רואה את הרחוב."],"ba-chalon ani roe et ha-rechov.","At the window I see the street."],
     [["יֵשׁ אֲנָשִׁים וְיֵשׁ אוֹפַנַּיִם.","יש אנשים ויש אופניים."],"yesh anashim ve-yesh ofanayim.","There are people and there are bicycles."],
     [["אֲנִי אוֹכֵל לֶחֶם עִם גְּבִינָה.","אני אוכל לחם עם גבינה."],"ani ochel lechem im gvina.","I eat bread with cheese."],
     [["אַחַר כָּךְ אֲנִי מִתְרַחֵץ.","אחר כך אני מתרחץ."],"achar kach ani mitrachetz.","Afterwards I wash up."],
     [["אֲנִי מִתְלַבֵּשׁ בִּמְהִירוּת.","אני מתלבש במהירות."],"ani mitlabesh bi-mhirut.","I get dressed quickly."],
     [["קוֹבִּי קָם וְאוֹמֵר בֹּקֶר טוֹב.","קובי קם ואומר בוקר טוב."],"Kobi kam ve-omer boker tov.","Kobi gets up and says good morning."],
     [["אֲנַחְנוּ שׁוֹתִים קָפֶה יַחַד.","אנחנו שותים קפה יחד."],"anachnu shotim kafe yachad.","We drink coffee together."],
     [["אֲנִי אוֹהֵב אֶת הַבֹּקֶר הַשָּׁקֵט בְּבֶּרְלִין.","אני אוהב את הבוקר השקט בברלין."],"ani ohev et ha-boker ha-shaket be-Berlin.","I love the quiet morning in Berlin."]],
  quiz:[{q:"What time does Vincenzo get up?",opts:["Six","Seven","Eight"],a:1},{q:"What does he eat?",opts:["Bread with cheese","Eggs","Yogurt"],a:0}]},
 {id:"s25",t:["בֶּרְלִין, הָעִיר שֶׁלִּי","ברלין, העיר שלי"],en:"Berlin, My City",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[[["אַנְגֶ'לָה, אֲנִי גָּר בְּבֶּרְלִין.","אנג'לה, אני גר בברלין."],"Angela, ani gar be-Berlin.","Angela, I live in Berlin."],
     [["בֶּרְלִין הִיא עִיר גְּדוֹלָה.","ברלין היא עיר גדולה."],"Berlin hi ir gdola.","Berlin is a big city."],
     [["יֵשׁ פֹּה הַרְבֵּה פַּארְקִים.","יש פה הרבה פארקים."],"yesh po harbe parkim.","There are many parks here."],
     [["יֵשׁ גַּם נְהָרוֹת וּגְשָׁרִים.","יש גם נהרות וגשרים."],"yesh gam neharot u-gsharim.","There are also rivers and bridges."],
     [["הָאֲנָשִׁים פֹּה רְגוּעִים.","האנשים פה רגועים."],"ha-anashim po regu'im.","The people here are relaxed."],
     [["בַּחֹרֶף קַר מְאוֹד.","בחורף קר מאוד."],"ba-choref kar me'od.","In winter it is very cold."],
     [["אֲבָל בַּקַּיִץ יָפֶה וְחַם.","אבל בקיץ יפה וחם."],"aval ba-kayitz yafe ve-cham.","But in summer it is beautiful and warm."],
     [["אֲנִי גָּר בִּפְּרֶנְצְלָאוּאֶר בֶּרְג.","אני גר בפרנצלאואר ברג."],"ani gar bi-Prenzlauer Berg.","I live in Prenzlauer Berg."],
     [["זֶה רֹבַע יָפֶה עִם בָּתֵּי קָפֶה.","זה רובע יפה עם בתי קפה."],"ze rova yafe im batei kafe.","It is a beautiful neighborhood with cafés."],
     [["קוֹבִּי וַאֲנִי אוֹהֲבִים לָלֶכֶת בָּרְחוֹב.","קובי ואני אוהבים ללכת ברחוב."],"Kobi va-ani ohavim lalechet ba-rechov.","Kobi and I love to walk in the street."],
     [["לִפְעָמִים אֲנִי מִתְגַּעְגֵּעַ לְסִיצִילְיָה.","לפעמים אני מתגעגע לסיציליה."],"lif'amim ani mitga'age'a le-Sitzilya.","Sometimes I miss Sicily."],
     [["אֲבָל בֶּרְלִין הִיא הַבַּיִת שֶׁלִּי עַכְשָׁו.","אבל ברלין היא הבית שלי עכשיו."],"aval Berlin hi ha-bayit sheli achshav.","But Berlin is my home now."]],
  quiz:[{q:"Where does Vincenzo live in Berlin?",opts:["Mitte","Prenzlauer Berg","Kreuzberg"],a:1},{q:"How is Berlin in summer?",opts:["Cold","Beautiful and warm","Rainy"],a:1}]},
 {id:"s26",t:["סִפְרִיָּה בֵּיתִית","ספרייה ביתית"],en:"A Home Library",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[[["לְקוֹבִּי יֵשׁ הַרְבֵּה סְפָרִים.","לקובי יש הרבה ספרים."],"le-Kobi yesh harbe sfarim.","Kobi has many books."],
     [["הַסְּפָרִים בַּסָּלוֹן.","הספרים בסלון."],"ha-sfarim ba-salon.","The books are in the living room."],
     [["יֵשׁ סְפָרִים בְּעִבְרִית.","יש ספרים בעברית."],"yesh sfarim be-ivrit.","There are books in Hebrew."],
     [["יֵשׁ גַּם סְפָרִים בְּאַנְגְּלִית.","יש גם ספרים באנגלית."],"yesh gam sfarim be-anglit.","There are also books in English."],
     [["אֲנִי לֹא קוֹרֵא טוֹב בְּעִבְרִית.","אני לא קורא טוב בעברית."],"ani lo kore tov be-ivrit.","I do not read well in Hebrew."],
     [["אֲבָל אֲנִי מִסְתַּכֵּל בַּתְּמוּנוֹת.","אבל אני מסתכל בתמונות."],"aval ani mistakel ba-tmunot.","But I look at the pictures."],
     [["קוֹבִּי קוֹרֵא לִי סִפּוּר.","קובי קורא לי סיפור."],"Kobi kore li sipur.","Kobi reads me a story."],
     [["הוּא קוֹרֵא לְאַט בִּשְׁבִילִי.","הוא קורא לאט בשבילי."],"hu kore le'at bishvili.","He reads slowly for me."],
     [["אֲנִי לוֹמֵד מִלִּים חֲדָשׁוֹת.","אני לומד מילים חדשות."],"ani lomed milim chadashot.","I learn new words."],
     [["יֵשׁ סֵפֶר אֶחָד עַל תֵּל אָבִיב.","יש ספר אחד על תל אביב."],"yesh sefer echad al Tel Aviv.","There is one book about Tel Aviv."],
     [["אֲנִי אוֹהֵב אֶת הַסֵּפֶר הַזֶּה.","אני אוהב את הספר הזה."],"ani ohev et ha-sefer ha-ze.","I love this book."],
     [["יוֹם אֶחָד אֲנִי אֶקְרָא אוֹתוֹ לְבַד.","יום אחד אני אקרא אותו לבד."],"yom echad ani ekra oto levad.","One day I will read it alone."]],
  quiz:[{q:"Where are the books?",opts:["In the kitchen","In the living room","In the bedroom"],a:1},{q:"Who reads to Vincenzo?",opts:["Angela","Kobi","Miki"],a:1}]},
 {id:"s27",t:["מָה אוֹכְלִים בְּיִשְׂרָאֵל","מה אוכלים בישראל"],en:"What People Eat in Israel",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[[["בְּיִשְׂרָאֵל אוֹכְלִים הַרְבֵּה חוּמוּס.","בישראל אוכלים הרבה חומוס."],"be-Yisrael ochlim harbe chumus.","In Israel people eat a lot of hummus."],
     [["חוּמוּס זֶה אֹכֶל מֵחוּמְצָה.","חומוס זה אוכל מחומצה."],"chumus ze ochel me-chumtza.","Hummus is food made from chickpeas."],
     [["אוֹכְלִים אוֹתוֹ עִם פִּיתָה.","אוכלים אותו עם פיתה."],"ochlim oto im pita.","People eat it with pita."],
     [["קוֹבִּי אוֹהֵב חוּמוּס בַּבֹּקֶר.","קובי אוהב חומוס בבוקר."],"Kobi ohev chumus ba-boker.","Kobi loves hummus in the morning."],
     [["יֵשׁ גַּם פָלָאפֶל.","יש גם פלאפל."],"yesh gam falafel.","There is also falafel."],
     [["פָלָאפֶל זֶה כַּדּוּרִים קְטַנִּים.","פלאפל זה כדורים קטנים."],"falafel ze kadurim ktanim.","Falafel is small balls."],
     [["בַּבֹּקֶר אוֹכְלִים שַׁקְשׁוּקָה.","בבוקר אוכלים שקשוקה."],"ba-boker ochlim shakshuka.","In the morning people eat shakshuka."],
     [["שַׁקְשׁוּקָה זֶה בֵּיצִים בְּעַגְבָנִיּוֹת.","שקשוקה זה ביצים בעגבניות."],"shakshuka ze beitzim be-agvaniot.","Shakshuka is eggs in tomatoes."],
     [["אֲנִי לָמַדְתִּי לֶאֱכֹל חָרִיף.","אני למדתי לאכול חריף."],"ani lamadti le'echol charif.","I learned to eat spicy food."],
     [["בְּהַתְחָלָה זֶה הָיָה קָשֶׁה.","בהתחלה זה היה קשה."],"be-hatchala ze haya kashe.","At first it was hard."],
     [["עַכְשָׁו אֲנִי אוֹהֵב אֶת הָאֹכֶל הַיִּשְׂרְאֵלִי.","עכשיו אני אוהב את האוכל הישראלי."],"achshav ani ohev et ha-ochel ha-yisre'eli.","Now I love Israeli food."],
     [["אֲבָל אֲנִי עוֹד מְבַשֵּׁל פַּסְטָה.","אבל אני עוד מבשל פסטה."],"aval ani od mevashel pasta.","But I still cook pasta."]],
  quiz:[{q:"What is shakshuka made of?",opts:["Chickpeas","Eggs in tomatoes","Bread"],a:1},{q:"What does Vincenzo still cook?",opts:["Falafel","Pasta","Hummus"],a:1}]},
 {id:"s28",t:["הַכֶּלֶב מֵהָרְחוֹב","הכלב מהרחוב"],en:"The Dog from the Street",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[[["כָּל בֹּקֶר אֲנִי הוֹלֵךְ בָּרְחוֹב.","כל בוקר אני הולך ברחוב."],"kol boker ani holech ba-rechov.","Every morning I walk in the street."],
     [["יֵשׁ כֶּלֶב גָּדוֹל וְשָׁחֹר.","יש כלב גדול ושחור."],"yesh kelev gadol ve-shachor.","There is a big, black dog."],
     [["הַכֶּלֶב יוֹשֵׁב לְיַד בֵּית הַקָּפֶה.","הכלב יושב ליד בית הקפה."],"ha-kelev yoshev le-yad beit ha-kafe.","The dog sits next to the café."],
     [["הוּא מַבִּיט בִּי כָּל בֹּקֶר.","הוא מביט בי כל בוקר."],"hu mabit bi kol boker.","He looks at me every morning."],
     [["אֲנִי אוֹמֵר לוֹ בֹּקֶר טוֹב.","אני אומר לו בוקר טוב."],"ani omer lo boker tov.","I say good morning to him."],
     [["הַכֶּלֶב מְכַשְׁכֵּשׁ בַּזָּנָב.","הכלב מכשכש בזנב."],"ha-kelev mechashkesh ba-zanav.","The dog wags his tail."],
     [["יֵשׁ לוֹ בְּעָלִים זָקֵן.","יש לו בעלים זקן."],"yesh lo be'alim zaken.","He has an old owner."],
     [["הַזָּקֵן שׁוֹתֶה קָפֶה בַּחוּץ.","הזקן שותה קפה בחוץ."],"ha-zaken shote kafe ba-chutz.","The old man drinks coffee outside."],
     [["יוֹם אֶחָד הֵבֵאתִי לַכֶּלֶב מַיִם.","יום אחד הבאתי לכלב מים."],"yom echad heveti la-kelev mayim.","One day I brought the dog water."],
     [["הוּא הָיָה שָׂמֵחַ מְאוֹד.","הוא היה שמח מאוד."],"hu haya sameach me'od.","He was very happy."],
     [["עַכְשָׁו אֲנַחְנוּ חֲבֵרִים.","עכשיו אנחנו חברים."],"achshav anachnu chaverim.","Now we are friends."],
     [["אֲנִי אוֹהֵב אֶת הַכֶּלֶב הַזֶּה.","אני אוהב את הכלב הזה."],"ani ohev et ha-kelev ha-ze.","I love this dog."]],
  quiz:[{q:"Where does the dog sit?",opts:["In the park","Next to the café","At home"],a:1},{q:"What did Vincenzo bring the dog?",opts:["Food","Water","A toy"],a:1}]},
 {id:"s29",t:["מִכְתָּב לְאַנְגֶ'לָה","מכתב לאנג'לה"],en:"A Letter to Angela",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[[["אִמָּא יְקָרָה,","אמא יקרה,"],"ima yekara,","Dear Mom,"],
     [["מָה שְׁלוֹמֵךְ? אֲנִי בְּסֵדֶר.","מה שלומך? אני בסדר."],"ma shlomech? ani beseder.","How are you? I am fine."],
     [["הַיּוֹם קַר בְּבֶּרְלִין.","היום קר בברלין."],"hayom kar be-Berlin.","Today it is cold in Berlin."],
     [["בַּבֹּקֶר שָׁתִיתִי קָפֶה.","בבוקר שתיתי קפה."],"ba-boker shatiti kafe.","In the morning I drank coffee."],
     [["אַחַר כָּךְ הָלַכְתִּי לַשּׁוּק.","אחר כך הלכתי לשוק."],"achar kach halachti la-shuk.","Afterwards I went to the market."],
     [["קָנִיתִי יְרָקוֹת וְלֶחֶם.","קניתי ירקות ולחם."],"kaniti yerakot ve-lechem.","I bought vegetables and bread."],
     [["בָּעֶרֶב בִּשַּׁלְתִּי פַּסְטָה.","בערב בישלתי פסטה."],"ba-erev bishalti pasta.","In the evening I cooked pasta."],
     [["קוֹבִּי אָמַר שֶׁזֶּה טָעִים.","קובי אמר שזה טעים."],"Kobi amar she-ze ta'im.","Kobi said it was delicious."],
     [["אֲנִי לוֹמֵד עִבְרִית כָּל יוֹם.","אני לומד עברית כל יום."],"ani lomed ivrit kol yom.","I learn Hebrew every day."],
     [["זֶה קָשֶׁה אֲבָל יָפֶה.","זה קשה אבל יפה."],"ze kashe aval yafe.","It is hard but beautiful."],
     [["אֲנִי מִתְגַּעְגֵּעַ אֵלַיִךְ וּלְאַבָּא.","אני מתגעגע אלייך ולאבא."],"ani mitga'age'a elayich u-le-aba.","I miss you and Dad."],
     [["נְשִׁיקוֹת, וִינְצֶנְצוֹ.","נשיקות, וינצנצו."],"neshikot, Vincenzo.","Kisses, Vincenzo."]],
  quiz:[{q:"What did Vincenzo buy at the market?",opts:["Fish and wine","Vegetables and bread","Coffee and cheese"],a:1},{q:"What did he cook in the evening?",opts:["Shakshuka","Pasta","Soup"],a:1}]},
 {id:"s30",t:["הַסּוּפֶּרְמַרְקֶט הַטּוּרְקִי","הסופרמרקט הטורקי"],en:"The Turkish Supermarket",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[[["לְיַד הַבַּיִת יֵשׁ סוּפֶּרְמַרְקֶט טוּרְקִי.","ליד הבית יש סופרמרקט טורקי."],"le-yad ha-bayit yesh supermarket turki.","Near home there is a Turkish supermarket."],
     [["הוּא פָּתוּחַ עַד מְאֻחָר.","הוא פתוח עד מאוחר."],"hu patuach ad me'uchar.","It is open until late."],
     [["יֵשׁ שָׁם הַרְבֵּה יְרָקוֹת.","יש שם הרבה ירקות."],"yesh sham harbe yerakot.","There are many vegetables there."],
     [["הַיְּרָקוֹת טְרִיִּים וְזוֹלִים.","הירקות טריים וזולים."],"ha-yerakot tri'im ve-zolim.","The vegetables are fresh and cheap."],
     [["אֲנִי קוֹנֶה שָׁם עַגְבָנִיּוֹת.","אני קונה שם עגבניות."],"ani kone sham agvaniot.","I buy tomatoes there."],
     [["יֵשׁ גַּם זֵיתִים וּגְבִינָה.","יש גם זיתים וגבינה."],"yesh gam zeitim u-gvina.","There are also olives and cheese."],
     [["הַמּוֹכֵר נֶחְמָד מְאוֹד.","המוכר נחמד מאוד."],"ha-mocher nechmad me'od.","The seller is very nice."],
     [["הוּא תָּמִיד אוֹמֵר שָׁלוֹם.","הוא תמיד אומר שלום."],"hu tamid omer shalom.","He always says hello."],
     [["אֲנִי לֹא מְדַבֵּר טוּרְקִית.","אני לא מדבר טורקית."],"ani lo medaber turkit.","I do not speak Turkish."],
     [["אֲבָל אֲנַחְנוּ מְבִינִים זֶה אֶת זֶה.","אבל אנחנו מבינים זה את זה."],"aval anachnu mevinim ze et ze.","But we understand each other."],
     [["אֲנִי מְשַׁלֵּם בִּמְזֻמָּן.","אני משלם במזומן."],"ani meshalem bi-mzuman.","I pay in cash."],
     [["זֶה הַסּוּפֶּר הָאָהוּב עָלַי.","זה הסופר האהוב עליי."],"ze ha-super ha-ahuv alai.","This is my favorite supermarket."]],
  quiz:[{q:"How are the vegetables?",opts:["Expensive","Fresh and cheap","Old"],a:1},{q:"How does Vincenzo pay?",opts:["By card","In cash","By phone"],a:1}]},
 {id:"s31",t:["יוֹם רִאשׁוֹן בְּתֵל אָבִיב","יום ראשון בתל אביב"],en:"First Sunday in Tel Aviv",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[[["זֶה יוֹם רִאשׁוֹן שֶׁלִּי בְּתֵל אָבִיב.","זה יום ראשון שלי בתל אביב."],"ze yom rishon sheli be-Tel Aviv.","This is my first Sunday in Tel Aviv."],
     [["קוֹבִּי לוֹקֵחַ אוֹתִי לַיָּם.","קובי לוקח אותי לים."],"Kobi lokeach oti la-yam.","Kobi takes me to the sea."],
     [["הַשֶּׁמֶשׁ חֲזָקָה מְאוֹד.","השמש חזקה מאוד."],"ha-shemesh chazaka me'od.","The sun is very strong."],
     [["הַיָּם כָּחֹל וְגָדוֹל.","הים כחול וגדול."],"ha-yam kachol ve-gadol.","The sea is blue and big."],
     [["יֵשׁ הַרְבֵּה אֲנָשִׁים עַל הַחוֹף.","יש הרבה אנשים על החוף."],"yesh harbe anashim al ha-chof.","There are many people on the beach."],
     [["יְלָדִים מְשַׂחֲקִים בַּחוֹל.","ילדים משחקים בחול."],"yeladim mesachakim ba-chol.","Children play in the sand."],
     [["אֲנִי נִכְנָס לַמַּיִם.","אני נכנס למים."],"ani nichnas la-mayim.","I go into the water."],
     [["הַמַּיִם חַמִּים וְנָעִים.","המים חמים ונעימים."],"ha-mayim chamim ve-ne'imim.","The water is warm and pleasant."],
     [["קוֹבִּי צוֹחֵק וְשׂוֹחֶה.","קובי צוחק ושוחה."],"Kobi tzochek ve-socheh.","Kobi laughs and swims."],
     [["אַחַר כָּךְ אֲנַחְנוּ אוֹכְלִים גְּלִידָה.","אחר כך אנחנו אוכלים גלידה."],"achar kach anachnu ochlim glida.","Afterwards we eat ice cream."],
     [["זֶה יוֹם מֻשְׁלָם.","זה יום מושלם."],"ze yom mushlam.","It is a perfect day."],
     [["אֲנִי מְאֻשָּׁר בְּתֵל אָבִיב.","אני מאושר בתל אביב."],"ani me'ushar be-Tel Aviv.","I am happy in Tel Aviv."]],
  quiz:[{q:"Where does Kobi take Vincenzo?",opts:["To the market","To the sea","To a museum"],a:1},{q:"What do they eat afterwards?",opts:["Falafel","Ice cream","Pasta"],a:1}]},
 {id:"s32",t:["אֲנָשִׁים בַּפַּארְק","אנשים בפארק"],en:"People in the Park",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[[["בְּיוֹם רִאשׁוֹן אֲנִי יוֹשֵׁב בַּפַּארְק.","ביום ראשון אני יושב בפארק."],"be-yom rishon ani yoshev ba-park.","On Sunday I sit in the park."],
     [["זֶה מָאוּאֶרְפַּארְק בְּבֶּרְלִין.","זה מאוארפארק בברלין."],"ze Mauerpark be-Berlin.","This is Mauerpark in Berlin."],
     [["יֵשׁ פֹּה הַרְבֵּה אֲנָשִׁים.","יש פה הרבה אנשים."],"yesh po harbe anashim.","There are many people here."],
     [["אִישׁ אֶחָד מְנַגֵּן בְּגִיטָרָה.","איש אחד מנגן בגיטרה."],"ish echad menagen be-gitara.","One man plays guitar."],
     [["יְלָדִים רָצִים עַל הַדֶּשֶׁא.","ילדים רצים על הדשא."],"yeladim ratzim al ha-deshe.","Children run on the grass."],
     [["אִשָּׁה מוֹכֶרֶת עוּגוֹת.","אישה מוכרת עוגות."],"isha mocheret ugot.","A woman sells cakes."],
     [["אֲנָשִׁים שָׁרִים יַחַד.","אנשים שרים יחד."],"anashim sharim yachad.","People sing together."],
     [["יֵשׁ רֵיחַ שֶׁל אֹכֶל בָּאֲוִיר.","יש ריח של אוכל באוויר."],"yesh reach shel ochel ba-avir.","There is a smell of food in the air."],
     [["אֲנִי אוֹכֵל נַקְנִיקִיָּה.","אני אוכל נקניקייה."],"ani ochel naknikiya.","I eat a sausage."],
     [["הַשֶּׁמֶשׁ נְעִימָה הַיּוֹם.","השמש נעימה היום."],"ha-shemesh ne'ima hayom.","The sun is pleasant today."],
     [["אֲנִי אוֹהֵב לְהִסְתַּכֵּל עַל אֲנָשִׁים.","אני אוהב להסתכל על אנשים."],"ani ohev lehistakel al anashim.","I love to watch people."],
     [["בֶּרְלִין מְלֵאָה חַיִּים.","ברלין מלאה חיים."],"Berlin mele'a chayim.","Berlin is full of life."]],
  quiz:[{q:"Which park is it?",opts:["Tiergarten","Mauerpark","Treptower"],a:1},{q:"What does the one man do?",opts:["Sells cakes","Plays guitar","Runs"],a:1}]},
 {id:"s33",t:["הַבְּרָכָה הָרִאשׁוֹנָה","הברכה הראשונה"],en:"The First Greeting",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[[["יוֹם אֶחָד פָּגַשְׁתִּי אֶת הַשָּׁכֵן שֶׁל קוֹבִּי.","יום אחד פגשתי את השכן של קובי."],"yom echad pagashti et ha-shachen shel Kobi.","One day I met Kobi's neighbor."],
     [["הוּא אִישׁ זָקֵן וְנֶחְמָד.","הוא איש זקן ונחמד."],"hu ish zaken ve-nechmad.","He is an old, nice man."],
     [["הוּא אָמַר לִי שָׁלוֹם.","הוא אמר לי שלום."],"hu amar li shalom.","He said shalom to me."],
     [["רָצִיתִי לַעֲנוֹת בְּעִבְרִית.","רציתי לענות בעברית."],"ratziti la'anot be-ivrit.","I wanted to answer in Hebrew."],
     [["פָּחַדְתִּי קְצָת.","פחדתי קצת."],"pachadti ktzat.","I was a little afraid."],
     [["אֲבָל אָמַרְתִּי שָׁלוֹם.","אבל אמרתי שלום."],"aval amarti shalom.","But I said shalom."],
     [["הַשָּׁכֵן חִיֵּךְ אֵלַי.","השכן חייך אליי."],"ha-shachen chiyech elai.","The neighbor smiled at me."],
     [["הוּא שָׁאַל מַה שְּׁלוֹמְךָ.","הוא שאל מה שלומך."],"hu sha'al ma shlomcha.","He asked how are you."],
     [["אָמַרְתִּי בְּסֵדֶר, תּוֹדָה.","אמרתי בסדר, תודה."],"amarti beseder, toda.","I said fine, thank you."],
     [["הָיִיתִי גֵּאֶה בְּעַצְמִי.","הייתי גאה בעצמי."],"hayiti ge'e be-atzmi.","I was proud of myself."],
     [["זֹאת הַמִּלָּה הָרִאשׁוֹנָה שֶׁלִּי בָּרְחוֹב.","זאת המילה הראשונה שלי ברחוב."],"zot ha-mila ha-rishona sheli ba-rechov.","It was my first word in the street."],
     [["עַכְשָׁו אֲנִי אוֹמֵר שָׁלוֹם כָּל יוֹם.","עכשיו אני אומר שלום כל יום."],"achshav ani omer shalom kol yom.","Now I say shalom every day."]],
  quiz:[{q:"Who did Vincenzo meet?",opts:["Kobi's brother","Kobi's neighbor","A teacher"],a:1},{q:"How did Vincenzo feel after?",opts:["Tired","Proud","Sad"],a:1}]},
 {id:"s34",t:["חוֹף הַיָּם בְּתֵל אָבִיב","חוף הים בתל אביב"],en:"The Beach in Tel Aviv",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[[["אֲנִי אוֹהֵב אֶת הַחוֹף בְּתֵל אָבִיב.","אני אוהב את החוף בתל אביב."],"ani ohev et ha-chof be-Tel Aviv.","I love the beach in Tel Aviv."],
     [["הַחוֹל לָבָן וְחַם.","החול לבן וחם."],"ha-chol lavan ve-cham.","The sand is white and warm."],
     [["הַיָּם כָּחֹל וְשָׁקֵט.","הים כחול ושקט."],"ha-yam kachol ve-shaket.","The sea is blue and calm."],
     [["בַּבֹּקֶר אֲנָשִׁים עוֹשִׂים סְפּוֹרְט.","בבוקר אנשים עושים ספורט."],"ba-boker anashim osim sport.","In the morning people do sport."],
     [["יֵשׁ אֲנָשִׁים שֶׁרָצִים עַל הַחוֹף.","יש אנשים שרצים על החוף."],"yesh anashim she-ratzim al ha-chof.","There are people who run on the beach."],
     [["יֵשׁ גַּם מַשֶּׁהוּ שֶׁקּוֹרְאִים לוֹ מַטְקוֹט.","יש גם משהו שקוראים לו מטקות."],"yesh gam mashehu she-korim lo matkot.","There is also something called matkot."],
     [["זֶה מִשְׂחָק עִם כַּדּוּר קָטָן.","זה משחק עם כדור קטן."],"ze miscchak im kadur katan.","It is a game with a small ball."],
     [["בַּצָּהֳרַיִים חַם מְאוֹד.","בצהריים חם מאוד."],"ba-tzohorayim cham me'od.","At noon it is very hot."],
     [["אֲנִי שׁוֹתֶה הַרְבֵּה מַיִם.","אני שותה הרבה מים."],"ani shote harbe mayim.","I drink a lot of water."],
     [["בָּעֶרֶב הַשֶּׁמֶשׁ יוֹרֶדֶת לַיָּם.","בערב השמש יורדת לים."],"ba-erev ha-shemesh yoredet la-yam.","In the evening the sun goes down into the sea."],
     [["זֶה הָרֶגַע הֲכִי יָפֶה.","זה הרגע הכי יפה."],"ze ha-rega hachi yafe.","It is the most beautiful moment."],
     [["אֲנִי מַרְגִּישׁ רָגוּעַ לְיַד הַיָּם.","אני מרגיש רגוע ליד הים."],"ani margish ragua le-yad ha-yam.","I feel calm by the sea."]],
  quiz:[{q:"What is matkot?",opts:["A food","A beach game","A drink"],a:1},{q:"When is the most beautiful moment?",opts:["Morning","When the sun sets","Noon"],a:1}]},
 {id:"s35",t:["בֵּית קָפֶה בְּבֶּרְלִין","בית קפה בברלין"],en:"A Café in Berlin",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[[["יֵשׁ בֵּית קָפֶה קָטָן לְיַד הַבַּיִת.","יש בית קפה קטן ליד הבית."],"yesh beit kafe katan le-yad ha-bayit.","There is a small café near home."],
     [["אֲנִי הוֹלֵךְ לְשָׁם כָּל בֹּקֶר.","אני הולך לשם כל בוקר."],"ani holech le-sham kol boker.","I go there every morning."],
     [["הַקָּפֶה שָׁם מְצֻיָּן.","הקפה שם מצוין."],"ha-kafe sham metzuyan.","The coffee there is excellent."],
     [["יֵשׁ גַּם עוּגוֹת טְרִיּוֹת.","יש גם עוגות טריות."],"yesh gam ugot tri'ot.","There are also fresh cakes."],
     [["הַמֶּלְצָר מַכִּיר אוֹתִי.","המלצר מכיר אותי."],"ha-meltzar makir oti.","The waiter knows me."],
     [["הוּא יוֹדֵעַ מָה אֲנִי רוֹצֶה.","הוא יודע מה אני רוצה."],"hu yodea ma ani rotze.","He knows what I want."],
     [["אֲנִי יוֹשֵׁב לְיַד הַחַלּוֹן.","אני יושב ליד החלון."],"ani yoshev le-yad ha-chalon.","I sit next to the window."],
     [["אֲנִי קוֹרֵא אוֹ כּוֹתֵב.","אני קורא או כותב."],"ani kore o kotev.","I read or write."],
     [["לִפְעָמִים קוֹבִּי בָּא גַּם.","לפעמים קובי בא גם."],"lif'amim Kobi ba gam.","Sometimes Kobi comes too."],
     [["אֲנַחְנוּ מְדַבְּרִים עַל הַיּוֹם.","אנחנו מדברים על היום."],"anachnu medabrim al hayom.","We talk about the day."],
     [["הַמָּקוֹם הַזֶּה שָׁקֵט וְחַם.","המקום הזה שקט וחם."],"ha-makom ha-ze shaket ve-cham.","This place is quiet and warm."],
     [["זֶה בֵּית הַקָּפֶה הָאָהוּב עָלַי.","זה בית הקפה האהוב עליי."],"ze beit ha-kafe ha-ahuv alai.","This is my favorite café."]],
  quiz:[{q:"How often does Vincenzo go?",opts:["Once a week","Every morning","Rarely"],a:1},{q:"Where does he sit?",opts:["By the door","By the window","Outside"],a:1}]},
 {id:"s36",t:["הַטִּיּוּל הָרִאשׁוֹן לְיִשְׂרָאֵל","הטיול הראשון לישראל"],en:"The First Trip to Israel",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[[["לִפְנֵי שָׁנָה נָסַעְתִּי לְיִשְׂרָאֵל בַּפַּעַם הָרִאשׁוֹנָה.","לפני שנה נסעתי לישראל בפעם הראשונה."],"lifnei shana nasati le-Yisrael ba-pa'am ha-rishona.","A year ago I traveled to Israel for the first time."],
     [["קוֹבִּי הָיָה אִתִּי בַּמָּטוֹס.","קובי היה איתי במטוס."],"Kobi haya iti ba-matos.","Kobi was with me on the plane."],
     [["הָיִיתִי קְצָת בְּלַחַץ בִּגְלַל הַשָּׂפָה.","הייתי קצת בלחץ בגלל השפה."],"hayiti ktzat be-lachatz biglal ha-safa.","I was a little stressed because of the language."],
     [["בְּנֶמַל הַתְּעוּפָה שָׁמַעְתִּי עִבְרִית בְּכָל מָקוֹם.","בנמל התעופה שמעתי עברית בכל מקום."],"bi-nmal ha-te'ufa shamati ivrit be-chol makom.","At the airport I heard Hebrew everywhere."],
     [["מִיקִי, הָאָח שֶׁל קוֹבִּי, חִכָּה לָנוּ.","מיקי, האח של קובי, חיכה לנו."],"Miki, ha-ach shel Kobi, chika lanu.","Miki, Kobi's brother, was waiting for us."],
     [["הוּא חִבֵּק אוֹתִי וְאָמַר בָּרוּךְ הַבָּא.","הוא חיבק אותי ואמר ברוך הבא."],"hu chibek oti ve-amar baruch haba.","He hugged me and said welcome."],
     [["נָסַעְנוּ בַּמְּכוֹנִית לְתֵל אָבִיב.","נסענו במכונית לתל אביב."],"nasanu ba-mechonit le-Tel Aviv.","We drove to Tel Aviv."],
     [["הָרְחוֹבוֹת הָיוּ מְלֵאִים אֲנָשִׁים.","הרחובות היו מלאים אנשים."],"ha-rechovot hayu mele'im anashim.","The streets were full of people."],
     [["הַשֶּׁמֶשׁ הָיְתָה חֲזָקָה מִבֶּרְלִין.","השמש הייתה חזקה מברלין."],"ha-shemesh hayta chazaka mi-Berlin.","The sun was stronger than in Berlin."],
     [["בָּעֶרֶב אָכַלְנוּ אֵצֶל מִיקִי.","בערב אכלנו אצל מיקי."],"ba-erev achalnu etzel Miki.","In the evening we ate at Miki's place."],
     [["הַיְּלָדִים שֶׁל מִיקִי דִּבְּרוּ אִתִּי לְאַט.","הילדים של מיקי דיברו איתי לאט."],"ha-yeladim shel Miki dibru iti le'at.","Miki's children spoke with me slowly."],
     [["הֵם לִמְּדוּ אוֹתִי מִלִּים חֲדָשׁוֹת.","הם לימדו אותי מילים חדשות."],"hem limdu oti milim chadashot.","They taught me new words."],
     [["צָחַקְנוּ הַרְבֵּה בָּעֶרֶב הַזֶּה.","צחקנו הרבה בערב הזה."],"tzachaknu harbe ba-erev ha-ze.","We laughed a lot that evening."],
     [["הִרְגַּשְׁתִּי שֶׁאֲנִי חֵלֶק מֵהַמִּשְׁפָּחָה.","הרגשתי שאני חלק מהמשפחה."],"hirgashti she-ani chelek me-ha-mishpacha.","I felt that I am part of the family."],
     [["לֹא הֵבַנְתִּי הַכֹּל, אֲבָל זֶה הָיָה בְּסֵדֶר.","לא הבנתי הכל, אבל זה היה בסדר."],"lo hevanti hakol, aval ze haya beseder.","I did not understand everything, but it was okay."],
     [["יָשַׁנְתִּי טוֹב בַּלַּיְלָה הָרִאשׁוֹן.","ישנתי טוב בלילה הראשון."],"yashanti tov ba-layla ha-rishon.","I slept well the first night."],
     [["הֵבַנְתִּי שֶׁיִּשְׂרָאֵל גַּם הִיא בַּיִת.","הבנתי שישראל גם היא בית."],"hevanti she-Yisrael gam hi bayit.","I understood that Israel is also a home."]],
  quiz:[{q:"Who was waiting at the airport?",opts:["Angela","Miki","Thomas"],a:1},{q:"How did Vincenzo feel by the end?",opts:["Like a stranger","Part of the family","Bored"],a:1}]},
 {id:"s37",t:["עֶרֶב שִׁישִׁי עִם מִיקִי","ערב שישי עם מיקי"],en:"Friday Evening with Miki",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[[["בְּיוֹם שִׁישִׁי הָלַכְנוּ לְמִיקִי לַאֲרוּחָה.","ביום שישי הלכנו למיקי לארוחה."],"be-yom shishi halachnu le-Miki la-arucha.","On Friday we went to Miki for a meal."],
     [["מִיקִי הוּא הָאָח הַגָּדוֹל שֶׁל קוֹבִּי.","מיקי הוא האח הגדול של קובי."],"Miki hu ha-ach ha-gadol shel Kobi.","Miki is Kobi's big brother."],
     [["יֵשׁ לוֹ אִשָּׁה וּשְׁנֵי יְלָדִים.","יש לו אישה ושני ילדים."],"yesh lo isha u-shnei yeladim.","He has a wife and two children."],
     [["הַבַּיִת שֶׁלּוֹ הָיָה מָלֵא רֵיחוֹת טוֹבִים.","הבית שלו היה מלא ריחות טובים."],"ha-bayit shelo haya male reichot tovim.","His house was full of good smells."],
     [["עַל הַשֻּׁלְחָן הָיְתָה חַלָּה גְּדוֹלָה.","על השולחן הייתה חלה גדולה."],"al ha-shulchan hayta chala gdola.","On the table there was a big challah."],
     [["הֵבֵאתִי יַיִן אִיטַלְקִי כְּמַתָּנָה.","הבאתי יין איטלקי כמתנה."],"heveti yayin italki ke-matana.","I brought Italian wine as a gift."],
     [["הַיְּלָדִים שָׂמְחוּ לִרְאוֹת אוֹתָנוּ.","הילדים שמחו לראות אותנו."],"ha-yeladim samchu lir'ot otanu.","The children were happy to see us."],
     [["הַבַּת קוֹרְאִים לָהּ נֹעָה וְהִיא בַּת שֶׁבַע.","הבת קוראים לה נועה והיא בת שבע."],"ha-bat korim la Noa ve-hi bat sheva.","The daughter is called Noa and she is seven."],
     [["הַבֵּן קוֹרְאִים לוֹ אִיתַי וְהוּא בֶּן עֶשֶׂר.","הבן קוראים לו איתי והוא בן עשר."],"ha-ben korim lo Itai ve-hu ben eser.","The son is called Itai and he is ten."],
     [["אָכַלְנוּ דָּגִים, אֹרֶז וְסָלָט.","אכלנו דגים, אורז וסלט."],"achalnu dagim, orez ve-salat.","We ate fish, rice and salad."],
     [["מִיקִי שָׁאַל אוֹתִי עַל סִיצִילְיָה.","מיקי שאל אותי על סיציליה."],"Miki sha'al oti al Sitzilya.","Miki asked me about Sicily."],
     [["סִפַּרְתִּי לוֹ עַל הַמִּשְׁפָּחָה שֶׁלִּי.","סיפרתי לו על המשפחה שלי."],"siparti lo al ha-mishpacha sheli.","I told him about my family."],
     [["דִּבַּרְנוּ עִבְרִית וְקְצָת אַנְגְּלִית.","דיברנו עברית וקצת אנגלית."],"dibarnu ivrit ve-ktzat anglit.","We spoke Hebrew and a little English."],
     [["אַחֲרֵי הָאֲרוּחָה שָׁתִינוּ תֵּה.","אחרי הארוחה שתינו תה."],"acharei ha-arucha shatinu te.","After the meal we drank tea."],
     [["הַיְּלָדִים הֶרְאוּ לִי מִשְׂחָקִים.","הילדים הראו לי משחקים."],"ha-yeladim her'u li miscchakim.","The children showed me games."],
     [["חָזַרְנוּ הַבַּיְתָה מְאֻחָר וּמְרֻצִּים.","חזרנו הביתה מאוחר ומרוצים."],"chazarnu ha-bayta me'uchar u-mrutzim.","We came home late and content."]],
  quiz:[{q:"What did Vincenzo bring as a gift?",opts:["Flowers","Italian wine","Cake"],a:1},{q:"How old is Itai?",opts:["Seven","Ten","Twelve"],a:1}]},
 {id:"s38",t:["לִלְמֹד עִבְרִית","ללמוד עברית"],en:"Learning Hebrew",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[[["הִתְחַלְתִּי לִלְמֹד עִבְרִית לִפְנֵי שְׁנָתַיִם.","התחלתי ללמוד עברית לפני שנתיים."],"hitchalti lilmod ivrit lifnei shnatayim.","I started learning Hebrew two years ago."],
     [["בְּהַתְחָלָה הָאוֹתִיּוֹת הָיוּ קָשׁוֹת.","בהתחלה האותיות היו קשות."],"be-hatchala ha-otiyot hayu kashot.","At first the letters were hard."],
     [["כָּתַבְתִּי מִיָּמִין לִשְׂמֹאל.","כתבתי מימין לשמאל."],"katavti mi-yamin li-smol.","I wrote from right to left."],
     [["זֶה הָיָה מוּזָר בִּשְׁבִילִי.","זה היה מוזר בשבילי."],"ze haya muzar bishvili.","It was strange for me."],
     [["אֲבָל הַתְּנוּעוֹת דּוֹמוֹת לְאִיטַלְקִית.","אבל התנועות דומות לאיטלקית."],"aval ha-tnu'ot domot le-italkit.","But the vowels are similar to Italian."],
     [["זֶה עָזַר לִי מְאוֹד.","זה עזר לי מאוד."],"ze azar li me'od.","That helped me a lot."],
     [["לָמַדְתִּי מִלָּה אַחַת בְּכָל יוֹם.","למדתי מילה אחת בכל יום."],"lamadti mila achat be-chol yom.","I learned one word every day."],
     [["קוֹבִּי דִּבֵּר אִתִּי עִבְרִית בַּבֹּקֶר.","קובי דיבר איתי עברית בבוקר."],"Kobi diber iti ivrit ba-boker.","Kobi spoke Hebrew with me in the morning."],
     [["טָעִיתִי הַרְבֵּה פְּעָמִים.","טעיתי הרבה פעמים."],"ta'iti harbe pe'amim.","I made mistakes many times."],
     [["אֲבָל הוּא לֹא צָחַק עָלַי.","אבל הוא לא צחק עליי."],"aval hu lo tzachak alai.","But he did not laugh at me."],
     [["הוּא תִּקֵּן אוֹתִי בְּעֲדִינוּת.","הוא תיקן אותי בעדינות."],"hu tiken oti ba-adinut.","He corrected me gently."],
     [["לְאַט לְאַט הִתְחַלְתִּי לְהָבִין.","לאט לאט התחלתי להבין."],"le'at le'at hitchalti lehavin.","Slowly I began to understand."],
     [["יוֹם אֶחָד הִזְמַנְתִּי קָפֶה בְּעִבְרִית.","יום אחד הזמנתי קפה בעברית."],"yom echad hizmanti kafe be-ivrit.","One day I ordered coffee in Hebrew."],
     [["הָיִיתִי גֵּאֶה מְאוֹד בְּעַצְמִי.","הייתי גאה מאוד בעצמי."],"hayiti ge'e me'od be-atzmi.","I was very proud of myself."],
     [["עַכְשָׁו אֲנִי קוֹרֵא מִשְׁפָּטִים קְצָרִים.","עכשיו אני קורא משפטים קצרים."],"achshav ani kore mishpatim ktzarim.","Now I read short sentences."],
     [["הַשָּׂפָה פּוֹתַחַת לִי דֶּלֶת חֲדָשָׁה.","השפה פותחת לי דלת חדשה."],"ha-safa potachat li delet chadasha.","The language opens a new door for me."],
     [["אֲנִי רוֹצֶה לְהַמְשִׁיךְ לִלְמֹד תָּמִיד.","אני רוצה להמשיך ללמוד תמיד."],"ani rotze lehamshich lilmod tamid.","I want to keep learning always."]],
  quiz:[{q:"What helped Vincenzo with Hebrew?",opts:["The letters","The vowels being like Italian","English"],a:1},{q:"How did Kobi react to mistakes?",opts:["Laughed","Corrected gently","Ignored them"],a:1}]},
 {id:"s39",t:["הַשָּׁכֵן הַגֶּרְמָנִי","השכן הגרמני"],en:"The German Neighbor",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[[["בַּבִּנְיָן שֶׁלָּנוּ גָּר שָׁכֵן בְּשֵׁם תּוֹמָאס.","בבניין שלנו גר שכן בשם תומאס."],"ba-binyan shelanu gar shachen be-shem Thomas.","In our building lives a neighbor named Thomas."],
     [["הוּא גֶּרְמָנִי וְהוּא אִישׁ נֶחְמָד.","הוא גרמני והוא איש נחמד."],"hu germani ve-hu ish nechmad.","He is German and he is a nice man."],
     [["הוּא אוֹהֵב אֹכֶל אִיטַלְקִי מְאוֹד.","הוא אוהב אוכל איטלקי מאוד."],"hu ohev ochel italki me'od.","He loves Italian food very much."],
     [["יוֹם אֶחָד הוּא דָּפַק עַל הַדֶּלֶת.","יום אחד הוא דפק על הדלת."],"yom echad hu dafak al ha-delet.","One day he knocked on the door."],
     [["הוּא שָׁאַל אִם אֲנִי מְבַשֵּׁל פַּסְטָה.","הוא שאל אם אני מבשל פסטה."],"hu sha'al im ani mevashel pasta.","He asked if I cook pasta."],
     [["אָמַרְתִּי כֵּן, וְהִזְמַנְתִּי אוֹתוֹ.","אמרתי כן, והזמנתי אותו."],"amarti ken, ve-hizmanti oto.","I said yes, and invited him."],
     [["הוּא בָּא בָּעֶרֶב עִם בַּקְבּוּק יַיִן.","הוא בא בערב עם בקבוק יין."],"hu ba ba-erev im bakbuk yayin.","He came in the evening with a bottle of wine."],
     [["בִּשַּׁלְתִּי פַּסְטָה עִם רֹטֶב עַגְבָנִיּוֹת.","בישלתי פסטה עם רוטב עגבניות."],"bishalti pasta im rotev agvaniot.","I cooked pasta with tomato sauce."],
     [["תּוֹמָאס אָמַר שֶׁזֶּה הֲכִי טָעִים.","תומאס אמר שזה הכי טעים."],"Thomas amar she-ze hachi ta'im.","Thomas said it was the most delicious."],
     [["הוּא יוֹדֵעַ קְצָת עִבְרִית.","הוא יודע קצת עברית."],"hu yodea ktzat ivrit.","He knows a little Hebrew."],
     [["דִּבַּרְנוּ עִבְרִית, אִיטַלְקִית וְגֶרְמָנִית.","דיברנו עברית, איטלקית וגרמנית."],"dibarnu ivrit, italkit ve-germanit.","We spoke Hebrew, Italian and German."],
     [["צָחַקְנוּ כִּי הָיָה בִּלְבּוּל גָּדוֹל.","צחקנו כי היה בלבול גדול."],"tzachaknu ki haya bilbul gadol.","We laughed because there was big confusion."],
     [["קוֹבִּי חָזַר מֵהָעֲבוֹדָה וְהִצְטָרֵף.","קובי חזר מהעבודה והצטרף."],"Kobi chazar me-ha-avoda ve-hitstaref.","Kobi came home from work and joined."],
     [["הָיָה עֶרֶב נֶחְמָד וְחַם.","היה ערב נחמד וחם."],"haya erev nechmad ve-cham.","It was a nice and warm evening."],
     [["עַכְשָׁו תּוֹמָאס הוּא חָבֵר טוֹב.","עכשיו תומאס הוא חבר טוב."],"achshav Thomas hu chaver tov.","Now Thomas is a good friend."],
     [["בֶּרְלִין הִיא עִיר שֶׁל אֲנָשִׁים מִכָּל מָקוֹם.","ברלין היא עיר של אנשים מכל מקום."],"Berlin hi ir shel anashim mi-kol makom.","Berlin is a city of people from everywhere."]],
  quiz:[{q:"What does Thomas love?",opts:["German food","Italian food","Sushi"],a:1},{q:"What did Thomas bring?",opts:["Bread","A bottle of wine","Cheese"],a:1}]},
 {id:"s40",t:["סוֹף שָׁבוּעַ עַל יַד הַיָּם","סוף שבוע על יד הים"],en:"A Weekend by the Sea",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[[["בְּסוֹף הַשָּׁבוּעַ נָסַעְנוּ צָפוֹנָה.","בסוף השבוע נסענו צפונה."],"be-sof ha-shavua nasanu tzafona.","On the weekend we drove north."],
     [["רָצִינוּ לִרְאוֹת אֶת הַיָּם הַצְּפוֹנִי.","רצינו לראות את הים הצפוני."],"ratzinu lir'ot et ha-yam ha-tzfoni.","We wanted to see the North Sea."],
     [["הַנְּסִיעָה הָיְתָה אֲרֻכָּה אֲבָל יָפָה.","הנסיעה הייתה ארוכה אבל יפה."],"ha-nesia hayta aruka aval yafa.","The drive was long but beautiful."],
     [["רָאִינוּ שָׂדוֹת יְרֻקִּים מֵהַחַלּוֹן.","ראינו שדות ירוקים מהחלון."],"ra'inu sadot yerukim me-ha-chalon.","We saw green fields from the window."],
     [["הִגַּעְנוּ לְעִיר קְטַנָּה עַל הַחוֹף.","הגענו לעיר קטנה על החוף."],"higanu le-ir ktana al ha-chof.","We arrived at a small town on the coast."],
     [["מָצָאנוּ מָלוֹן קָטָן וְנָעִים.","מצאנו מלון קטן ונעים."],"matzanu malon katan ve-na'im.","We found a small, pleasant hotel."],
     [["הַחֶדֶר הָיָה עִם נוֹף לַיָּם.","החדר היה עם נוף לים."],"ha-cheder haya im nof la-yam.","The room had a view of the sea."],
     [["הָאֲוִיר הָיָה קַר וְצַח.","האוויר היה קר וצח."],"ha-avir haya kar ve-tzach.","The air was cold and clear."],
     [["הָלַכְנוּ עַל הַחוֹף בָּעֶרֶב.","הלכנו על החוף בערב."],"halachnu al ha-chof ba-erev.","We walked on the beach in the evening."],
     [["הַיָּם הַצְּפוֹנִי שׁוֹנֶה מֵהַיָּם בְּתֵל אָבִיב.","הים הצפוני שונה מהים בתל אביב."],"ha-yam ha-tzfoni shone me-ha-yam be-Tel Aviv.","The North Sea is different from the sea in Tel Aviv."],
     [["הַמַּיִם הָיוּ אֲפֹרִים וְקָרִים.","המים היו אפורים וקרים."],"ha-mayim hayu aforim ve-karim.","The water was grey and cold."],
     [["אָכַלְנוּ דָּגִים טְרִיִּים בַּמִּסְעָדָה.","אכלנו דגים טריים במסעדה."],"achalnu dagim tri'im ba-misada.","We ate fresh fish at the restaurant."],
     [["בַּלַּיְלָה שָׁמַעְנוּ אֶת הַגַּלִּים.","בלילה שמענו את הגלים."],"ba-layla shamanu et ha-galim.","At night we heard the waves."],
     [["יָשַׁנּוּ טוֹב וְקַמְנוּ מְאֻחָר.","ישנו טוב וקמנו מאוחר."],"yashanu tov ve-kamnu me'uchar.","We slept well and got up late."],
     [["חָזַרְנוּ לְבֶּרְלִין רְגוּעִים וּמְאֻשָּׁרִים.","חזרנו לברלין רגועים ומאושרים."],"chazarnu le-Berlin regu'im u-me' usharim.","We returned to Berlin calm and happy."]],
  quiz:[{q:"Which sea did they go to see?",opts:["The Mediterranean","The North Sea","The Red Sea"],a:1},{q:"What did the room have?",opts:["A balcony","A view of the sea","A kitchen"],a:1}]},
 {id:"s41",t:["הָעֲבוֹדָה שֶׁלִּי בְּבֶּרְלִין","העבודה שלי בברלין"],en:"My Work in Berlin",lvl:"A2",sublevel:"A2.2",type:"long",
  s:[[["אֲנִי עוֹבֵד עִם אֲנָשִׁים וְעִם יֹפִי.","אני עובד עם אנשים ועם יופי."],"ani oved im anashim ve-im yofi.","I work with people and with beauty."],
     [["אֲנִי יוֹעֵץ תַּדְמִית וְגַם סַפָּר.","אני יועץ תדמית וגם ספר."],"ani yo'etz tadmit ve-gam sapar.","I am an image consultant and also a hairdresser."],
     [["יֵשׁ לִי לָקוֹחוֹת מִכָּל הָעוֹלָם.","יש לי לקוחות מכל העולם."],"yesh li lakochot mi-kol ha-olam.","I have clients from all over the world."],
     [["הֵם בָּאִים אֵלַי כְּדֵי לְהַרְגִּישׁ טוֹב.","הם באים אליי כדי להרגיש טוב."],"hem ba'im elai kdei lehargish tov.","They come to me in order to feel good."],
     [["אֲנִי מַקְשִׁיב לָהֶם בְּסַבְלָנוּת.","אני מקשיב להם בסבלנות."],"ani makshiv lahem be-savlanut.","I listen to them with patience."],
     [["אֲנִי מַבִּין מָה הֵם רוֹצִים.","אני מבין מה הם רוצים."],"ani mevin ma hem rotzim.","I understand what they want."],
     [["לִפְעָמִים הֵם לֹא יוֹדְעִים מָה מַתְאִים לָהֶם.","לפעמים הם לא יודעים מה מתאים להם."],"lif'amim hem lo yodim ma matim lahem.","Sometimes they do not know what suits them."],
     [["אֲנִי עוֹזֵר לָהֶם לִבְחֹר.","אני עוזר להם לבחור."],"ani ozer lahem livchor.","I help them choose."],
     [["אֲנִי אוֹהֵב לִרְאוֹת אֶת הַחִיּוּךְ שֶׁלָּהֶם.","אני אוהב לראות את החיוך שלהם."],"ani ohev lir'ot et ha-chiyuch shelahem.","I love to see their smile."],
     [["הָעֲבוֹדָה שֶׁלִּי הִיא אָמָּנוּת.","העבודה שלי היא אמנות."],"ha-avoda sheli hi omanut.","My work is an art."],
     [["כָּל אָדָם הוּא שׁוֹנֶה וּמְיֻחָד.","כל אדם הוא שונה ומיוחד."],"kol adam hu shone u-meyuchad.","Every person is different and special."],
     [["לִפְעָמִים הָעֲבוֹדָה קָשָׁה וַאֲרֻכָּה.","לפעמים העבודה קשה וארוכה."],"lif'amim ha-avoda kasha va-aruka.","Sometimes the work is hard and long."],
     [["אֲבָל אֲנִי תָּמִיד מַרְגִּישׁ סִפּוּק.","אבל אני תמיד מרגיש סיפוק."],"aval ani tamid margish sipuk.","But I always feel satisfaction."],
     [["בָּעֶרֶב אֲנִי מְסַפֵּר לְקוֹבִּי עַל הַיּוֹם.","בערב אני מספר לקובי על היום."],"ba-erev ani mesaper le-Kobi al hayom.","In the evening I tell Kobi about the day."],
     [["אֲנִי אוֹהֵב אֶת מָה שֶׁאֲנִי עוֹשֶׂה.","אני אוהב את מה שאני עושה."],"ani ohev et ma she-ani ose.","I love what I do."]],
  quiz:[{q:"What is Vincenzo's work?",opts:["Teacher","Image consultant and hairdresser","Chef"],a:1},{q:"How does he feel after work?",opts:["Satisfaction","Boredom","Anger"],a:0}]},
 {id:"s42",t:["הֶחָג הָרִאשׁוֹן","החג הראשון"],en:"The First Holiday",lvl:"A2",sublevel:"A2.1",type:"long",
  s:[[["בַּשָּׁנָה שֶׁעָבְרָה חָגַגְתִּי חַג רִאשׁוֹן עִם הַמִּשְׁפָּחָה.","בשנה שעברה חגגתי חג ראשון עם המשפחה."],"ba-shana she-avra chagagti chag rishon im ha-mishpacha.","Last year I celebrated a first holiday with the family."],
     [["זֶה הָיָה רֹאשׁ הַשָּׁנָה.","זה היה ראש השנה."],"ze haya Rosh Hashana.","It was Rosh Hashana."],
     [["כֻּלָּם בָּאוּ לַבַּיִת שֶׁל מִיקִי.","כולם באו לבית של מיקי."],"kulam ba'u la-bayit shel Miki.","Everyone came to Miki's house."],
     [["עַל הַשֻּׁלְחָן הָיָה הַרְבֵּה אֹכֶל.","על השולחן היה הרבה אוכל."],"al ha-shulchan haya harbe ochel.","On the table there was a lot of food."],
     [["אָכַלְנוּ תַּפּוּחַ בִּדְבַשׁ.","אכלנו תפוח בדבש."],"achalnu tapuach bi-dvash.","We ate apple with honey."],
     [["קוֹבִּי אָמַר שֶׁזֶּה לְשָׁנָה מְתוּקָה.","קובי אמר שזה לשנה מתוקה."],"Kobi amar she-ze le-shana metuka.","Kobi said it is for a sweet year."],
     [["לֹא הִכַּרְתִּי אֶת הַמִּנְהָגִים.","לא הכרתי את המנהגים."],"lo hikarti et ha-minhagim.","I did not know the customs."],
     [["אֲבָל כֻּלָּם הִסְבִּירוּ לִי בְּסַבְלָנוּת.","אבל כולם הסבירו לי בסבלנות."],"aval kulam hisbiru li be-savlanut.","But everyone explained to me with patience."],
     [["שָׁמַעְתִּי בְּרָכוֹת בְּעִבְרִית.","שמעתי ברכות בעברית."],"shamati brachot be-ivrit.","I heard blessings in Hebrew."],
     [["לֹא הֵבַנְתִּי כָּל מִלָּה.","לא הבנתי כל מילה."],"lo hevanti kol mila.","I did not understand every word."],
     [["אֲבָל הִרְגַּשְׁתִּי אֶת הַחֲשִׁיבוּת.","אבל הרגשתי את החשיבות."],"aval hirgashti et ha-chashivut.","But I felt the importance."],
     [["הַיְּלָדִים שָׁרוּ שִׁירִים שֶׁל הַחַג.","הילדים שרו שירים של החג."],"ha-yeladim sharu shirim shel ha-chag.","The children sang holiday songs."],
     [["סַבְתָּא בִּרְכָה אֶת כֻּלָּם.","סבתא ברכה את כולם."],"savta bercha et kulam.","Grandma blessed everyone."],
     [["הִרְגַּשְׁתִּי שֶׁאֲנִי שַׁיָּךְ לְכָאן.","הרגשתי שאני שייך לכאן."],"hirgashti she-ani shayach le-chan.","I felt that I belong here."],
     [["זֶה הָיָה חַג שֶׁלֹּא אֶשְׁכַּח.","זה היה חג שלא אשכח."],"ze haya chag she-lo eshkach.","It was a holiday I will not forget."]],
  quiz:[{q:"What holiday was it?",opts:["Passover","Rosh Hashana","Hanukkah"],a:1},{q:"What did they eat for a sweet year?",opts:["Cake","Apple with honey","Challah"],a:1}]},
 {id:"s47",t:["הַמַּעֲבָר לְבֶּרְלִין","המעבר לברלין"],en:"The Move to Berlin",lvl:"B1",sublevel:"B1",type:"extended",
  s:[[["לִפְנֵי כַּמָּה שָׁנִים הֶחְלַטְתִּי לַעֲזֹב אֶת סִיצִילְיָה.","לפני כמה שנים החלטתי לעזוב את סיציליה."],"lifnei kama shanim hechlateti la'azov et Sitzilya.","A few years ago I decided to leave Sicily."],
     [["זוֹ הָיְתָה הַחְלָטָה לֹא קַלָּה.","זו הייתה החלטה לא קלה."],"zo hayta hachlata lo kala.","It was not an easy decision."],
     [["נוֹלַדְתִּי בְּרוֹזוֹלִינִי וְגַדַלְתִּי שָׁם.","נולדתי ברוזוליני וגדלתי שם."],"noladeti be-Rosolini ve-gadalti sham.","I was born in Rosolini and grew up there."],
     [["כָּל הַמִּשְׁפָּחָה שֶׁלִּי גָּרָה בְּסִיצִילְיָה.","כל המשפחה שלי גרה בסיציליה."],"kol ha-mishpacha sheli gara be-Sitzilya.","All my family lives in Sicily."],
     [["אֲבָל אָהַבְתִּי גֶּבֶר בְּשֵׁם קוֹבִּי.","אבל אהבתי גבר בשם קובי."],"aval ahavti gever be-shem Kobi.","But I loved a man named Kobi."],
     [["קוֹבִּי גָּר בְּבֶּרְלִין וְעָבַד שָׁם.","קובי גר בברלין ועבד שם."],"Kobi gar be-Berlin ve-avad sham.","Kobi lived in Berlin and worked there."],
     [["יָדַעְתִּי שֶׁאֲנִי רוֹצֶה לִחְיוֹת אִתּוֹ.","ידעתי שאני רוצה לחיות איתו."],"yadati she-ani rotze lichyot ito.","I knew that I wanted to live with him."],
     [["לָכֵן אָרַזְתִּי אֶת הַחַיִּים שֶׁלִּי בְּמִזְוָדוֹת.","לכן ארזתי את החיים שלי במזוודות."],"lachen arazti et ha-chayim sheli bi-mzvadot.","So I packed my life into suitcases."],
     [["בַּהַתְחָלָה בֶּרְלִין הָיְתָה זָרָה לִי.","בהתחלה ברלין הייתה זרה לי."],"ba-hatchala Berlin hayta zara li.","At first Berlin was foreign to me."],
     [["הַשָּׂפָה, הַמֶּזֶג הָאֲוִיר וְהָאֲנָשִׁים הָיוּ שׁוֹנִים.","השפה, מזג האוויר והאנשים היו שונים."],"ha-safa, mezeg ha-avir ve-ha-anashim hayu shonim.","The language, the weather and the people were different."],
     [["הִתְגַּעְגַּעְתִּי לַשֶּׁמֶשׁ וְלַיָּם שֶׁל סִיצִילְיָה.","התגעגעתי לשמש ולים של סיציליה."],"hitga'ga'ti la-shemesh ve-la-yam shel Sitzilya.","I missed the sun and the sea of Sicily."],
     [["הִתְגַּעְגַּעְתִּי לָאֹכֶל שֶׁל אִמָּא.","התגעגעתי לאוכל של אמא."],"hitga'ga'ti la-ochel shel ima.","I missed Mom's food."],
     [["אֲבָל קוֹבִּי הָיָה לְצִדִּי כָּל הַזְּמַן.","אבל קובי היה לצידי כל הזמן."],"aval Kobi haya le-tzidi kol ha-zman.","But Kobi was by my side all the time."],
     [["לְאַט לְאַט מָצָאתִי אֶת הַמָּקוֹם שֶׁלִּי.","לאט לאט מצאתי את המקום שלי."],"le'at le'at matzati et ha-makom sheli.","Slowly I found my place."],
     [["מָצָאתִי בָּתֵּי קָפֶה שֶׁאֲנִי אוֹהֵב.","מצאתי בתי קפה שאני אוהב."],"matzati batei kafe she-ani ohev.","I found cafés that I love."],
     [["הִכַּרְתִּי שְׁכֵנִים וְהָפַכְתִּי לַחֲבֵרִים.","הכרתי שכנים והפכתי לחברים."],"hikarti shchenim ve-hafachti la-chaverim.","I met neighbors and we became friends."],
     [["הִתְחַלְתִּי לַעֲבֹד וְלִבְנוֹת חַיִּים חֲדָשִׁים.","התחלתי לעבוד ולבנות חיים חדשים."],"hitchalti la'avod ve-livnot chayim chadashim.","I began to work and to build a new life."],
     [["גַּם הִתְחַלְתִּי לִלְמֹד עִבְרִית.","גם התחלתי ללמוד עברית."],"gam hitchalti lilmod ivrit.","I also began to learn Hebrew."],
     [["הֵבַנְתִּי שֶׁבַּיִת זֶה לֹא רַק מָקוֹם.","הבנתי שבית זה לא רק מקום."],"hevanti she-bayit ze lo rak makom.","I understood that home is not only a place."],
     [["בַּיִת זֶה הָאֲנָשִׁים שֶׁאַתָּה אוֹהֵב.","בית זה האנשים שאתה אוהב."],"bayit ze ha-anashim she-ata ohev.","Home is the people you love."],
     [["הַיּוֹם בֶּרְלִין הִיא בֵּיתִי, וְגַם סִיצִילְיָה.","היום ברלין היא ביתי, וגם סיציליה."],"hayom Berlin hi beiti, ve-gam Sitzilya.","Today Berlin is my home, and so is Sicily."],
     [["יֵשׁ לִי שְׁנֵי בָּתִּים בַּלֵּב.","יש לי שני בתים בלב."],"yesh li shnei batim ba-lev.","I have two homes in my heart."]],
  quiz:[{q:"Why did Vincenzo leave Sicily?",opts:["For work","To live with Kobi","For study"],a:1},{q:"What did he understand about 'home'?",opts:["It is a building","It is the people you love","It is a country"],a:1}]},
 {id:"s48",t:["שְׁתֵּי שָׂפוֹת, בַּיִת אֶחָד","שתי שפות, בית אחד"],en:"Two Languages, One Home",lvl:"B1",sublevel:"B1",type:"extended",
  s:[[["בַּבַּיִת שֶׁלָּנוּ מְדַבְּרִים כַּמָּה שָׂפוֹת.","בבית שלנו מדברים כמה שפות."],"ba-bayit shelanu medabrim kama safot.","In our home we speak several languages."],
     [["קוֹבִּי מְדַבֵּר עִבְרִית מִיַּלְדוּת.","קובי מדבר עברית מילדות."],"Kobi medaber ivrit mi-yaldut.","Kobi has spoken Hebrew since childhood."],
     [["אֲנִי מְדַבֵּר אִיטַלְקִית מִיַּלְדוּת.","אני מדבר איטלקית מילדות."],"ani medaber italkit mi-yaldut.","I have spoken Italian since childhood."],
     [["בֵּינֵינוּ אֲנַחְנוּ מְדַבְּרִים בְּעִקָּר אַנְגְּלִית.","בינינו אנחנו מדברים בעיקר אנגלית."],"beineinu anachnu medabrim be-ikar anglit.","Between us we mostly speak English."],
     [["אֲבָל אֲנִי רוֹצֶה לְשַׁנּוֹת אֶת זֶה.","אבל אני רוצה לשנות את זה."],"aval ani rotze leshanot et ze.","But I want to change that."],
     [["אֲנִי רוֹצֶה לְדַבֵּר עִבְרִית בַּבַּיִת.","אני רוצה לדבר עברית בבית."],"ani rotze ledaber ivrit ba-bayit.","I want to speak Hebrew at home."],
     [["לָכֵן בַּבֹּקֶר אֲנַחְנוּ מְנַסִּים רַק עִבְרִית.","לכן בבוקר אנחנו מנסים רק עברית."],"lachen ba-boker anachnu menasim rak ivrit.","So in the morning we try only Hebrew."],
     [["בַּהַתְחָלָה זֶה הָיָה מַצְחִיק וְקָשֶׁה.","בהתחלה זה היה מצחיק וקשה."],"ba-hatchala ze haya matzchik ve-kashe.","At first it was funny and hard."],
     [["שָׁכַחְתִּי מִלִּים פְּשׁוּטוֹת.","שכחתי מילים פשוטות."],"shachachti milim pshutot.","I forgot simple words."],
     [["לִפְעָמִים עֵרַבְתִּי שָׁלוֹשׁ שָׂפוֹת בְּמִשְׁפָּט אֶחָד.","לפעמים עירבתי שלוש שפות במשפט אחד."],"lif'amim eravti shalosh safot be-mishpat echad.","Sometimes I mixed three languages in one sentence."],
     [["קוֹבִּי צָחַק אֲבָל עָזַר לִי.","קובי צחק אבל עזר לי."],"Kobi tzachak aval azar li.","Kobi laughed but helped me."],
     [["הוּא אָמַר שֶׁטָּעֻיּוֹת הֵן חֵלֶק מֵהַלִּמּוּד.","הוא אמר שטעויות הן חלק מהלימוד."],"hu amar she-ta'uyot hen chelek me-ha-limud.","He said that mistakes are part of learning."],
     [["לְאַט לְאַט הַמִּלִּים הִתְחִילוּ לָבוֹא.","לאט לאט המילים התחילו לבוא."],"le'at le'at ha-milim hitchilu lavo.","Slowly the words began to come."],
     [["הִתְחַלְתִּי לַחְשֹׁב בְּעִבְרִית לִפְעָמִים.","התחלתי לחשוב בעברית לפעמים."],"hitchalti lachshov be-ivrit lif'amim.","I began to think in Hebrew sometimes."],
     [["יוֹם אֶחָד חָלַמְתִּי חֲלוֹם בְּעִבְרִית.","יום אחד חלמתי חלום בעברית."],"yom echad chalamti chalom be-ivrit.","One day I dreamed a dream in Hebrew."],
     [["סִפַּרְתִּי לְקוֹבִּי וְהוּא הָיָה מְאֻשָּׁר.","סיפרתי לקובי והוא היה מאושר."],"siparti le-Kobi ve-hu haya me'ushar.","I told Kobi and he was happy."],
     [["עַכְשָׁו אֲנַחְנוּ מְעָרְבִים עִבְרִית בְּכָל יוֹם.","עכשיו אנחנו מערבים עברית בכל יום."],"achshav anachnu me'arvim ivrit be-chol yom.","Now we mix in Hebrew every day."],
     [["הַשָּׂפָה הִיא גֶּשֶׁר בֵּינֵינוּ.","השפה היא גשר בינינו."],"ha-safa hi gesher beineinu.","The language is a bridge between us."],
     [["כְּשֶׁאֲנִי מְדַבֵּר עִבְרִית, אֲנִי קָרוֹב יוֹתֵר לְקוֹבִּי.","כשאני מדבר עברית, אני קרוב יותר לקובי."],"ksheani medaber ivrit, ani karov yoter le-Kobi.","When I speak Hebrew, I am closer to Kobi."],
     [["וְגַם קָרוֹב יוֹתֵר לַמִּשְׁפָּחָה שֶׁלּוֹ.","וגם קרוב יותר למשפחה שלו."],"ve-gam karov yoter la-mishpacha shelo.","And also closer to his family."],
     [["שְׁתֵּי שָׂפוֹת חַיּוֹת בְּבַיִת אֶחָד, בְּשָׁלוֹם.","שתי שפות חיות בבית אחד, בשלום."],"shtei safot chayot be-bayit echad, be-shalom.","Two languages live in one home, in peace."]],
  quiz:[{q:"What language do they mostly speak between them?",opts:["Hebrew","English","German"],a:1},{q:"What did Vincenzo dream one day?",opts:["In Italian","In Hebrew","In English"],a:1}]},
 {id:"s49",t:["מָה זֶה לִהְיוֹת זָר","מה זה להיות זר"],en:"What It Means to Be a Foreigner",lvl:"B2",sublevel:"B2",type:"extended",
  s:[[["כָּל הַחַיִּים שֶׁלִּי הָיוּ בְּמָקוֹם אֶחָד.","כל החיים שלי היו במקום אחד."],"kol ha-chayim sheli hayu be-makom echad.","All my life had been in one place."],
     [["הִכַּרְתִּי כָּל רְחוֹב בְּרוֹזוֹלִינִי.","הכרתי כל רחוב ברוזוליני."],"hikarti kol rechov be-Rosolini.","I knew every street in Rosolini."],
     [["יָדַעְתִּי אֵיךְ הַדְּבָרִים עוֹבְדִים שָׁם.","ידעתי איך הדברים עובדים שם."],"yadati eich ha-dvarim ovdim sham.","I knew how things work there."],
     [["כְּשֶׁעָבַרְתִּי לְבֶּרְלִין, הַכֹּל הִשְׁתַּנָּה.","כשעברתי לברלין, הכל השתנה."],"ksheavarti le-Berlin, ha-kol hishtana.","When I moved to Berlin, everything changed."],
     [["פִּתְאוֹם לֹא יָדַעְתִּי אֵיךְ לְדַבֵּר עִם אֲנָשִׁים.","פתאום לא ידעתי איך לדבר עם אנשים."],"pit'om lo yadati eich ledaber im anashim.","Suddenly I did not know how to talk to people."],
     [["אֲפִלּוּ דְּבָרִים פְּשׁוּטִים הָיוּ קָשִׁים.","אפילו דברים פשוטים היו קשים."],"afilu dvarim pshutim hayu kashim.","Even simple things were hard."],
     [["לִקְנוֹת לֶחֶם הָיָה כְּמוֹ מַשִּׂימָה גְּדוֹלָה.","לקנות לחם היה כמו משימה גדולה."],"liknot lechem haya kmo masima gdola.","Buying bread was like a big mission."],
     [["הִרְגַּשְׁתִּי קָטָן וַאֲבוּד.","הרגשתי קטן ואבוד."],"hirgashti katan va-avud.","I felt small and lost."],
     [["לִהְיוֹת זָר זֶה לְהַרְגִּישׁ בְּחוּץ.","להיות זר זה להרגיש בחוץ."],"lihyot zar ze lehargish ba-chutz.","To be a foreigner is to feel outside."],
     [["אַתָּה רוֹאֶה אֲנָשִׁים צוֹחֲקִים וְלֹא מֵבִין לָמָּה.","אתה רואה אנשים צוחקים ולא מבין למה."],"ata roe anashim tzochakim ve-lo mevin lama.","You see people laughing and do not understand why."],
     [["אַתָּה רוֹצֶה לוֹמַר מַשֶּׁהוּ, אֲבָל הַמִּלִּים לֹא בָּאוֹת.","אתה רוצה לומר משהו, אבל המילים לא באות."],"ata rotze lomar mashehu, aval ha-milim lo ba'ot.","You want to say something, but the words do not come."],
     [["לִפְעָמִים כָּעַסְתִּי עַל עַצְמִי.","לפעמים כעסתי על עצמי."],"lif'amim ka'asti al atzmi.","Sometimes I was angry at myself."],
     [["לִפְעָמִים רָצִיתִי לַחְזֹר הַבַּיְתָה.","לפעמים רציתי לחזור הביתה."],"lif'amim ratziti lachzor ha-bayta.","Sometimes I wanted to go back home."],
     [["אֲבָל לְאַט לְאַט מַשֶּׁהוּ הִשְׁתַּנָּה.","אבל לאט לאט משהו השתנה."],"aval le'at le'at mashehu hishtana.","But slowly something changed."],
     [["הִתְחַלְתִּי לְהָבִין מִלִּים בָּרְחוֹב.","התחלתי להבין מילים ברחוב."],"hitchalti lehavin milim ba-rechov.","I began to understand words in the street."],
     [["הִתְחַלְתִּי לַעֲנוֹת בְּלִי לִפְחֹד.","התחלתי לענות בלי לפחוד."],"hitchalti la'anot bli lifchod.","I began to answer without fear."],
     [["הָאֲנָשִׁים הָיוּ סַבְלָנִיִּים אִתִּי.","האנשים היו סבלניים איתי."],"ha-anashim hayu savlaniyim iti.","People were patient with me."],
     [["הֵבַנְתִּי שֶׁלִּהְיוֹת זָר זֶה גַּם מַתָּנָה.","הבנתי שלהיות זר זה גם מתנה."],"hevanti she-lihyot zar ze gam matana.","I understood that being a foreigner is also a gift."],
     [["אַתָּה רוֹאֶה אֶת הָעוֹלָם בְּעֵינַיִם חֲדָשׁוֹת.","אתה רואה את העולם בעיניים חדשות."],"ata roe et ha-olam be-einayim chadashot.","You see the world with new eyes."],
     [["אַתָּה לוֹמֵד לֶהֱיוֹת עָנָו וּפָתוּחַ.","אתה לומד להיות עניו ופתוח."],"ata lomed lihyot anav u-fatuach.","You learn to be humble and open."],
     [["אַתָּה מַעֲרִיךְ דְּבָרִים קְטַנִּים יוֹתֵר.","אתה מעריך דברים קטנים יותר."],"ata ma'arich dvarim ktanim yoter.","You appreciate small things more."],
     [["כָּל מִלָּה בְּעִבְרִית הִיא נִצָּחוֹן קָטָן.","כל מילה בעברית היא ניצחון קטן."],"kol mila be-ivrit hi nitzachon katan.","Every word in Hebrew is a small victory."],
     [["הַיּוֹם אֲנִי כְּבָר לֹא מַרְגִּישׁ זָר.","היום אני כבר לא מרגיש זר."],"hayom ani kvar lo margish zar.","Today I no longer feel like a stranger."],
     [["אֲנִי מַרְגִּישׁ שֶׁיֵּשׁ לִי מָקוֹם בָּעוֹלָם.","אני מרגיש שיש לי מקום בעולם."],"ani margish she-yesh li makom ba-olam.","I feel that I have a place in the world."],
     [["וְהַמָּקוֹם הַזֶּה גָּדֵל בְּכָל יוֹם.","והמקום הזה גדל בכל יום."],"ve-ha-makom ha-ze gadel be-chol yom.","And that place grows every day."]],
  quiz:[{q:"How did Vincenzo feel at first in Berlin?",opts:["Confident","Small and lost","Excited"],a:1},{q:"What did he understand being a foreigner can be?",opts:["A punishment","A gift","A mistake"],a:1}]},
 {id:"s50",t:["אַהֲבָה בֵּין שְׁתֵּי תַּרְבֻּיּוֹת","אהבה בין שתי תרבויות"],en:"Love Between Two Cultures",lvl:"B2",sublevel:"B2",type:"extended",
  s:[[["קוֹבִּי וַאֲנִי בָּאנוּ מִשְּׁנֵי עוֹלָמוֹת שׁוֹנִים.","קובי ואני באנו משני עולמות שונים."],"Kobi va-ani banu mi-shnei olamot shonim.","Kobi and I came from two different worlds."],
     [["אֲנִי מִסִּיצִילְיָה, מִמִּשְׁפָּחָה קָתוֹלִית.","אני מסיציליה, ממשפחה קתולית."],"ani mi-Sitzilya, mi-mishpacha katolit.","I am from Sicily, from a Catholic family."],
     [["קוֹבִּי מִיִּשְׂרָאֵל, מִמִּשְׁפָּחָה יְהוּדִית.","קובי מישראל, ממשפחה יהודית."],"Kobi mi-Yisrael, mi-mishpacha yehudit.","Kobi is from Israel, from a Jewish family."],
     [["בַּהַתְחָלָה פָּחַדְתִּי שֶׁזֶּה יִהְיֶה קָשֶׁה.","בהתחלה פחדתי שזה יהיה קשה."],"ba-hatchala pachadti she-ze yihye kashe.","At first I was afraid it would be hard."],
     [["חָשַׁבְתִּי עַל הַהֶבְדֵּלִים בֵּינֵינוּ.","חשבתי על ההבדלים בינינו."],"chashavti al ha-hevdelim beineinu.","I thought about the differences between us."],
     [["שָׂפָה שׁוֹנָה, דָּת שׁוֹנָה, אֹכֶל שׁוֹנֶה.","שפה שונה, דת שונה, אוכל שונה."],"safa shona, dat shona, ochel shone.","A different language, a different religion, different food."],
     [["אֲבָל גִּלִּיתִי מַשֶּׁהוּ מַפְתִּיעַ.","אבל גיליתי משהו מפתיע."],"aval giliti mashehu maftia.","But I discovered something surprising."],
     [["הַמִּשְׁפָּחָה שֶׁל קוֹבִּי דּוֹמָה לְמִשְׁפַּחְתִּי.","המשפחה של קובי דומה למשפחתי."],"ha-mishpacha shel Kobi doma le-mishpachti.","Kobi's family is similar to my family."],
     [["גַּם הֵם אוֹהֲבִים לֶאֱכֹל יַחַד.","גם הם אוהבים לאכול יחד."],"gam hem ohavim le'echol yachad.","They too love to eat together."],
     [["גַּם הֵם מְדַבְּרִים בְּקוֹל וּבְיָדַיִם.","גם הם מדברים בקול ובידיים."],"gam hem medabrim be-kol u-ve-yadayim.","They too speak loudly and with their hands."],
     [["גַּם אֶצְלָם הַמִּשְׁפָּחָה הִיא הֲכִי חֲשׁוּבָה.","גם אצלם המשפחה היא הכי חשובה."],"gam etzlam ha-mishpacha hi hachi chashuva.","For them too, family is the most important thing."],
     [["הֵבַנְתִּי שֶׁהַדִּמְיוֹן גָּדוֹל מֵהַהֶבְדֵּל.","הבנתי שהדמיון גדול מההבדל."],"hevanti she-ha-dimyon gadol me-ha-hevdel.","I understood that the similarity is greater than the difference."],
     [["בַּחֲתֻנָּה שֶׁלָּנוּ בְּקוֹפֶּנְהָאגֶן הָיוּ שְׁתֵּי הַמִּשְׁפָּחוֹת.","בחתונה שלנו בקופנהאגן היו שתי המשפחות."],"ba-chatuna shelanu be-Copenhagen hayu shtei ha-mishpachot.","At our wedding in Copenhagen both families were there."],
     [["הַהוֹרִים שֶׁלִּי לֹא דִּבְּרוּ עִבְרִית.","ההורים שלי לא דיברו עברית."],"ha-horim sheli lo dibru ivrit.","My parents did not speak Hebrew."],
     [["הַהוֹרִים שֶׁל קוֹבִּי לֹא דִּבְּרוּ אִיטַלְקִית.","ההורים של קובי לא דיברו איטלקית."],"ha-horim shel Kobi lo dibru italkit.","Kobi's parents did not speak Italian."],
     [["אֲבָל כֻּלָּם חִיְּכוּ וְרָקְדוּ יַחַד.","אבל כולם חייכו ורקדו יחד."],"aval kulam chiyechu ve-rakdu yachad.","But everyone smiled and danced together."],
     [["הָאַהֲבָה לֹא צְרִיכָה תַּרְגּוּם.","האהבה לא צריכה תרגום."],"ha-ahava lo tzricha targum.","Love does not need translation."],
     [["הַיּוֹם אֲנַחְנוּ חוֹגְגִים גַּם חַגִּים יְהוּדִים.","היום אנחנו חוגגים גם חגים יהודים."],"hayom anachnu chogegim gam chagim yehudim.","Today we also celebrate Jewish holidays."],
     [["וְגַם אֲנִי מְבַשֵּׁל לְקוֹבִּי אֹכֶל סִיצִילְיָאנִי.","וגם אני מבשל לקובי אוכל סיציליאני."],"ve-gam ani mevashel le-Kobi ochel sitziliani.","And I also cook Kobi Sicilian food."],
     [["לָמַדְתִּי שֶׁתַּרְבּוּת אֵינָהּ קִיר.","למדתי שתרבות אינה קיר."],"lamadti she-tarbut eina kir.","I learned that culture is not a wall."],
     [["תַּרְבּוּת הִיא דֶּלֶת לְעוֹלָם חָדָשׁ.","תרבות היא דלת לעולם חדש."],"tarbut hi delet le-olam chadash.","Culture is a door to a new world."],
     [["מִשְּׁנֵי עוֹלָמוֹת בָּנִינוּ עוֹלָם אֶחָד.","משני עולמות בנינו עולם אחד."],"mi-shnei olamot baninu olam echad.","From two worlds we built one world."],
     [["וְהָעוֹלָם הַזֶּה מָלֵא אַהֲבָה.","והעולם הזה מלא אהבה."],"ve-ha-olam ha-ze male ahava.","And this world is full of love."],
     [["זוֹ הַמַּתָּנָה הֲכִי גְּדוֹלָה שֶׁקִּבַּלְתִּי.","זו המתנה הכי גדולה שקיבלתי."],"zo ha-matana hachi gdola she-kibalti.","It is the greatest gift I have received."],
     [["וַאֲנִי אַסִּיר תּוֹדָה עַל זֶה כָּל יוֹם.","ואני אסיר תודה על זה כל יום."],"va-ani asir toda al ze kol yom.","And I am grateful for it every day."]],
  quiz:[{q:"What did Vincenzo discover about the two families?",opts:["They are enemies","They are very similar","They never meet"],a:1},{q:"What did he learn culture is?",opts:["A wall","A door to a new world","A problem"],a:1}]},
 {id:"m1",t:["מָה זֶה שַׁבָּת?","מה זה שבת?"],en:"What Is Shabbat?",lvl:"A2",sublevel:"A2.1",type:"magazine",magazine:true,
  s:[[["שַׁבָּת הִיא יוֹם מְנוּחָה בְּיִשְׂרָאֵל.","שבת היא יום מנוחה בישראל."],"Shabbat hi yom menucha be-Yisrael.","Shabbat is a day of rest in Israel."],
     [["הִיא מַתְחִילָה בְּיוֹם שִׁישִׁי בָּעֶרֶב.","היא מתחילה ביום שישי בערב."],"hi matchila be-yom shishi ba-erev.","It begins on Friday evening."],
     [["הִיא נִגְמֶרֶת בְּמוֹצָאֵי שַׁבָּת, בְּלֵיל שַׁבָּת.","היא נגמרת במוצאי שבת."],"hi nigmeret be-motza'ei shabbat.","It ends on Saturday night."],
     [["בְּשַׁבָּת הַרְבֵּה אֲנָשִׁים לֹא עוֹבְדִים.","בשבת הרבה אנשים לא עובדים."],"be-shabbat harbe anashim lo ovdim.","On Shabbat many people do not work."],
     [["חֲנֻיּוֹת רַבּוֹת סְגוּרוֹת.","חנויות רבות סגורות."],"chanuyot rabot sgurot.","Many shops are closed."],
     [["בִּירוּשָׁלַיִם גַּם הָאוֹטוֹבּוּסִים לֹא נוֹסְעִים.","בירושלים גם האוטובוסים לא נוסעים."],"bi-Yerushalayim gam ha-otobusim lo nos'im.","In Jerusalem even the buses do not run."],
     [["בְּתֵל אָבִיב הַחַיִּים מַמְשִׁיכִים יוֹתֵר.","בתל אביב החיים ממשיכים יותר."],"be-Tel Aviv ha-chayim mamshichim yoter.","In Tel Aviv life continues more."],
     [["בְּלֵיל שִׁישִׁי מִשְׁפָּחוֹת אוֹכְלוֹת יַחַד.","בליל שישי משפחות אוכלות יחד."],"be-leil shishi mishpachot ochlot yachad.","On Friday night families eat together."],
     [["עַל הַשֻּׁלְחָן יֵשׁ חַלָּה וְיַיִן.","על השולחן יש חלה ויין."],"al ha-shulchan yesh chala ve-yayin.","On the table there is challah and wine."],
     [["מַדְלִיקִים נֵרוֹת לִפְנֵי הָאֲרוּחָה.","מדליקים נרות לפני הארוחה."],"madlikim nerot lifnei ha-arucha.","People light candles before the meal."],
     [["אוֹמְרִים בְּרָכוֹת מְיֻחָדוֹת.","אומרים ברכות מיוחדות."],"omrim brachot meyuchadot.","People say special blessings."],
     [["הָאֹכֶל לְאַט וְהַשִּׂיחָה אֲרֻכָּה.","האוכל לאט והשיחה ארוכה."],"ha-ochel le'at ve-ha-sicha aruka.","The meal is slow and the conversation is long."],
     [["גַּם אֲנָשִׁים לֹא דָּתִיִּים אוֹהֲבִים אֶת שַׁבָּת.","גם אנשים לא דתיים אוהבים את שבת."],"gam anashim lo datiyim ohavim et shabbat.","Even non-religious people love Shabbat."],
     [["זֶה זְמַן לַעֲצֹר וְלָנוּחַ.","זה זמן לעצור ולנוח."],"ze zman la'atzor ve-lanuach.","It is a time to stop and to rest."],
     [["זֶה זְמַן לִהְיוֹת עִם הַמִּשְׁפָּחָה.","זה זמן להיות עם המשפחה."],"ze zman lihyot im ha-mishpacha.","It is a time to be with family."],
     [["שַׁבָּת הִיא חֵלֶק חָשׁוּב מֵהַתַּרְבּוּת.","שבת היא חלק חשוב מהתרבות."],"shabbat hi chelek chashuv me-ha-tarbut.","Shabbat is an important part of the culture."]],
  quiz:[{q:"When does Shabbat begin?",opts:["Friday evening","Saturday morning","Sunday"],a:0},{q:"Which city is busier on Shabbat?",opts:["Jerusalem","Tel Aviv","Both equally"],a:1}]},
 {id:"m2",t:["תֵּל אָבִיב לְעֻמַּת יְרוּשָׁלַיִם","תל אביב לעומת ירושלים"],en:"Tel Aviv vs Jerusalem",lvl:"A2",sublevel:"A2.2",type:"magazine",magazine:true,
  s:[[["בְּיִשְׂרָאֵל יֵשׁ שְׁתֵּי עָרִים גְּדוֹלוֹת וּמְפֻרְסָמוֹת.","בישראל יש שתי ערים גדולות ומפורסמות."],"be-Yisrael yesh shtei arim gdolot u-mefursamot.","In Israel there are two big and famous cities."],
     [["יְרוּשָׁלַיִם וְתֵל אָבִיב.","ירושלים ותל אביב."],"Yerushalayim ve-Tel Aviv.","Jerusalem and Tel Aviv."],
     [["הֵן קְרוֹבוֹת, אֲבָל שׁוֹנוֹת מְאוֹד.","הן קרובות, אבל שונות מאוד."],"hen krovot, aval shonot me'od.","They are close, but very different."],
     [["יְרוּשָׁלַיִם הִיא עִיר עַתִּיקָה וְקְדוֹשָׁה.","ירושלים היא עיר עתיקה וקדושה."],"Yerushalayim hi ir atika u-kdosha.","Jerusalem is an ancient and holy city."],
     [["יֵשׁ בָּהּ אֲבָנִים יְשָׁנוֹת וּבָתֵּי תְּפִלָּה.","יש בה אבנים ישנות ובתי תפילה."],"yesh ba avanim yeshanot u-vatei tfila.","It has old stones and houses of prayer."],
     [["אֲנָשִׁים מִכָּל הַדָּתוֹת בָּאִים אֵלֶיהָ.","אנשים מכל הדתות באים אליה."],"anashim mi-kol ha-datot ba'im eleha.","People of all religions come to it."],
     [["הָאֲוִירָה שָׁם רְצִינִית וְשֶׁקֶטָה.","האווירה שם רצינית ושקטה."],"ha-avira sham retzinit ve-shketa.","The atmosphere there is serious and quiet."],
     [["תֵּל אָבִיב הִיא עִיר צְעִירָה וּמוֹדֶרְנִית.","תל אביב היא עיר צעירה ומודרנית."],"Tel Aviv hi ir tze'ira u-modernit.","Tel Aviv is a young and modern city."],
     [["יֵשׁ בָּהּ יָם, חוֹפִים וּבָתֵּי קָפֶה.","יש בה ים, חופים ובתי קפה."],"yesh ba yam, chofim u-vatei kafe.","It has a sea, beaches and cafés."],
     [["הָאֲנָשִׁים שָׁם אוֹהֲבִים לַחֲגֹּג.","האנשים שם אוהבים לחגוג."],"ha-anashim sham ohavim lachgog.","The people there love to celebrate."],
     [["הַחַיִּים בְּתֵל אָבִיב לֹא עוֹצְרִים בַּלַּיְלָה.","החיים בתל אביב לא עוצרים בלילה."],"ha-chayim be-Tel Aviv lo otzrim ba-layla.","Life in Tel Aviv does not stop at night."],
     [["יֵשׁ אוֹמְרִים שֶׁיְּרוּשָׁלַיִם מִתְפַּלֶּלֶת.","יש אומרים שירושלים מתפללת."],"yesh omrim she-Yerushalayim mitpalelet.","Some say that Jerusalem prays."],
     [["וְתֵל אָבִיב מְשַׂחֶקֶת וְרוֹקֶדֶת.","ותל אביב משחקת ורוקדת."],"ve-Tel Aviv mesacheket ve-rokedet.","And Tel Aviv plays and dances."],
     [["שְׁתֵּי הֶעָרִים מַרְאוֹת שְׁנֵי צְדָדִים שֶׁל יִשְׂרָאֵל.","שתי הערים מראות שני צדדים של ישראל."],"shtei he-arim mar'ot shnei tzdadim shel Yisrael.","The two cities show two sides of Israel."],
     [["כְּדַאי לְבַקֵּר בִּשְׁתֵּיהֶן.","כדאי לבקר בשתיהן."],"kdai levaker bi-shteihen.","It is worth visiting both."]],
  quiz:[{q:"How is Jerusalem described?",opts:["Young and modern","Ancient and holy","Small and empty"],a:1},{q:"What does Tel Aviv have?",opts:["Only old stones","Sea, beaches and cafés","No nightlife"],a:1}]},
 {id:"m3",t:["סַבָּבָּה · עִבְרִית שְׁגוּרָה","סבבה · עברית שגורה"],en:"Sababa: Everyday Slang",lvl:"A2",sublevel:"A2.1",type:"magazine",magazine:true,
  s:[[["בְּעִבְרִית מְדֻבֶּרֶת יֵשׁ הַרְבֵּה סְלֶנְג.","בעברית מדוברת יש הרבה סלנג."],"be-ivrit meduberet yesh harbe sleng.","In spoken Hebrew there is a lot of slang."],
     [["הַמִּלָּה הֲכִי מְפֻרְסֶמֶת הִיא סַבָּבָּה.","המילה הכי מפורסמת היא סבבה."],"ha-mila hachi mefurseset hi sababa.","The most famous word is sababa."],
     [["סַבָּבָּה אוֹמֶרֶת מְצֻיָּן אוֹ בְּסֵדֶר גָּמוּר.","סבבה אומרת מצוין או בסדר גמור."],"sababa omeret metzuyan o beseder gamur.","Sababa means great or totally fine."],
     [["מִלָּה נוֹסֶפֶת הִיא יַאללָה.","מילה נוספת היא יאללה."],"mila nosefet hi yalla.","Another word is yalla."],
     [["יַאללָה אוֹמֶרֶת בּוֹא נֵלֵךְ אוֹ קָדִימָה.","יאללה אומרת בוא נלך או קדימה."],"yalla omeret bo nelech o kadima.","Yalla means let's go or come on."],
     [["יֵשׁ גַּם אֶת הַמִּלָּה וָואלָה.","יש גם את המילה וואלה."],"yesh gam et ha-mila walla.","There is also the word walla."],
     [["וָואלָה אוֹמֶרֶת בֶּאֱמֶת? אוֹ וָואו.","וואלה אומרת באמת? או וואו."],"walla omeret be'emet? o wow.","Walla means really? or wow."],
     [["כְּשֶׁמַּשֶּׁהוּ טוֹב מְאוֹד, אוֹמְרִים אַחְלָה.","כשמשהו טוב מאוד, אומרים אחלה."],"kshemashehu tov me'od, omrim achla.","When something is very good, people say achla."],
     [["הַמִּלִּים הָאֵלֶּה בָּאוֹת מֵעֲרָבִית.","המילים האלה באות מערבית."],"ha-milim ha-ele ba'ot me-aravit.","These words come from Arabic."],
     [["הָעִבְרִית הַמְּדֻבֶּרֶת מְלֵאָה הַשְׁפָּעוֹת.","העברית המדוברת מלאה השפעות."],"ha-ivrit ha-meduberet mele'a hashpa'ot.","Spoken Hebrew is full of influences."],
     [["יֵשׁ מִלִּים מֵאַנְגְּלִית, רוּסִית וְיִידִישׁ.","יש מילים מאנגלית, רוסית ויידיש."],"yesh milim me-anglit, rusit ve-yidish.","There are words from English, Russian and Yiddish."],
     [["כְּדֵי לְדַבֵּר כְּמוֹ יִשְׂרְאֵלִי, צָרִיךְ לָדַעַת סְלֶנְג.","כדי לדבר כמו ישראלי, צריך לדעת סלנג."],"kdei ledaber kmo yisre'eli, tzarich lada'at sleng.","To speak like an Israeli, you need to know slang."],
     [["הַסְּלֶנְג מַרְאֶה שֶׁאַתָּה חֵלֶק מֵהָעִנְיָנִים.","הסלנג מראה שאתה חלק מהעניינים."],"ha-sleng mar'e she-ata chelek me-ha-inyanim.","The slang shows that you are part of things."],
     [["אֲבָל כְּדַאי לְהִזָּהֵר מֵתֵי לְהִשְׁתַּמֵּשׁ בּוֹ.","אבל כדאי להיזהר מתי להשתמש בו."],"aval kdai lehizaher matai lehishtamesh bo.","But it is good to be careful when to use it."],
     [["בְּכָל מִקְרֶה, סַבָּבָּה הִיא תָּמִיד בְּסֵדֶר.","בכל מקרה, סבבה היא תמיד בסדר."],"be-chol mikre, sababa hi tamid beseder.","In any case, sababa is always fine."]],
  quiz:[{q:"What does 'sababa' mean?",opts:["Goodbye","Great / totally fine","Maybe"],a:1},{q:"Where do many of these slang words come from?",opts:["French","Arabic","Italian"],a:1}]},
 {id:"m4",t:["אֹכֶל יִשְׂרְאֵלִי","אוכל ישראלי"],en:"Israeli Food",lvl:"A2",sublevel:"A2.2",type:"magazine",magazine:true,
  s:[[["הָאֹכֶל הַיִּשְׂרְאֵלִי הוּא תַּעֲרֹבֶת שֶׁל תַּרְבֻּיּוֹת.","האוכל הישראלי הוא תערובת של תרבויות."],"ha-ochel ha-yisre'eli hu ta'arovet shel tarbuyot.","Israeli food is a mix of cultures."],
     [["הַמַּנָה הֲכִי מְפֻרְסֶמֶת הִיא חוּמוּס.","המנה הכי מפורסמת היא חומוס."],"ha-mana hachi mefurseset hi chumus.","The most famous dish is hummus."],
     [["חוּמוּס עָשׂוּי מֵחֻמְצָה וּטְחִינָה.","חומוס עשוי מחומצה וטחינה."],"chumus asui me-chumtza u-tchina.","Hummus is made from chickpeas and tahini."],
     [["אוֹכְלִים אוֹתוֹ עִם פִּיתָה חַמָּה.","אוכלים אותו עם פיתה חמה."],"ochlim oto im pita chama.","People eat it with warm pita."],
     [["מַנָה נוֹסֶפֶת הִיא שַׁקְשׁוּקָה.","מנה נוספת היא שקשוקה."],"mana nosefet hi shakshuka.","Another dish is shakshuka."],
     [["שַׁקְשׁוּקָה הִיא בֵּיצִים בְּרֹטֶב עַגְבָנִיּוֹת.","שקשוקה היא ביצים ברוטב עגבניות."],"shakshuka hi beitzim be-rotev agvaniot.","Shakshuka is eggs in tomato sauce."],
     [["אוֹכְלִים אוֹתָהּ בְּעִקָּר בַּבֹּקֶר.","אוכלים אותה בעיקר בבוקר."],"ochlim ota be-ikar ba-boker.","People eat it mostly in the morning."],
     [["יֵשׁ גַּם מַנָה בְּשֵׁם סַבִּיךְ.","יש גם מנה בשם סביח."],"yesh gam mana be-shem sabich.","There is also a dish called sabich."],
     [["סַבִּיךְ הוּא פִּיתָה עִם חָצִיל וּבֵיצָה.","סביח הוא פיתה עם חציל וביצה."],"sabich hu pita im chatzil u-veitza.","Sabich is pita with eggplant and egg."],
     [["הַמָּנָה הַזֹּאת בָּאָה מֵיְּהוּדֵי עִירָאק.","המנה הזאת באה מיהודי עיראק."],"ha-mana ha-zot ba'a mi-yehudei Irak.","This dish comes from Iraqi Jews."],
     [["הַרְבֵּה מַנוֹת בָּאוֹת מֵעֵדוֹת שׁוֹנוֹת.","הרבה מנות באות מעדות שונות."],"harbe manot ba'ot me-edot shonot.","Many dishes come from different communities."],
     [["יֵשׁ אֹכֶל מָרוֹקָאִי, תֵּימָנִי וּפּוֹלָנִי.","יש אוכל מרוקאי, תימני ופולני."],"yesh ochel moroka'i, teimani u-folani.","There is Moroccan, Yemenite and Polish food."],
     [["כָּל עֵדָה הֵבִיאָה אֶת הַטַּעַם שֶׁלָּהּ.","כל עדה הביאה את הטעם שלה."],"kol eda hevi'a et ha-ta'am shela.","Each community brought its own taste."],
     [["הַיִּשְׂרְאֵלִים אוֹהֲבִים אֹכֶל טָרִי וּפָשׁוּט.","הישראלים אוהבים אוכל טרי ופשוט."],"ha-yisre'elim ohavim ochel tari u-fashut.","Israelis love fresh and simple food."],
     [["הָאֹכֶל הוּא דֶּרֶךְ לְהַכִּיר אֶת הָאֲנָשִׁים.","האוכל הוא דרך להכיר את האנשים."],"ha-ochel hu derech lehakir et ha-anashim.","Food is a way to get to know the people."]],
  quiz:[{q:"What is sabich made with?",opts:["Eggplant and egg","Chickpeas only","Fish"],a:0},{q:"What does Israeli food reflect?",opts:["One culture","A mix of many communities","Only European food"],a:1}]},
 {id:"m5",t:["לָמָּה יִשְׂרְאֵלִים יְשִׁירִים","למה ישראלים ישירים"],en:"Why Israelis Are Direct",lvl:"B1",sublevel:"B1",type:"magazine",magazine:true,
  s:[[["זָרִים רַבִּים אוֹמְרִים שֶׁיִּשְׂרְאֵלִים יְשִׁירִים מְאוֹד.","זרים רבים אומרים שישראלים ישירים מאוד."],"zarim rabim omrim she-yisre'elim yeshirim me'od.","Many foreigners say that Israelis are very direct."],
     [["הֵם אוֹמְרִים מָה שֶׁהֵם חוֹשְׁבִים.","הם אומרים מה שהם חושבים."],"hem omrim ma she-hem choshvim.","They say what they think."],
     [["לִפְעָמִים זֶה נִשְׁמָע גַּס לְאַנְשֵׁי אֵירוֹפָּה.","לפעמים זה נשמע גס לאנשי אירופה."],"lif'amim ze nishma gas le-anshei Eiropa.","Sometimes it sounds rude to Europeans."],
     [["אֲבָל בִּשְׁבִיל יִשְׂרְאֵלִים זֶה לֹא גַּס.","אבל בשביל ישראלים זה לא גס."],"aval bishvil yisre'elim ze lo gas.","But for Israelis it is not rude."],
     [["הַיְּשִׁירוּת הִיא סִימָן שֶׁל כֵּנוּת.","הישירות היא סימן של כנות."],"ha-yeshirut hi siman shel kenut.","Directness is a sign of honesty."],
     [["יִשְׂרְאֵלִי שֶׁאוֹמֵר לְךָ אֶת הָאֱמֶת מְכַבֵּד אוֹתְךָ.","ישראלי שאומר לך את האמת מכבד אותך."],"yisre'eli she-omer lecha et ha-emet mechabed otcha.","An Israeli who tells you the truth respects you."],
     [["יֵשׁ לְזֶה גַּם מִלָּה: דּוּגְרִי.","יש לזה גם מילה: דוגרי."],"yesh le-ze gam mila: dugri.","There is also a word for this: dugri."],
     [["דּוּגְרִי אוֹמֵר לְדַבֵּר יָשָׁר וּבְלִי מִשְׂחָקִים.","דוגרי אומר לדבר ישר ובלי משחקים."],"dugri omer ledaber yashar u-vli miscchakim.","Dugri means to speak straight and without games."],
     [["מֵאַיִן בָּאָה הַתְּכוּנָה הַזֹּאת?","מאין באה התכונה הזאת?"],"me-ayin ba'a ha-tchuna ha-zot?","Where does this trait come from?"],
     [["יֵשׁ אוֹמְרִים שֶׁזֶּה בִּגְלַל הַהִיסְטוֹרְיָה הַקָּשָׁה.","יש אומרים שזה בגלל ההיסטוריה הקשה."],"yesh omrim she-ze biglal ha-historya ha-kasha.","Some say it is because of the hard history."],
     [["אֲנָשִׁים לֹא רָצוּ לְבַזְבֵּז זְמַן עַל מִלִּים רֵיקוֹת.","אנשים לא רצו לבזבז זמן על מילים ריקות."],"anashim lo ratzu levazbez zman al milim reikot.","People did not want to waste time on empty words."],
     [["יֵשׁ אוֹמְרִים שֶׁזֶּה בִּגְלַל הָאֲרֶץ הַקְּטַנָּה.","יש אומרים שזה בגלל הארץ הקטנה."],"yesh omrim she-ze biglal ha-aretz ha-ktana.","Some say it is because of the small country."],
     [["כְּשֶׁכֻּלָּם קְרוֹבִים, מְדַבְּרִים כְּמוֹ מִשְׁפָּחָה.","כשכולם קרובים, מדברים כמו משפחה."],"ksheekulam krovim, medabrim kmo mishpacha.","When everyone is close, people talk like family."],
     [["בַּהַתְחָלָה זָר יָכוֹל לְהִפָּגַע.","בהתחלה זר יכול להיפגע."],"ba-hatchala zar yachol lehipaga.","At first a foreigner can be hurt."],
     [["אֲבָל אַחַר כָּךְ הוּא מֵבִין שֶׁזֶּה בָּא מֵהַלֵּב.","אבל אחר כך הוא מבין שזה בא מהלב."],"aval achar kach hu mevin she-ze ba me-ha-lev.","But later he understands that it comes from the heart."],
     [["הַיְּשִׁירוּת הִיא חֵלֶק מֵהַחֹם הַיִּשְׂרְאֵלִי.","הישירות היא חלק מהחום הישראלי."],"ha-yeshirut hi chelek me-ha-chom ha-yisre'eli.","Directness is part of the Israeli warmth."]],
  quiz:[{q:"What does 'dugri' mean?",opts:["To lie","To speak straight without games","To be quiet"],a:1},{q:"For Israelis, directness is a sign of what?",opts:["Rudeness","Honesty","Weakness"],a:1}]},
 {id:"m6",t:["רֹאשׁ הַשָּׁנָה","ראש השנה"],en:"Rosh Hashana",lvl:"B1",sublevel:"B1",type:"magazine",magazine:true,
  s:[[["רֹאשׁ הַשָּׁנָה הוּא הַחַג שֶׁל הַשָּׁנָה הַחֲדָשָׁה.","ראש השנה הוא החג של השנה החדשה."],"Rosh Hashana hu ha-chag shel ha-shana ha-chadasha.","Rosh Hashana is the festival of the new year."],
     [["הוּא חָל בַּסְּתָו, בְּדֶרֶךְ כְּלָל בְּסֶפְּטֶמְבֶּר.","הוא חל בסתיו, בדרך כלל בספטמבר."],"hu chal ba-stav, be-derech klal be-September.","It falls in autumn, usually in September."],
     [["זֶה לֹא רֹאשׁ הַשָּׁנָה שֶׁל יָנוּאָר.","זה לא ראש השנה של ינואר."],"ze lo Rosh Hashana shel Yanuar.","It is not the new year of January."],
     [["זֶה רֹאשׁ הַשָּׁנָה לְפִי הַלּוּחַ הָעִבְרִי.","זה ראש השנה לפי הלוח העברי."],"ze Rosh Hashana lefi ha-luach ha-ivri.","It is the new year according to the Hebrew calendar."],
     [["בַּחַג הַזֶּה מִשְׁפָּחוֹת נִפְגָּשׁוֹת.","בחג הזה משפחות נפגשות."],"ba-chag ha-ze mishpachot nifgashot.","On this holiday families gather."],
     [["אוֹכְלִים אֹכֶל מָתוֹק לְשָׁנָה טוֹבָה.","אוכלים אוכל מתוק לשנה טובה."],"ochlim ochel matok le-shana tova.","People eat sweet food for a good year."],
     [["הַמַּאֲכָל הֲכִי מְפֻרְסָם הוּא תַּפּוּחַ בִּדְבַשׁ.","המאכל הכי מפורסם הוא תפוח בדבש."],"ha-ma'achal hachi mefursam hu tapuach bi-dvash.","The most famous food is apple with honey."],
     [["הַתַּפּוּחַ וְהַדְּבַשׁ הֵם סֵמֶל לְשָׁנָה מְתוּקָה.","התפוח והדבש הם סמל לשנה מתוקה."],"ha-tapuach ve-ha-dvash hem semel le-shana metuka.","The apple and honey are a symbol of a sweet year."],
     [["בְּבֵית הַכְּנֶסֶת תּוֹקְעִים בַּשּׁוֹפָר.","בבית הכנסת תוקעים בשופר."],"be-veit ha-kneset tok'im ba-shofar.","In the synagogue people blow the shofar."],
     [["הַשּׁוֹפָר הוּא קֶרֶן שֶׁל אַיִל.","השופר הוא קרן של איל."],"ha-shofar hu keren shel ayil.","The shofar is the horn of a ram."],
     [["הַקּוֹל שֶׁלּוֹ מַזְכִּיר לָאֲנָשִׁים לַחְשֹׁב עַל הַחַיִּים.","הקול שלו מזכיר לאנשים לחשוב על החיים."],"ha-kol shelo mazkir la-anashim lachshov al ha-chayim.","Its sound reminds people to think about life."],
     [["זֶה זְמַן לַחְשֹׁב עַל הַשָּׁנָה שֶׁעָבְרָה.","זה זמן לחשוב על השנה שעברה."],"ze zman lachshov al ha-shana she-avra.","It is a time to reflect on the past year."],
     [["וְזֶה זְמַן לְקַבֵּל הַחְלָטוֹת חֲדָשׁוֹת.","וזה זמן לקבל החלטות חדשות."],"ve-ze zman lekabel hachlatot chadashot.","And it is a time to make new resolutions."],
     [["אֲנָשִׁים מְאַחֲלִים זֶה לָזֶה שָׁנָה טוֹבָה.","אנשים מאחלים זה לזה שנה טובה."],"anashim me'achalim ze la-ze shana tova.","People wish each other a good year."],
     [["אַחֲרֵי רֹאשׁ הַשָּׁנָה בָּא יוֹם כִּפּוּר.","אחרי ראש השנה בא יום כיפור."],"acharei Rosh Hashana ba Yom Kipur.","After Rosh Hashana comes Yom Kippur."],
     [["רֹאשׁ הַשָּׁנָה הוּא הַתְחָלָה חֲדָשָׁה לְכֻלָּם.","ראש השנה הוא התחלה חדשה לכולם."],"Rosh Hashana hu hatchala chadasha le-chulam.","Rosh Hashana is a new beginning for everyone."]],
  quiz:[{q:"What food symbolizes a sweet year?",opts:["Challah","Apple with honey","Fish"],a:1},{q:"What is blown in the synagogue?",opts:["A flute","The shofar","A drum"],a:1}]},
 {id:"p1",t:["הַחַלּוֹן הַגָּדוֹל","החלון הגדול"],en:"The Big Window",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["בַּסָּלוֹן שֶׁלָּנוּ יֵשׁ חַלּוֹן גָּדוֹל.","בסלון שלנו יש חלון גדול."],"bsalon shelanu yesh chalon gadol.","In our living room there is a big window."],
     [["אֲנִי אוֹהֵב לִשְׁבֹּת לְיַד הַחַלּוֹן.","אני אוהב לשבת ליד החלון."],"ani ohev lashevet leyad ha-chalon.","I love to sit by the window."],
     [["בַּבֹּקֶר אֲנִי רוֹאֶה אֶת הַשֶּׁמֶשׁ.","בבוקר אני רואה את השמש."],"ba-boker ani roe et ha-shemesh.","In the morning I see the sun."],
     [["בָּעֶרֶב אֲנִי רוֹאֶה אֶת הָעִיר.","בערב אני רואה את העיר."],"ba-erev ani roe et ha-ir.","In the evening I see the city."],
     [["הָרְחוֹב תָּמִיד מָלֵא אֲנָשִׁים.","הרחוב תמיד מלא אנשים."],"ha-rechov tamid male anashim.","The street is always full of people."],
     [["לִפְעָמִים יוֹרֵד גֶּשֶׁם.","לפעמים יורד גשם."],"lif'amim yored geshem.","Sometimes it rains."],
     [["אֲנִי אוֹהֵב אֶת הַגֶּשֶׁם.","אני אוהב את הגשם."],"ani ohev et ha-geshem.","I love the rain."],
     [["קוֹבִּי שׁוֹתֶה קָפֶה לְיַד הַחַלּוֹן.","קובי שותה קפה ליד החלון."],"Kobi shote kafe leyad ha-chalon.","Kobi drinks coffee by the window."],
     [["אֲנַחְנוּ מְדַבְּרִים עַל הַיּוֹם.","אנחנו מדברים על היום."],"anachnu medabrim al ha-yom.","We talk about the day."],
     [["זֶה הָרֶגַע הַכִּי טוֹב.","זה הרגע הכי טוב."],"ze ha-rega hachi tov.","This is the best moment."],
     [["אֲנִי אוֹהֵב אֶת הַבַּיִת שֶׁלָּנוּ.","אני אוהב את הבית שלנו."],"ani ohev et ha-bayit shelanu.","I love our home."],
     [["בֶּרְלִין מִחוּץ לַחַלּוֹן.","ברלין מחוץ לחלון."],"Berlin michuts la-chalon.","Berlin is outside the window."],
  ],
  quiz:[{q:"Where does Vincenzo like to sit?",opts:["By the window","In the kitchen","In the garden"],a:0},{q:"What does Kobi drink by the window?",opts:["Tea","Wine","Coffee"],a:2}]},
 {id:"p2",t:["הָאֹפַנַּיִם הַצְּהֻבּוֹת","האופניים הצהובות"],en:"The Yellow Bicycle",lvl:"A1",sublevel:"A1.1",type:"short",
  s:[
     [["לְקוֹבִּי יֵשׁ אוֹפַנַּיִם צְהֻבּוֹת.","לקובי יש אופניים צהובות."],"le-Kobi yesh ofanayim tzehubbot.","Kobi has a yellow bicycle."],
     [["הוּא רוֹכֵב עָלֶיהָ כָּל יוֹם.","הוא רוכב עליה כל יום."],"hu rochev aleha kol yom.","He rides it every day."],
     [["אֲנִי לֹא יוֹדֵעַ לִרְכֹּב.","אני לא יודע לרכוב."],"ani lo yodea lirkov.","I do not know how to ride."],
     [["קוֹבִּי מְלַמֵּד אוֹתִי לְאַט לְאַט.","קובי מלמד אותי לאט לאט."],"Kobi melaem oti le'at le'at.","Kobi teaches me slowly."],
     [["בַּפַּארְק יֵשׁ שְׁבִיל לְאוֹפַנַּיִם.","בפארק יש שביל לאופניים."],"ba-park yesh shvil le-ofanayim.","In the park there is a bike path."],
     [["אֲנִי מַתְחִיל לִרְכֹּב לְאַט.","אני מתחיל לרכוב לאט."],"ani matchil lirkov le'at.","I start to ride slowly."],
     [["אֲנִי נוֹפֵל פַּעַם אַחַת.","אני נופל פעם אחת."],"ani nofel pa'am achat.","I fall once."],
     [["קוֹבִּי עוֹזֵר לִי לָקוּם.","קובי עוזר לי לקום."],"Kobi ozer li lakum.","Kobi helps me get up."],
     [["אֲנַחְנוּ צוֹחֲקִים הַרְבֵּה.","אנחנו צוחקים הרבה."],"anachnu tzochakim harbe.","We laugh a lot."],
     [["אַחַר כָּךְ אֲנִי רוֹכֵב טוֹב יוֹתֵר.","אחר כך אני רוכב טוב יותר."],"achar kach ani rochev tov yoter.","Afterwards I ride better."],
     [["קוֹבִּי אוֹמֵר שֶׁאֲנִי מְצֻיָּן.","קובי אומר שאני מצוין."],"Kobi omer she-ani metzuyan.","Kobi says I am excellent."],
     [["אֲנִי שָׂמֵחַ מְאוֹד.","אני שמח מאוד."],"ani sameach me'od.","I am very happy."],
  ],
  quiz:[{q:"What colour is Kobi's bicycle?",opts:["Blue","Red","Yellow"],a:2},{q:"What happens to Vincenzo the first time?",opts:["He rides fast","He falls","He is afraid"],a:1}]},
 {id:"p3",t:["לֵיל שַׁבָּת בְּבֵית מִיקִי","ליל שבת בבית מיקי"],en:"Shabbat Night at Miki's",lvl:"A1",sublevel:"A1.2",type:"short",
  s:[
     [["כָּל שַׁבָּת אֲנַחְנוּ הוֹלְכִים לְמִיקִי.","כל שבת אנחנו הולכים למיקי."],"kol Shabbat anachnu holchim le-Miki.","Every Shabbat we go to Miki's."],
     [["הַבַּיִת שֶׁלּוֹ מָלֵא אוֹר וְנֵרוֹת.","הבית שלו מלא אור ונרות."],"ha-bayit shelo male or ve-nerot.","His house is full of light and candles."],
     [["עַל הַשֻּׁלְחָן יֵשׁ חַלָּה גְּדוֹלָה.","על השולחן יש חלה גדולה."],"al ha-shulchan yesh chala gdola.","On the table there is a big challah."],
     [["הַיְּלָדִים שָׁרִים שִׁיר שַׁבָּת.","הילדים שרים שיר שבת."],"ha-yeladim sharim shir Shabbat.","The children sing a Shabbat song."],
     [["אֲנִי לֹא יוֹדֵעַ אֶת הַמִּלִּים.","אני לא יודע את המילים."],"ani lo yodea et ha-milim.","I do not know the words."],
     [["אֲבָל אֲנִי שׁוֹמֵעַ בְּשִׂמְחָה.","אבל אני שומע בשמחה."],"aval ani shomea be-simcha.","But I listen with joy."],
     [["הָאֲרוּחָה מְצֻיֶּנֶת.","האכיחה מצוינת."],"ha-arucha metzuyenet.","The meal is excellent."],
     [["אוֹכְלִים דָּגִים, סָלָט וּלֶחֶם.","אוכלים דגים, סלט ולחם."],"ochlim dagim, salat u-lechem.","We eat fish, salad and bread."],
