<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>עברית · Vincenzo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  /* softened palette: calmer slate-navy, gentler gold, warm paper */
  --bg:#1b2733; --bg2:#1f2d3b; --panel:#243341; --panel2:#26384a; --raise:#2c3e51;
  --paper:#f4efe6; --warm:#e9e2d4; --muted:#9aabba; --faint:#6f8294;
  --gold:#cbb279; --gold2:#ddc890; --goldsoft:#3a3a2a;
  --line:rgba(203,178,121,.16); --line2:rgba(255,255,255,.06);
  --good:#6fae86; --bad:#cf8a7c; --info:#7fa8c9;
  --shadow:0 14px 40px -20px rgba(0,0,0,.5);
  --serif:'Spectral',Georgia,serif; --sans:'Outfit',system-ui,sans-serif; --heb:'Assistant','Heebo',sans-serif;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--warm);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.55;overflow-x:hidden}
/* Hebrew is lighter, modern, not bold/biblical */
.heb{font-family:var(--heb);direction:rtl;unicode-bidi:embed;font-weight:400}
.heb.lg{font-size:28px;font-weight:300;color:var(--paper)}
.heb.b{font-weight:500}
.app{display:flex;min-height:100vh}
/* sidebar (desktop) */
.side{width:230px;flex:0 0 230px;background:linear-gradient(180deg,#1a2530,#1b2835);
  border-right:1px solid var(--line);padding:20px 13px;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;gap:3px;overflow:auto;z-index:30}
.brand{display:flex;align-items:baseline;gap:9px;padding:4px 10px 14px}
.brand .he{font-family:var(--heb);font-weight:600;font-size:27px;color:var(--gold2);direction:rtl}
.brand small{color:var(--faint);font-family:var(--serif);font-style:italic;font-size:12.5px}
.nav{display:flex;flex-direction:column;gap:1px}
.nav button{all:unset;display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;
  cursor:pointer;color:#aebccb;font-size:14px;transition:.16s}
.nav button .ic{width:17px;text-align:center;opacity:.8;font-size:14px}
.nav button:hover{background:rgba(203,178,121,.07);color:var(--paper)}
.nav button.on{background:rgba(203,178,121,.13);color:var(--gold2);box-shadow:inset 2px 0 0 var(--gold)}
.side .foot{margin-top:auto;padding:10px;color:var(--faint);font-size:11px;line-height:1.5}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--bad);margin-inline-end:6px;vertical-align:middle}
.dot.ok{background:var(--good)}
/* main */
.main{flex:1;min-width:0;padding:30px 38px 90px;max-width:1060px}
h1{font-family:var(--serif);font-weight:600;font-size:31px;letter-spacing:-.01em;color:var(--paper)}
h2{font-family:var(--serif);font-weight:600;font-size:20px;color:var(--gold2);margin:24px 0 12px}
h3{font-family:var(--sans);font-weight:600;font-size:14.5px;color:var(--paper);margin:0 0 4px}
h4{color:var(--gold2);font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;margin-bottom:7px;font-weight:600}
p{color:#cbd6e0;font-size:14.5px}
.lead{color:var(--muted);font-family:var(--serif);font-style:italic;font-size:15.5px;margin-top:4px}
.card{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);
  border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.grid{display:grid;gap:14px}
.g3{grid-template-columns:repeat(3,1fr)} .g2{grid-template-columns:repeat(2,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
.pill{display:inline-block;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--gold2);
  border:1px solid var(--line);border-radius:999px;padding:3px 9px}
.tag{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:1px 7px;white-space:nowrap}
.lvl{font-size:10px;font-weight:600;letter-spacing:.04em;border-radius:6px;padding:2px 7px}
.lvl.a1{background:rgba(111,174,134,.16);color:#9ed3b3} .lvl.a2{background:rgba(127,168,201,.16);color:#a9cbe6}
.lvl.b1{background:rgba(203,178,121,.16);color:var(--gold2)} .lvl.b2{background:rgba(207,138,124,.16);color:#e3a99c}
.btn{all:unset;cursor:pointer;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#2a230f;
  font-weight:600;font-size:13px;padding:9px 15px;border-radius:10px;transition:.15s;text-align:center}
.btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn:active{transform:none}
.btn.ghost{background:transparent;color:var(--gold2);border:1px solid var(--line)}
.btn.sm{padding:6px 11px;font-size:12px}
.btn.full{display:block;width:100%}
.row{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.spread{justify-content:space-between}
.tl{color:var(--gold2);font-style:italic;font-family:var(--serif);font-size:13.5px}
.en{color:#cbd6e0}
.muted{color:var(--muted)} .faint{color:var(--faint)}
.stat{display:flex;flex-direction:column;gap:1px}
.stat b{font-family:var(--serif);font-size:30px;color:var(--gold2);font-weight:600}
.stat span{color:var(--faint);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em}
.bar{height:7px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}
/* list item (master) */
.item{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--line);
  border-radius:12px;background:var(--panel);margin-bottom:9px;cursor:pointer;transition:.15s}
.item:hover{border-color:rgba(203,178,121,.4);background:var(--panel2);transform:translateX(2px)}
.item.done{border-color:rgba(111,174,134,.4)}
.item .meta{display:flex;flex-direction:column;gap:3px;min-width:0}
.item .meta .t{font-weight:600;color:var(--paper);font-size:14.5px}
.chev{color:var(--faint);font-size:18px}
/* detail */
.back{all:unset;cursor:pointer;color:var(--gold2);font-size:13px;display:inline-flex;align-items:center;gap:6px;margin-bottom:6px}
.back:hover{color:var(--gold)}
.sec{border:1px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--panel);margin-bottom:12px}
.stage{display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
.stage .n{flex:0 0 26px;height:26px;border-radius:8px;background:rgba(203,178,121,.14);color:var(--gold2);
  display:grid;place-items:center;font-size:12px;font-weight:600;font-family:var(--serif)}
table{width:100%;border-collapse:collapse;font-size:14px;margin-top:4px}
th,td{text-align:start;padding:7px 10px;border-bottom:1px solid var(--line2)}
th{color:var(--gold2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td .heb{font-size:17px}
/* confidence */
.rate{display:flex;gap:5px;align-items:center}
.rate b{width:25px;height:25px;border-radius:7px;border:1px solid var(--line);display:grid;place-items:center;
  cursor:pointer;color:var(--muted);font-size:12px}
.rate b.on{background:var(--gold);color:#2a230f;border-color:var(--gold)}
/* tabs within a section */
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 16px;border-bottom:1px solid var(--line);padding-bottom:0}
.subtabs button{all:unset;cursor:pointer;padding:8px 13px;color:var(--muted);font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px}
.subtabs button.on{color:var(--gold2);border-bottom-color:var(--gold)}
/* speak button + clickable word */
.spk{all:unset;cursor:pointer;width:32px;height:32px;border-radius:9px;border:1px solid var(--line);
  display:grid;place-items:center;color:var(--gold2);font-size:14px;flex:0 0 auto;transition:.15s}
.spk:hover{background:rgba(203,178,121,.1)}
.w{cursor:pointer;border-bottom:1px dotted transparent;transition:.12s}
.w:hover{border-bottom-color:var(--gold);color:var(--gold2)}
/* story sentence */
.s-sent{padding:11px 13px;border-radius:11px;border:1px solid transparent;transition:.15s;margin-bottom:2px}
.s-sent:hover{background:rgba(203,178,121,.05);border-color:var(--line)}
.s-sent .heb{font-size:21px;font-weight:300;color:var(--paper);display:block}
.s-sent .tl{display:block;margin-top:2px}
.s-sent .en{display:block;color:var(--muted);font-size:13px}
.s-sent .pmark{all:unset;cursor:pointer;color:var(--gold2);font-size:13px;margin-inline-start:4px}
/* chat */
.chat{display:flex;flex-direction:column;gap:9px;max-height:48vh;overflow:auto;padding:6px 2px}
.msg{max-width:80%;padding:10px 14px;border-radius:14px;font-size:15px;line-height:1.5}
.msg.ai{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.me{align-self:flex-end;background:linear-gradient(180deg,var(--gold2),var(--gold));color:#2a230f;border-bottom-right-radius:4px}
.msg .heb{font-size:18px;font-weight:300}
.msg.me .heb{font-weight:400}
.typing{align-self:flex-start;color:var(--faint);font-size:13px;padding:4px 10px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chips button{all:unset;cursor:pointer;font-size:13px;border:1px solid var(--line);border-radius:999px;padding:6px 11px;color:#aebccb}
.chips button:hover{background:rgba(203,178,121,.1);color:var(--gold2)}
/* inputs */
.inp,textarea,select{width:100%;background:#172430;border:1px solid var(--line);border-radius:11px;
  color:var(--warm);padding:10px 13px;font-family:var(--sans);font-size:14px}
.inp.heb,textarea.heb{font-family:var(--heb);font-size:18px;font-weight:300;direction:rtl}
.inp:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold)}
textarea{min-height:120px;resize:vertical}
label{display:block;font-size:12px;color:var(--muted);margin:14px 0 5px;letter-spacing:.02em}
.range{width:100%;accent-color:var(--gold)}
/* switch */
.switch{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.switch input{display:none}
.track{width:40px;height:23px;border-radius:99px;background:#34495e;position:relative;transition:.2s}
.track::after{content:"";position:absolute;top:3px;left:3px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.2s}
.switch input:checked+.track{background:var(--gold)}
.switch input:checked+.track::after{left:20px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:16px;flex-wrap:wrap}
.note{font-size:12.5px;color:var(--muted);background:rgba(203,178,121,.05);border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin-top:12px}
.info{display:inline-grid;place-items:center;width:16px;height:16px;border-radius:50%;border:1px solid var(--line);color:var(--info);font-size:10px;cursor:help;font-style:italic;font-family:var(--serif);position:relative}
.info:hover .tip{display:block}
.tip{display:none;position:absolute;top:22px;left:50%;transform:translateX(-50%);width:240px;background:#0f1922;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:12px;color:#cbd6e0;z-index:50;font-style:normal;font-family:var(--sans);text-align:start;line-height:1.45;box-shadow:var(--shadow)}
.kbd{font-family:var(--heb);direction:rtl;font-size:36px;font-weight:300;color:var(--paper);text-align:center}
.cell{border:1px solid var(--line);border-radius:11px;padding:13px 8px;text-align:center;cursor:pointer;background:var(--panel);transition:.15s}
.cell:hover{background:var(--panel2);border-color:rgba(203,178,121,.4)}
.cell small{display:block;color:var(--faint);font-size:10.5px;margin-top:4px}
/* answer states */
.ans-ok{color:var(--good)} .ans-bad{color:var(--bad)}
.feedback{font-size:13px;margin-top:6px}
/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0f1922;border:1px solid var(--gold);
  color:var(--paper);padding:11px 18px;border-radius:11px;font-size:13.5px;opacity:0;transition:.25s;z-index:100;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* word popover */
.pop{position:fixed;background:#0f1922;border:1px solid var(--gold);border-radius:12px;padding:13px 15px;z-index:90;box-shadow:var(--shadow);max-width:260px;display:none}
.pop.show{display:block}
.pop .hw{font-family:var(--heb);font-size:24px;font-weight:300;color:var(--paper);direction:rtl}
/* mobile bottom nav */
.mobnav{display:none}
@media(max-width:860px){
  .app{flex-direction:column}
  .side{display:none}
  .main{padding:18px 15px 96px;max-width:100%}
  .g3,.g2,.g4{grid-template-columns:1fr}
  h1{font-size:26px}
  .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#16212c;border-top:1px solid var(--line);
    z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom));overflow-x:auto;gap:2px}
  .mobnav button{all:unset;cursor:pointer;flex:1 0 auto;min-width:60px;text-align:center;color:#9aabba;font-size:10px;padding:6px 4px;border-radius:9px}
  .mobnav button .ic{display:block;font-size:16px;margin-bottom:2px}
  .mobnav button.on{color:var(--gold2);background:rgba(203,178,121,.12)}
  .mobtop{display:flex !important}
}
.mobtop{display:none;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:20}
.mobtop .he{font-family:var(--heb);font-weight:600;font-size:22px;color:var(--gold2)}
</style>
</head>
<body>
<div class="mobtop">
  <span class="he">עברית</span>
  <span class="faint" style="font-size:12px">Vincenzo</span>
</div>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="he">עברית</span><small>for Vincenzo</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">
      <div><span class="dot" id="syncDot"></span><span id="syncTxt">checking…</span></div>
      <div style="margin-top:6px">Modern Hebrew · A1 to B2</div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
<nav class="mobnav" id="mobnav"></nav>
<div class="toast" id="toast"></div>
<div class="pop" id="pop"></div>

<script>
/* ===================================================================
   IVRIT  ·  private Hebrew learning app for Vincenzo
   Single file. Master-detail navigation. A1 to B2.
=================================================================== */
const USER_ID='vincenzo';
const DRIVE_FOLDER='1jqZwxO-5IhaiMxn7WkS0_EDadN_4VQlr';
/* Supabase pre-wired (project "ivrit") */
const SUPA_URL='https://ygstriddcprzalnisbql.supabase.co';
const SUPA_KEY='sb_publishable_QbkZ3-OMXm-LiIoZw3lApA_BzhOUtlS';
const LS='ivrit_state_'+USER_ID;

const defaultState={
  user:USER_ID, nikud:true, rate:0.9, voiceURI:'',
  streak:0, lastDay:null, xp:0,
  grammar:{}, vocab:{}, verbs:{}, stories:{}, lessons:{},
  customVocab:[], writeEntries:[],
  cfg:{anthropicKey:''},
  updated:Date.now()
};
let S=load();
function load(){try{return deepMerge(structuredClone(defaultState),JSON.parse(localStorage.getItem(LS))||{})}catch(e){return structuredClone(defaultState)}}
function deepMerge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])){a[k]=deepMerge(a[k]||{},b[k])}else{a[k]=b[k]}}return a}
function save(){S.updated=Date.now();localStorage.setItem(LS,JSON.stringify(S));syncUp();}
function touchDay(){const d=new Date().toDateString();if(S.lastDay!==d){const gap=S.lastDay?(new Date(d)-new Date(S.lastDay)):0;S.streak=(S.lastDay&&gap<=864e5*1.6)?S.streak+1:1;S.lastDay=d;}}
function addXP(n){S.xp=(S.xp||0)+n;}

/* ---------- Hebrew display: nikud + correct unvowelled (ktiv male) ---------- */
/* H(vowelled, plainUnvowelled?) returns the right string for current mode.
   We store an explicit unvowelled form whenever it differs from a naive strip. */
function stripN(t){return t.replace(/[\u0591-\u05C7]/g,'')}
function H(v,plain){ if(S.nikud) return v; return (plain!=null&&plain!=='')?plain:stripN(v); }
/* render a clickable Hebrew phrase, word by word, with audio+info on click */
function hebClick(v,plain,cls){
  const shown=H(v,plain);
  const words=shown.split(/(\s+)/);
  return `<span class="heb ${cls||''}" dir="rtl">`+words.map(w=>{
    if(/^\s+$/.test(w)||w==='')return w;
    return `<span class="w" data-word="${encodeURIComponent(w)}">${w}</span>`;
  }).join('')+`</span>`;
}

/* ---------- Speech: voice + rate, sequential queue, graceful fallback ---------- */
let voices=[];
function loadVoices(){voices=speechSynthesis.getVoices()||[]}
if('speechSynthesis'in window){loadVoices();speechSynthesis.onvoiceschanged=loadVoices;}
function heVoice(){
  if(S.voiceURI){const v=voices.find(v=>v.voiceURI===S.voiceURI);if(v)return v;}
  return voices.find(v=>v.lang&&v.lang.toLowerCase().startsWith('he'))||null;
}
function hasHeVoice(){return !!heVoice()}
function speak(t){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(stripN(t));
  u.lang='he-IL';const v=heVoice();if(v)u.voice=v;
  u.rate=S.rate||0.9;
  speechSynthesis.speak(u);
}
let queue=[];
function speakSeq(arr){
  if(!('speechSynthesis'in window))return;
  speechSynthesis.cancel();queue=arr.slice();next();
  function next(){
    if(!queue.length)return;
    const u=new SpeechSynthesisUtterance(stripN(queue.shift()));
    u.lang='he-IL';const v=heVoice();if(v)u.voice=v;u.rate=S.rate||0.9;
    u.onend=()=>setTimeout(next,180);
    speechSynthesis.speak(u);
  }
}

/* ---------- Supabase sync (newer-wins) ---------- */
async function syncUp(){
  if(!SUPA_URL||!SUPA_KEY){setSync(false);return;}
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/progress?on_conflict=user_id',{method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify([{user_id:USER_ID,state:S,updated_at:new Date(S.updated).toISOString()}])});
    setSync(r.ok);
  }catch(e){setSync(false)}
}
async function syncDown(){
  if(!SUPA_URL||!SUPA_KEY){setSync(false);return;}
  try{
    const r=await fetch(SUPA_URL+'/rest/v1/progress?user_id=eq.'+USER_ID+'&select=state,updated_at',
      {headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
    if(r.ok){const rows=await r.json();
      if(rows&&rows[0]&&rows[0].state&&(rows[0].state.updated||0)>(S.updated||0)){
        S=deepMerge(structuredClone(defaultState),rows[0].state);localStorage.setItem(LS,JSON.stringify(S));render();}
      setSync(true);
    }else setSync(false);
  }catch(e){setSync(false)}
}
function setSync(ok){const d=document.getElementById('syncDot'),t=document.getElementById('syncTxt');
  if(!d)return;d.className='dot'+(ok?' ok':'');t.textContent=ok?'synced across devices':'offline (saved on device)';}

/* ---------- Backup ---------- */
function backupJSON(){
  const name='ivrit-backup-'+new Date().toISOString().slice(0,10)+'.json';
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
  toast('Backup downloaded: '+name);
}
function importJSON(file){const r=new FileReader();r.onload=e=>{try{S=deepMerge(structuredClone(defaultState),JSON.parse(e.target.result));save();render();toast('Backup restored')}catch(_){toast('Invalid file')}};r.readAsText(file);}

/* ===================================================================
   CONTENT
   Each Hebrew value is [vowelled, unvowelled] where the unvowelled
   (ktiv male) form differs; otherwise a single string.
=================================================================== */

/* ---- ALEPH-BET (all 22 + finals) ---- */
const ALEFBET=[
 ["א","alef","silent / vowel carrier",""],["ב","bet","b (בּ) / v (ב)",""],["ג","gimel","g (as in go)",""],
 ["ד","dalet","d",""],["ה","he","h",""],["ו","vav","v / o / u",""],["ז","zayin","z",""],
 ["ח","chet","ch (throat)",""],["ט","tet","t",""],["י","yod","y / i",""],["כ","kaf","k (כּ) / kh (כ)","ך"],
 ["ל","lamed","l",""],["מ","mem","m","ם"],["נ","nun","n","ן"],["ס","samech","s",""],
 ["ע","ayin","silent / guttural carrier",""],["פ","pe","p (פּ) / f (פ)","ף"],["צ","tzadi","tz","ץ"],
 ["ק","kuf","k",""],["ר","resh","r (French-like)",""],["ש","shin (שׁ) / sin (שׂ)","sh / s",""],["ת","tav","t",""]
];
/* ---- NIKUD lessons (modern explanation) ---- */

const TABS=[
 ["dash","Today","◆"],["course","Course","❡"],["grammar","Grammar","✎"],["binyanim","Binyanim","⬡"],
 ["vocab","Vocab","✦"],["verbs","Verbs","⟳"],["stories","Stories","❧"],["practice","Practice","✓"],
 ["conversa","Conversa","❝"],["write","Write","✒"],["pron","Sounds","♪"],["settings","Settings","⚙"]
];
let route={section:'dash',item:null,sub:null};
function go(section,item,sub){route={section,item:item||null,sub:sub||null};buildNav();render();window.scrollTo(0,0);}
function buildNav(){
  document.getElementById('nav').innerHTML=TABS.map(t=>`<button data-v="${t[0]}" class="${t[0]===route.section?'on':''}"><span class="ic">${t[2]}</span>${t[1]}</button>`).join('');
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
  // mobile bottom nav: a focused subset + more
  const mob=[["dash","Today","◆"],["course","Course","❡"],["vocab","Vocab","✦"],["conversa","Talk","❝"],["grammar","Learn","✎"],["settings","More","⚙"]];
  document.getElementById('mobnav').innerHTML=mob.map(t=>`<button data-v="${t[0]}" class="${t[0]===route.section?'on':''}"><span class="ic">${t[2]}</span>${t[1]}</button>`).join('');
  document.querySelectorAll('#mobnav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
}

function render(){
  const m=document.getElementById('main');
  const f={dash:vDash,course:vCourse,grammar:vGrammar,binyanim:vBinyanim,vocab:vVocab,verbs:vVerbs,
    stories:vStories,practice:vPractice,conversa:vConversa,write:vWrite,pron:vPron,settings:vSettings}[route.section];
  m.innerHTML=f();
  bind();
}

/* small helpers */
function nikToggle(){return `<label class="switch" title="vowel marks"><input type="checkbox" id="nikTop" ${S.nikud?'checked':''}><span class="track"></span></label>
  <span class="info">i<span class="tip">Nikud are the vowel marks. Beginners keep them on. Real modern Hebrew has none, so turn them off to practise reading the bare word. Spelling shifts slightly (extra ו/י): we show the true unvowelled form.</span></span>`;}
function lvlBadge(l){const k=l.toLowerCase().replace('.','').slice(0,2);return `<span class="lvl ${k}">${l}</span>`;}
function speakBtn(v){return `<button class="spk" data-speak="${encodeURIComponent(v)}">♪</button>`;}

/* ===================================================================
   VIEWS
=================================================================== */
function gPct(){const d=Object.values(S.grammar).filter(v=>v>=4).length;return Math.round(d/GRAMMAR.length*100);}
function vCount(){return Object.values(S.vocab).filter(Boolean).length;}

/* daily lesson: deterministic by date */
function todaySeed(){const d=new Date();return d.getFullYear()*1000+(d.getMonth()*31+d.getDate());}
function dailyPlan(){
  const seed=todaySeed();const r=n=>Math.abs((seed*9301+49297*n)%233280);
  const g=GRAMMAR[r(1)%GRAMMAR.length];
  const cat=VOCAB[r(2)%VOCAB.length];
  const st=STORIES[r(3)%STORIES.length];
  const cv=CONVERSA[1+ r(4)%(CONVERSA.length-1)];
  return {g,cat,st,cv};
}

function vDash(){
  const hour=new Date().getHours();const g=hour<12?["בֹּקֶר טוֹב","בוקר טוב"]:hour<18?["צָהֳרַיִים טוֹבִים","צהריים טובים"]:["עֶרֶב טוֹב","ערב טוב"];
  const p=dailyPlan();const doneToday=S.lessons[new Date().toDateString()];
  return `<div class="topbar"><div><h1>${H(g[0],g[1])}, Vincenzo</h1><div class="lead">${hebClick("לְאַט לְאַט זֶה בָּא","לאט לאט זה בא")} · slowly it comes.</div></div><span class="pill">streak ${S.streak||0}</span></div>
   <div class="grid g3" style="margin-top:20px">
     <div class="card stat"><b>${S.streak||0}</b><span>day streak</span></div>
     <div class="card stat"><b>${vCount()}</b><span>words learned</span></div>
     <div class="card stat"><b>${gPct()}%</b><span>grammar confident</span><div class="bar"><i style="width:${gPct()}%"></i></div></div>
   </div>
   <h2>Today's lesson</h2>
   <div class="card">
     <p class="muted" style="margin-bottom:12px">A short mix for today: one grammar point, a word set, a story, and a conversation. ${doneToday?'<span class="ans-ok">Done today ✓</span>':''}</p>
     <div class="grid g2">
       <div class="sec" style="margin:0"><h4>Grammar</h4><h3>${p.g.t}</h3><p class="muted" style="font-size:13px">${p.g.sum}</p><button class="btn sm ghost" style="margin-top:10px" data-go2="grammar|${p.g.id}">Open</button></div>
       <div class="sec" style="margin:0"><h4>Words</h4><h3>${p.cat.cat}</h3><p class="muted" style="font-size:13px">${p.cat.words.length} words</p><button class="btn sm ghost" style="margin-top:10px" data-go2="vocab|${p.cat.cat}">Open</button></div>
       <div class="sec" style="margin:0"><h4>Story</h4><h3>${p.st.en}</h3><p class="muted" style="font-size:13px">${p.st.lvl}</p><button class="btn sm ghost" style="margin-top:10px" data-go2="stories|${p.st.id}">Read</button></div>
       <div class="sec" style="margin:0"><h4>Talk</h4><h3>${p.cv.t}</h3><p class="muted" style="font-size:13px">${p.cv.lvl}</p><button class="btn sm ghost" style="margin-top:10px" data-go2="conversa|${p.cv.id}">Start</button></div>
     </div>
     <button class="btn full" style="margin-top:14px" id="finishLesson">Mark today's lesson done (+10 XP)</button>
   </div>
   <div class="note">Tap any Hebrew word, anywhere, to hear it and see its meaning. Toggle the vowel marks at the top of each learning screen.</div>`;

/* COURSE: combines methods per chapter, ordered path */
function vCourse(){
  if(route.item){
    const c=GRAMMAR.find(x=>''+x.id===''+route.item);if(!c)return vCourseList();
    const cat=VOCAB.find(v=>v.lvl===c.lvl)||VOCAB[0];
    const story=STORIES.find(s=>s.lvl===c.lvl);
    const pr=PRACTICE.find(p=>p.ch===c.id);
    return `<button class="back" data-back="course">← all lessons</button>
     <div class="topbar"><div><h1>${c.t}</h1><div class="lead">${lvlBadge(c.lvl)} · a full lesson, not only grammar</div></div></div>
     <div class="sec"><h4>Step 1 · Learn the rule</h4>${c.stages.map((s,i)=>stageHTML(s,i)).join('')}${rateRow(c.id)}</div>
     <div class="sec"><h4>Step 2 · Words for this level</h4><p class="muted" style="font-size:13px;margin-bottom:8px">A matching word set. Open the full category to mark and practise.</p>
       ${cat.words.slice(0,6).map(w=>`<div class="row" style="gap:10px;margin-bottom:5px">${speakBtn(w[0][0])}${hebClick(w[0][0],w[0][1])} <span class="tl">${w[1]}</span> <span class="muted">· ${w[2]}</span></div>`).join('')}
       <button class="btn sm ghost" style="margin-top:8px" data-go2="vocab|${cat.cat}">Open ${cat.cat}</button></div>
     ${story?`<div class="sec"><h4>Step 3 · Read in context</h4><p class="muted" style="font-size:13px">"${story.en}" uses this level. Read it with audio and a short quiz.</p><button class="btn sm ghost" style="margin-top:8px" data-go2="stories|${story.id}">Read the story</button></div>`:''}
     ${pr?`<div class="sec"><h4>Step 4 · Practise (type your answers)</h4><p class="muted" style="font-size:13px">Typed exercises that check what you wrote.</p><button class="btn sm ghost" style="margin-top:8px" data-go2="practice|${pr.ch}">Practise chapter ${pr.ch}</button></div>`:''}
     <div class="sec"><h4>Step 5 · Speak it</h4><p class="muted" style="font-size:13px">Try a conversation at this level, or free chat.</p><button class="btn sm ghost" style="margin-top:8px" data-go2="conversa|free">Open Conversa</button></div>`;
  }
  return vCourseList();
}
function vCourseList(){
  return `<h1>Course</h1><div class="lead">The path, in order. Each lesson blends rule, words, a story, typed practice, and speaking.</div>
   ${GRAMMAR.map(c=>{const done=(S.grammar[c.id]||0)>=4;
     return `<div class="item ${done?'done':''}" data-course="${c.id}"><div class="meta"><div class="t">${c.id}. ${c.t} ${done?'<span class="ans-ok" style="font-size:12px">✓</span>':''}</div><div class="muted" style="font-size:12.5px">${c.sum}</div></div><div class="row">${lvlBadge(c.lvl)}<span class="chev">›</span></div></div>`;}).join('')}`;
}
function stageHTML(s,i){
  let body='';
  if(s.p)body=`<p>${s.p}</p>`;
  if(s.tbl)body=`<table><tbody>${s.tbl.map(r=>`<tr>${r.map(c=>Array.isArray(c)?`<td>${hebClick(c[0],c[1])}</td>`:/[\u0590-\u05FF]/.test(c)?`<td>${hebClick(c)}</td>`:`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  if(s.ex)body=s.ex.map(e=>`<div class="row" style="gap:10px;margin-bottom:6px">${speakBtn(e[0][0])}${hebClick(e[0][0],e[0][1])} <span class="tl">${e[1]}</span> <span class="muted">· ${e[2]}</span></div>`).join('');
  return `<div class="stage"><div class="n">${i+1}</div><div style="flex:1"><h3>${s.h}</h3>${body}</div></div>`;
}
function rateRow(id){const v=S.grammar[id]||0;
  return `<div class="row spread" style="margin-top:12px"><div class="rate" data-rate="${id}"><span class="muted" style="font-size:12px;margin-inline-end:4px">How confident?</span>${[1,2,3,4,5].map(n=>`<b class="${v>=n?'on':''}" data-n="${n}">${n}</b>`).join('')}</div></div>`;
}

/* GRAMMAR: list -> detail with stages */
function vGrammar(){
  if(route.item){
    const c=GRAMMAR.find(x=>''+x.id===''+route.item);if(!c)return grammarList();
    return `<button class="back" data-back="grammar">← all topics</button>
     <div class="topbar"><div><h1>${c.t}</h1><div class="lead">${lvlBadge(c.lvl)} · chapter ${c.id} of ${GRAMMAR.length}</div></div>${nikToggle()}</div>
     <div class="sec">${c.stages.map((s,i)=>stageHTML(s,i)).join('')}${rateRow(c.id)}</div>
     <div class="row" style="gap:8px">${c.id>1?`<button class="btn ghost sm" data-go2="grammar|${c.id-1}">← previous</button>`:''}${c.id<GRAMMAR.length?`<button class="btn sm" data-go2="grammar|${c.id+1}">next topic →</button>`:''}</div>`;
  }
  return grammarList();
}
function grammarList(){
  const groups={A1:[],A2:[],B1:[],B2:[]};
  GRAMMAR.forEach(c=>groups[c.lvl].push(c));
  return `<div class="topbar"><div><h1>Grammar</h1><div class="lead">${GRAMMAR.length} topics, A1 to B2. Pick one to open it as its own page.</div></div>${nikToggle()}</div>
   ${Object.keys(groups).filter(k=>groups[k].length).map(k=>`<h2>${k}</h2>${groups[k].map(c=>{const done=(S.grammar[c.id]||0)>=4;

}

/* VOCAB: categories -> word list with mark, practice, add */
function vVocab(){
  if(route.item){
    if(route.item==='__add__')return vocabAdd();
    if(route.sub==='practice')return vocabPractice(route.item);
    return vocabCategory(route.item);
  }
  const custom=S.customVocab.length;
  return `<div class="topbar"><div><h1>Vocabulary</h1><div class="lead">${vCount()} learned across ${VOCAB.length} categories${custom?` (+${custom} of your own)`:''}.</div></div>${nikToggle()}</div>
   <div class="row" style="margin-bottom:14px"><button class="btn sm" data-vocab-add="1">+ Add a word</button></div>
   ${VOCAB.map(c=>{const known=c.words.filter((w,i)=>S.vocab[c.cat+':'+i]).length;
     return `<div class="item" data-cat="${encodeURIComponent(c.cat)}"><div class="meta"><div class="t">${c.cat}</div><div class="muted" style="font-size:12.5px">${c.words.length} words · ${known} known</div></div><div class="row">${lvlBadge(c.lvl)}<span class="chev">›</span></div></div>`;}).join('')}
   ${custom?`<div class="item" data-cat="${encodeURIComponent('My words')}"><div class="meta"><div class="t">My words</div><div class="muted" style="font-size:12.5px">${custom} words you added</div></div><span class="chev">›</span></div>`:''}`;
}
function catWords(name){
  if(name==='My words')return {cat:'My words',lvl:'',words:S.customVocab.map(w=>[[w.v,w.p||''],w.tl,w.en,w.it||''])};
  return VOCAB.find(c=>c.cat===name);
}
function vocabCategory(encName){
  const name=decodeURIComponent(encName);const c=catWords(name);if(!c)return vVocab();
  return `<button class="back" data-back="vocab">← all categories</button>
   <div class="topbar"><div><h1>${c.cat}</h1><div class="lead">${c.words.length} words ${c.lvl?'· '+c.lvl:''}</div></div>${nikToggle()}</div>
   <div class="row" style="margin-bottom:12px"><button class="btn sm" data-practice-cat="${encName}">Practise this set</button></div>
   ${c.words.map((w,i)=>{const key=c.cat+':'+i;const done=S.vocab[key];
     return `<div class="item ${done?'done':''}" style="cursor:default"><div class="row" style="gap:12px">${speakBtn(w[0][0]||w[0])}<div class="meta"><div>${hebClick(w[0][0]||w[0],w[0][1])}</div><div class="tl">${w[1]}</div></div></div>

       <button class="btn ${done?'ghost':''} sm" data-vocab-key="${encodeURIComponent(key)}">${done?'✓':'learn'}</button></div></div>`;}).join('')}`;
}
function vocabPractice(encName){

function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}

/* normalize for answer checking: strip nikud, dashes, spaces case */
function norm(s){return stripN(s).toLowerCase().replace(/[\u2013\u2014'"`.,!?]/g,'').replace(/\s+/g,' ').trim();}
function checkPractice(ch,i){
  const ex=PRACTICE.find(p=>p.ch===ch);const it=ex.items[i];
  const inp=document.querySelector(`[data-pi="${ch}|${i}"]`);const fb=document.getElementById('pf-'+ch+'-'+i);
  const got=norm(inp.value);const ok=it.a.some(a=>norm(a)===got||norm(a).replace(/-/g,'')===got.replace(/-/g,''));
  if(ok){fb.innerHTML='<span class="ans-ok">Correct ✓</span>';addXP(3);touchDay();save();}
  else{fb.innerHTML='<span class="ans-bad">Not yet. A correct answer: '+it.a[0]+'</span>';}
}

/* vocab practice engine */
let vp={list:[],idx:0,score:0};
function startVocabPractice(name){
  const c=catWords(name);if(!c)return;
  vp={list:shuffle(c.words.map((w,i)=>({v:w[0][0]||w[0],p:w[0][1],tl:w[1],en:w[2]}))),idx:0,score:0};
  renderVP();
}
function renderVP(){
  const card=document.getElementById('vpCard');if(!card)return;
  if(vp.idx>=vp.list.length){card.innerHTML=`<h3>Done. ${vp.score}/${vp.list.length} correct.</h3><button class="btn sm" id="vpAgain" style="margin-top:10px">Again</button>`;
    document.getElementById('vpAgain').onclick=()=>{startVocabPractice(decodeURIComponent(route.item));};return;}
  const w=vp.list[vp.idx];
  card.innerHTML=`<div class="faint" style="font-size:12px">${vp.idx+1} / ${vp.list.length}</div>
   <div style="text-align:center;margin:14px 0"><span class="heb lg">${H(w.v,w.p)}</span> ${speakBtn(w.v)}</div>
   <label>Type the English meaning (or the transliteration)</label><input class="inp" id="vpIn" placeholder="meaning…">
   <div class="row" style="margin-top:10px;gap:8px"><button class="btn sm" id="vpCheck">check</button><button class="btn ghost sm" id="vpSkip">skip</button></div>
   <div class="feedback" id="vpFb"></div>`;
  const inp=document.getElementById('vpIn');inp.focus();inp.onkeydown=e=>{if(e.key==='Enter')vpCheck();};
  document.getElementById('vpCheck').onclick=vpCheck;
  document.getElementById('vpSkip').onclick=()=>{vp.idx++;renderVP();};
  function vpCheck(){const got=norm(inp.value);const ok=norm(w.en).includes(got)&&got.length>1||norm(w.tl)===got;
    const fb=document.getElementById('vpFb');
    if(ok){fb.innerHTML='<span class="ans-ok">✓ '+w.en+'</span>';vp.score++;addXP(2);}
    else fb.innerHTML='<span class="ans-bad">'+w.en+' ('+w.tl+')</span>';
    setTimeout(()=>{vp.idx++;save();renderVP();},900);}
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* word popover */
function lexLookup(word){
  const bare=stripN(word);
  for(const c of VOCAB)for(const w of c.words){if(stripN(w[0][0])===bare||(w[0][1]&&w[0][1]===bare))return {tl:w[1],en:w[2]};}
  for(const v of VERBS){if(stripN(v.inf[0])===bare)return {tl:'',en:v.en};
    for(const grp of[v.present,v.past,v.future])for(const r of grp){if(stripN(r[1][0])===bare)return {tl:'',en:v.en+' ('+r[0]+')'};}}
  return null;
}
function wordPopover(word,e){
  const pop=document.getElementById('pop');const info=lexLookup(word);
  pop.innerHTML=`<div class="row spread"><span class="hw">${word}</span><button class="spk" id="popSpk">♪</button></div>${info?`<div class="tl" style="margin-top:6px">${info.tl||''}</div><div class="en">${info.en}</div>`:'<div class="muted" style="margin-top:6px;font-size:12.5px">Tap to hear it.</div>'}`;
  const x=Math.min(e.clientX, window.innerWidth-280);const y=e.clientY+14;
  pop.style.left=x+'px';pop.style.top=y+'px';pop.classList.add('show');
  document.getElementById('popSpk').onclick=()=>speak(word);
  setTimeout(()=>{document.addEventListener('click',hidePop,{once:true});},10);
  function hidePop(){pop.classList.remove('show');}
}

/* ===================================================================
   AI: conversa + writing feedback
=================================================================== */
function primeChat(){
  if(route.section!=='conversa'||!route.item)return;
  const sc=CONVERSA.find(c=>c.id===route.item);if(!sc)return;
  if(!chat.length||chat.__id!==sc.id){chat=[{role:'assistant',content:sc.open[0]}];chat.__id=sc.id;}
  renderChat();
}
function renderChat(){const c=document.getElementById('chat');if(!c)return;
  c.innerHTML=chat.map(m=>`<div class="msg ${m.role==='assistant'?'ai':'me'}">${hebClick(m.display||m.content)}</div>`).join('')+(busy?'<div class="typing">…</div>':'');
  // rebind word clicks inside chat
  c.querySelectorAll('.w').forEach(el=>el.onclick=ev=>{ev.stopPropagation();wordPopover(decodeURIComponent(el.dataset.word),ev);});
  c.scrollTop=c.scrollHeight;}
async function sendChat(){
  const inp=document.getElementById('cIn');const text=inp.value.trim();if(!text||busy)return;
  inp.value='';chat.push({role:'user',content:text});touchDay();addXP(2);save();renderChat();
  const sc=CONVERSA.find(c=>c.id===route.item);const key=S.cfg&&S.cfg.anthropicKey;
  if(!key){chat.push({role:'assistant',content:'(הוֹסֵף מַפְתֵּחַ בְּהַגְדָּרוֹת)',display:'Add your Anthropic key in Settings for live replies.'});renderChat();return;}
  busy=true;renderChat();
  const sys=`${sc.char} You are speaking with Vincenzo. Reply ONLY in modern spoken Hebrew${sc.free?'':' at '+sc.lvl+' level'}, short and natural (1-2 sentences). Address him with masculine forms. If he makes a clear mistake, model the correct form briefly. Do not translate unless asked.`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,messages:chat.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content}))})});
    const d=await r.json();busy=false;
    const txt=(d.content&&d.content.filter(x=>x.type==='text').map(x=>x.text).join(' '))||'(...)';
    chat.push({role:'assistant',content:txt});renderChat();
  }catch(e){busy=false;chat.push({role:'assistant',content:'(שְׁגִיאָה)',display:'Connection error. Check your key and network.'});renderChat();}
}
async function writeFeedback(text){
  const fb=document.getElementById('wFb');const key=S.cfg&&S.cfg.anthropicKey;
  if(!text.trim()){fb.textContent='Write something first.';return;}
  if(!key){fb.innerHTML='<span class="muted">Add your Anthropic key in Settings to get feedback.</span>';return;}
  fb.textContent='Reading your text…';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        system:"You are a warm Hebrew tutor for an Italian beginner (A1-A2, male). The user writes Hebrew. Reply in English. Give: (1) a corrected version of their Hebrew, (2) 2-3 short bullet notes on the main fixes in plain language, (3) one encouraging line. Keep it brief.",
        messages:[{role:'user',content:text}]})});
    const d=await r.json();
    const txt=(d.content&&d.content.filter(x=>x.type==='text').map(x=>x.text).join(' '))||'(no response)';
    fb.innerHTML=txt.replace(/\n/g,'<br>');
  }catch(e){fb.textContent='Connection error. Check your key.';}
}

/* toast */
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}
