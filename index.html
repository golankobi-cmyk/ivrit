  key:"מְבַשֵּׁל · כּוֹתֵב · קוֹרֵא · רוֹצֶה · יוֹדֵעַ · יָכוֹל"},
 {id:13,chap:3,title:"שְׁלִילָה: לֹא וְאֵין",sub:"A1.2",lvl:"A1",vocab:"Common adjectives",grammar:3,story:null,
  intro:"Negation in Hebrew is beautifully simple: put לֹא before the verb. For 'there is not', use אֵין.",
  goals:["Negate any present-tense sentence","Use יֵשׁ לִי / אֵין לִי for having/not having","Understand the difference between לֹא and אֵין"],
  key:"לֹא אוֹכֵל · לֹא גָּר · אֵין לִי · יֵשׁ לִי",
  teach:[
   {h:"לֹא — negate any verb",p:"Put לֹא directly before the verb. Nothing else changes. It is exactly like Italian 'non' — same position, same simplicity."},
   {h:"Examples with לֹא",ex:[["אֲנִי לֹא מְדַבֵּר גֶּרְמָנִית","ani lo medaber germanit","I don't speak German"],["קוֹבִּי לֹא אוֹכֵל בָּשָׂר","Kobi lo ochel basar","Kobi doesn't eat meat"],["אֲנַחְנוּ לֹא גָּרִים בְּרוֹמָא","anachnu lo garim be-Roma","We don't live in Rome"]]},
   {h:"יֵשׁ / אֵין — there is / there is not",p:"These are the most common words in spoken Hebrew. יֵשׁ לִי = I have (there is to me). אֵין לִי = I don't have. They work with any preposition."},
   {h:"יש/אין in use",tbl:[["יֵשׁ קָפֶה","yesh kafe","There is coffee"],["אֵין חָלָב","ein chalav","There is no milk"],["יֵשׁ לִי שְׁאֵלָה","yesh li she'ela","I have a question"],["אֵין לִי זְמַן עַכְשָׁו","ein li zman achshav","I have no time right now"]]},
  ]},

 {id:14,chap:4,title:"הַמִּשְׁפָּחָה שֶׁלִּי",sub:"A1.2",lvl:"A1",vocab:"Family & people",grammar:11,story:"s2",

  key:"אַבָּא · אִמָּא · אָח · אָחוֹת · בֵּן · בַּת · דּוֹד · דּוֹדָה"},
 {id:15,chap:4,title:"כִּינּוּיֵי הַגּוּף · Personal Pronouns",sub:"A1.2",lvl:"A1",vocab:"Pronouns & function",grammar:10,story:null,
  intro:"The 8 personal pronouns in Hebrew, plus how they affect verb and adjective forms.",
  goals:["Know all 8 pronouns (אני, אתה, את, הוא, היא, אנחנו, אתם, הם)","Use them correctly in sentences","Understand formal vs. informal you"],
  key:"אֲנִי · אַתָּה · אַת · הוּא · הִיא · אֲנַחְנוּ · אַתֶּם · הֵם",
  teach:[
   {h:"The 8 personal pronouns",tbl:[["אֲנִי","ani","I"],["אַתָּה","ata","you (m.sg)"],["אַת","at","you (f.sg)"],["הוּא","hu","he / it (m)"],["הִיא","hi","she / it (f)"],["אֲנַחְנוּ","anachnu","we"],["אַתֶּם","atem","you (m.pl)"],["הֵם / הֵן","hem / hen","they (m/f)"]]},
   {h:"No 'to be' in the present — again",p:"Pronouns + noun/adjective = a complete sentence. אֲנִי רָעֵב (I hungry) = I am hungry. הִיא יָפָה (she beautiful) = she is beautiful. The copula 'is/am/are' is absent and understood."},
   {h:"אַתָּה vs. אַת",p:"Hebrew distinguishes you-masculine (אַתָּה) from you-feminine (אַת). This affects the verb form you use. Speaking to a man: מָה אַתָּה רוֹצֶה? Speaking to a woman: מָה אַת רוֹצָה?"},
  ]},
 {id:16,chap:4,title:"שֶׁלִּי, שֶׁלְּךָ, שֶׁלּוֹ · Possession",sub:"A1.2",lvl:"A1",vocab:"Family & people",grammar:11,story:"s3",
  intro:"Possession in Hebrew uses the word שֶׁל (of). It chains with pronouns to make my/your/his/her.",
  goals:["Use שֶׁלִּי/שֶׁלְּךָ/שֶׁלָּהּ etc.","Construct possessive phrases with any noun","Understand the difference between שֶׁל and יֵשׁ לִי"],
  key:"הַבַּיִת שֶׁלִּי · הַכֶּלֶב שֶׁלּוֹ · הָאֲחוֹת שֶׁלָּהּ",
  teach:[
   {h:"The possessive: שֶׁל + pronoun",tbl:[["שֶׁלִּי","sheli","my / mine"],["שֶׁלְּךָ","shelcha","your (m)"],["שֶׁלָּךְ","shelach","your (f)"],["שֶׁלּוֹ","shelo","his"],["שֶׁלָּהּ","shelah","her"],["שֶׁלָּנוּ","shelanu","our"],["שֶׁלָּכֶם","shelachem","your (pl)"],["שֶׁלָּהֶם","shelahem","their"]]},
   {h:"Always AFTER the noun",p:"Unlike Italian, the possessive comes after the noun. Not 'my book' but 'the book of-me': הַסֵּפֶר שֶׁלִּי. The noun takes the definite article ה."},
   {h:"Examples from daily life",ex:[["הַבַּיִת שֶׁלָּנוּ בְּבֶּרְלִין","ha-bayit shelanu be-Berlin","Our house in Berlin"],["הַכֶּלֶב שֶׁל טֵרֵזָה","ha-kelev shel Teresa","Teresa's dog"],["הָאוֹכֶל שֶׁלּוֹ מְצוּיָּן","ha-ochel shelo metsuyan","His food is excellent"]]},
  ]},

 {id:18,chap:5,title:"הַבַּיִת: חֲדָרִים וְרָהִיטִים",sub:"A1.2",lvl:"A1",vocab:"Home & interior design",grammar:4,story:"s26",

  key:"מִטְבָּח · סָלוֹן · חֶדֶר שֵׁנָה · שֻׁלְחָן · כִּסֵּא · מִיטָה"},
 {id:19,chap:5,title:"הַ · The Definite Article",sub:"A1.2",lvl:"A1",vocab:"Furniture & household",grammar:5,story:null,
  intro:"Hebrew has no indefinite article. The definite 'the' is a prefix ה attached directly to the word.",
  goals:["Attach ה to any noun","Know how ה merges with common prepositions","Understand when to use the definite article"],
  key:"בַּיִת → הַבַּיִת · בְּ + הַ = בַּ · לְ + הַ = לַ",
  teach:[
   {h:"The prefix ה (ha-)",p:"'The' in Hebrew is never a separate word. It attaches as a prefix: house = בַּיִת, the house = הַבַּיִת. The vowel changes slightly after certain letters, but the principle is always the same."},
   {h:"ה merges with prepositions",tbl:[["בְּ + הַ","= בַּ","in the"],["לְ + הַ","= לַ","to the"],["מִ + הַ","= מֵהַ","from the"],["כְּ + הַ","= כַּ","like the"]]},
   {h:"Examples",ex:[["אֲנִי הוֹלֵךְ לַמִּטְבָּח","ani holech la-mitbach","I go to the kitchen"],["הַסֵּפֶר עַל הַשֻּׁלְחָן","ha-sefer al ha-shulchan","The book is on the table"],["הוּא יוֹצֵא מֵהַבַּיִת","hu yotze me-ha-bayit","He leaves the house"]]},
   {h:"Hebrew has NO indefinite article",p:"'A house' is simply בַּיִת. 'A dog' is כֶּלֶב. No word for 'a/an' — the noun on its own is already indefinite."},
  ]},
 {id:20,chap:5,title:"מִין: זָכָר וּנְקֵבָה",sub:"A1.2",lvl:"A1",vocab:"Bathroom & bedroom",grammar:4,story:null,
  intro:"Every Hebrew noun is masculine or feminine, like Italian. Most feminine nouns end in ה- or ת-.",
  goals:["Identify noun gender from its ending","Know the most common exceptions","Use gender correctly with adjectives and verbs"],
  key:"בַּיִת (m) · דִּירָה (f) · שֻׁלְחָן (m) · מִיטָה (f)",
  teach:[
   {h:"Gender in Hebrew is like Italian — but stricter",p:"Hebrew nouns are either masculine or feminine. There is no neutral. This affects every adjective, every verb, every possessive. The good news: the pattern is learnable."},
   {h:"Feminine endings — the two main signals",tbl:[["Ends in ה-","דִּירָה, מִיטָה, שָׁנָה","apartment, bed, year"],["Ends in ת-","מַחְשֵׁבֶת, דַּעַת","computer, opinion"],["Exception: masculine ה","שֻׁלְחָן is m, בַּיִת is m","learn as vocabulary"]]},
   {h:"Plural endings signal gender too",p:"Masculine plural: ־ִים (-im). Feminine plural: ־וֹת (-ot). בַּיִת → בָּתִּים (m). מִיטָה → מִיטוֹת (f). Exceptions exist (שֻׁלְחָנוֹת is masculine despite ־וֹת) — learn as you go."},
  ]},
 {id:21,chap:5,title:"שֵׁמוֹת תֹּאַר: הַסְכָּמָה",sub:"A1.2",lvl:"A1",vocab:"Common adjectives",grammar:6,story:null,
  intro:"Adjectives follow the noun in Hebrew and must agree with it in gender, number, and definiteness.",
  goals:["Place adjectives after nouns","Match adjective to noun gender and number","Double the ה when noun is definite"],
  key:"בַּיִת גָּדוֹל · דִּירָה גְּדוֹלָה · בָּתִּים גְּדוֹלִים",
  teach:[
   {h:"Adjective AFTER the noun — not before",p:"In Italian: grande casa. In Hebrew: בַּיִת גָּדוֹל (house big). The adjective always follows the noun. Learn this by heart — it is the opposite of English."},
   {h:"Agreement: gender and number",tbl:[["m.sg","בַּיִת גָּדוֹל","a big house"],["f.sg","דִּירָה גְּדוֹלָה","a big apartment"],["m.pl","בָּתִּים גְּדוֹלִים","big houses"],["f.pl","דִּירוֹת גְּדוֹלוֹת","big apartments"]]},
   {h:"Definite: double the ה",p:"If the noun is definite (has ה), the adjective also takes ה: הַבַּיִת הַגָּדוֹל (the big house). Both noun and adjective carry the definite article. Forget one ה and the phrase sounds wrong."},
   {h:"Common adjectives to learn now",tbl:[["גָּדוֹל/גְּדוֹלָה","gadol/gdola","big"],["קָטָן/קְטַנָּה","katan/ktana","small"],["יָפֶה/יָפָה","yafe/yafa","beautiful"],["טוֹב/טוֹבָה","tov/tova","good"],["חָדָשׁ/חֲדָשָׁה","chadash/chadasha","new"],["יָשָׁן/יְשָׁנָה","yashan/yeshana","old (thing)"]]},
  ]},

 {id:22,chap:6,title:"אֹכֶל וּמַשְׁקָאוֹת · Food & Drink",sub:"A1.3",lvl:"A1",vocab:"Food & drink",grammar:5,story:"s7",
  intro:"Food is culture. Build the vocabulary to shop, cook, order, and describe what you eat.",
  goals:["Name 25 common foods and drinks","Use food vocabulary in present tense sentences","Describe what you like, eat, and cook"],
  key:"לֶחֶם · גְּבִינָה · בֵּיצָה · עַגְבָנִיָּה · פַּסְטָה · שֶׁמֶן זַיִת"},
 {id:23,chap:6,title:"אֶת: הַמַּפְעִיל הַיָּשִׁיר",sub:"A1.3",lvl:"A1",vocab:"Food & drink",grammar:5,story:"s27",
  intro:"The word אֶת marks definite direct objects. It has no English translation — but you will feel its absence immediately if you leave it out.",
  goals:["Use אֶת before definite direct objects","Know when NOT to use it (indefinite objects)","Apply the rule in food and daily sentences"],
  key:"אֲנִי אוֹכֵל אֶת הַסָּלָט · אֲנִי אוֹהֵב אֶת קוֹבִּי",
  teach:[
   {h:"The rule",p:"אֶת appears before definite direct objects only. Definite = has ה (the), is a proper name, or is a pronoun. If the object is indefinite (no 'the'), no אֶת."},
   {h:"With / without אֶת",tbl:[["אֲנִי אוֹכֵל סָלָט","ani ochel salat","I eat a salad — NO אֶת (indefinite)"],["אֲנִי אוֹכֵל אֶת הַסָּלָט","ani ochel et ha-salat","I eat the salad — WITH אֶת"],["אֲנִי אוֹהֵב אֶת קוֹבִּי","ani ohev et Kobi","I love Kobi — WITH אֶת (proper name)"],["אֲנִי אוֹהֵב מוּסִיקָה","ani ohev musika","I love music — NO אֶת (indefinite)"]]},
   {h:"The test",p:"Ask: is this object specific and definite? Yes → use אֶת. No → skip it. With time, it becomes instinctive."},
  ]},

 {id:29,chap:7,title:"שְׁגָרַת הַיּוֹם · Daily Routine",sub:"A1.3",lvl:"A1",vocab:"Verbs of daily life",grammar:3,story:"s24",

  key:"מִתְעוֹרֵר · קָם · מִתְקַלֵּחַ · מִתְלַבֵּשׁ · יוֹצֵא"},
 {id:30,chap:7,title:"יֵשׁ לִי / אֵין לִי · Having & Not Having",sub:"A1.3",lvl:"A1",vocab:"Pronouns & function",grammar:11,story:null,
  intro:"Hebrew has no verb 'to have'. Possession is expressed with יֵשׁ לִי — there is to me.",
  goals:["Use יֵשׁ לִי for having something","Use אֵין לִי for not having","Use all preposition-pronoun forms"],
  key:"יֵשׁ לִי · יֵשׁ לְךָ · יֵשׁ לוֹ · אֵין לָנוּ",
  teach:[
   {h:"No verb 'to have'",p:"Where Italian says 'ho una macchina' (I have a car), Hebrew says יֵשׁ לִי מְכוֹנִית (there is to me a car). The possession structure uses the preposition לְ (to) plus a pronoun."},
   {h:"All forms",tbl:[["יֵשׁ לִי","yesh li","I have"],["יֵשׁ לְךָ","yesh lecha","you have (m)"],["יֵשׁ לָךְ","yesh lach","you have (f)"],["יֵשׁ לוֹ","yesh lo","he has"],["יֵשׁ לָהּ","yesh la","she has"],["יֵשׁ לָנוּ","yesh lanu","we have"],["יֵשׁ לָהֶם","yesh lahem","they have"]]},
   {h:"Negation: אֵין",p:"To negate, replace יֵשׁ with אֵין. יֵשׁ לִי כֶּלֶב (I have a dog) → אֵין לִי כֶּלֶב (I don't have a dog)."},
   {h:"Examples",ex:[["יֵשׁ לִי שְׁאֵלָה","yesh li she'ela","I have a question"],["אֵין לִי זְמַן","ein li zman","I have no time"],["יֵשׁ לָנוּ בַּיִת בְּבָּרָנְדֶּנְבּוּרְג","yesh lanu bayit be-Brandenburg","We have a house in Brandenburg"]]},
  ]},
 /* ── CHAPTER 8: Past Tense ── */
 {id:31,chap:8,title:"עָבַר: צוּרַת אֲנִי",sub:"A1.4",lvl:"A1",vocab:"Verbs of daily life",grammar:8,story:null,
  intro:"The past tense is built with suffixes. Master the 'I' form first — it ends in ־תִּי and applies to almost every verb.",
  goals:["Use the 1sg past suffix ־תִּי with any verb","Talk about what you did yesterday","Build a 3-sentence narrative in the past"],
  key:"אָכַלְתִּי · שָׁתִיתִי · הָלַכְתִּי · עָשִׂיתִי · דִּיבַּרְתִּי",
  teach:[
   {h:"The 1sg suffix: ־תִּי (-ti)",p:"Add ־תִּי to the 3sg-male (he) base form to get 'I did'. This works for almost every regular Pa'al verb. לָמַד → לָמַדְתִּי (I studied). אָכַל → אָכַלְתִּי (I ate). הָלַךְ → הָלַכְתִּי (I went)."},
   {h:"High-frequency 1sg past forms",tbl:[["אָכַלְתִּי","achalti","I ate"],["שָׁתִיתִי","shatiti","I drank"],["הָלַכְתִּי","halachti","I went"],["עָשִׂיתִי","asiti","I did / made"],["רָאִיתִי","ra'iti","I saw"],["אָמַרְתִּי","amarti","I said"],["בִּיקַּרְתִּי","bikkarti","I visited"],["דִּיבַּרְתִּי","dibarti","I spoke"]]},
   {h:"Simple past narrative",ex:[["אֶתְמוֹל אָכַלְתִּי שַׁקְשׁוּקָה","etmol achalti shakshuka","Yesterday I ate shakshuka"],["הָלַכְתִּי לַשּׁוּק בְּבֹּקֶר","halachti la-shuk ba-boker","I went to the market in the morning"],["שָׁתִיתִי קָפֶה עִם קוֹבִּי","shatiti kafe im Kobi","I drank coffee with Kobi"]]},
  ]},
 {id:32,chap:8,title:"עָבַר: כָּל הַצּוּרוֹת",sub:"A1.4",lvl:"A1",vocab:"Time expressions",grammar:8,story:"s8",
  intro:"The full Pa'al past conjugation. Six suffixes cover all persons. Learn them as a table and they will click into place.",
  goals:["Conjugate any regular Pa'al verb in the past","Use all six person forms","Tell a story involving multiple people"],
  key:"לָמַדְתִּי · לָמַדְתָּ · לָמַד · לָמְדָה · לָמַדְנוּ · לָמְדוּ",
  teach:[
   {h:"Full Pa'al past — root ל-מ-ד",tbl:[["I","לָמַדְתִּי","lamadti"],["you m","לָמַדְתָּ","lamadta"],["you f","לָמַדְתְּ","lamadt"],["he","לָמַד","lamad"],["she","לָמְדָה","lamda"],["we","לָמַדְנוּ","lamadnu"],["you pl","לְמַדְתֶּם","lemadtem"],["they","לָמְדוּ","lamdu"]]},
   {h:"The pattern",p:"1sg: ־תִּי, 2msg: ־תָּ, 2fsg: ־תְּ, 3msg: bare root, 3fsg: ־ָה, 1pl: ־נוּ, 2pl: ־תֶּם, 3pl: ־וּ. The hardest ones are 3msg (bare) and 3fsg (the ה suffix). Everything else follows a clear pattern."},
   {h:"With time expressions",ex:[["בֶּעָרֶב אָכַלְנוּ יַחַד","ba-erev achalnu yachad","In the evening we ate together"],["הֵם דִּיבְּרוּ שָׁעָה שְׁלֵמָה","hem dibberu sha'a shlema","They spoke for a whole hour"],["טֵרֵזָה שָׁלְחָה תְּמוּנָה","Teresa shlacha tmuna","Teresa sent a photo"]]},
  ]},
 {id:33,chap:8,title:"פְּעָלִים חֶרְגִּים: הָלַךְ, בָּא, נָתַן",sub:"A1.4",lvl:"A1",vocab:"Verbs of movement",grammar:8,story:null,

 {id:36,chap:9,title:"עָתִיד: מַכִּירִים אֶת הַמִּבְנֶה",sub:"A1.4",lvl:"A1",vocab:"Travel & places",grammar:9,story:null,
  intro:"The future uses prefixes. The root stays in the middle; א/י/נ/ת before it marks who is doing it.",
  goals:["Recognise future tense forms","Use the 1sg future (אֶ- prefix)","Contrast future with present and past"],
  key:"אֵלֵךְ · יֵלֵךְ · נֵלֵךְ · אֹכַל · יֹאכַל",
  teach:[
   {h:"The future: prefixes, not suffixes",p:"The past used suffixes (at the end). The future uses prefixes (at the start). Root ל-כ-ת: אֵלֵךְ (I will go), תֵּלֵךְ (you m will go), יֵלֵךְ (he will go), תֵּלֵכִי (you f), נֵלֵךְ (we), יֵלְכוּ (they)."},
   {h:"Future prefixes — Pa'al pattern",tbl:[["I","אֶ-","echtov (I will write)"],["you m","תִּ-","tichtov"],["you f","תִּ-...-ִי","tichtevi"],["he","יִ-","yichtov"],["she","תִּ-","tichtov"],["we","נִ-","nichtov"],["they","יִ-...-וּ","yichtevu"]]},
   {h:"The spoken shortcut",p:"In everyday speech, Israelis often use רוֹצֶה/צָרִיךְ/הוֹלֵךְ + infinitive rather than conjugating the future. אֲנִי הוֹלֵךְ לֶאֱכֹל (I'm going to eat) feels more natural than אֹכַל in casual conversation."},
  ]},
 {id:37,chap:9,title:"עָתִיד: כָּל הַצּוּרוֹת",sub:"A1.4",lvl:"A1",vocab:"Travel & places",grammar:9,story:null,
  intro:"The complete future conjugation for regular Pa'al verbs. The most important pattern is 1sg and 3pl.",
  goals:["Conjugate any regular Pa'al verb in the future","Make plans and promises","Use future with time expressions"],
  key:"אֶלְמַד · תִּלְמַד · יִלְמַד · נִלְמַד · יִלְמְדוּ"},
 {id:38,chap:9,title:"רוֹצֶה / צָרִיךְ / יָכוֹל + שֵׁם פֹּעַל",sub:"A1.4",lvl:"A1",vocab:"Verbs of daily life",grammar:9,story:null,
  intro:"The most natural way to talk about intentions in Hebrew: modal verb + infinitive. This is how Israelis actually speak.",
  goals:["Use רוֹצֶה לְ... / צָרִיךְ לְ... / יָכוֹל לְ...","Make a 5-sentence plan for tomorrow","Combine modals with negation (לֹא רוֹצֶה)"],
  key:"אֲנִי רוֹצֶה לִנְסֹעַ · אֲנִי צָרִיךְ לִקְנוֹת · אֲנִי יָכוֹל לַעֲזֹר",
  teach:[
   {h:"Modal + infinitive = the natural future",p:"Rather than conjugating the full future tense, spoken Hebrew uses: modal verb (in present, agreeing with subject) + infinitive. This is the pattern you will hear 80% of the time."},
   {h:"The three main modals",tbl:[["רוֹצֶה לְ","rotze le","I want to (m.sg)"],["צָרִיךְ לְ","tzarich le","I need to (m.sg)"],["יָכוֹל לְ","yachol le","I can / am able to (m.sg)"]]},
   {h:"Agreement: the modal changes form",p:"The modal agrees with the subject. אֲנִי רוֹצֶה (m) / אֲנִי רוֹצָה (f) / אֲנַחְנוּ רוֹצִים. The infinitive stays the same."},
   {h:"In practice",ex:[["אֲנִי רוֹצֶה לִנְסֹעַ לְתֵל אָבִיב","ani rotze linsoa le-Tel Aviv","I want to travel to Tel Aviv"],["אֲנִי לֹא יָכוֹל לָבוֹא מָחָר","ani lo yachol lavo machar","I can't come tomorrow"],["קוֹבִּי צָרִיךְ לִקְנוֹת לֶחֶם","Kobi tzarich liknot lechem","Kobi needs to buy bread"]]},
  ]},

function lessonDone(id){return !!S.course.done[id];}
function lessonUnlocked(id){return id===1||lessonDone(id-1);}
function currentLesson(){for(const l of COURSE)if(!lessonDone(l.id))return l;return COURSE[COURSE.length-1];}
function completeLesson(id){S.course.done[id]=true;const nx=COURSE.find(l=>!lessonDone(l.id));S.course.lesson=nx?nx.id:id;touchDay();addXP(15);save();}
function lessonStages(l){
  const st=[{type:'vocab'},{type:'grammar'},{type:'quiz'}];
  if(l.story)st.push({type:'story'});
  st.push({type:'drill'});
  return st;
}

/* ===================================================================
   DRILL ENGINE  (feedback-bearing, updates mastery)
=================================================================== */
let drill=null;
function startVocabDrill(items,opts){opts=opts||{};
  items=items.filter(Boolean);
  if(!items.length){toast('Nothing to practise here yet');return;}
  drill={typed:false,items:shuffle(items).slice(0,opts.max||Math.min(items.length,12)),i:0,score:0,wrong:[],answered:null,done:opts.onDone,title:opts.title||'Practice',back:opts.back||'practice'};
  go('drill');}
function startGrammarDrill(chItems,opts){opts=opts||{};
  drill={typed:true,items:shuffle(chItems).slice(0,opts.max||chItems.length),i:0,score:0,wrong:[],answered:null,done:opts.onDone,title:opts.title||'Practice',back:opts.back||'practice'};
  go('drill');}
function startVerbDrill(verbs,opts){opts=opts||{};
  verbs=(verbs||VERBS).filter(Boolean);
  const tenses=[["present","Present"],["past","Past"],["future","Future"]];
  const items=[];
  verbs.forEach(v=>{
    tenses.forEach(t=>{const rows=v[t[0]];if(!rows)return;
      rows.forEach(r=>{
        items.push({q:v.en+" \u00b7 "+t[1]+", "+r[0]+"  ("+v.inf[1]+")",a:[r[1][0],r[1][1]],hint:v.binyan+" \u00b7 root "+v.root});
      });});
  });
  if(!items.length){toast("No verbs to drill");return;}
  drill={typed:true,items:shuffle(items).slice(0,opts.max||12),i:0,score:0,wrong:[],answered:null,done:opts.onDone,title:opts.title||"Verb conjugation",back:opts.back||"practice"};
  go("drill");}
function distractors(it,n){const pool=(drill.items.length>=4?drill.items:LEX).filter(x=>x.en!==it.en);const out=[];const used={};
  while(out.length<n&&pool.length){const c=pool[Math.floor(Math.random()*pool.length)];if(!used[c.en]){used[c.en]=1;out.push(c);}if(Object.keys(used).length>=pool.length)break;}
  return out;}
function vDrill(){
  const d=drill;if(!d)return '<p>No drill.</p>';
  if(d.i>=d.items.length)return drillDone();
  const pct=Math.round(d.i/d.items.length*100);
  const head=`<div class="dprog"><button class="back" data-drill-exit="1" style="margin:0">← exit</button><div class="track"><i style="width:${pct}%"></i></div><div class="num">${d.i+1} / ${d.items.length}</div></div><div class="steplabel">${d.title}</div>`;
  if(d.typed)return head+drillTyped(d);
  return head+drillVocab(d);
}
function drillVocab(d){
  const it=d.items[d.i];const type=d.i%4;const a=d.answered;d.vkind=type;
  if(type===1){ // translation: English -> type Hebrew
    const fb=a?`<div class="banner ${a.ok?'ok':'bad'}"><span><span class="lbl">${a.ok?'נכון · correct':'לא בדיוק · not quite'}</span><br>${it.en} = ${H(it.v,it.p)} (${it.tl})</span><button class="btn sm" data-drill-next="1">Continue</button></div>`:'';
    return `<div class="qprompt"><div class="en" style="font-size:20px">${it.en}</div><div class="sub">translate · type it in Hebrew (or transliteration)</div></div>
      <input class="inp heb" id="dType" placeholder="כְּתֹב כָּאן…" ${a?'disabled':''}>
      <div class="row" style="margin-top:10px">${a?'':'<button class="btn" data-drill-check="1">check</button> <button class="btn ghost sm" data-drill-skip="1">skip</button> <button class="btn ghost sm" data-drill-hint="1">hint</button> <span class="muted" id="dHint" style="font-size:12.5px"></span>'}</div>${fb}`;
  }
  // MCQ variants
  const en2he=(type===3);
  const opts=shuffle([it,...distractors(it,3)]);
  const promptHTML = en2he
    ? `<div class="qprompt"><div class="en">${it.en}</div><div class="sub">choose the Hebrew word</div></div>`
    : (type===2
      ? `<div class="qprompt"><button class="spk" data-speak="${encodeURIComponent(it.v)}" style="margin:0 auto;width:46px;height:46px;font-size:20px">♪</button><div class="sub">listen, then choose the meaning</div></div>`
      : `<div class="qprompt"><div class="big">${H(it.v,it.p)}</div><button class="spk" data-speak="${encodeURIComponent(it.v)}" style="margin:8px auto 0">♪</button><div class="sub">choose the meaning</div></div>`);
  const optsHTML=opts.map(o=>{
    const label=en2he?H(o.v,o.p):o.en;
    let cls='opt'+(en2he?' heb':'');
    if(a){if(o.en===it.en)cls+=' ok';else if(o.en===a.chosen&&!a.ok)cls+=' bad';}
    return `<button class="${cls}" ${a?'disabled':''} data-drill-pick="${encodeURIComponent(o.en)}">${label}</button>`;
  }).join('');
  const fb=a?`<div class="banner ${a.ok?'ok':'bad'}"><span><span class="lbl">${a.ok?'נכון · correct':'לא בדיוק · not quite'}</span><br>${H(it.v,it.p)} = ${it.en}</span><button class="btn sm" data-drill-next="1">Continue</button></div>`:'';
  return promptHTML+`<div class="opts">${optsHTML}</div>${fb}`;
}
function drillTyped(d){
  const it=d.items[d.i];const a=d.answered;
  const fb=a?`<div class="banner ${a.ok?'ok':'bad'}"><span><span class="lbl">${a.ok?'נכון · correct':'לא בדיוק · not quite'}</span><br>${it.a[0]}</span><button class="btn sm" data-drill-next="1">Continue</button></div>`:'';
  return `<div class="qprompt"><div class="sub" style="font-size:15px;color:var(--paper)">${it.q}</div></div>
    <input class="inp" id="dType" placeholder="type your answer…" ${a?'disabled':''}>
    <div class="row" style="margin-top:10px">${a?'':'<button class="btn" data-drill-check="1">check</button> <button class="btn ghost sm" data-drill-hint="1">hint</button> <span class="muted" id="dHint" style="font-size:12.5px"></span>'}</div>${fb}`;
}
function drillDone(){
  const d=drill;const total=d.items.length;
  return `<div class="steplabel">${d.title}</div>
   <div class="card" style="text-align:center"><h2 style="margin-top:0">${d.score} / ${total}</h2>
   <p class="muted">${d.score===total?'Perfect.':d.score>=total*0.6?'Good work. The ones you missed are now marked weak and will come back.':'Keep going. These are now in your weak spots for review.'}</p>
   <div class="row" style="justify-content:center;margin-top:14px;gap:8px"><button class="btn sm" data-drill-again="1">Again</button><button class="btn ghost sm" data-drill-finish="1">Done</button></div></div>`;
}

    else{S.stories[story.id]=true;
    body=`<div class="steplabel">Step ${st+1} · Read in context: ${story.en}</div>
     <div class="row" style="margin-bottom:10px"><button class="btn sm" data-readall="${story.id}">▶ read aloud</button><button class="btn sm ghost" data-stopread="1">■ stop</button></div>
     <div class="card">${story.s.map(x=>`<div class="s-sent"><div class="s-txt">${hebClick(x[0][0],x[0][1])}<span class="tl">${x[1]}</span><span class="en">${x[2]}</span></div><button class="spk" title="hear this line" data-speak="${encodeURIComponent(x[0][0])}">♪</button></div>`).join('')}</div>`;}

/* mini check-in quiz: 3 questions from this lesson's words, no score */
function renderMini(lid){
  const l=COURSE.find(x=>x.id===lid);const host=document.getElementById('miniHost');if(!l||!host)return;
  const pool=catItems(l.vocab);if(pool.length<2){host.innerHTML='<div class="note">Not enough words for a quiz here. Move on.</div>';return;}
  const picks=shuffle(pool.slice()).slice(0,Math.min(3,pool.length));
  const qs=picks.map((it,i)=>{
    const en2he=(i%2===1);
    const distr=shuffle(pool.filter(x=>x.en!==it.en)).slice(0,3);
    const opts=shuffle([it,...distr]);
    return {it,en2he,opts};
  });
  host.innerHTML=qs.map((q,qi)=>{
    const prompt=q.en2he?`<div class="en" style="font-size:18px">${q.it.en}</div><div class="sub">choose the Hebrew</div>`
      :`<div class="big" style="font-size:28px">${H(q.it.v,q.it.p)}</div><button class="spk" data-speak="${encodeURIComponent(q.it.v)}" style="margin:6px auto 0">♪</button><div class="sub">choose the meaning</div>`;
    const opts=q.opts.map(o=>`<button class="opt${q.en2he?' heb':''}" data-mini="${qi}|${encodeURIComponent(o.en)}|${encodeURIComponent(q.it.en)}|${o.key}">${q.en2he?H(o.v,o.p):o.en}</button>`).join('');
    return `<div class="card" style="margin-bottom:12px"><div class="qprompt" style="margin:4px 0 12px">${prompt}</div><div class="opts">${opts}</div><div class="feedback" id="mf-${qi}" style="margin-top:8px"></div></div>`;
  }).join('')+`<div class="note">When you're done, tap <b>next step →</b> to keep going.</div>`;
  host.querySelectorAll('[data-speak]').forEach(b=>b.onclick=e=>{e.stopPropagation();speak(decodeURIComponent(b.dataset.speak));});
  host.querySelectorAll('[data-mini]').forEach(b=>b.onclick=()=>{
    const[qi,chosen,correct,key]=b.dataset.mini.split('|');const ok=decodeURIComponent(chosen)===decodeURIComponent(correct);
    const wrap=b.closest('.card');wrap.querySelectorAll('.opt').forEach(o=>{o.disabled=true;
      const oc=decodeURIComponent(o.dataset.mini.split('|')[1]);
      if(oc===decodeURIComponent(correct))o.classList.add('ok');else if(o===b&&!ok)o.classList.add('bad');});
    mAnswer(key,ok);save();
    document.getElementById('mf-'+qi).innerHTML=ok?'<span class="ans-ok">נכון · correct ✓</span>':'<span class="ans-bad">לא בדיוק · the answer is highlighted</span>';
  });
}

function advanceDialogue(){const d=dlg.d; // skip past AI turns shown automatically; prep opts when reaching a user turn
  while(dlg.i<d.turns.length && d.turns[dlg.i].who!=='Vincenzo'){dlg.i++;}

}

let scr=null;
function startScramble(){const item=SCRAMBLE_BANK[Math.floor(Math.random()*SCRAMBLE_BANK.length)];
  const words=stripN(item[0][0]).split(/\s+/).filter(Boolean);
  scr={item,words,order:shuffle(words.map((_,i)=>i)),built:[],checked:null};renderScramble();}
function renderScramble(){const host=document.getElementById('scrHost');if(!host)return;const s=scr;
  const pool=s.order.filter(i=>!s.built.includes(i));
  const builtHe=s.built.map(i=>s.words[i]).join(' ');
  const correct=s.words.join(' ');
  const ok=s.checked===true;
  host.innerHTML=`<div class="row spread" style="margin-bottom:10px"><div class="steplabel" style="margin:0">Sentence scramble</div><button class="btn ghost sm" data-scr-skip="1">↺ new sentence</button></div>
    <div class="card"><div class="muted" style="font-size:13px">${s.item[1]}</div>
      <div class="heb" dir="rtl" style="min-height:40px;border:1px dashed var(--line);border-radius:10px;padding:10px;margin:10px 0;font-size:22px;font-weight:300">${s.built.length?builtHe:'<span class="faint" style="font-size:14px">tap words below…</span>'}</div>
      <div class="chips" dir="rtl">${pool.map(i=>`<button data-scr-add="${i}" class="heb" style="font-size:18px">${s.words[i]}</button>`).join('')}</div>
      <div class="row" style="margin-top:12px;gap:8px">${s.built.length?'<button class="btn ghost sm" data-scr-undo="1">undo</button>':''}<button class="btn sm" data-scr-check="1" ${s.built.length!==s.words.length?'disabled style="opacity:.5"':''}>check</button><button class="spk" data-speak="${encodeURIComponent(s.item[0][0])}" title="hear it">♪</button></div>
      ${s.checked!=null?`<div class="banner ${ok?'ok':'bad'}" style="margin-top:12px"><span><span class="lbl">${ok?'נכון · correct':'לא בדיוק · not quite'}</span><br>${hebClick(s.item[0][0],s.item[0][1])}</span>${ok?'<button class="btn sm" data-scr-skip="1">Next →</button>':'<button class="btn sm" data-scr-reset="1">Try again</button>'}</div>`:''}
    </div>`;
  host.querySelectorAll('[data-speak]').forEach(b=>b.onclick=e=>{e.stopPropagation();speak(decodeURIComponent(b.dataset.speak));});
  host.querySelectorAll('[data-scr-add]').forEach(b=>b.onclick=()=>{if(s.checked!=null)return;s.built.push(+b.dataset.scrAdd);renderScramble();});
  const u=host.querySelector('[data-scr-undo]');if(u)u.onclick=()=>{s.built.pop();renderScramble();};
  const ch=host.querySelector('[data-scr-check]');if(ch)ch.onclick=()=>{s.checked=(builtHe===correct);if(s.checked){addXP(3);touchDay();save();}renderScramble();};
  const rs=host.querySelector('[data-scr-reset]');if(rs)rs.onclick=()=>{s.built=[];s.checked=null;renderScramble();};
  host.querySelectorAll('[data-scr-skip]').forEach(b=>b.onclick=()=>startScramble());
}

let dic=null;
function startDictation(){
  const words=learnedPool().length>=6?learnedPool():LEX;
  const wItems=shuffle(words.slice()).slice(0,8).map(it=>({he:[it.v,it.p],en:it.en,key:it.key}));
  const pItems=shuffle(DICT_PHRASES.slice()).slice(0,6).map(p=>({he:p[0],en:p[1]}));
  dic={list:shuffle(wItems.concat(pItems)),i:0,score:0,checked:null};
  renderDictation();setTimeout(()=>{if(dic)speak(dic.list[0].he[0]);},250);}
function renderDictation(){const host=document.getElementById('dicHost');if(!host)return;const d=dic;
  if(d.i>=d.list.length){host.innerHTML=`<div class="card" style="text-align:center"><h2 style="margin-top:0">${d.score} / ${d.list.length}</h2><p class="muted">Dictation done. Listening sharpens fast with practice.</p><button class="btn sm" data-dic-again="1" style="margin-top:10px">Again</button></div>`;
    host.querySelector('[data-dic-again]').onclick=startDictation;return;}
  const it=d.list[d.i];const a=d.checked;
  host.innerHTML=`<div class="dprog"><div class="track"><i style="width:${Math.round(d.i/d.list.length*100)}%"></i></div><div class="num">${d.i+1} / ${d.list.length}</div></div>
    <div class="card" style="text-align:center"><p class="muted" style="font-size:13px">Listen and type what you hear (Hebrew or transliteration).</p>
      <button class="spk" data-dic-play="1" style="margin:10px auto;width:56px;height:56px;font-size:24px">♪</button>
      <input class="inp heb" id="dicIn" placeholder="כְּתֹב כָּאן…" ${a!=null?'disabled':''} style="text-align:center">
      <div class="row" style="justify-content:center;margin-top:10px;gap:8px">${a==null?'<button class="btn" data-dic-check="1">check</button><button class="btn ghost sm" data-dic-skip="1">skip</button>':''}</div>
      ${a!=null?`<div class="banner ${a?'ok':'bad'}" style="margin-top:12px;text-align:start"><span><span class="lbl">${a?'נכון · correct':'לא בדיוק · not quite'}</span><br>${hebClick(it.he[0],it.he[1])} · ${it.en}</span><button class="btn sm" data-dic-next="1">Continue</button></div>`:''}
    </div>`;
  const play=()=>speak(it.he[0]);
  host.querySelector('[data-dic-play]').onclick=play;
  const inp=document.getElementById('dicIn');if(inp&&a==null)inp.focus();
  const check=()=>{const got=norm(inp.value);const ans=[it.he[0],it.he[1],it.en].filter(Boolean);
    const ok=ans.some(x=>norm(x)===got||norm(x).replace(/-/g,'')===got.replace(/-/g,''));
    d.checked=ok;if(ok){d.score++;}if(it.key)mAnswer(it.key,ok);save();renderDictation();};
  const cb=host.querySelector('[data-dic-check]');if(cb)cb.onclick=check;
  if(inp)inp.onkeydown=e=>{if(e.key==='Enter'&&a==null)check();};
  const sk=host.querySelector('[data-dic-skip]');if(sk)sk.onclick=()=>{d.checked=false;if(it.key)mAnswer(it.key,false);save();renderDictation();};
  const nx=host.querySelector('[data-dic-next]');if(nx)nx.onclick=()=>{d.i++;d.checked=null;renderDictation();if(d.i<d.list.length)setTimeout(()=>speak(d.list[d.i].he[0]),250);};
}

=================================================================== */
let mat=null;
function startMatch(){const pool=learnedPool().length>=5?learnedPool():LEX;
  const items=shuffle(pool.slice()).slice(0,5);
  mat={items,he:shuffle(items.map(it=>it.key)),en:shuffle(items.map(it=>it.key)),sel:null,matched:[],wrong:null};renderMatch();}
function renderMatch(){const host=document.getElementById('matHost');if(!host)return;const m=mat;const byKey=k=>m.items.find(x=>x.key===k);
  const done=m.matched.length===m.items.length;
  const col=(arr,side)=>arr.map(k=>{const it=byKey(k);const isM=m.matched.includes(k);const isSel=m.sel&&m.sel.key===k&&m.sel.side===side;const isWrong=m.wrong&&m.wrong.includes(side+':'+k);
    let cls='opt'+(side==='he'?' heb':'');if(isM)cls+=' ok';if(isSel)cls+=' bad';if(isWrong)cls+=' bad';
    return `<button class="${cls}" ${isM?'disabled':''} data-mat-side="${side}" data-mat-key="${encodeURIComponent(k)}">${side==='he'?H(it.v,it.p):it.en}</button>`;}).join('');
  host.innerHTML=`<div class="row spread" style="margin-bottom:10px"><div class="steplabel" style="margin:0">Match pairs</div><button class="btn ghost sm" data-mat-again="1">↺ new round</button></div>
    <div class="card"><p class="muted" style="font-size:13px;margin-bottom:10px">Tap a Hebrew word, then its meaning. ${m.matched.length}/${m.items.length} matched.</p>
      <div class="grid g2" style="gap:14px"><div class="opts">${col(m.he,'he')}</div><div class="opts">${col(m.en,'en')}</div></div>
      ${done?'<div class="banner ok" style="margin-top:12px"><span><span class="lbl">כָּל הַכָּבוֹד · all matched</span></span><button class="btn sm" data-mat-again="1">Again</button></div>':''}
    </div>`;
  host.querySelectorAll('[data-mat-again]').forEach(b=>b.onclick=startMatch);
  host.querySelectorAll('[data-mat-side]').forEach(b=>b.onclick=()=>{const side=b.dataset.matSide;const k=decodeURIComponent(b.dataset.matKey);
    if(m.matched.includes(k))return;
    if(!m.sel){m.sel={side,key:k};m.wrong=null;renderMatch();return;}
    if(m.sel.side===side){m.sel={side,key:k};renderMatch();return;}
    // different columns: check match
    if(m.sel.key===k){m.matched.push(k);const it=byKey(k);if(it.key)mAnswer(it.key,true);addXP(1);m.sel=null;touchDay();save();renderMatch();}
    else{m.wrong=[m.sel.side+':'+m.sel.key,side+':'+k];m.sel=null;renderMatch();setTimeout(()=>{if(mat){mat.wrong=null;renderMatch();}},650);}
  });
}

     <button class="btn sm ghost" id="testVoice" style="margin-top:10px">▶ Test voice: שָׁלוֹם, מַה שְׁלוֹמְךָ?</button></div>
   <div class="card" style="margin-top:14px"><h3>Conversa AI key</h3>
     <p class="muted" style="font-size:13px">Your own Anthropic key powers the live chat and writing feedback. It stays on your device.</p>
     <label>Anthropic API key</label><input class="inp" id="setKey" type="password" placeholder="sk-ant-..." value="${c.anthropicKey||''}">
     <button class="btn sm" id="saveKey" style="margin-top:10px">Save key</button> <span class="muted" id="keyMsg" style="font-size:12.5px"></span></div>
   <div class="card" style="margin-top:14px"><h3>Sync <span class="info">i<span class="tip">Keeps your streak, learned words and progress identical on Mac and iPhone, and safe if a browser clears its cache. Pre-connected to your private "ivrit" Supabase project.</span></span></h3>
     <p class="muted" style="font-size:13px">Pre-connected to your private Supabase project "ivrit". Nothing to enter. Status: <span id="syncTxt2">…</span></p>
     <button class="btn sm ghost" id="pullCloud">pull latest from cloud</button></div>
   <div class="card" style="margin-top:14px"><h3>Backup</h3>
     <p class="muted" style="font-size:13px">Download a snapshot (ivrit-backup-YYYY-MM-DD.json) for the shared Drive back-ups folder. Restore any time.</p>
     <div class="row" style="margin-top:10px"><button class="btn sm" id="doBackup">download backup</button>
       <label class="btn ghost sm" style="cursor:pointer">restore<input type="file" id="doRestore" accept="application/json" style="display:none"></label></div></div>
   <div class="card" style="margin-top:14px"><h3>Reset progress</h3><p class="muted" style="font-size:13px">Clears mastery, course progress and streak. Cannot be undone.</p><button class="btn ghost sm" id="resetProg" style="margin-top:8px">Reset my progress</button></div>`;
}

/* ===================================================================
   BIND
=================================================================== */
function bind(){
  document.querySelectorAll('.w').forEach(el=>el.onclick=e=>{e.stopPropagation();wordPopover(decodeURIComponent(el.dataset.word),e);});
  document.querySelectorAll('[data-speak]').forEach(b=>b.onclick=e=>{e.stopPropagation();speak(decodeURIComponent(b.dataset.speak));});
  document.querySelectorAll('[data-go2]').forEach(b=>b.onclick=()=>{const[s,i,sub]=b.dataset.go2.split('|');go(s,i,sub);});
  document.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>go(b.dataset.back));
  const nt=document.getElementById('nikTop');if(nt)nt.onchange=()=>{S.nikud=nt.checked;saveNikud();render();};
  document.querySelectorAll('[data-rate]').forEach(r=>r.querySelectorAll('b').forEach(b=>b.onclick=()=>{S.grammar[r.dataset.rate]=+b.dataset.n;touchDay();addXP(2);save();render();}));

  // dashboard
  document.querySelectorAll('[data-open-lesson]').forEach(b=>b.onclick=()=>{lsStage=0;go('course',b.dataset.openLesson);});
  document.querySelectorAll('[data-course-chap]').forEach(b=>b.onclick=()=>{courseChap=+b.dataset.courseChap;render();});
  const ccb=document.querySelector('[data-course-chap-back]');if(ccb)ccb.onclick=()=>{if(route.item){const l=COURSE.find(x=>x.id===+route.item);if(l)courseChap=l.chap;route.item=null;go('course');}else{courseChap=0;go('course');}};
  const fd=document.getElementById('finishDay');if(fd)fd.onclick=()=>{S.dailyDone[new Date().toDateString()]=true;touchDay();addXP(10);save();toast('Nice. +10 XP');render();};
  const wu=document.querySelector('[data-warmup]');if(wu)wu.onclick=()=>startVocabDrill(weakPool(10),{title:'Warm-up review',back:'dash'});

  // course lesson stepping
  const lp=document.querySelector('[data-ls-prev]');if(lp)lp.onclick=()=>{lsStage=Math.max(0,lsStage-1);render();};
  const ln=document.querySelector('[data-ls-next]');if(ln)ln.onclick=()=>{lsStage++;save();render();};
  // flip-to-rate word cards (step 1)
  document.querySelectorAll('[data-wcard]').forEach(c=>c.addEventListener('click',e=>{
    if(e.target.closest('.wr'))return; c.classList.toggle('open');}));
  document.querySelectorAll('[data-wstate]').forEach(b=>b.onclick=e=>{e.stopPropagation();
    const k=decodeURIComponent(b.dataset.wkey);const s=+b.dataset.wstate;mSetState(k,s);touchDay();addXP(1);save();
    const card=b.closest('.wcard');if(card)card.querySelectorAll('.wr').forEach(x=>x.classList.toggle('on',x===b));
    toast(s>=2?'ידעתי · known':s===1?'בערך · sort of':'חדש לי · new word');});
  // mini check-in quiz (step 2.5)
  const mh=document.getElementById('miniHost');if(mh){const lid=+mh.dataset.miniLesson;renderMini(lid);}

  const ld=document.querySelector('[data-lesson-drill]');if(ld)ld.onclick=()=>{const l=COURSE.find(x=>x.id===+ld.dataset.lessonDrill);
    let items=catItems(l.vocab).slice();const pr=PRACTICE.find(p=>p.ch===l.grammar);
    const onDone=()=>{completeLesson(l.id);toast('Lesson '+l.id+' complete. +15 XP');go('course');};
    if(pr){startGrammarDrill(pr.items,{title:'Lesson '+l.id+' grammar',back:'course',onDone:()=>{startVocabDrill(items,{title:'Lesson '+l.id+' words',back:'course',onDone});}});}
    else{startVocabDrill(items,{title:'Lesson '+l.id+' practice',back:'course',onDone});}};

  // grammar
  document.querySelectorAll('[data-grammar]').forEach(b=>b.onclick=()=>go('grammar',b.dataset.grammar));
  const pt=document.querySelector('[data-practice-topic]');if(pt)pt.onclick=()=>{const id=+pt.dataset.practiceTopic;const pr=PRACTICE.find(p=>p.ch===id);
    if(pr){startGrammarDrill(pr.items,{title:pr.t,back:'grammar'});}
    else{const l=COURSE.find(x=>x.grammar===id);const items=l?catItems(l.vocab):LEX.slice(0,10);startVocabDrill(items,{title:'Practice',back:'grammar'});}};

  // binyanim
  document.querySelectorAll('[data-binyan]').forEach(b=>b.onclick=()=>go('binyanim',b.dataset.binyan));

  // vocab
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>go('vocab',b.dataset.cat));
  document.querySelectorAll('[data-vocab-add]').forEach(b=>b.onclick=()=>go('vocab','__add__'));
  document.querySelectorAll('[data-practice-cat]').forEach(b=>b.onclick=()=>{const name=decodeURIComponent(b.dataset.practiceCat);startVocabDrill(catItems(name),{title:name,back:route.section==='practice'?'practice':'vocab'});});
  const aw=document.getElementById('awSave');if(aw)aw.onclick=()=>{const v=val('awV');if(!v){toast('Type the Hebrew word');return;}S.customVocab.push({v,p:val('awP'),tl:val('awTl'),en:val('awEn'),it:val('awIt')});buildLex();save();toast('Word saved');go('vocab',encodeURIComponent('My words'));};

  // verbs
  // verb list items are bound inside renderVerbList; only verb-detail drill button here:
  document.querySelectorAll('[data-verb-drill]').forEach(b=>b.onclick=()=>{const v=VERBS.find(x=>x.inf[0]===decodeURIComponent(b.dataset.verbDrill));if(v)startVerbDrill([v],{title:v.en+' · conjugation',max:12,back:'verbs'});});
  // verbs search + filter
  const vq=document.getElementById('verbQ');
  if(vq){
    renderVerbList();
    vq.oninput=renderVerbList;
    document.querySelectorAll('[data-vfilter]').forEach(b=>b.onclick=()=>{
      _verbBinyan=b.dataset.vfilter;
      document.querySelectorAll('[data-vfilter]').forEach(x=>x.classList.toggle('on',x===b));
      renderVerbList();
    });
  }

  // stories
  document.querySelectorAll('[data-story-filter]').forEach(b=>b.onclick=()=>go('stories',null,b.dataset.storyFilter));
  document.querySelectorAll('[data-story]').forEach(b=>b.onclick=()=>{S.stories[b.dataset.story]=true;touchDay();save();go('stories',b.dataset.story);});
  const ra=document.querySelector('[data-readall]');if(ra)ra.onclick=()=>{const st=STORIES.find(s=>s.id===ra.dataset.readall);speakSeq(st.s.map(x=>x[0][0]));};
  const sr=document.querySelector('[data-stopread]');if(sr)sr.onclick=()=>{queue=[];if('speechSynthesis'in window)speechSynthesis.cancel();};
  document.querySelectorAll('[data-quiz]').forEach(b=>b.onclick=()=>{const[sid,qi,oi]=b.dataset.quiz.split('|');const st=STORIES.find(s=>s.id===sid);const q=st.quiz[+qi];const fb=document.getElementById('qf-'+qi);
    if(+oi===q.a){fb.innerHTML='<span class="ans-ok">Correct ✓</span>';addXP(2);save();}else{fb.innerHTML='<span class="ans-bad">Not quite. Answer: '+q.opts[q.a]+'</span>';}});

  // practice modes
  document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{const mode=b.dataset.mode;
    if(mode==='weak'){const w=weakPool(15);if(!w.length){toast('No weak spots yet. Learn some words first.');return;}startVocabDrill(w,{title:'Weak spots',back:'practice'});}
    else if(mode==='mixed'){const p=learnedPool();if(!p.length){toast('Learn some words first.');return;}startVocabDrill(p,{title:'Mixed review',max:12,back:'practice'});}
    else if(mode==='flash'){go('practice',null,'flash');setTimeout(startFlash,30);}
    else if(mode==='cat'){go('practice',null,'cat');}
    else if(mode==='grammar'){go('practice',null,'grammar');}
    else if(mode==='dialogue'){dlg=null;go('practice',null,'dialogue');}
    else if(mode==='scramble'){scr=null;go('practice',null,'scramble');}
    else if(mode==='dictation'){dic=null;go('practice',null,'dictation');}
    else if(mode==='match'){mat=null;go('practice',null,'match');}
    else if(mode==='verbs'){startVerbDrill(VERBS,{title:'Conjugation drill',max:12,back:'practice'});}});
  document.querySelectorAll('[data-practice-ch]').forEach(b=>b.onclick=()=>{const pr=PRACTICE.find(p=>p.ch===+b.dataset.practiceCh);startGrammarDrill(pr.items,{title:'Ch '+pr.ch+' · '+pr.t,back:'practice'});});
  if(route.section==='practice'&&route.sub==='flash')setTimeout(startFlash,20);
  if(route.section==='practice'&&route.sub==='dialogue')setTimeout(renderDialogue,20);
  if(route.section==='practice'&&route.sub==='scramble'&&!scr)setTimeout(startScramble,20);
  if(route.section==='practice'&&route.sub==='dictation'&&!dic)setTimeout(startDictation,20);
  if(route.section==='practice'&&route.sub==='match'&&!mat)setTimeout(startMatch,20);

  // drill engine
  bindDrill();

  // conversa
  document.querySelectorAll('[data-conv]').forEach(b=>b.onclick=()=>{go('conversa',b.dataset.conv);setTimeout(primeChat,30);});
  const cs=document.getElementById('cSend');if(cs){cs.onclick=sendChat;primeChat();}
  const cin=document.getElementById('cIn');if(cin)cin.onkeydown=e=>{if(e.key==='Enter')sendChat();};
  document.querySelectorAll('[data-chip]').forEach(b=>b.onclick=()=>{const i=document.getElementById('cIn');if(i){i.value=decodeURIComponent(b.dataset.chip);i.focus();}});

  // write
  document.querySelectorAll('[data-write-filter]').forEach(b=>b.onclick=()=>go('write',null,decodeURIComponent(b.dataset.writeFilter)));
  document.querySelectorAll('[data-write-prompt]').forEach(b=>b.onclick=()=>go('write',b.dataset.writePrompt));

  // phrasebook
  document.querySelectorAll('[data-phrase-cat]').forEach(b=>b.onclick=()=>{S._phraseQuery='';go('phrases',null,decodeURIComponent(b.dataset.phraseCat));});
  const psearch=document.getElementById('phraseSearch');
  if(psearch)psearch.oninput=()=>{S._phraseQuery=psearch.value;const cur=psearch.selectionStart;render();const ns=document.getElementById('phraseSearch');if(ns){ns.focus();try{ns.setSelectionRange(cur,cur);}catch(e){}}};

  const wb=document.getElementById('wBox');
  if(wb){document.getElementById('wSpeak').onclick=()=>speak(wb.value);
    document.getElementById('wSave').onclick=()=>{if(!wb.value.trim())return;const pr=wb.dataset.prompt?decodeURIComponent(wb.dataset.prompt):'';S.writeEntries.push({date:new Date().toLocaleString(),text:wb.value,prompt:pr});S.writeDraft='';touchDay();addXP(5);save();toast('Entry saved. +5 XP');render();};
    wb.oninput=()=>{S.writeDraft=wb.value;};
    document.getElementById('wFeedback').onclick=()=>writeFeedback(wb.value);}

  // settings
  const sn=document.getElementById('setNik');if(sn)sn.onchange=()=>{S.nikud=sn.checked;saveNikud();render();};
  const sv=document.getElementById('setVoice');if(sv)sv.onchange=()=>{S.voiceURI=sv.value;save();};
  const srng=document.getElementById('setRate');if(srng)srng.oninput=()=>{S.rate=+srng.value;document.getElementById('rateVal').textContent=(+srng.value).toFixed(2)+'x';save();};
  const tv=document.getElementById('testVoice');if(tv)tv.onclick=()=>speak('שלום, מה שלומך?');
  const sk=document.getElementById('saveKey');if(sk)sk.onclick=()=>{S.cfg.anthropicKey=val('setKey');save();document.getElementById('keyMsg').innerHTML='<span class="ans-ok">Saved ✓</span>';toast('API key saved');};
  const pc=document.getElementById('pullCloud');if(pc)pc.onclick=()=>{syncDown();toast('Pulling from cloud…');};
  const db=document.getElementById('doBackup');if(db)db.onclick=backupJSON;
  const dr=document.getElementById('doRestore');if(dr)dr.onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0]);};
  const st2=document.getElementById('syncTxt2');if(st2)st2.textContent=document.getElementById('syncTxt').textContent;
  const rp=document.getElementById('resetProg');if(rp)rp.onclick=()=>{if(confirm('Reset all progress?')){S.mastery={};S.grammar={};S.course={done:{},lesson:1};S.streak=0;S.xp=0;S.stories={};save();toast('Progress reset');go('dash');}};
}
function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function norm(s){return stripN(s).toLowerCase().replace(/[\u2013\u2014'"`.,!?]/g,'').replace(/\s+/g,' ').trim();}

/* drill bind */
function bindDrill(){
  if(route.section!=='drill'||!drill)return;
  const d=drill;
  document.querySelectorAll('[data-drill-exit]').forEach(b=>b.onclick=()=>{const back=d.back||'practice';drill=null;go(back);});
  document.querySelectorAll('[data-drill-pick]').forEach(b=>b.onclick=()=>{if(d.answered)return;const chosen=decodeURIComponent(b.dataset.drillPick);const it=d.items[d.i];const ok=chosen===it.en;mAnswer(it.key,ok);if(ok)d.score++;else d.wrong.push(it);d.answered={chosen,ok};save();render();});
  const ck=document.querySelector('[data-drill-check]');if(ck)ck.onclick=drillCheck;
  const ti=document.getElementById('dType');if(ti)ti.onkeydown=e=>{if(e.key==='Enter')drillCheck();};
  const sk=document.querySelector('[data-drill-skip]');if(sk)sk.onclick=()=>{const it=d.items[d.i];mAnswer(it.key,false);d.wrong.push(it);d.answered={chosen:'',ok:false};save();render();};
  const hb=document.querySelector('[data-drill-hint]');if(hb)hb.onclick=()=>{const it=d.items[d.i];const h=document.getElementById('dHint');if(h)h.textContent=it.hint||('sounds like: '+(it.tl||''));};
  const nx=document.querySelector('[data-drill-next]');if(nx)nx.onclick=()=>{d.i++;d.answered=null;render();};
  const ag=document.querySelector('[data-drill-again]');if(ag)ag.onclick=()=>{d.i=0;d.score=0;d.wrong=[];d.answered=null;d.items=shuffle(d.items);render();};
  const fn=document.querySelector('[data-drill-finish]');if(fn)fn.onclick=()=>{const cb=d.done;const back=d.back||'practice';drill=null;if(cb)cb();else go(back);};
}
function drillCheck(){const d=drill;const ti=document.getElementById('dType');if(!ti)return;const got=norm(ti.value);
  if(d.typed){const it=d.items[d.i];const ok=it.a.some(a=>norm(a)===got||norm(a).replace(/-/g,'')===got.replace(/-/g,''));if(ok)d.score++;else d.wrong.push(it);d.answered={ok};render();}
  else{const it=d.items[d.i];let ok;
    if(d.vkind===1){const ans=[it.v,it.p,it.tl].filter(Boolean);ok=ans.some(a=>norm(a)===got||norm(a).replace(/-/g,'')===got.replace(/-/g,''));}
    else{ok=(norm(it.en).includes(got)&&got.length>1)||norm(it.tl)===got;}
    mAnswer(it.key,ok);if(ok)d.score++;else d.wrong.push(it);d.answered={chosen:'',ok};save();render();}
}

/* ===================================================================
   WORD POPOVER + LEX LOOKUP
=================================================================== */
function lexLookup(word){const bare=stripN(word);
  for(const it of LEX){if(stripN(it.v)===bare||(it.p&&it.p===bare))return {tl:it.tl,en:it.en};}
  for(const v of VERBS){if(stripN(v.inf[0])===bare)return {tl:'',en:v.en,extra:v.binyan+' · '+v.root};
    for(const grp of[[v.present,'present'],[v.past,'past'],[v.future,'future']]){for(const r of grp[0]){if(stripN(r[1][0])===bare)return {tl:'',en:v.en+' ('+grp[1]+', '+r[0]+')',extra:v.binyan+' · '+v.root};}}}
  return null;}
function wordPopover(word,e){const pop=document.getElementById('pop');const info=lexLookup(word);
  pop.innerHTML=`<div class="row spread"><span class="hw">${word}</span><button class="spk" id="popSpk">♪</button></div>${info?`<div class="tl" style="margin-top:6px">${info.tl||''}</div><div class="en">${info.en}</div>${info.extra?`<div class="faint" style="font-size:11.5px;margin-top:3px">${info.extra}</div>`:''}`:'<div class="muted" style="margin-top:6px;font-size:12.5px">Tap to hear it.</div>'}`;
  const x=Math.min(e.clientX,window.innerWidth-280);const y=Math.min(e.clientY+14,window.innerHeight-120);
  pop.style.left=x+'px';pop.style.top=y+'px';pop.classList.add('show');
  document.getElementById('popSpk').onclick=()=>speak(word);
  setTimeout(()=>document.addEventListener('click',hidePop,{once:true}),10);
  function hidePop(){pop.classList.remove('show');}
}

/* ===================================================================
   AI: conversa + writing feedback
=================================================================== */
function primeChat(){if(route.section!=='conversa'||!route.item)return;const sc=CONVERSA.find(c=>c.id===route.item);if(!sc)return;
  if(!chat.length||chat.__id!==sc.id){chat=[{role:'assistant',content:sc.open[0]}];chat.__id=sc.id;}renderChat();}
function renderChat(){const c=document.getElementById('chat');if(!c)return;
  c.innerHTML=chat.map(m=>`<div class="msg ${m.role==='assistant'?'ai':'me'}">${hebClick(m.display||m.content)}</div>`).join('')+(busy?'<div class="typing">…</div>':'');
  c.querySelectorAll('.w').forEach(el=>el.onclick=ev=>{ev.stopPropagation();wordPopover(decodeURIComponent(el.dataset.word),ev);});
  c.scrollTop=c.scrollHeight;}
async function sendChat(){const inp=document.getElementById('cIn');const text=inp.value.trim();if(!text||busy)return;
  inp.value='';chat.push({role:'user',content:text});touchDay();addXP(2);save();renderChat();
  const sc=CONVERSA.find(c=>c.id===route.item);const key=S.cfg&&S.cfg.anthropicKey;
  if(!key){chat.push({role:'assistant',content:'(הוֹסֵף מַפְתֵּחַ בְּהַגְדָּרוֹת)',display:'Add your Anthropic key in Settings for live replies.'});renderChat();return;}
  busy=true;renderChat();
  const sys=`${sc.char} You are speaking with Vincenzo. Reply ONLY in modern spoken Hebrew${sc.free?'':' at '+sc.lvl+' level'}, short and natural (1-2 sentences). Address him with masculine forms. If he makes a clear mistake, model the correct form briefly. Do not translate unless asked.`;
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,messages:chat.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content}))})});
    const d=await r.json();busy=false;const txt=(d.content&&d.content.filter(x=>x.type==='text').map(x=>x.text).join(' '))||'(...)';
    chat.push({role:'assistant',content:txt});renderChat();}catch(e){busy=false;chat.push({role:'assistant',content:'(שְׁגִיאָה)',display:'Connection error. Check your key and network.'});renderChat();}}
async function writeFeedback(text){const fb=document.getElementById('wFb');const key=S.cfg&&S.cfg.anthropicKey;
  if(!text.trim()){fb.textContent='Write something first.';return;}
  if(!key){fb.innerHTML='<span class="muted">Add your Anthropic key in Settings to get feedback.</span>';return;}
  fb.textContent='Reading your text…';
  try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
      system:"You are a warm Hebrew tutor for an Italian beginner (A1-A2, male). The user writes Hebrew. Reply in English. Give: (1) a corrected version of their Hebrew, (2) 2-3 short bullet notes on the main fixes in plain language, (3) one encouraging line. Keep it brief.",
      messages:[{role:'user',content:text}]})});
    const d=await r.json();const txt=(d.content&&d.content.filter(x=>x.type==='text').map(x=>x.text).join(' '))||'(no response)';
    fb.innerHTML=txt.replace(/\n/g,'<br>');}catch(e){fb.textContent='Connection error. Check your key.';}}

/* ===================================================================
   BOOT
=================================================================== */
buildLex();buildNav();render();setSync(false);syncDown();
setTimeout(()=>{loadVoices();if(route.section==='settings'||route.section==='pron')render();},600);
